<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Granice funkcji</title>
</head>
<body>
<script type="module">
import { VizCore, T, COLORS, drawTextC } from '../lib/viz-core.js';

// ── Click-to-expand proof: epsilon-delta definition ────────────────
const PROOF_EPS_DELTA = {
  title: () => T('Definicja \u03B5–\u03B4 (Cauchy\u2019ego)', 'The \u03B5–\u03B4 definition (Cauchy)'),
  lines: [
    { text: T('Co to znaczy lim\u2093\u2192\u2090 f(x) = L?', 'What does lim\u2093\u2192\u2090 f(x) = L mean?'), size: 12 },
    '',
    { text: T('Intuicyjnie: f(x) mo\u017Cna uczyni\u0107 dowolnie blisko L,', 'Intuition: f(x) can be made arbitrarily close to L'), size: 11, color: 'rgba(255,255,255,0.75)' },
    { text: T('je\u015Bli tylko x we\u017Amiemy dostatecznie blisko a.', 'if only we take x sufficiently close to a.'), size: 11, color: 'rgba(255,255,255,0.75)' },
    '',
    { text: T('Formalnie:', 'Formally:'), size: 11, color: COLORS.CYAN, bold: true },
    { text: T('dla ka\u017Cdego \u03B5 > 0 istnieje \u03B4 > 0, takie \u017Ce', 'for every \u03B5 > 0 there exists \u03B4 > 0 such that'), size: 12, color: COLORS.YELLOW },
    { text: '0 < |x \u2212 a| < \u03B4   \u21D2   |f(x) \u2212 L| < \u03B5', size: 12, color: COLORS.YELLOW },
    '',
    { text: T('Gra: przeciwnik wybiera \u03B5, ty musisz znale\u017A\u0107 \u03B4.', 'A game: the opponent picks \u03B5, you must find \u03B4.'), size: 10, color: COLORS.ORANGE },
    { text: T('Je\u015Bli dla KA\u017BDEGO \u03B5 umiesz znale\u017A\u0107 dobr\u0105 \u03B4 \u2014 granica to L.', 'If for EVERY \u03B5 you can find a working \u03B4 \u2014 the limit is L.'), size: 10, color: COLORS.ORANGE },
    '',
    { text: T('Warunek 0 < |x\u2212a| wyklucza sam punkt x = a.', 'The condition 0 < |x\u2212a| excludes the point x = a itself.'), size: 10, color: COLORS.PINK },
    { text: T('Warto\u015B\u0107 f(a) NIE WP\u0141YWA na granic\u0119 w a.', 'The value f(a) does NOT affect the limit at a.'), size: 10, color: COLORS.PINK },
  ],
};

// f(x) = (x^2 - 1)/(x - 1) — undefined at x = 1, equals x + 1 elsewhere
const fHole = (x) => {
  if (Math.abs(x - 1) < 1e-9) return NaN;
  return (x * x - 1) / (x - 1);
};

VizCore.init({
  title: T('Granice funkcji', 'Limits of Functions'),
  H: 360,
  stages: [

    // ── Stage 0: Intuicja ─ function with a hole ─────────────────
    {
      title: () => T('Intuicja — dziura w wykresie', 'Intuition — a hole in the graph'),
      desc:  () => T(
        'Funkcja f(x) = (x\u00B2\u22121)/(x\u22121) nie jest okre\u015Blona w x = 1 (bo 0/0). Ale wsz\u0119dzie indziej upraszcza si\u0119 do x + 1. Czego brakuje w x = 1?',
        'The function f(x) = (x\u00B2\u22121)/(x\u22121) is undefined at x = 1 (because 0/0). But everywhere else it simplifies to x + 1. What is missing at x = 1?'
      ),
      draw(cx, W, H) {
        drawPlot(cx, W, H, {
          xMin: -1.5, xMax: 3.5, yMin: -1, yMax: 5,
          showHole: true, showLimitLine: false, xHighlight: null,
          label: 'f(x) = (x\u00B2\u22121)/(x\u22121)',
          note: T('dziura w (1, 2)', 'hole at (1, 2)'),
        });
      },
    },

    // ── Stage 1: Przybliżanie ─ zoom window ──────────────────────
    {
      title: () => T('Przybli\u017Canie — im bli\u017Cej, tym pro\u015Bciej', 'Zooming in — the closer, the straighter'),
      desc:  () => T(
        'Zmniejsz okno wok\u00F3\u0142 x = 1. Dla x bliskich 1 warto\u015Bci f(x) d\u0105\u017C\u0105 do 2 \u2014 zar\u00F3wno z lewej, jak i z prawej strony. Krzywa wygl\u0105da coraz bardziej jak prosta.',
        'Shrink the window around x = 1. For x close to 1, f(x) approaches 2 \u2014 both from the left and from the right. The curve looks more and more like a straight line.'
      ),
      sliders: [
        { id: 'zoom', lbl: 'okno', color: COLORS.CYAN, min: 0.02, max: 2.5, step: 0.01, val: 2.0 },
      ],
      draw(cx, W, H, vals) {
        const w = vals.zoom;
        drawPlot(cx, W, H, {
          xMin: 1 - w, xMax: 1 + w,
          yMin: 2 - w, yMax: 2 + w,
          showHole: true, showLimitLine: true, xHighlight: null,
          label: 'f(x) = (x\u00B2\u22121)/(x\u22121)',
          note: T('okno \u00B1' + w.toFixed(2) + ' wok\u00F3\u0142 x = 1',
                  'window \u00B1' + w.toFixed(2) + ' around x = 1'),
        });

        // Live numerical readout of f near x = 1
        const dx = w * 0.5;
        const xL = 1 - dx, xR = 1 + dx;
        const yL = fHole(xL), yR = fHole(xR);
        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = 'rgba(255,255,255,0.55)';
        cx.fillText('f(' + xL.toFixed(3) + ') = ' + yL.toFixed(4), 14, H - 28);
        cx.fillText('f(' + xR.toFixed(3) + ') = ' + yR.toFixed(4), 14, H - 12);
        cx.fillStyle = COLORS.GREEN; cx.textAlign = 'right';
        cx.fillText('\u2192 lim = 2', W - 14, H - 12);
      },
    },

    // ── Stage 2: Granica ≠ wartość w punkcie ─────────────────────
    {
      title: () => T('Granica \u2260 warto\u015B\u0107 w punkcie', 'The limit is not the value at the point'),
      desc:  () => T(
        'Granica to warto\u015B\u0107, do kt\u00F3rej funkcja D\u0104\u017BY \u2014 nie wymaga, by f(a) w og\u00F3le istnia\u0142o. Tutaj f(1) nie istnieje, a mimo to lim\u2093\u21921 f(x) = 2.',
        'The limit is the value that the function APPROACHES \u2014 it does not require f(a) to exist at all. Here f(1) is undefined, yet lim\u2093\u21921 f(x) = 2.'
      ),
      draw(cx, W, H) {
        drawPlot(cx, W, H, {
          xMin: -1.5, xMax: 3.5, yMin: -1, yMax: 5,
          showHole: true, showLimitLine: true, xHighlight: 1,
          label: 'f(x) = (x\u00B2\u22121)/(x\u22121)',
          note: '',
        });

        cx.font = 'bold 13px monospace'; cx.textAlign = 'right';
        cx.fillStyle = COLORS.PINK;
        cx.fillText('f(1) =  ?   (nieokre\u015Blona)', W - 14, 22);
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('lim\u2093\u21921 f(x) = 2', W - 14, 42);

        cx.font = '11px monospace'; cx.textAlign = 'right';
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.fillText(T('dwie r\u00F3\u017Cne rzeczy!', 'two different things!'), W - 14, 58);
      },
    },

    // ── Stage 3: Epsilon–delta ───────────────────────────────────
    {
      title: () => T('Epsilon\u2013delta: jak blisko potrzebujesz?',
                     'Epsilon\u2013delta: how close do you need to get?'),
      desc:  () => T(
        'Wybierz \u03B5 \u2014 poziomy pas wok\u00F3\u0142 L = 2. Znajd\u017A \u03B4 tak, by WSZYSTKIE x z (1\u2212\u03B4, 1+\u03B4) \\ {1} wpada\u0142y w pas. Zielony znacznik = sukces. Kliknij fioletowy kafelek po wyja\u015Bnienie definicji.',
        'Pick \u03B5 \u2014 a horizontal band around L = 2. Find \u03B4 so that ALL x in (1\u2212\u03B4, 1+\u03B4) \\ {1} land inside the band. Green marker = success. Click the purple tile for the definition.'
      ),
      sliders: [
        { id: 'eps', lbl: '\u03B5', color: COLORS.YELLOW, min: 0.05, max: 1.0, step: 0.01, val: 0.5 },
        { id: 'del', lbl: '\u03B4', color: COLORS.ORANGE, min: 0.02, max: 1.0, step: 0.01, val: 0.8 },
      ],
      draw(cx, W, H, vals, proof) {
        const eps = vals.eps, del = vals.del;

        drawPlot(cx, W, H, {
          xMin: -0.2, xMax: 2.2, yMin: 0.6, yMax: 3.4,
          showHole: true, showLimitLine: true, xHighlight: 1,
          label: 'f(x) = (x\u00B2\u22121)/(x\u22121)',
          note: '',
          overlay(g) {
            // Epsilon band (yellow horizontal strip around y=2)
            const yTop = g.py(2 + eps), yBot = g.py(2 - eps);
            g.cx.save();
            g.cx.fillStyle = 'rgba(255,209,102,0.12)';
            g.cx.fillRect(g.plotX, yTop, g.plotW, yBot - yTop);
            g.cx.strokeStyle = 'rgba(255,209,102,0.55)';
            g.cx.setLineDash([4, 3]); g.cx.lineWidth = 1;
            g.cx.beginPath(); g.cx.moveTo(g.plotX, yTop); g.cx.lineTo(g.plotX + g.plotW, yTop); g.cx.stroke();
            g.cx.beginPath(); g.cx.moveTo(g.plotX, yBot); g.cx.lineTo(g.plotX + g.plotW, yBot); g.cx.stroke();
            g.cx.setLineDash([]);
            g.cx.restore();

            // Delta band (orange vertical strip around x=1)
            const xL = g.px(1 - del), xR = g.px(1 + del);
            g.cx.save();
            g.cx.fillStyle = 'rgba(255,107,53,0.10)';
            g.cx.fillRect(xL, g.plotY, xR - xL, g.plotH);
            g.cx.strokeStyle = 'rgba(255,107,53,0.55)';
            g.cx.setLineDash([4, 3]); g.cx.lineWidth = 1;
            g.cx.beginPath(); g.cx.moveTo(xL, g.plotY); g.cx.lineTo(xL, g.plotY + g.plotH); g.cx.stroke();
            g.cx.beginPath(); g.cx.moveTo(xR, g.plotY); g.cx.lineTo(xR, g.plotY + g.plotH); g.cx.stroke();
            g.cx.setLineDash([]);
            g.cx.restore();
          },
        });

        // Away from x=1, f(x) = x+1, so |f(x)-2| = |x-1|. The condition
        // |f(x)-2| < eps for all x in (1-del, 1+del)\{1} holds iff del <= eps.
        const pass = del <= eps + 1e-9;

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('\u03B5 = ' + eps.toFixed(2) + '   \u2192 pas y \u2208 (' + (2 - eps).toFixed(2) + ', ' + (2 + eps).toFixed(2) + ')', 14, 22);
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText('\u03B4 = ' + del.toFixed(2) + '   \u2192 x \u2208 (' + (1 - del).toFixed(2) + ', ' + (1 + del).toFixed(2) + ')', 14, 40);

        cx.font = 'bold 12px monospace';
        cx.fillStyle = pass ? COLORS.GREEN : COLORS.PINK;
        cx.fillText(pass
          ? T('\u2713  dla tego \u03B5 wystarczy \u03B4 = ' + del.toFixed(2), '\u2713  this \u03B4 works for this \u03B5')
          : T('\u2717  \u03B4 za du\u017Ce \u2014 zmniejsz \u03B4 (lub zwi\u0119ksz \u03B5)', '\u2717  \u03B4 too large \u2014 shrink \u03B4 (or raise \u03B5)'),
          14, 58);

        cx.font = '10px monospace'; cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.fillText(T('tu: |f(x)\u22122| = |x\u22121|, wi\u0119c dzia\u0142a ka\u017Cde \u03B4 \u2264 \u03B5',
                      'here: |f(x)\u22122| = |x\u22121|, so any \u03B4 \u2264 \u03B5 works'), 14, 74);

        // Clickable proof tile (bottom-right)
        const tX = W - 200, tY = H - 32;
        cx.save();
        cx.fillStyle = 'rgba(192,128,255,0.10)';
        cx.fillRect(tX, tY, 186, 22);
        cx.strokeStyle = 'rgba(192,128,255,0.4)';
        cx.strokeRect(tX, tY, 186, 22);
        cx.restore();
        drawTextC(cx, T('definicja \u03B5\u2013\u03B4', '\u03B5\u2013\u03B4 definition'),
                  tX + 93, tY + 11, 'bold 11px monospace', COLORS.PURPLE);
        proof.registerCell(tX, tY, 186, 22, PROOF_EPS_DELTA);
      },
    },

    // ── Stage 4: Granice jednostronne — 1/x ──────────────────────
    {
      title: () => T('Granice jednostronne \u2014 lewa \u2260 prawa',
                     'One-sided limits \u2014 left \u2260 right'),
      desc:  () => T(
        'Dla f(x) = 1/x przy x \u2192 0: z lewej f \u2192 \u2212\u221E, z prawej f \u2192 +\u221E. Granice jednostronne si\u0119 r\u00F3\u017Cni\u0105, wi\u0119c granica obustronna NIE ISTNIEJE.',
        'For f(x) = 1/x as x \u2192 0: from the left f \u2192 \u2212\u221E, from the right f \u2192 +\u221E. The one-sided limits differ, so the two-sided limit DOES NOT EXIST.'
      ),
      draw(cx, W, H) {
        drawPlot(cx, W, H, {
          xMin: -3, xMax: 3, yMin: -4, yMax: 4,
          fn: x => (Math.abs(x) < 0.01) ? NaN : 1 / x,
          showHole: false, showLimitLine: false, xHighlight: 0,
          label: 'f(x) = 1/x',
          note: '',
        });

        cx.font = 'bold 12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.PINK;
        cx.fillText('lim\u2093\u21920\u207B 1/x = \u2212\u221E', 14, 22);
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('lim\u2093\u21920\u207A 1/x = +\u221E', 14, 40);
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('lim\u2093\u21920  1/x   \u2014 nie istnieje', 14, 58);

        cx.font = '10px monospace'; cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.fillText(T('granica obustronna istnieje \u27FA obie jednostronne istniej\u0105 i s\u0105 r\u00F3wne',
                      'two-sided limit exists \u27FA both one-sided limits exist and agree'), 14, H - 14);
      },
    },

    // ── Stage 5: Nie istnieje — oscylacja sin(1/x) ───────────────
    {
      title: () => T('Nie istnieje \u2014 oscylacja sin(1/x)',
                     'Does not exist \u2014 the oscillation sin(1/x)'),
      desc:  () => T(
        'Dla f(x) = sin(1/x) przy x \u2192 0 warto\u015Bci skacz\u0105 mi\u0119dzy \u22121 a 1 niesko\u0144czenie cz\u0119sto. Nie ma jednej liczby L, do kt\u00F3rej f d\u0105\u017Cy \u2014 granica nie istnieje.',
        'For f(x) = sin(1/x) as x \u2192 0 the values jump between \u22121 and 1 infinitely often. There is no single L to approach \u2014 the limit does not exist.'
      ),
      draw(cx, W, H) {
        drawPlot(cx, W, H, {
          xMin: -0.4, xMax: 0.4, yMin: -1.4, yMax: 1.4,
          fn: x => (Math.abs(x) < 1e-4) ? NaN : Math.sin(1 / x),
          samples: 3000,
          showHole: false, showLimitLine: false, xHighlight: 0,
          label: 'f(x) = sin(1/x)',
          note: T('oscylacja bez ko\u0144ca w pobli\u017Cu 0', 'endless oscillation near 0'),
        });

        cx.font = 'bold 12px monospace'; cx.textAlign = 'right';
        cx.fillStyle = COLORS.PINK;
        cx.fillText('lim\u2093\u21920 sin(1/x)  \u2014 nie istnieje', W - 14, 22);
      },
    },

  ],
});

// ──────────────────────────────────────────────────────────────────
// Shared plotting routine
// opts: { xMin,xMax,yMin,yMax, fn?, showHole?, showLimitLine?,
//         xHighlight?, label?, note?, samples?, overlay?(g) }
// ──────────────────────────────────────────────────────────────────
function drawPlot(cx, W, H, opts) {
  const fn = opts.fn || fHole;
  const xMin = opts.xMin, xMax = opts.xMax;
  const yMin = opts.yMin, yMax = opts.yMax;

  const plotX = 50, plotY = 86;
  const plotW = W - 70, plotH = H - 130;
  const px = (x) => plotX + (x - xMin) / (xMax - xMin) * plotW;
  const py = (y) => plotY + plotH - (y - yMin) / (yMax - yMin) * plotH;

  // Frame
  cx.save();
  cx.fillStyle = 'rgba(255,255,255,0.02)';
  cx.fillRect(plotX, plotY, plotW, plotH);
  cx.strokeStyle = 'rgba(255,255,255,0.08)';
  cx.lineWidth = 0.5;
  cx.strokeRect(plotX, plotY, plotW, plotH);
  cx.restore();

  // Gridlines
  cx.save();
  cx.strokeStyle = 'rgba(255,255,255,0.06)';
  cx.lineWidth = 0.5;
  const xStep = pickStep(xMax - xMin);
  const yStep = pickStep(yMax - yMin);
  for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax + 1e-9; x += xStep) {
    const sx = px(x);
    cx.beginPath(); cx.moveTo(sx, plotY); cx.lineTo(sx, plotY + plotH); cx.stroke();
  }
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax + 1e-9; y += yStep) {
    const sy = py(y);
    cx.beginPath(); cx.moveTo(plotX, sy); cx.lineTo(plotX + plotW, sy); cx.stroke();
  }
  cx.restore();

  // Axes (if visible)
  cx.save();
  cx.strokeStyle = 'rgba(255,255,255,0.28)';
  cx.lineWidth = 1;
  if (xMin <= 0 && 0 <= xMax) {
    const sx = px(0);
    cx.beginPath(); cx.moveTo(sx, plotY); cx.lineTo(sx, plotY + plotH); cx.stroke();
  }
  if (yMin <= 0 && 0 <= yMax) {
    const sy = py(0);
    cx.beginPath(); cx.moveTo(plotX, sy); cx.lineTo(plotX + plotW, sy); cx.stroke();
  }
  cx.restore();

  // Tick labels
  cx.font = '12px monospace';
  cx.fillStyle = 'rgba(255,255,255,0.4)';
  cx.textAlign = 'center'; cx.textBaseline = 'top';
  for (let x = Math.ceil(xMin / xStep) * xStep; x <= xMax + 1e-9; x += xStep) {
    if (Math.abs(x) < 1e-9) continue;
    cx.fillText(fmtTick(x), px(x), plotY + plotH + 4);
  }
  cx.textAlign = 'right'; cx.textBaseline = 'middle';
  for (let y = Math.ceil(yMin / yStep) * yStep; y <= yMax + 1e-9; y += yStep) {
    if (Math.abs(y) < 1e-9) continue;
    cx.fillText(fmtTick(y), plotX - 4, py(y));
  }

  // Horizontal L=2 line
  if (opts.showLimitLine && fn === fHole) {
    if (2 >= yMin && 2 <= yMax) {
      cx.save();
      cx.strokeStyle = COLORS.GREEN;
      cx.lineWidth = 1;
      cx.setLineDash([5, 4]);
      cx.beginPath(); cx.moveTo(plotX, py(2)); cx.lineTo(plotX + plotW, py(2)); cx.stroke();
      cx.setLineDash([]);
      cx.restore();
      drawTextC(cx, 'L = 2', plotX + plotW - 20, py(2) - 9, '12px monospace', COLORS.GREEN);
    }
  }

  // Vertical highlight x = a
  if (opts.xHighlight !== null && opts.xHighlight !== undefined) {
    const xa = opts.xHighlight;
    if (xa >= xMin && xa <= xMax) {
      cx.save();
      cx.strokeStyle = 'rgba(255,255,255,0.20)';
      cx.lineWidth = 1; cx.setLineDash([3, 4]);
      const sx = px(xa);
      cx.beginPath(); cx.moveTo(sx, plotY); cx.lineTo(sx, plotY + plotH); cx.stroke();
      cx.setLineDash([]);
      cx.restore();
      drawTextC(cx, 'x = ' + xa, px(xa), plotY - 8,
        '12px monospace', 'rgba(255,255,255,0.55)');
    }
  }

  // Overlay bands (ε/δ)
  if (opts.overlay) {
    opts.overlay({ cx, px, py, plotX, plotY, plotW, plotH });
  }

  // Plot curve
  cx.save();
  cx.beginPath();
  cx.rect(plotX, plotY, plotW, plotH);
  cx.clip();

  const samples = opts.samples || 600;
  cx.strokeStyle = COLORS.CYAN;
  cx.lineWidth = 2;
  cx.shadowColor = COLORS.CYAN;
  cx.shadowBlur = 4;
  cx.beginPath();
  let penDown = false;
  let prevY = null;
  for (let i = 0; i <= samples; i++) {
    const x = xMin + (xMax - xMin) * (i / samples);
    const y = fn(x);
    if (!isFinite(y) || isNaN(y)) { penDown = false; prevY = null; continue; }
    if (prevY !== null && Math.abs(y - prevY) > (yMax - yMin) * 0.8) {
      penDown = false;
    }
    const sx = px(x), sy = py(y);
    if (!penDown) { cx.moveTo(sx, sy); penDown = true; }
    else cx.lineTo(sx, sy);
    prevY = y;
  }
  cx.stroke();
  cx.shadowBlur = 0;
  cx.restore();

  // Hole at (1, 2)
  if (opts.showHole && fn === fHole) {
    const hx = px(1), hy = py(2);
    if (hx >= plotX && hx <= plotX + plotW && hy >= plotY && hy <= plotY + plotH) {
      cx.save();
      cx.beginPath(); cx.arc(hx, hy, 5, 0, Math.PI * 2);
      cx.fillStyle = COLORS.BG;
      cx.fill();
      cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2;
      cx.stroke();
      cx.restore();
    }
  }

  // Header label & note (drawn after so they sit on top)
  if (opts.label) {
    cx.font = 'bold 13px monospace'; cx.textAlign = 'left';
    cx.fillStyle = COLORS.CYAN;
    cx.fillText(opts.label, 14, 70);
  }
  if (opts.note) {
    cx.font = '12px monospace'; cx.textAlign = 'right';
    cx.fillStyle = 'rgba(255,255,255,0.5)';
    cx.fillText(opts.note, W - 14, 70);
  }
}

function pickStep(range) {
  const target = range / 6;
  const mag = Math.pow(10, Math.floor(Math.log10(target)));
  const norm = target / mag;
  let step;
  if (norm < 1.5) step = 1;
  else if (norm < 3.5) step = 2;
  else if (norm < 7.5) step = 5;
  else step = 10;
  return step * mag;
}

function fmtTick(v) {
  const abs = Math.abs(v);
  if (abs >= 100 || (abs > 0 && abs < 0.01)) return v.toExponential(0);
  if (Number.isInteger(v)) return v.toString();
  return v.toFixed(abs < 1 ? 2 : 1);
}
</script>
