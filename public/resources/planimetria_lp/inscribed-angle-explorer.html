<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kąt wpisany — eksplorator</title>
</head>
<body>
<script type="module">
import { VizCore, T, COLORS, clampStage } from '../lib/viz-core.js';

const { cv, cx, W, H, getCanvasPos } = VizCore.init({
  title: T('Kąt wpisany — eksplorator', 'Inscribed Angle — Explorer'),
  H: 360,
  stages: [
    // ── Stage 0: Central vs inscribed angle ──────────────────────
    {
      title: () => T('Kąt środkowy i wpisany', 'Central and inscribed angle'),
      desc:  () => T(
        'Kąt środkowy (czerwony) ma wierzchołek w centrum okręgu. Kąt wpisany (cyjanowy) ma wierzchołek NA okręgu. Przesuń suwak, żeby zmienić łuk.',
        'The central angle (red) has its vertex at the circle\'s centre. The inscribed angle (cyan) has its vertex ON the circle. Move the slider to change the arc.'
      ),
      sliders: [
        { id: 'arc', lbl: 'łuk', color: COLORS.CYAN, min: 10, max: 340, step: 1, val: 120 },
      ],
      draw(cx, W, H, vals) {
        const CX = W / 2, CY = H / 2 + 10, R = 110;
        const arc = vals.arc * Math.PI / 180;

        // arc endpoints A and B (fixed at ±arc/2 from top)
        const a1 = -Math.PI / 2 - arc / 2;
        const a2 = -Math.PI / 2 + arc / 2;
        const Ax = CX + R * Math.cos(a1), Ay = CY + R * Math.sin(a1);
        const Bx = CX + R * Math.cos(a2), By = CY + R * Math.sin(a2);

        // inscribed point P (bottom of circle)
        const Px = CX + R * Math.cos(Math.PI / 2), Py = CY + R * Math.sin(Math.PI / 2);

        // Draw circle
        cx.beginPath(); cx.arc(CX, CY, R, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1.5; cx.stroke();

        // Highlighted arc (major arc from B to A going right)
        cx.beginPath(); cx.arc(CX, CY, R, a2, a1 + Math.PI * 2);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 3;
        cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 6; cx.stroke(); cx.shadowBlur = 0;

        // Central angle lines (center → A, center → B)
        cx.beginPath(); cx.moveTo(CX, CY); cx.lineTo(Ax, Ay);
        cx.moveTo(CX, CY); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 2; cx.stroke();

        // Inscribed angle lines (P → A, P → B)
        cx.beginPath(); cx.moveTo(Px, Py); cx.lineTo(Ax, Ay);
        cx.moveTo(Px, Py); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2; cx.stroke();

        // Points
        [
          [Ax, Ay, 5, COLORS.GREEN],
          [Bx, By, 5, COLORS.GREEN],
          [CX, CY, 5, COLORS.ORANGE],
          [Px, Py, 7, COLORS.CYAN],
        ].forEach(([x, y, r, c]) => {
          cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2);
          cx.fillStyle = c; cx.shadowColor = c; cx.shadowBlur = 10;
          cx.fill(); cx.shadowBlur = 0;
        });

        // Labels
        cx.font = 'bold 13px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText(Math.round(vals.arc) + '°', CX + 2, CY - 12);
        cx.fillStyle = COLORS.CYAN;
        cx.fillText(Math.round(vals.arc / 2) + '°', Px + 22, Py - 12);

        // Legend
        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.ORANGE; cx.fillText('∠ środkowy = ' + Math.round(vals.arc) + '°', 16, 22);
        cx.fillStyle = COLORS.CYAN;   cx.fillText('∠ wpisany  = ' + Math.round(vals.arc / 2) + '°', 16, 40);
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.fillText('= ½ × ∠ środkowy', 16, 58);
      },
    },

    // ── Stage 1: Drag inscribed point around arc ─────────────────
    {
      title: () => T('Kąt wpisany jest zawsze taki sam', 'The inscribed angle is always the same'),
      desc:  () => T(
        'Przeciągnij niebieski punkt P wzdłuż łuku. Kąt wpisany NIE zmienia się — zawsze wynosi połowę kąta środkowego. To twierdzenie o kącie wpisanym.',
        'Drag the blue point P along the arc. The inscribed angle does NOT change — it\'s always half the central angle. That\'s the inscribed angle theorem.'
      ),
      sliders: [],
      draw(cx, W, H, vals) {
        const CX = W / 2, CY = H / 2 + 10, R = 110;
        const a1 = -Math.PI / 2 - Math.PI / 3;  // A fixed at -120° from top
        const a2 = -Math.PI / 2 + Math.PI / 3;  // B fixed at -60° from top → arc = 120°
        const Ax = CX + R * Math.cos(a1), Ay = CY + R * Math.sin(a1);
        const Bx = CX + R * Math.cos(a2), By = CY + R * Math.sin(a2);

        const Pa = dragAngle;
        const Px = CX + R * Math.cos(Pa), Py = CY + R * Math.sin(Pa);

        // Compute inscribed angle at P
        const ang1 = Math.atan2(Ay - Py, Ax - Px);
        const ang2 = Math.atan2(By - Py, Bx - Px);
        let inscribed = Math.abs(ang1 - ang2) * 180 / Math.PI;
        if (inscribed > 180) inscribed = 360 - inscribed;

        cx.beginPath(); cx.arc(CX, CY, R, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1.5; cx.stroke();

        // Arc AB (minor arc, highlighted)
        cx.beginPath(); cx.arc(CX, CY, R, a1, a2);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 4;
        cx.shadowColor = COLORS.ORANGE; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        // Radii
        cx.beginPath(); cx.moveTo(CX, CY); cx.lineTo(Ax, Ay);
        cx.moveTo(CX, CY); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 1.5;
        cx.setLineDash([4, 4]); cx.stroke(); cx.setLineDash([]);

        // Inscribed angle lines
        cx.beginPath(); cx.moveTo(Px, Py); cx.lineTo(Ax, Ay);
        cx.moveTo(Px, Py); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2; cx.stroke();

        [
          [Ax, Ay, 5, COLORS.GREEN],
          [Bx, By, 5, COLORS.GREEN],
          [CX, CY, 4, COLORS.ORANGE],
          [Px, Py, 8, COLORS.CYAN],
        ].forEach(([x, y, r, c]) => {
          cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2);
          cx.fillStyle = c; cx.shadowColor = c; cx.shadowBlur = 10;
          cx.fill(); cx.shadowBlur = 0;
        });

        cx.font = 'bold 13px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText(Math.round(inscribed) + '°', Px + (Px > CX ? 22 : -22), Py + (Py > CY ? 18 : -10));

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN; cx.fillText('∠ wpisany ≈ ' + Math.round(inscribed) + '°', 16, 22);
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.fillText('Przeciągnij punkt P!', 16, 40);
      },
    },

    // ── Stage 2: Visual proof — isoceles triangles ────────────────
    {
      title: () => T('Dowód: trójkąty równoramienne', 'Proof: isosceles triangles'),
      desc:  () => T(
        'Dlaczego? Połącz środek O z wierzchołkiem P. OA = OB = OP = promień → trójkąty OAP i OBP są równoramienne. Kąty podstawy: α i β. Kąt wpisany = α+β = ½ kąta środkowego.',
        'Why? Connect centre O to vertex P. OA = OB = OP = radius → triangles OAP and OBP are isosceles. Base angles: α and β. Inscribed angle = α+β = ½ central angle.'
      ),
      sliders: [
        { id: 'alpha', lbl: 'α', color: COLORS.YELLOW, min: 10, max: 70, step: 1, val: 35 },
      ],
      draw(cx, W, H, vals) {
        const CX = W / 2, CY = H / 2 + 10, R = 110;
        const alpha = vals.alpha * Math.PI / 180;

        // P at bottom, A and B symmetric
        const Pp = Math.PI / 2;
        const Ap = Pp - 2 * alpha - 0.3;
        const Bp = Pp + 2 * alpha + 0.3;

        const Px = CX + R * Math.cos(Pp), Py = CY + R * Math.sin(Pp);
        const Ax = CX + R * Math.cos(Ap), Ay = CY + R * Math.sin(Ap);
        const Bx = CX + R * Math.cos(Bp), By = CY + R * Math.sin(Bp);

        cx.beginPath(); cx.arc(CX, CY, R, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1.5; cx.stroke();

        // OP line (median)
        cx.beginPath(); cx.moveTo(CX, CY); cx.lineTo(Px, Py);
        cx.strokeStyle = 'rgba(255,255,255,0.3)'; cx.lineWidth = 1.5;
        cx.setLineDash([3, 4]); cx.stroke(); cx.setLineDash([]);

        // Triangle OAP (yellow)
        cx.beginPath(); cx.moveTo(Ax, Ay); cx.lineTo(CX, CY); cx.lineTo(Px, Py); cx.closePath();
        cx.strokeStyle = COLORS.YELLOW; cx.lineWidth = 2; cx.stroke();
        cx.fillStyle = 'rgba(255,209,102,0.07)'; cx.fill();

        // Triangle OBP (pink)
        cx.beginPath(); cx.moveTo(Bx, By); cx.lineTo(CX, CY); cx.lineTo(Px, Py); cx.closePath();
        cx.strokeStyle = COLORS.PINK; cx.lineWidth = 2; cx.stroke();
        cx.fillStyle = 'rgba(224,112,144,0.07)'; cx.fill();

        // Points
        [
          [Ax, Ay, 5, COLORS.GREEN],
          [Bx, By, 5, COLORS.GREEN],
          [CX, CY, 5, COLORS.ORANGE],
          [Px, Py, 7, COLORS.CYAN],
        ].forEach(([x, y, r, c]) => {
          cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2);
          cx.fillStyle = c; cx.shadowColor = c; cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;
        });

        cx.font = 'bold 13px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.YELLOW; cx.fillText('α', (Ax + CX + Px) / 3, (Ay + CY + Py) / 3 + 8);
        cx.fillStyle = COLORS.PINK;   cx.fillText('β', (Bx + CX + Px) / 3, (By + CY + Py) / 3 + 8);

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.YELLOW; cx.fillText('α = ' + Math.round(vals.alpha) + '°', 16, 22);
        cx.fillStyle = COLORS.PINK;   cx.fillText('β = ' + Math.round(vals.alpha) + '°  (symetria)', 16, 40);
        cx.fillStyle = COLORS.CYAN;   cx.fillText('∠ wpisany = α+β = ' + Math.round(vals.alpha * 2) + '°', 16, 58);
        cx.fillStyle = COLORS.ORANGE; cx.fillText('∠ środkowy = 2(α+β) = ' + Math.round(vals.alpha * 4) + '°', 16, 76);
      },
    },

    // ── Stage 3: Kąt w półokręgu = 90° ──────────────────────────
    {
      title: () => T('Szczególny przypadek: kąt w półokręgu', 'Special case: angle in a semicircle'),
      desc:  () => T(
        'Gdy łuk AB jest średnicą (kąt środkowy = 180°), to kąt wpisany = 90°. Każdy trójkąt wpisany w półokrąg ma kąt prosty przy wierzchołku na okręgu.',
        'When arc AB is a diameter (central angle = 180°), the inscribed angle = 90°. Any triangle inscribed in a semicircle has a right angle at the vertex on the circle.'
      ),
      sliders: [
        { id: 'p', lbl: 'P', color: COLORS.CYAN, min: 5, max: 175, step: 1, val: 90 },
      ],
      draw(cx, W, H, vals) {
        const CX = W / 2, CY = H / 2 + 10, R = 110;
        const Ax = CX - R, Ay = CY;
        const Bx = CX + R, By = CY;
        const Pa = vals.p * Math.PI / 180;  // angle from left, 0..π
        const Px = CX + R * Math.cos(Math.PI - Pa);
        const Py = CY - R * Math.sin(Pa);  // above diameter

        cx.beginPath(); cx.arc(CX, CY, R, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1.5; cx.stroke();

        // Diameter
        cx.beginPath(); cx.moveTo(Ax, Ay); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 2.5;
        cx.shadowColor = COLORS.ORANGE; cx.shadowBlur = 6; cx.stroke(); cx.shadowBlur = 0;

        // Inscribed lines PA, PB
        cx.beginPath(); cx.moveTo(Px, Py); cx.lineTo(Ax, Ay);
        cx.moveTo(Px, Py); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2; cx.stroke();

        // Right angle marker at P
        const vAx = (Ax - Px), vAy = (Ay - Py);
        const vBx = (Bx - Px), vBy = (By - Py);
        const dA = Math.hypot(vAx, vAy), dB = Math.hypot(vBx, vBy);
        const uAx = vAx / dA * 14, uAy = vAy / dA * 14;
        const uBx = vBx / dB * 14, uBy = vBy / dB * 14;
        cx.beginPath();
        cx.moveTo(Px + uAx, Py + uAy);
        cx.lineTo(Px + uAx + uBx, Py + uAy + uBy);
        cx.lineTo(Px + uBx, Py + uBy);
        cx.strokeStyle = COLORS.GREEN; cx.lineWidth = 1.5; cx.stroke();

        [
          [Ax, Ay, 5, COLORS.ORANGE],
          [Bx, By, 5, COLORS.ORANGE],
          [CX, CY, 4, 'rgba(255,255,255,0.3)'],
          [Px, Py, 7, COLORS.CYAN],
        ].forEach(([x, y, r, c]) => {
          cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2);
          cx.fillStyle = c; cx.shadowColor = c; cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;
        });

        cx.font = 'bold 13px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.GREEN; cx.fillText('90°', Px, Py - 22);

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.ORANGE; cx.fillText('AB = średnica (180°)', 16, 22);
        cx.fillStyle = COLORS.CYAN;   cx.fillText('∠APB = 90° zawsze!', 16, 40);
      },
    },

    // ── Stage 4: Multiple inscribed angles ───────────────────────
    {
      title: () => T('Wszystkie kąty wpisane nad tym samym łukiem są równe', 'All inscribed angles over the same arc are equal'),
      desc:  () => T(
        'Cztery punkty na okręgu — każdy tworzy taki sam kąt wpisany nad łukiem AB. Zmień łuk suwakiem, a zobaczysz, że wszystkie kąty zmieniają się tak samo.',
        'Four points on the circle — each forms the same inscribed angle over arc AB. Change the arc with the slider and all angles update together.'
      ),
      sliders: [
        { id: 'arc', lbl: 'łuk', color: COLORS.ORANGE, min: 20, max: 160, step: 1, val: 80 },
      ],
      draw(cx, W, H, vals) {
        const CX = W / 2, CY = H / 2 + 20, R = 100;
        const arc = vals.arc * Math.PI / 180;
        const a1 = -Math.PI / 2 - arc / 2;
        const a2 = -Math.PI / 2 + arc / 2;
        const Ax = CX + R * Math.cos(a1), Ay = CY + R * Math.sin(a1);
        const Bx = CX + R * Math.cos(a2), By = CY + R * Math.sin(a2);

        cx.beginPath(); cx.arc(CX, CY, R, 0, Math.PI * 2);
        cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1.5; cx.stroke();

        // Arc AB (minor)
        cx.beginPath(); cx.arc(CX, CY, R, a1, a2);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 4;
        cx.shadowColor = COLORS.ORANGE; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        // 4 inscribed points on the major arc
        const pts = [
          Math.PI / 2,
          Math.PI / 2 + Math.PI / 3,
          Math.PI / 2 - Math.PI / 3,
          Math.PI / 2 + 2 * Math.PI / 3,
        ].map(a => ({ x: CX + R * Math.cos(a), y: CY + R * Math.sin(a) }));

        const ptColors = [COLORS.CYAN, COLORS.GREEN, COLORS.YELLOW, COLORS.PURPLE];

        pts.forEach((P, i) => {
          cx.beginPath(); cx.moveTo(P.x, P.y); cx.lineTo(Ax, Ay);
          cx.moveTo(P.x, P.y); cx.lineTo(Bx, By);
          cx.strokeStyle = ptColors[i]; cx.lineWidth = 1.5;
          cx.globalAlpha = 0.6; cx.stroke(); cx.globalAlpha = 1;
        });

        [
          [Ax, Ay, 5, COLORS.ORANGE],
          [Bx, By, 5, COLORS.ORANGE],
        ].forEach(([x, y, r, c]) => {
          cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2);
          cx.fillStyle = c; cx.shadowColor = c; cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;
        });
        pts.forEach((P, i) => {
          cx.beginPath(); cx.arc(P.x, P.y, 6, 0, Math.PI * 2);
          cx.fillStyle = ptColors[i]; cx.shadowColor = ptColors[i]; cx.shadowBlur = 10;
          cx.fill(); cx.shadowBlur = 0;
        });

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.fillText('Każdy kąt wpisany = ' + Math.round(vals.arc / 2) + '°', 16, 22);
      },
    },
  ],
});

// ── Drag logic for stage 1 ────────────────────────────────────────
let dragAngle = Math.PI / 2; // P starts at bottom

const CX = W / 2, CY = H / 2 + 10, R = 110;
const a1 = -Math.PI / 2 - Math.PI / 3;
const a2 = -Math.PI / 2 + Math.PI / 3;

// Valid range for P: major arc from a2 going around to a1
function clampToMajorArc(angle) {
  // Major arc goes from a2 (+60° from top) clockwise around to a1 (-120° from top)
  // Normalize angle to [a2, a2 + 2π - (a2-a1)] range
  let norm = angle;
  // Simple: just keep away from minor arc
  const minA = a1, maxA = a2;
  if (norm > minA && norm < maxA) {
    // In minor arc zone — snap to nearest endpoint
    const dA = Math.abs(norm - minA), dB = Math.abs(norm - maxA);
    norm = dA < dB ? minA + 0.05 : maxA - 0.05;
  }
  return norm;
}

cv.classList.add('draggable');
let dragging = false;

function onDown(e) {
  // Only on stage 1
  const pos = getCanvasPos(e);
  const Px = CX + R * Math.cos(dragAngle), Py = CY + R * Math.sin(dragAngle);
  if (Math.hypot(pos.x - Px, pos.y - Py) < 20) { dragging = true; if (e.preventDefault) e.preventDefault(); }
}
function onMove(e) {
  if (!dragging) return;
  if (e.preventDefault) e.preventDefault();
  const pos = getCanvasPos(e);
  dragAngle = clampToMajorArc(Math.atan2(pos.y - CY, pos.x - CX));
}
function onUp() { dragging = false; }

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('mouseleave', onUp);
cv.addEventListener('touchstart', onDown, { passive: false });
cv.addEventListener('touchmove', onMove, { passive: false });
cv.addEventListener('touchend', onUp);
</script>
</body>
</html>
