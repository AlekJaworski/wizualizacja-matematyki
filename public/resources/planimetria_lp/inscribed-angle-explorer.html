<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kąt wpisany — eksplorator</title>
</head>
<body>
<script type="module">
import { VizCore, T, COLORS } from '../lib/viz-core.js';

/* ── geometry constants ──────────────────────────────────────────── */
const CX_OFF = 0, CY_OFF = 10, RAD = 110;
let currentStage = 0;
let dragAngle = Math.PI * 0.6;   // P initial angle (on major arc, lower-right)
let dragging = false;

/* fixed A,B for stages 0,1,2 — 120-degree arc at top */
const A_ANG = -Math.PI / 2 - Math.PI / 3;
const B_ANG = -Math.PI / 2 + Math.PI / 3;

/* ── helper: draw angle arc with label ───────────────────────────── */
function drawAngleArc(cx, vx, vy, arm1x, arm1y, arm2x, arm2y, radius, color, label, labelOffset) {
  const a1 = Math.atan2(arm1y - vy, arm1x - vx);
  const a2 = Math.atan2(arm2y - vy, arm2x - vx);

  let start = a1, end = a2;
  let diff = end - start;
  while (diff > Math.PI) diff -= 2 * Math.PI;
  while (diff < -Math.PI) diff += 2 * Math.PI;
  if (diff < 0) {
    start = a2;
    end = a1;
    diff = -diff;
  }

  cx.beginPath();
  cx.arc(vx, vy, radius, start, start + diff);
  cx.strokeStyle = color;
  cx.lineWidth = 2;
  cx.stroke();

  if (label) {
    const mid = start + diff / 2;
    const lr = radius + (labelOffset || 12);
    cx.font = 'bold 11px monospace';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillStyle = color;
    cx.fillText(label, vx + lr * Math.cos(mid), vy + lr * Math.sin(mid));
  }
}

/* ── helper: draw a right-angle marker ───────────────────────────── */
function drawRightAngle(cx, px, py, ax, ay, bx, by, size, color) {
  const vAx = ax - px, vAy = ay - py;
  const vBx = bx - px, vBy = by - py;
  const dA = Math.hypot(vAx, vAy), dB = Math.hypot(vBx, vBy);
  const uAx = vAx / dA * size, uAy = vAy / dA * size;
  const uBx = vBx / dB * size, uBy = vBy / dB * size;
  cx.beginPath();
  cx.moveTo(px + uAx, py + uAy);
  cx.lineTo(px + uAx + uBx, py + uAy + uBy);
  cx.lineTo(px + uBx, py + uBy);
  cx.strokeStyle = color;
  cx.lineWidth = 1.5;
  cx.stroke();
}

/* ── helper: compute inscribed angle ─────────────────────────────── */
function inscribedAngleDeg(px, py, ax, ay, bx, by) {
  const a1 = Math.atan2(ay - py, ax - px);
  const a2 = Math.atan2(by - py, bx - px);
  let d = Math.abs(a1 - a2) * 180 / Math.PI;
  if (d > 180) d = 360 - d;
  return d;
}

/* ── helper: draw point with glow ────────────────────────────────── */
function dot(cx, x, y, r, c) {
  cx.beginPath(); cx.arc(x, y, r, 0, Math.PI * 2);
  cx.fillStyle = c; cx.shadowColor = c; cx.shadowBlur = 10;
  cx.fill(); cx.shadowBlur = 0;
}

/* ── helper: draw circle ─────────────────────────────────────────── */
function drawCircle(cx, ccx, ccy, r) {
  cx.beginPath(); cx.arc(ccx, ccy, r, 0, Math.PI * 2);
  cx.strokeStyle = 'rgba(255,255,255,0.15)'; cx.lineWidth = 1.5; cx.stroke();
}

/* ── helper: label near a point ──────────────────────────────────── */
function pointLabel(cx, x, y, text, color, offx, offy) {
  cx.font = 'bold 13px monospace'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
  cx.fillStyle = color;
  cx.fillText(text, x + (offx || 0), y + (offy || 0));
}

/* ── clamping P to major arc (stages 0,1,2,4) ───────────────────── */
function clampToMajorArc(angle) {
  let n = angle;
  if (n > A_ANG && n < B_ANG) {
    const dA = Math.abs(n - A_ANG), dB = Math.abs(n - B_ANG);
    n = dA < dB ? A_ANG + 0.05 : B_ANG - 0.05;
  }
  return n;
}

/* ── clamping P to major arc for arbitrary A,B angles ────────────── */
function clampToMajorArcCustom(angle, aAng, bAng) {
  let n = angle;
  // Minor arc goes from aAng to bAng (the short way around top).
  // Keep P off the minor arc.
  if (n > aAng && n < bAng) {
    const dA = Math.abs(n - aAng), dB = Math.abs(n - bAng);
    n = dA < dB ? aAng + 0.05 : bAng - 0.05;
  }
  return n;
}

/* ── clamping P to upper semicircle (stage 3) ────────────────────── */
function clampToUpperSemicircle(angle) {
  let n = angle;
  while (n > Math.PI) n -= 2 * Math.PI;
  while (n < -Math.PI) n += 2 * Math.PI;
  if (n >= 0) {
    n = n < Math.PI ? -0.05 : -Math.PI + 0.05;
  }
  if (n > -0.05) n = -0.05;
  if (n < -Math.PI + 0.05) n = -Math.PI + 0.05;
  return n;
}

const { cv, cx, W, H, getCanvasPos } = VizCore.init({
  title: T('Kąt wpisany — eksplorator', 'Inscribed Angle — Explorer'),
  H: 360,
  stages: [
    // ── Stage 0: Central vs inscribed angle ──────────────────────
    {
      title: () => T('Kąt środkowy i wpisany', 'Central and inscribed angle'),
      desc:  () => T(
        'Kąt środkowy (pomarańczowy) ma wierzchołek w centrum. Kąt wpisany (cyjanowy) — na okręgu. Przesuń punkt P!',
        'The central angle (orange) has its vertex at the centre. The inscribed angle (cyan) — on the circle. Drag point P!'
      ),
      sliders: [
        { id: 'arc', lbl: T('łuk','arc'), color: COLORS.CYAN, min: 10, max: 340, step: 1, val: 120 },
      ],
      draw(cx, W, H, vals) {
        const ccx = W / 2, ccy = H / 2 + CY_OFF, R = RAD;
        const arc = vals.arc * Math.PI / 180;
        const a1 = -Math.PI / 2 - arc / 2;
        const a2 = -Math.PI / 2 + arc / 2;
        const Ax = ccx + R * Math.cos(a1), Ay = ccy + R * Math.sin(a1);
        const Bx = ccx + R * Math.cos(a2), By = ccy + R * Math.sin(a2);

        // P on circle, draggable
        const Pa = dragAngle;
        const Px = ccx + R * Math.cos(Pa), Py = ccy + R * Math.sin(Pa);

        drawCircle(cx, ccx, ccy, R);

        // Highlighted arc
        cx.beginPath(); cx.arc(ccx, ccy, R, a2, a1 + Math.PI * 2);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 3;
        cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 6; cx.stroke(); cx.shadowBlur = 0;

        // Central angle lines
        cx.beginPath(); cx.moveTo(ccx, ccy); cx.lineTo(Ax, Ay);
        cx.moveTo(ccx, ccy); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 2; cx.stroke();

        // Inscribed angle lines
        cx.beginPath(); cx.moveTo(Px, Py); cx.lineTo(Ax, Ay);
        cx.moveTo(Px, Py); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2; cx.stroke();

        // Angle arcs
        drawAngleArc(cx, ccx, ccy, Ax, Ay, Bx, By, 22, COLORS.ORANGE, Math.round(vals.arc) + '\u00B0');
        const insc = inscribedAngleDeg(Px, Py, Ax, Ay, Bx, By);
        drawAngleArc(cx, Px, Py, Ax, Ay, Bx, By, 20, COLORS.CYAN, Math.round(insc) + '\u00B0');

        // Points
        dot(cx, Ax, Ay, 5, COLORS.GREEN);
        dot(cx, Bx, By, 5, COLORS.GREEN);
        dot(cx, ccx, ccy, 5, COLORS.ORANGE);
        dot(cx, Px, Py, 8, COLORS.CYAN);

        // Point labels
        pointLabel(cx, Ax, Ay, 'A', COLORS.GREEN, -14, -8);
        pointLabel(cx, Bx, By, 'B', COLORS.GREEN, 14, -8);
        pointLabel(cx, ccx, ccy, 'O', COLORS.ORANGE, -14, -4);
        pointLabel(cx, Px, Py, 'P', COLORS.CYAN, (Px > ccx ? 16 : -16), (Py > ccy ? 14 : -14));

        // Drag hint
        cx.font = '11px monospace'; cx.textAlign = 'left';
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.fillText(T('Przesuń punkt P!', 'Drag point P!'), 16, 22);

        // Legend
        cx.font = '12px monospace';
        cx.fillStyle = COLORS.ORANGE; cx.fillText(T('∠ środkowy','central') + ' = ' + Math.round(vals.arc) + '\u00B0', 16, 40);
        cx.fillStyle = COLORS.CYAN;   cx.fillText(T('∠ wpisany','inscribed') + '  = ' + Math.round(insc) + '\u00B0', 16, 56);
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.fillText('= \u00BD \u00D7 ' + T('∠ środkowy','central'), 16, 72);
      },
    },

    // ── Stage 1: Drag inscribed point — angle stays constant ─────
    {
      title: () => T('Kąt wpisany jest zawsze taki sam', 'The inscribed angle is always the same'),
      desc:  () => T(
        'Przeciągnij punkt P wzdłuż łuku. Kąt wpisany NIE zmienia się — zawsze wynosi połowę kąta środkowego.',
        'Drag point P along the arc. The inscribed angle does NOT change — it\'s always half the central angle.'
      ),
      sliders: [],
      draw(cx, W, H, vals) {
        const ccx = W / 2, ccy = H / 2 + CY_OFF, R = RAD;
        const Ax = ccx + R * Math.cos(A_ANG), Ay = ccy + R * Math.sin(A_ANG);
        const Bx = ccx + R * Math.cos(B_ANG), By = ccy + R * Math.sin(B_ANG);

        const Pa = dragAngle;
        const Px = ccx + R * Math.cos(Pa), Py = ccy + R * Math.sin(Pa);

        const insc = inscribedAngleDeg(Px, Py, Ax, Ay, Bx, By);

        drawCircle(cx, ccx, ccy, R);

        // Arc AB (minor)
        cx.beginPath(); cx.arc(ccx, ccy, R, A_ANG, B_ANG);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 4;
        cx.shadowColor = COLORS.ORANGE; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        // Radii (dashed)
        cx.beginPath(); cx.moveTo(ccx, ccy); cx.lineTo(Ax, Ay);
        cx.moveTo(ccx, ccy); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 1.5;
        cx.setLineDash([4, 4]); cx.stroke(); cx.setLineDash([]);

        // Inscribed angle lines
        cx.beginPath(); cx.moveTo(Px, Py); cx.lineTo(Ax, Ay);
        cx.moveTo(Px, Py); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2; cx.stroke();

        // Angle arc at P
        drawAngleArc(cx, Px, Py, Ax, Ay, Bx, By, 22, COLORS.CYAN, Math.round(insc) + '\u00B0');

        dot(cx, Ax, Ay, 5, COLORS.GREEN);
        dot(cx, Bx, By, 5, COLORS.GREEN);
        dot(cx, ccx, ccy, 4, COLORS.ORANGE);
        dot(cx, Px, Py, 8, COLORS.CYAN);

        pointLabel(cx, Ax, Ay, 'A', COLORS.GREEN, -14, -8);
        pointLabel(cx, Bx, By, 'B', COLORS.GREEN, 14, -8);
        pointLabel(cx, ccx, ccy, 'O', COLORS.ORANGE, -14, -4);
        pointLabel(cx, Px, Py, 'P', COLORS.CYAN, (Px > ccx ? 16 : -16), (Py > ccy ? 14 : -14));

        cx.font = 'bold 13px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText(Math.round(insc) + '\u00B0', Px + (Px > ccx ? 26 : -26), Py + (Py > ccy ? 22 : -18));

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText(T('∠ wpisany','inscribed') + ' = ' + Math.round(insc) + '\u00B0  ' + T('(stały!)','(constant!)'), 16, 22);
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.fillText(T('Przesuń punkt P!', 'Drag point P!'), 16, 40);
      },
    },

    // ── Stage 2: Proof — isosceles triangles (detailed) ──────────
    {
      title: () => T('Dowód: trójkąty równoramienne', 'Proof: isosceles triangles'),
      desc:  () => T(
        'OA = OP = OB = R, więc △OAP i △OBP są równoramienne. Kąty podstawy to α i β. Przesuń P, aby zobaczyć jak zmieniają się kąty.',
        'OA = OP = OB = R, so △OAP and △OBP are isosceles. Base angles are α and β. Drag P to see angles change.'
      ),
      sliders: [],
      draw(cx, W, H, vals) {
        const ccx = W / 2, ccy = H / 2 + CY_OFF, R = RAD;
        const Ax = ccx + R * Math.cos(A_ANG), Ay = ccy + R * Math.sin(A_ANG);
        const Bx = ccx + R * Math.cos(B_ANG), By = ccy + R * Math.sin(B_ANG);

        const Pa = dragAngle;
        const Px = ccx + R * Math.cos(Pa), Py = ccy + R * Math.sin(Pa);

        // Compute alpha and beta from geometry
        const AP = Math.hypot(Ax - Px, Ay - Py);
        const BP = Math.hypot(Bx - Px, By - Py);
        // In triangle OAP: OA=OP=R, AP = computed
        const cosAngleO_A = (R * R + R * R - AP * AP) / (2 * R * R);
        const angleO_A = Math.acos(Math.max(-1, Math.min(1, cosAngleO_A)));
        const alpha = (Math.PI - angleO_A) / 2;

        // In triangle OBP: OB=OP=R, BP = computed
        const cosAngleO_B = (R * R + R * R - BP * BP) / (2 * R * R);
        const angleO_B = Math.acos(Math.max(-1, Math.min(1, cosAngleO_B)));
        const beta = (Math.PI - angleO_B) / 2;

        const alphaDeg = alpha * 180 / Math.PI;
        const betaDeg = beta * 180 / Math.PI;
        const centralDeg = 2 * (alphaDeg + betaDeg);
        const inscDeg = alphaDeg + betaDeg;

        drawCircle(cx, ccx, ccy, R);

        // OP line (dashed)
        cx.beginPath(); cx.moveTo(ccx, ccy); cx.lineTo(Px, Py);
        cx.strokeStyle = 'rgba(255,255,255,0.3)'; cx.lineWidth = 1.5;
        cx.setLineDash([3, 4]); cx.stroke(); cx.setLineDash([]);

        // OA line (dashed)
        cx.beginPath(); cx.moveTo(ccx, ccy); cx.lineTo(Ax, Ay);
        cx.strokeStyle = 'rgba(255,255,255,0.3)'; cx.lineWidth = 1.5;
        cx.setLineDash([3, 4]); cx.stroke(); cx.setLineDash([]);

        // OB line (dashed)
        cx.beginPath(); cx.moveTo(ccx, ccy); cx.lineTo(Bx, By);
        cx.strokeStyle = 'rgba(255,255,255,0.3)'; cx.lineWidth = 1.5;
        cx.setLineDash([3, 4]); cx.stroke(); cx.setLineDash([]);

        // Triangle OAP filled (yellow)
        cx.beginPath(); cx.moveTo(Ax, Ay); cx.lineTo(ccx, ccy); cx.lineTo(Px, Py); cx.closePath();
        cx.fillStyle = 'rgba(255,209,102,0.08)'; cx.fill();
        cx.strokeStyle = COLORS.YELLOW; cx.lineWidth = 2; cx.stroke();

        // Triangle OBP filled (pink)
        cx.beginPath(); cx.moveTo(Bx, By); cx.lineTo(ccx, ccy); cx.lineTo(Px, Py); cx.closePath();
        cx.fillStyle = 'rgba(224,112,144,0.08)'; cx.fill();
        cx.strokeStyle = COLORS.PINK; cx.lineWidth = 2; cx.stroke();

        // ── Angle arcs ──────────────────────────────────────────
        // Alpha at A (angle OAP)
        drawAngleArc(cx, Ax, Ay, ccx, ccy, Px, Py, 18, COLORS.YELLOW, '\u03B1', 10);
        // Alpha at P toward A (angle OPA) — same triangle
        drawAngleArc(cx, Px, Py, Ax, Ay, ccx, ccy, 24, COLORS.YELLOW, '\u03B1', 10);
        // Angle at O in triangle OAP (pi - 2*alpha)
        drawAngleArc(cx, ccx, ccy, Ax, Ay, Px, Py, 20, COLORS.YELLOW,
          (Math.round(angleO_A * 180 / Math.PI)) + '\u00B0', 16);

        // Beta at B (angle OBP)
        drawAngleArc(cx, Bx, By, ccx, ccy, Px, Py, 18, COLORS.PINK, '\u03B2', 10);
        // Beta at P toward B (angle OPB)
        drawAngleArc(cx, Px, Py, Bx, By, ccx, ccy, 34, COLORS.PINK, '\u03B2', 10);
        // Angle at O in triangle OBP (pi - 2*beta)
        drawAngleArc(cx, ccx, ccy, Bx, By, Px, Py, 30, COLORS.PINK,
          (Math.round(angleO_B * 180 / Math.PI)) + '\u00B0', 16);

        // Points
        dot(cx, Ax, Ay, 5, COLORS.GREEN);
        dot(cx, Bx, By, 5, COLORS.GREEN);
        dot(cx, ccx, ccy, 5, COLORS.ORANGE);
        dot(cx, Px, Py, 8, COLORS.CYAN);

        // Point labels
        pointLabel(cx, Ax, Ay, 'A', COLORS.GREEN, -14, -8);
        pointLabel(cx, Bx, By, 'B', COLORS.GREEN, 14, -8);
        pointLabel(cx, ccx, ccy, 'O', COLORS.ORANGE, -14, -4);
        pointLabel(cx, Px, Py, 'P', COLORS.CYAN, (Px > ccx ? 16 : -16), (Py > ccy ? 14 : -14));

        // R labels along radii
        cx.font = '10px monospace'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.fillText('R', (ccx + Ax) / 2 + 6, (ccy + Ay) / 2 - 6);
        cx.fillText('R', (ccx + Bx) / 2 - 6, (ccy + By) / 2 - 6);
        cx.fillText('R', (ccx + Px) / 2 + 8, (ccy + Py) / 2);

        // ── Legend: step-by-step derivation ──────────────────────
        const lx = 10, ly0 = 18, lh = 15;
        cx.font = '11px monospace'; cx.textAlign = 'left'; cx.textBaseline = 'alphabetic';
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('\u25B3OAP: \u03B1=' + Math.round(alphaDeg) + '\u00B0, \u03B1, \u03C0\u22122\u03B1=' + Math.round(angleO_A * 180 / Math.PI) + '\u00B0', lx, ly0);
        cx.fillStyle = COLORS.PINK;
        cx.fillText('\u25B3OBP: \u03B2=' + Math.round(betaDeg) + '\u00B0, \u03B2, \u03C0\u22122\u03B2=' + Math.round(angleO_B * 180 / Math.PI) + '\u00B0', lx, ly0 + lh);
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText('\u2220' + T('śr.','cen.') + ' = 2\u03C0\u2212(\u03C0\u22122\u03B1)\u2212(\u03C0\u22122\u03B2) = 2(\u03B1+\u03B2) = ' + Math.round(centralDeg) + '\u00B0', lx, ly0 + lh * 2);
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('\u2220' + T('wp.','ins.') + ' = \u03B1+\u03B2 = ' + Math.round(inscDeg) + '\u00B0 = \u00BD\u00B7\u2220' + T('śr.','cen.') + ' \u2713', lx, ly0 + lh * 3);

        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.fillText(T('Przesuń punkt P!', 'Drag point P!'), lx, ly0 + lh * 4 + 2);
      },
    },

    // ── Stage 3: Angle in a semicircle = 90° ────────────────────
    {
      title: () => T('Szczególny przypadek: kąt w półokręgu', 'Special case: angle in a semicircle'),
      desc:  () => T(
        'Gdy AB jest średnicą (kąt środkowy = 180°), to kąt wpisany = 90°. Przesuń punkt P po górnym półokręgu!',
        'When AB is a diameter (central angle = 180°), the inscribed angle = 90°. Drag point P along the upper semicircle!'
      ),
      sliders: [],
      draw(cx, W, H, vals) {
        const ccx = W / 2, ccy = H / 2 + CY_OFF, R = RAD;
        const Ax = ccx - R, Ay = ccy;
        const Bx = ccx + R, By = ccy;

        // P on upper semicircle via dragAngle
        let pNorm = dragAngle;
        while (pNorm > Math.PI) pNorm -= 2 * Math.PI;
        while (pNorm < -Math.PI) pNorm += 2 * Math.PI;
        if (pNorm >= 0) pNorm = -Math.PI / 2; // fallback to top
        const Px = ccx + R * Math.cos(pNorm);
        const Py = ccy + R * Math.sin(pNorm);

        drawCircle(cx, ccx, ccy, R);

        // Diameter
        cx.beginPath(); cx.moveTo(Ax, Ay); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 2.5;
        cx.shadowColor = COLORS.ORANGE; cx.shadowBlur = 6; cx.stroke(); cx.shadowBlur = 0;

        // Upper semicircle highlight
        cx.beginPath(); cx.arc(ccx, ccy, R, -Math.PI, 0);
        cx.strokeStyle = 'rgba(88,196,221,0.25)'; cx.lineWidth = 3; cx.stroke();

        // Inscribed lines
        cx.beginPath(); cx.moveTo(Px, Py); cx.lineTo(Ax, Ay);
        cx.moveTo(Px, Py); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2; cx.stroke();

        // Right angle marker at P
        drawRightAngle(cx, Px, Py, Ax, Ay, Bx, By, 14, COLORS.GREEN);

        dot(cx, Ax, Ay, 5, COLORS.ORANGE);
        dot(cx, Bx, By, 5, COLORS.ORANGE);
        dot(cx, ccx, ccy, 4, 'rgba(255,255,255,0.3)');
        dot(cx, Px, Py, 8, COLORS.CYAN);

        pointLabel(cx, Ax, Ay, 'A', COLORS.ORANGE, -14, 14);
        pointLabel(cx, Bx, By, 'B', COLORS.ORANGE, 14, 14);
        pointLabel(cx, ccx, ccy, 'O', COLORS.ORANGE, 0, 14);
        pointLabel(cx, Px, Py, 'P', COLORS.CYAN, (Px > ccx ? 16 : -16), -14);

        cx.font = 'bold 13px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.GREEN; cx.fillText('90\u00B0', Px + (Px > ccx ? -20 : 20), Py - 20);

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.ORANGE; cx.fillText('AB = ' + T('średnica','diameter') + ' (180\u00B0)', 16, 22);
        cx.fillStyle = COLORS.CYAN;   cx.fillText('\u2220APB = 90\u00B0 ' + T('zawsze!','always!'), 16, 40);
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.fillText(T('Przesuń punkt P!', 'Drag point P!'), 16, 58);
      },
    },

    // ── Stage 4: Multiple inscribed angles + draggable P ─────────
    {
      title: () => T('Wszystkie kąty wpisane nad tym samym łukiem', 'All inscribed angles over the same arc'),
      desc:  () => T(
        'Przesuń punkt P (cyjanowy) po łuku. Inne punkty też tworzą taki sam kąt wpisany nad łukiem AB.',
        'Drag point P (cyan) along the arc. Other points also form the same inscribed angle over arc AB.'
      ),
      sliders: [
        { id: 'arc', lbl: T('łuk','arc'), color: COLORS.ORANGE, min: 20, max: 160, step: 1, val: 80 },
      ],
      draw(cx, W, H, vals) {
        const ccx = W / 2, ccy = H / 2 + 20, R = 100;
        const arc = vals.arc * Math.PI / 180;
        const a1 = -Math.PI / 2 - arc / 2;
        const a2 = -Math.PI / 2 + arc / 2;
        const Ax = ccx + R * Math.cos(a1), Ay = ccy + R * Math.sin(a1);
        const Bx = ccx + R * Math.cos(a2), By = ccy + R * Math.sin(a2);

        // Draggable P
        const Pa = dragAngle;
        const Px = ccx + R * Math.cos(Pa), Py = ccy + R * Math.sin(Pa);

        drawCircle(cx, ccx, ccy, R);

        // Arc AB (minor)
        cx.beginPath(); cx.arc(ccx, ccy, R, a1, a2);
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 4;
        cx.shadowColor = COLORS.ORANGE; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        // Fixed extra points on major arc
        const fixedAngles = [
          Math.PI / 2 + Math.PI / 3,
          Math.PI / 2 - Math.PI / 3,
          Math.PI / 2 + 2 * Math.PI / 3,
        ];
        const fixedPts = fixedAngles.map(a => ({ x: ccx + R * Math.cos(a), y: ccy + R * Math.sin(a) }));
        const fixedColors = [COLORS.GREEN, COLORS.YELLOW, COLORS.PURPLE];

        // Draw fixed points' lines and angle arcs
        fixedPts.forEach((P, i) => {
          cx.beginPath(); cx.moveTo(P.x, P.y); cx.lineTo(Ax, Ay);
          cx.moveTo(P.x, P.y); cx.lineTo(Bx, By);
          cx.strokeStyle = fixedColors[i]; cx.lineWidth = 1.5;
          cx.globalAlpha = 0.5; cx.stroke(); cx.globalAlpha = 1;

          drawAngleArc(cx, P.x, P.y, Ax, Ay, Bx, By, 16, fixedColors[i], '');
        });

        // Draggable P lines (drawn on top, brighter)
        cx.beginPath(); cx.moveTo(Px, Py); cx.lineTo(Ax, Ay);
        cx.moveTo(Px, Py); cx.lineTo(Bx, By);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2; cx.stroke();

        const inscP = inscribedAngleDeg(Px, Py, Ax, Ay, Bx, By);
        drawAngleArc(cx, Px, Py, Ax, Ay, Bx, By, 20, COLORS.CYAN, Math.round(inscP) + '\u00B0');

        // Points
        dot(cx, Ax, Ay, 5, COLORS.ORANGE);
        dot(cx, Bx, By, 5, COLORS.ORANGE);
        pointLabel(cx, Ax, Ay, 'A', COLORS.ORANGE, -12, -8);
        pointLabel(cx, Bx, By, 'B', COLORS.ORANGE, 12, -8);

        fixedPts.forEach((P, i) => {
          dot(cx, P.x, P.y, 5, fixedColors[i]);
        });

        dot(cx, Px, Py, 8, COLORS.CYAN);
        pointLabel(cx, Px, Py, 'P', COLORS.CYAN, (Px > ccx ? 16 : -16), (Py > ccy ? 14 : -14));

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.fillText(T('Każdy kąt wpisany','Each inscribed angle') + ' = ' + Math.round(vals.arc / 2) + '\u00B0', 16, 22);
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.fillText(T('Przesuń punkt P!', 'Drag point P!'), 16, 40);
      },
    },
  ],
});

/* ── Track current stage via MutationObserver ───────────────────── */
const dotsEl = document.getElementById('qdots');
new MutationObserver(() => {
  const dots = dotsEl.querySelectorAll('.dot');
  dots.forEach((d, i) => { if (d.classList.contains('active')) currentStage = i; });
}).observe(dotsEl, { subtree: true, attributes: true, attributeFilter: ['class'] });

/* ── Drag logic — works in ALL stages (0-4) ─────────────────────── */
const getCenterAndRadius = () => {
  if (currentStage === 4) {
    return { ccx: W / 2, ccy: H / 2 + 20, R: 100 };
  }
  return { ccx: W / 2, ccy: H / 2 + CY_OFF, R: RAD };
};

cv.classList.add('draggable');

function getPPos() {
  const { ccx, ccy, R } = getCenterAndRadius();
  if (currentStage === 3) {
    let pNorm = dragAngle;
    while (pNorm > Math.PI) pNorm -= 2 * Math.PI;
    while (pNorm < -Math.PI) pNorm += 2 * Math.PI;
    if (pNorm >= 0) pNorm = -Math.PI / 2;
    return { x: ccx + R * Math.cos(pNorm), y: ccy + R * Math.sin(pNorm) };
  }
  return { x: ccx + R * Math.cos(dragAngle), y: ccy + R * Math.sin(dragAngle) };
}

function onDown(e) {
  const pos = getCanvasPos(e);
  const P = getPPos();
  if (Math.hypot(pos.x - P.x, pos.y - P.y) < 24) {
    dragging = true;
    if (e.preventDefault) e.preventDefault();
  }
}

function onMove(e) {
  if (!dragging) return;
  if (e.preventDefault) e.preventDefault();
  const pos = getCanvasPos(e);
  const { ccx, ccy } = getCenterAndRadius();
  const rawAngle = Math.atan2(pos.y - ccy, pos.x - ccx);

  if (currentStage === 3) {
    dragAngle = clampToUpperSemicircle(rawAngle);
  } else if (currentStage === 4) {
    // For stage 4, clamp to major arc based on current arc slider value
    const arcEl = document.getElementById('s_arc');
    const arcDeg = arcEl ? parseFloat(arcEl.value) : 80;
    const arcRad = arcDeg * Math.PI / 180;
    const sa1 = -Math.PI / 2 - arcRad / 2;
    const sa2 = -Math.PI / 2 + arcRad / 2;
    dragAngle = clampToMajorArcCustom(rawAngle, sa1, sa2);
  } else if (currentStage === 0) {
    // Stage 0: clamp based on current arc slider value
    const arcEl = document.getElementById('s_arc');
    const arcDeg = arcEl ? parseFloat(arcEl.value) : 120;
    const arcRad = arcDeg * Math.PI / 180;
    const sa1 = -Math.PI / 2 - arcRad / 2;
    const sa2 = -Math.PI / 2 + arcRad / 2;
    dragAngle = clampToMajorArcCustom(rawAngle, sa1, sa2);
  } else {
    dragAngle = clampToMajorArc(rawAngle);
  }
}

function onUp() { dragging = false; }

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('mouseleave', onUp);
cv.addEventListener('touchstart', onDown, { passive: false });
cv.addEventListener('touchmove', onMove, { passive: false });
cv.addEventListener('touchend', onUp);
</script>
</body>
