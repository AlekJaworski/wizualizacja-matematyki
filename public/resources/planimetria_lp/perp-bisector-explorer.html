<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Symetralna odcinka — historia</title>
</head>
<body>
<script type="module">
import { VizCore, T, COLORS } from '../lib/viz-core.js';
import { GeoScene } from '../lib/geo-engine.js';

// ── House icon (purely cosmetic — not geometry) ─────────────────
function drawHouse(cx, sx, sy, col) {
  const s = 10;
  cx.beginPath();
  cx.rect(sx - s, sy - s * 0.3, s * 2, s * 1.3);
  cx.fillStyle = col + '44'; cx.fill();
  cx.strokeStyle = col; cx.lineWidth = 1.5; cx.stroke();
  cx.beginPath();
  cx.moveTo(sx - s * 1.3, sy - s * 0.3);
  cx.lineTo(sx, sy - s * 1.5);
  cx.lineTo(sx + s * 1.3, sy - s * 0.3);
  cx.closePath();
  cx.fillStyle = col + '66'; cx.fill();
  cx.strokeStyle = col; cx.lineWidth = 1.5; cx.stroke();
  cx.beginPath();
  cx.rect(sx - s * 0.25, sy + s * 0.2, s * 0.5, s * 0.8);
  cx.fillStyle = col; cx.fill();
}

// ── VizCore bootstrap ───────────────────────────────────────────
const W = 600, H = 420;

// ── GeoScene — world origin at canvas center, 1 world unit = 40 px
//    This means canvas pixel (300, 210) = world (0, 0)
//    houseA at pixel (160, 210) = world (-3.5, 0)
//    houseB at pixel (440, 210) = world (3.5, 0)
const SCALE = 40;
const OX = 300, OY = 210;

// We create the scene lazily (need cx from VizCore.init).
let scene;

// ── Geo objects (populated in setup) ────────────────────────────
let A, B, M, bisector, segAB, dA_meas, dB_meas, rightAngle, eqMA, eqMB;
// Trial point for stages 0-1
let P;
// Three-house stage
let triA, triB, triC;
let bisAB, bisBC, bisCA;
let midAB, midBC, midCA;
let circumO, circumCircle;
let segOA, segOB, segOC;
let triSegAB, triSegBC, triSegCA;
// Construction stage
let arcA, arcB, intP1, intP2, constructLine;
let conA, conB, conM, conSeg, conBisector, conRightAngle, conEqMA, conEqMB;

// Animation state
let animT = 0;

function setup(cx) {
  scene = new GeoScene(cx, W, H, { originX: OX, originY: OY, scale: SCALE });

  // ── Stages 0-1: Two houses + draggable trial point ────────────
  A = scene.point(-3.5, 0, { drag: false, label: T('Ty', 'You'), color: COLORS.CYAN });
  B = scene.point(3.5, 0, { drag: false, label: T('Przyjaciel', 'Friend'), color: COLORS.ORANGE, labelOffset: [8, 18] });
  A.opts.labelOffset = [-30, 18];
  M = scene.midpoint(A, B, { label: 'M', color: COLORS.YELLOW, radius: 4 });
  segAB = scene.segment(A, B, { color: 'rgba(255,255,255,0.25)', lineWidth: 2 });
  bisector = scene.perpBisector(A, B, { color: COLORS.GREEN, lineWidth: 2.5, glow: true });

  // Trial/explorer point — draggable
  P = scene.point(1.25, 2.25, { drag: true, label: '', color: COLORS.GREEN, radius: 9 });

  // Distance measurements (invisible objects — just for .value)
  dA_meas = scene.distance(P, A);
  dB_meas = scene.distance(P, B);

  // Right angle marker at midpoint: arm1 toward A, arm2 along bisector (hidden helper point)
  rightAngle = scene.rightAngleMarker(M, A, scene.point(M.wx, M.wy + 1, { visible: false }), { color: COLORS.GREEN, size: 12 });

  // Equal-length marks
  eqMA = scene.equalMarker(M, A, 1, { color: COLORS.YELLOW });
  eqMB = scene.equalMarker(M, B, 1, { color: COLORS.YELLOW });

  // ── Stage 3: Three houses ─────────────────────────────────────
  triA = scene.point(-3.75, 2.75, { drag: true, label: 'A', color: COLORS.CYAN });
  triB = scene.point(3.75, 1.75, { drag: true, label: 'B', color: COLORS.ORANGE });
  triC = scene.point(0, -3.75, { drag: true, label: 'C', color: COLORS.YELLOW });

  triSegAB = scene.segment(triA, triB, { color: 'rgba(255,255,255,0.25)', lineWidth: 1.5 });
  triSegBC = scene.segment(triB, triC, { color: 'rgba(255,255,255,0.25)', lineWidth: 1.5 });
  triSegCA = scene.segment(triC, triA, { color: 'rgba(255,255,255,0.25)', lineWidth: 1.5 });

  midAB = scene.midpoint(triA, triB, { radius: 3, color: COLORS.CYAN, label: '' });
  midBC = scene.midpoint(triB, triC, { radius: 3, color: COLORS.ORANGE, label: '' });
  midCA = scene.midpoint(triC, triA, { radius: 3, color: COLORS.YELLOW, label: '' });

  bisAB = scene.perpBisector(triA, triB, { color: COLORS.CYAN, lineWidth: 1.5, dash: [5, 4] });
  bisBC = scene.perpBisector(triB, triC, { color: COLORS.ORANGE, lineWidth: 1.5, dash: [5, 4] });
  bisCA = scene.perpBisector(triC, triA, { color: COLORS.YELLOW, lineWidth: 1.5, dash: [5, 4] });

  // Circumcenter = intersection of any two perp bisectors
  circumO = scene.intersection(bisAB, bisBC, 0, { label: 'O', color: COLORS.GREEN, radius: 6 });
  circumCircle = scene.circle(circumO, triA, { color: COLORS.GREEN, lineWidth: 2.5, glow: true });

  // Radii lines to each vertex
  segOA = scene.segment(circumO, triA, { color: 'rgba(131,193,103,0.3)', lineWidth: 1.5 });
  segOB = scene.segment(circumO, triB, { color: 'rgba(131,193,103,0.3)', lineWidth: 1.5 });
  segOC = scene.segment(circumO, triC, { color: 'rgba(131,193,103,0.3)', lineWidth: 1.5 });

  // ── Stage 4: Construction ─────────────────────────────────────
  conA = scene.point(-3, 0, { drag: false, label: 'A', color: COLORS.CYAN, radius: 5 });
  conB = scene.point(3, 0, { drag: false, label: 'B', color: COLORS.ORANGE, radius: 5 });
  conSeg = scene.segment(conA, conB, { color: 'rgba(255,255,255,0.5)', lineWidth: 2.5 });
  conM = scene.midpoint(conA, conB, { label: 'M', color: COLORS.YELLOW, radius: 4 });

  // Compass radius in world units: 0.7 * distance(A,B) = 0.7 * 6 = 4.2
  const compassR = 4.2;
  arcA = scene.circleR(conA, compassR, { color: COLORS.CYAN, lineWidth: 2, glow: true });
  arcB = scene.circleR(conB, compassR, { color: COLORS.ORANGE, lineWidth: 2, glow: true });

  // Intersection points of the two construction circles
  intP1 = scene.intersection(arcA, arcB, 0, { label: '', color: COLORS.YELLOW, radius: 5 });
  intP2 = scene.intersection(arcA, arcB, 1, { label: '', color: COLORS.YELLOW, radius: 5 });

  // The perpendicular bisector through the two intersection points
  constructLine = scene.segment(intP1, intP2, { color: COLORS.GREEN, lineWidth: 2.5, glow: true });

  conBisector = scene.perpBisector(conA, conB, { visible: false }); // hidden, just for right-angle ref
  conRightAngle = scene.rightAngleMarker(conM, conA, intP1, { color: COLORS.GREEN, size: 14 });
  conEqMA = scene.equalMarker(conM, conA, 1, { color: COLORS.YELLOW });
  conEqMB = scene.equalMarker(conM, conB, 1, { color: COLORS.YELLOW });

  // Start hidden — goTo will toggle
  hideAll();
}

// ── Visibility helpers ───────────────────────────────────────────

function hideAll() {
  scene.objects.forEach(o => { o.opts.visible = false; });
}

function setVisible(objs, v) {
  objs.forEach(o => { if (o) o.opts.visible = v; });
}

function applyStageVisibility(idx) {
  hideAll();

  if (idx === 0) {
    // Problem: houses, trial point, segment, distances
    setVisible([A, B, segAB, P, dA_meas, dB_meas], true);
  } else if (idx === 1) {
    // Discovery: + bisector, midpoint, right-angle, equal marks
    setVisible([A, B, segAB, P, dA_meas, dB_meas, bisector, M, rightAngle, eqMA, eqMB], true);
  } else if (idx === 2) {
    // Proof/fold: handled entirely in draw (custom overlay), but show nothing from scene
    // We'll draw the proof stage manually using scene coords for positioning
  } else if (idx === 3) {
    // Three houses: triangle, bisectors, circumcircle
    setVisible([
      triA, triB, triC,
      triSegAB, triSegBC, triSegCA,
      midAB, midBC, midCA,
      bisAB, bisBC, bisCA,
      circumO, circumCircle,
      segOA, segOB, segOC,
    ], true);
  } else if (idx === 4) {
    // Construction: step-based reveal handled in draw
    setVisible([conA, conB, conSeg], true);
  }
}

// ══════════════════════════════════════════════════════════════════
// VizCore.init — stages
// ══════════════════════════════════════════════════════════════════

const result = VizCore.init({
  title: T('Symetralna odcinka — historia', 'Perpendicular Bisector — A Story'),
  H,
  stages: [
    // ── Stage 0: Problem ───────────────────────────────────────
    {
      title: () => T('Problem', 'The Problem'),
      desc: () => T(
        'Masz przyjaciela \u2014 mieszkacie 100\u00a0km od siebie. Chcecie kupi\u0107 domek letni, kt\u00f3ry b\u0119dzie jednakowo daleko od was obu, \u017ceby by\u0142o sprawiedliwie. Gdzie mo\u017cecie go postawi\u0107?',
        'You and a friend live 100\u00a0km apart. You want a summer house equally far from both of you \u2014 fair and square. Where can you put it?'
      ),
      sliders: [],
      draw(cx, W, H) {
        scene.clear();
        scene.update();

        // Distance values — engine keeps them always correct
        const dAv = dA_meas.value;
        const dBv = dB_meas.value;
        const ratio = Math.abs(dAv - dBv) / Math.max(dAv, dBv);
        const fair = ratio < 0.05;

        // Color the trial dot by fairness
        P.opts.color = fair ? COLORS.GREEN : '#FFD166';

        // Render all visible geo objects
        for (const obj of scene.objects) if (obj.opts.visible) obj.render(cx);

        // Distance lines (dashed)
        const sA = scene.toScreen(A.wx, A.wy);
        const sB = scene.toScreen(B.wx, B.wy);
        const sP = scene.toScreen(P.wx, P.wy);

        cx.setLineDash([4, 4]);
        cx.lineWidth = 1.5;
        cx.strokeStyle = COLORS.CYAN;
        cx.beginPath(); cx.moveTo(sP.x, sP.y); cx.lineTo(sA.x, sA.y); cx.stroke();
        cx.strokeStyle = COLORS.ORANGE;
        cx.beginPath(); cx.moveTo(sP.x, sP.y); cx.lineTo(sB.x, sB.y); cx.stroke();
        cx.setLineDash([]);

        // Houses (cosmetic)
        drawHouse(cx, sA.x, sA.y, COLORS.CYAN);
        drawHouse(cx, sB.x, sB.y, COLORS.ORANGE);

        // Distance readouts
        cx.font = '12px monospace'; cx.textAlign = 'left'; cx.textBaseline = 'alphabetic';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('d(' + T('Ty', 'You') + ') = ' + (dAv * 10).toFixed(0), 16, 22);
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText('d(' + T('Przyjaciel', 'Friend') + ') = ' + (dBv * 10).toFixed(0), 16, 38);

        // Fair indicator
        if (fair) {
          cx.font = 'bold 14px monospace'; cx.textAlign = 'center';
          cx.fillStyle = COLORS.GREEN;
          cx.shadowColor = COLORS.GREEN; cx.shadowBlur = 12;
          cx.fillText('OK! ' + T('Sprawiedliwie!', 'Fair!'), sP.x, sP.y - 22);
          cx.shadowBlur = 0;
        } else {
          cx.font = '12px monospace'; cx.textAlign = 'center';
          cx.fillStyle = '#FF6060';
          cx.fillText(T('Niesprawiedliwe!', 'Not fair!'), sP.x, sP.y - 22);
        }

        // Hint
        cx.font = '11px monospace'; cx.textAlign = 'center';
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.fillText(T('Przesun zielony punkt \u2014 gdzie jest sprawiedliwie?',
                       'Drag the green dot \u2014 where is it fair?'), W / 2, H - 16);
      },
    },

    // ── Stage 1: Discovery ─────────────────────────────────────
    {
      title: () => T('Odkrycie', 'The Discovery'),
      desc: () => T(
        'Zauwa\u017c co\u015b niezwyk\u0142ego: wszystkie sprawiedliwe punkty le\u017c\u0105 na jednej linii! Ta linia jest prostopad\u0142a do odcinka \u0142\u0105cz\u0105cego domy i przechodzi przez jego \u015brodek. To symetralna odcinka.',
        'Notice something remarkable: all fair points lie on one line! This line is perpendicular to the segment joining the houses and passes through its midpoint. This is the perpendicular bisector.'
      ),
      sliders: [],
      draw(cx, W, H) {
        scene.clear();
        scene.update();

        // Snap P onto the perpendicular bisector: project onto the bisector direction
        // Bisector passes through M, direction is perpendicular to AB = (-dy, dx) of AB
        const dx = B.wx - A.wx, dy = B.wy - A.wy;
        const pdx = -dy, pdy = dx;
        const len = Math.hypot(pdx, pdy) || 1;
        const nx = pdx / len, ny = pdy / len;
        const proj = (P.wx - M.wx) * nx + (P.wy - M.wy) * ny;
        const clampedProj = Math.max(-4.75, Math.min(4.75, proj));
        P.wx = M.wx + nx * clampedProj;
        P.wy = M.wy + ny * clampedProj;
        P.opts.color = COLORS.GREEN;

        // Render engine objects
        for (const obj of scene.objects) if (obj.opts.visible) obj.render(cx);

        // Dashed distance lines
        const sA = scene.toScreen(A.wx, A.wy);
        const sB = scene.toScreen(B.wx, B.wy);
        const sP = scene.toScreen(P.wx, P.wy);

        cx.setLineDash([4, 4]);
        cx.lineWidth = 1.5;
        cx.strokeStyle = COLORS.CYAN;
        cx.beginPath(); cx.moveTo(sP.x, sP.y); cx.lineTo(sA.x, sA.y); cx.stroke();
        cx.strokeStyle = COLORS.ORANGE;
        cx.beginPath(); cx.moveTo(sP.x, sP.y); cx.lineTo(sB.x, sB.y); cx.stroke();
        cx.setLineDash([]);

        // Houses
        drawHouse(cx, sA.x, sA.y, COLORS.CYAN);
        drawHouse(cx, sB.x, sB.y, COLORS.ORANGE);

        // Distance readouts
        const dAv = dA_meas.value, dBv = dB_meas.value;
        cx.font = '12px monospace'; cx.textAlign = 'left'; cx.textBaseline = 'alphabetic';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('d(' + T('Ty', 'You') + ') = ' + (dAv * 10).toFixed(0), 16, 22);
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText('d(' + T('Przyjaciel', 'Friend') + ') = ' + (dBv * 10).toFixed(0), 16, 38);
        cx.fillStyle = COLORS.GREEN;
        cx.fillText(T('Zawsze rowne!', 'Always equal!'), 16, 54);

        // "symetralna" label
        const sM = scene.toScreen(M.wx, M.wy);
        cx.font = 'bold 15px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.GREEN;
        cx.shadowColor = COLORS.GREEN; cx.shadowBlur = 16;
        cx.fillText(T('symetralna', 'perp. bisector'), sM.x + nx * 170, sM.y - ny * 170);
        cx.shadowBlur = 0;
      },
    },

    // ── Stage 2: Why does it work? (Fold proof) ────────────────
    {
      title: () => T('Dlaczego to dziala?', 'Why Does It Work?'),
      desc: () => T(
        'Z\u0142\u00f3\u017c odcinek AB wzd\u0142u\u017c symetralnej \u2014 punkt A pokryje B! Ka\u017cdy punkt na symetralnej jest osi\u0105 symetrii odcinka. Dlatego odleg\u0142o\u015bci od A i B s\u0105 identyczne \u2014 symetria to gwarantuje.',
        'Fold segment AB along the bisector \u2014 A lands on B! Every point on the bisector is an axis of symmetry. That\'s why distances to A and B are always identical.'
      ),
      sliders: [
        { id: 'fold', lbl: T('skladanie', 'fold'), color: COLORS.YELLOW, min: 0, max: 1, step: 0.01, val: 0 },
      ],
      draw(cx, W, H, vals) {
        // This stage uses a dedicated mini-scene for the proof diagram
        // We build it fresh each frame to keep things simple (it's lightweight).
        const ps = new GeoScene(cx, W, H, { originX: OX, originY: 250, scale: SCALE });
        const pA = ps.point(-3, 0, { label: '', color: COLORS.CYAN, radius: 6 });
        const pB = ps.point(3, 0, { label: '', color: COLORS.ORANGE, radius: 6 });
        const pM = ps.midpoint(pA, pB, { label: 'M', color: COLORS.YELLOW, radius: 4 });
        const pSeg = ps.segment(pA, pB, { color: 'rgba(255,255,255,0.4)', lineWidth: 2 });
        const pBis = ps.perpBisector(pA, pB, { color: COLORS.GREEN, lineWidth: 2, dash: [6, 4] });
        const pP = ps.point(0, 3.5, { label: 'P', color: COLORS.PURPLE, radius: 6, labelOffset: [-16, -4] });

        // Congruent triangles PMA and PMB — fill
        const pRA = ps.rightAngleMarker(pM, pA, pP, { color: COLORS.GREEN, size: 12 });
        const pEqMA = ps.equalMarker(pM, pA, 1, { color: COLORS.YELLOW });
        const pEqMB = ps.equalMarker(pM, pB, 1, { color: COLORS.YELLOW });

        ps.clear();
        ps.update();

        // Triangle fills
        const spA = ps.toScreen(pA.wx, pA.wy);
        const spB = ps.toScreen(pB.wx, pB.wy);
        const spM = ps.toScreen(pM.wx, pM.wy);
        const spP = ps.toScreen(pP.wx, pP.wy);

        cx.beginPath(); cx.moveTo(spP.x, spP.y); cx.lineTo(spM.x, spM.y); cx.lineTo(spA.x, spA.y); cx.closePath();
        cx.fillStyle = 'rgba(88,196,221,0.08)'; cx.fill();
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 1.5; cx.stroke();

        cx.beginPath(); cx.moveTo(spP.x, spP.y); cx.lineTo(spM.x, spM.y); cx.lineTo(spB.x, spB.y); cx.closePath();
        cx.fillStyle = 'rgba(255,107,53,0.08)'; cx.fill();
        cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 1.5; cx.stroke();

        // Render engine objects on top
        for (const obj of ps.objects) if (obj.opts.visible) obj.render(cx);

        // PM common-side marks
        const pmMid = ps.toScreen((pP.wx + pM.wx) / 2, (pP.wy + pM.wy) / 2);
        cx.font = '11px monospace'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('||', pmMid.x + 8, pmMid.y);

        // Fold animation: A slides toward B
        const fold = vals.fold;
        const foldedAx = spA.x + (spB.x - spA.x) * fold;
        const foldedAy = spA.y + (spB.y - spA.y) * fold;

        // Draw folding A
        cx.beginPath(); cx.arc(foldedAx, foldedAy, 6, 0, Math.PI * 2);
        cx.fillStyle = COLORS.CYAN; cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;

        if (fold < 0.5) {
          cx.font = '14px monospace'; cx.fillStyle = COLORS.CYAN;
          cx.fillText('A', foldedAx - 16, foldedAy);
        } else {
          cx.font = '12px monospace'; cx.fillStyle = COLORS.CYAN;
          cx.fillText('A\u2192B', foldedAx + 20, foldedAy - 6);
        }

        cx.font = '14px monospace'; cx.fillStyle = COLORS.ORANGE;
        cx.fillText('B', spB.x + 16, spB.y);

        // Proof annotations
        const paD = Math.hypot(pP.wx - pA.wx, pP.wy - pA.wy);
        const pbD = Math.hypot(pP.wx - pB.wx, pP.wy - pB.wy);
        cx.font = '12px monospace'; cx.textAlign = 'left'; cx.textBaseline = 'alphabetic';
        cx.fillStyle = COLORS.CYAN;  cx.fillText('PA = ' + (paD * 10).toFixed(0), 16, 22);
        cx.fillStyle = COLORS.ORANGE; cx.fillText('PB = ' + (pbD * 10).toFixed(0), 16, 38);
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('PM = PM (' + T('wspolny', 'common') + ')', 16, 54);
        cx.fillText('MA = MB (' + T('srodek', 'midpoint') + ')', 16, 70);
        cx.fillText(T('\u2220PMA = \u2220PMB = 90\u00b0', '\u2220PMA = \u2220PMB = 90\u00b0'), 16, 86);

        if (fold > 0.9) {
          cx.font = 'bold 13px monospace'; cx.textAlign = 'center';
          cx.fillStyle = COLORS.GREEN;
          cx.shadowColor = COLORS.GREEN; cx.shadowBlur = 12;
          cx.fillText(T('A pokrywa B \u2014 symetria!', 'A lands on B \u2014 symmetry!'), W / 2, H - 16);
          cx.shadowBlur = 0;
        }
      },
    },

    // ── Stage 3: Three Houses — Circumcircle ───────────────────
    {
      title: () => T('Trzy domy \u2014 okr\u0105g opisany', 'Three Houses \u2014 Circumscribed Circle'),
      desc: () => T(
        'A co je\u015bli macie troje przyjaci\u00f3\u0142? Punkt jednakowo daleko od trzech punkt\u00f3w to \u015brodek okr\u0119gu opisanego \u2014 i le\u017cy na przeci\u0119ciu DW\u00d3CH symetralnych. Trzecia musi przej\u015b\u0107 przez ten sam punkt!',
        'What if there are three of you? The point equidistant from three points is the circumcenter \u2014 at the intersection of TWO bisectors. The third must pass through the same point!'
      ),
      sliders: [],
      draw(cx, W, H) {
        scene.clear();
        scene.update();

        // Render engine objects: triangle sides, bisectors, circumcircle, radii, points — all automatic
        for (const obj of scene.objects) if (obj.opts.visible) obj.render(cx);

        // Houses (cosmetic overlay)
        const sA = scene.toScreen(triA.wx, triA.wy);
        const sB = scene.toScreen(triB.wx, triB.wy);
        const sC = scene.toScreen(triC.wx, triC.wy);
        drawHouse(cx, sA.x, sA.y, COLORS.CYAN);
        drawHouse(cx, sB.x, sB.y, COLORS.ORANGE);
        drawHouse(cx, sC.x, sC.y, COLORS.YELLOW);

        // Distance readout — engine guarantees correctness
        const dOA = Math.hypot(circumO.wx - triA.wx, circumO.wy - triA.wy);
        cx.font = '12px monospace'; cx.textAlign = 'left'; cx.textBaseline = 'alphabetic';
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('OA = OB = OC = ' + (dOA * 10).toFixed(0), 16, 22);
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.fillText(T('Symetralne spotykaja sie w jednym punkcie!',
                       'Bisectors meet at one point!'), 16, 38);
        cx.fillStyle = 'rgba(255,255,255,0.3)';
        cx.fillText(T('Przeciagnij domy!', 'Drag the houses!'), 16, H - 8);
      },
    },

    // ── Stage 4: Construction ──────────────────────────────────
    {
      title: () => T('Konstrukcja', 'Construction'),
      desc: () => T(
        'Jak narysowa\u0107 symetraln\u0105? Rozstaw cyrkiel szerzej ni\u017c po\u0142owa odcinka. Narysuj dwa \u0142uki \u2014 z A i z B. \u0141uki przetn\u0105 si\u0119 w dw\u00f3ch punktach. Po\u0142\u0105cz je \u2014 to symetralna!',
        'How to draw it? Open the compass wider than half the segment. Draw two arcs \u2014 from A and from B. They intersect at two points. Connect them \u2014 that\'s the perpendicular bisector!'
      ),
      sliders: [
        { id: 'step', lbl: T('krok', 'step'), color: COLORS.CYAN, min: 0, max: 4, step: 1, val: 0 },
      ],
      draw(cx, W, H, vals) {
        const step = Math.round(vals.step);

        // Progressive reveal via visibility
        setVisible([conA, conB, conSeg], true);
        arcA.opts.visible = step >= 1;
        arcB.opts.visible = step >= 2;
        intP1.opts.visible = step >= 2;
        intP2.opts.visible = step >= 2;
        constructLine.opts.visible = step >= 3;
        conM.opts.visible = step >= 4;
        conRightAngle.opts.visible = step >= 4;
        conEqMA.opts.visible = step >= 4;
        conEqMB.opts.visible = step >= 4;

        scene.clear();
        scene.update();

        // Render all visible engine objects
        for (const obj of scene.objects) if (obj.opts.visible) obj.render(cx);

        // Step labels
        const stepLabels = [
          T('Odcinek AB', 'Segment AB'),
          T('Luk z punktu A', 'Arc from point A'),
          T('Luk z punktu B \u2014 przeciecia!', 'Arc from point B \u2014 intersections!'),
          T('Polacz przeciecia \u2014 symetralna!', 'Connect intersections \u2014 bisector!'),
          T('Sprawdzenie: kat prosty i srodek', 'Verify: right angle and midpoint'),
        ];

        // "symetralna" label when line is shown
        if (step >= 3) {
          const sI1 = scene.toScreen(intP1.wx, intP1.wy);
          cx.font = 'bold 14px monospace'; cx.textAlign = 'center';
          cx.fillStyle = COLORS.GREEN;
          cx.shadowColor = COLORS.GREEN; cx.shadowBlur = 12;
          cx.fillText(T('symetralna', 'perp. bisector'), sI1.x + 70, sI1.y - 10);
          cx.shadowBlur = 0;
        }

        if (step >= 4) {
          // MA = MB annotation
          const sMc = scene.toScreen(conM.wx, conM.wy);
          const segLen = Math.hypot(conA.wx - conB.wx, conA.wy - conB.wy);
          cx.font = '12px monospace'; cx.textAlign = 'center'; cx.textBaseline = 'middle';
          cx.fillStyle = COLORS.YELLOW;
          cx.fillText('MA = MB = ' + (segLen * 5).toFixed(0), sMc.x, sMc.y + 30);

          cx.font = 'bold 16px monospace';
          cx.fillStyle = COLORS.GREEN;
          cx.shadowColor = COLORS.GREEN; cx.shadowBlur = 8;
          cx.fillText('\u2713', sMc.x, sMc.y - 20);
          cx.shadowBlur = 0;
        }

        cx.font = '12px monospace'; cx.textAlign = 'left'; cx.textBaseline = 'alphabetic';
        cx.fillStyle = 'rgba(255,255,255,0.55)';
        cx.fillText(T('Krok', 'Step') + ' ' + step + ': ' + stepLabels[step], 16, 22);
      },
    },
  ],
});

const { cv, cx: vizCx, goTo, getCanvasPos } = result;

// ── Initialize scene with canvas context ────────────────────────
setup(vizCx);

// ── Drag handling — engine does it all ──────────────────────────
cv.classList.add('draggable');

// Track stage changes to toggle visibility
let currentStage = 0;
const stageTitle = document.getElementById('qf');
const observer = new MutationObserver(() => {
  const title = stageTitle.textContent;
  let newStage = -1;
  if (title.includes('Problem') || title.includes('The Problem')) newStage = 0;
  else if (title.includes('Odkrycie') || title.includes('Discovery')) newStage = 1;
  else if (title.includes('Dlaczego') || title.includes('Why')) newStage = 2;
  else if (title.includes('Trzy') || title.includes('Three')) newStage = 3;
  else if (title.includes('Konstrukcja') || title.includes('Construction')) newStage = 4;

  if (newStage !== -1 && newStage !== currentStage) {
    currentStage = newStage;

    // Reset trial point position on stage enter
    if (newStage === 0) { P.wx = 1.25; P.wy = 2.25; }
    if (newStage === 1) { P.wx = 0; P.wy = 1.5; }

    applyStageVisibility(newStage);
  }
});
observer.observe(stageTitle, { childList: true, characterData: true, subtree: true });

// Use engine's built-in drag for stages 0, 1, 3
// For stage 3, the triA/triB/triC points have drag:true.
// For stages 0, 1, P has drag:true.
// Engine handles it all via bindDrag.
scene.bindDrag(cv, (e) => {
  const rect = cv.getBoundingClientRect();
  const scX = W / rect.width;
  const scY = H / rect.height;
  const src = e.touches ? e.touches[0] : e;
  return {
    x: (src.clientX - rect.left) * scX,
    y: (src.clientY - rect.top) * scY,
  };
});

// Initialize first stage visibility
applyStageVisibility(0);
</script>
</body>
</html>
