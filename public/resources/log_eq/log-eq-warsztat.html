<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<title>Równania logarytmiczne — Warsztat (Bramka Dziedziny)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; color: rgba(255,255,255,.85); }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; background: #0e0e12; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }

  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .head .step { font-size: 11px; color: rgba(255,255,255,.4); letter-spacing: .04em; }
  .head .title { font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  .desc { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); margin-bottom: 10px; min-height: 34px; }

  .pips { display: flex; gap: 14px; flex-wrap: wrap; margin: 4px 0 10px; font-size: 12px; }
  .pip { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.55); }
  .pip .mark { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,.25); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; line-height: 1; }
  .pip.ok { color: #83C167; }
  .pip.ok .mark { background: #83C167; border-color: #83C167; color: #0e0e12; }
  .pip.ok .mark::before { content: "\2713"; }

  .predict { margin-bottom: 10px; }
  .predict .q { font-size: 13px; color: rgba(255,255,255,.82); margin-bottom: 8px; line-height: 1.55; }
  .predict .opts { display: flex; flex-direction: column; gap: 6px; }
  .predict button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .predict button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .predict button.picked { border-color: #58C4DD; color: #58C4DD; }
  .predict .feedback { margin-top: 8px; font-size: 12px; line-height: 1.55; color: rgba(255,255,255,.7); padding: 8px 10px; border-left: 2px solid #58C4DD; background: rgba(88,196,221,.06); border-radius: 0 4px 4px 0; }

  /* Choices */
  .choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .choices button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .choices button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .choices button.picked { border-color: #58C4DD; color: #58C4DD; }
  .choices button.wrong { border-color: #FF6B6B; color: #FF6B6B; background: rgba(255,107,107,.06); }
  .choices button.correct { border-color: #83C167; color: #83C167; background: rgba(131,193,103,.08); }

  /* Debug widget */
  .debug { margin-bottom: 10px; }
  .debug-task { font-size: 13px; color: rgba(255,255,255,.82); margin-bottom: 10px; line-height: 1.55; padding: 8px 10px; border-left: 2px solid #58C4DD; background: rgba(88,196,221,.06); border-radius: 0 4px 4px 0; }
  .debug-steps { display: flex; flex-direction: column; gap: 4px; }
  .debug-step { display: flex; align-items: flex-start; gap: 10px; background: transparent; border: 0.5px solid rgba(255,255,255,.15); color: rgba(255,255,255,.8); padding: 8px 12px; font-size: 13px; line-height: 1.5; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .debug-step:hover:not(:disabled) { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.45); }
  .debug-step:disabled { cursor: default; opacity: .85; }
  .debug-step .debug-n { color: rgba(255,255,255,.4); min-width: 20px; }
  .debug-step .debug-text { flex: 1; }
  .debug-step.wrong { border-color: #FF6B6B; background: rgba(255,107,107,.08); color: #FF6B6B; }
  .debug-step.correct { border-color: #83C167; background: rgba(131,193,103,.1); color: #83C167; }
  .debug-feedback { margin-top: 10px; font-size: 12px; line-height: 1.55; padding: 8px 10px; border-radius: 0 4px 4px 0; }
  .debug-feedback.ok { color: rgba(255,255,255,.82); border-left: 2px solid #83C167; background: rgba(131,193,103,.06); }
  .debug-feedback.bad { color: rgba(255,255,255,.78); border-left: 2px solid #FF6B6B; background: rgba(255,107,107,.06); }

  .hints { font-size: 12px; color: rgba(255,255,255,.5); margin: 4px 0 10px; line-height: 1.55; }
  .hints .hint { padding: 6px 10px; border-left: 2px solid #FFD166; background: rgba(255,209,102,.05); margin-top: 4px; border-radius: 0 4px 4px 0; }

  .nav { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .nav button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  .nav button:hover:not(:disabled) { background: rgba(255,255,255,.08); }
  .nav button:disabled { opacity: .3; cursor: default; }
  .nav button.primary { border-color: #83C167; color: #83C167; }
  .nav button.primary:hover { background: rgba(131,193,103,.1); }

  .dots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.15); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  .dot.done { background: #83C167; }

  .solved-note { font-size: 13px; color: #83C167; line-height: 1.55; padding: 8px 10px; border-left: 2px solid #83C167; background: rgba(131,193,103,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }
  .wrapup-note { font-size: 13px; color: #C78DFF; line-height: 1.55; padding: 10px 12px; border-left: 2px solid #C78DFF; background: rgba(199,141,255,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }

  .banner { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-bottom: 0; border-radius: 10px 10px 0 0; padding: 14px 18px; color: rgba(255,255,255,.72); font-size: 13px; line-height: 1.6; }
  .banner b { color: #FFD166; font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">
    <b>Bramka Dziedziny.</b> Każde rozwiązanie równania logarytmicznego musi przejść przez bramkę, która sprawdza dziedzinę ($\log$ wymaga argumentu $> 0$). Algebraiczne rozwiązanie $\neq$ prawdziwe rozwiązanie — spotkasz tu liczby matematycznie poprawne, ale odrzucone przez bramkę.
  </div>
  <canvas id="cv" width="600" height="310"></canvas>
  <div class="panel">
    <div class="head">
      <span class="step" id="step"></span>
      <div class="dots" id="dots"></div>
    </div>
    <p class="title" id="title"></p>
    <p class="desc" id="desc"></p>
    <div id="predict"></div>
    <div id="sliders-wrap"></div>
    <div id="choices-wrap"></div>
    <div id="debug-wrap"></div>
    <div class="pips" id="pips"></div>
    <div class="hints" id="hints"></div>
    <div id="solved-msg"></div>
    <div class="nav">
      <button id="prev">&larr;</button>
      <button id="next" class="primary">Dalej &rarr;</button>
    </div>
  </div>
</div>

<script type="module">
import { initWarsztat, renderMath, T } from '../lib/warsztat-core.js';
import { drawDomainGate, drawMiniGate } from '../lib/domain-gate.js';
{
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = 600, H = 310;

  // A monotonic animation clock used by the gate helpers.
  let T0 = performance.now();
  function now() { return (performance.now() - T0) / 1000; }

  // Helper: fill canvas background + banner-esque title strip.
  function clearCanvas() {
    ctx.fillStyle = '#0e0e12';
    ctx.fillRect(0, 0, W, H);
  }

  // Helper: render a KaTeX-style formula into an offscreen HTML element
  // then paint as image? Too heavy. Instead, we keep canvas text plain and
  // put the proper KaTeX in the DOM desc. Canvas shows ASCII-style shorthand.

  // ── Challenge-local state ───────────────────────────────────
  const C = {
    // Ch.1
    ch1Pick: null,
    // Ch.2
    ch2Pick: null,
    // Ch.3
    ch3Pick: null,
    // Ch.5 has no work phase beyond predict — predictAfter handles transfer.
  };

  // Shared text helpers
  function drawHeader(text, subtitle) {
    ctx.save();
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(text, W / 2, 10);
    if (subtitle) {
      ctx.font = '11px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.48)';
      ctx.fillText(subtitle, W / 2, 28);
    }
    ctx.restore();
  }

  // ── Challenges ──────────────────────────────────────────────
  const challenges = [

    // ═══════════════════════════════════════════════════════════
    // Ch.1 — Dziedzina przed rozwiązaniem (warm-up)
    // ═══════════════════════════════════════════════════════════
    {
      id: 'ch1',
      title:   'Dziedzina przed rozwiązaniem',
      titleEn: 'Domain before solving',
      desc:    'Równanie: $\\log_2(x - 3) = 4$. Najpierw zapisz dziedzinę, potem rozwiąż. Każdy kandydat musi przejść przez **Bramkę Dziedziny**.',
      descEn:  'Equation: $\\log_2(x - 3) = 4$. Write down the domain first, then solve. Every candidate has to pass through the **Domain Gate**.',
      drawBackground: 'blank',
      init() { C.ch1Pick = null; },
      predict: {
        question:   'Przed rozwiązaniem: jakie warunki na $x$ musi spełnić?',
        questionEn: 'Before solving: what conditions must $x$ satisfy?',
        options: [
          { label: '$x > 0$',        labelEn: '$x > 0$',
            correct: false,
            why:   'Taki warunek pasowałby do $\\log_2 x$, ale tutaj logarytm działa na $x - 3$, więc to wyrażenie $x - 3$ musi być dodatnie.',
            whyEn: 'That condition would fit $\\log_2 x$, but here the logarithm acts on $x - 3$, so it’s the expression $x - 3$ that has to be positive.' },
          { label: '$x > 3$',        labelEn: '$x > 3$',
            correct: true,
            why:   'Argument $\\log_2(x-3)$ musi być dodatni, więc $x - 3 > 0$.',
            whyEn: 'The argument of $\\log_2(x-3)$ must be positive, so $x - 3 > 0$.' },
          { label: '$x \\geq 3$',    labelEn: '$x \\geq 3$',
            correct: false,
            why:   'Niemal poprawnie, ale $\\log_2 0$ nie istnieje, więc wymagamy nierówności ściśle większej.',
            whyEn: 'Almost right, but $\\log_2 0$ doesn’t exist, so the inequality has to be strict.' },
          { label: 'brak warunków', labelEn: 'no conditions',
            correct: false,
            why:   'Każdy logarytm ma ograniczoną dziedzinę — jej zapisanie jest pierwszym krokiem w każdym zadaniu.',
            whyEn: 'Every logarithm has a restricted domain — writing it down is the first step in every problem.' },
        ],
      },
      choices: {
        question:   'Jak rozwiązać $\\log_2(x-3) = 4$?',
        questionEn: 'How do you solve $\\log_2(x-3) = 4$?',
        options: [
          { id: 'a', label: '$x - 3 = 2^4 = 16$, więc $x = 19$', labelEn: '$x - 3 = 2^4 = 16$, so $x = 19$', correct: true },
          { id: 'b', label: '$x - 3 = \\log_2 4$, więc $x = 5$',  labelEn: '$x - 3 = \\log_2 4$, so $x = 5$',  correct: false },
          { id: 'c', label: '$x = 4 \\cdot 2 + 3 = 11$',              labelEn: '$x = 4 \\cdot 2 + 3 = 11$',         correct: false },
        ],
        pick(id) { C.ch1Pick = id; },
      },
      pips() {
        return [
          { label: 'dziedzina: $x > 3$', ok: true }, // assumed after predict
          { label: 'rozwiązanie wybrane', ok: C.ch1Pick === 'a' },
        ];
      },
      solved() { return C.ch1Pick === 'a'; },
      hints: [
        '① Najpierw **dziedzina**: $x - 3 > 0 \\Rightarrow x > 3$. Zapisz ten warunek od razu.',
        '② Teraz rozwiązanie: zamień $\\log_2 A = 4$ na $A = 2^4$. Tu $A = x - 3$, więc $x - 3 = 16$.',
        '③ $x = 19$. Sprawdź z dziedziną: $19 > 3$ ✓. Bramka przepuszcza.',
      ],
      hintsEn: [
        '① First the **domain**: $x - 3 > 0 \\Rightarrow x > 3$. Write the condition down right away.',
        '② Now the solving: rewrite $\\log_2 A = 4$ as $A = 2^4$. Here $A = x - 3$, so $x - 3 = 16$.',
        '③ $x = 19$. Check against the domain: $19 > 3$ ✓. The gate lets it through.',
      ],
      solvedMsg:   'W każdym zadaniu logarytmicznym zaczynamy od zapisania dziedziny, a dopiero potem rozwiązujemy algebraicznie — bez dziedziny można otrzymać liczbę, która wcale równania nie spełnia.',
      solvedMsgEn: 'For every logarithmic problem we start by writing the domain, and only then solve algebraically — without it you can land on a number that doesn’t actually satisfy the equation.',
      draw() {
        clearCanvas();
        // Build candidates based on current pick
        const candidates = [];
        if (C.ch1Pick === 'a' || C.ch1Pick === null) {
          candidates.push({ value: 19, label: 'x=19', passed: true, note: '19 > 3 ✓' });
        }
        if (C.ch1Pick === 'b') {
          candidates.push({ value: 19, label: 'x=19', passed: true });
          candidates.push({ value: 5,  label: 'x=5',  passed: false, note: '5 > 3? tak — ale nie spełnia równania' });
        }
        if (C.ch1Pick === 'c') {
          candidates.push({ value: 19, label: 'x=19', passed: true });
          candidates.push({ value: 11, label: 'x=11', passed: false, note: 'to nie rozwiązanie równania' });
        }

        drawDomainGate(ctx, {
          bounds: { x: 10, y: 10, w: W - 20, h: H - 20 },
          title: 'log₂(x − 3) = 4',
          subtitle: 'Dziedzina: x − 3 > 0, czyli x > 3',
          domain: { label: 'x > 3', predicate: v => v > 3 },
          candidates,
          t: now(),
        });
      },
    },

    // ═══════════════════════════════════════════════════════════
    // Ch.2 — Ekstraneal root (the punch)
    // ═══════════════════════════════════════════════════════════
    {
      id: 'ch2',
      title:   'Pierwiastek pozorny — bramka odrzuca',
      titleEn: 'Spurious root — the gate blocks it',
      desc:    'Rozwiązujemy $\\log_2(x^2 - 9) = \\log_2(x + 3)$. Obaj kandydaci z równania kwadratowego spróbują przejść — o tym, który przechodzi, decyduje bramka dziedziny.',
      descEn:  'We solve $\\log_2(x^2 - 9) = \\log_2(x + 3)$. Both candidates from the quadratic try to pass — the domain gate decides which one gets through.',
      drawBackground: 'blank',
      init() { C.ch2Pick = null; },
      predict: {
        question:   'Czy $x = -3$ może być rozwiązaniem?',
        questionEn: 'Can $x = -3$ be a solution?',
        options: [
          { label: 'Tak — przecież $x^2 - 9 = x + 3$ ma $-3$ jako pierwiastek.', labelEn: 'Yes — after all $x^2 - 9 = x + 3$ has $-3$ as a root.',
            correct: false,
            why:   'Podstawiając do oryginalnego równania, dostajemy $\\log_2((-3)^2 - 9) = \\log_2 0$, a taka wartość logarytmu nie istnieje.',
            whyEn: 'Substituting into the original equation gives $\\log_2((-3)^2 - 9) = \\log_2 0$, and that value of the logarithm doesn’t exist.' },
          { label: 'Nie — spełnia równanie algebraiczne, ale nie dziedzinę.', labelEn: 'No — it satisfies the algebraic equation but not the domain.',
            correct: false,
            why:   'Bliski trop, ale precyzyjniej: dziedzinę wyznaczamy najpierw, a dopiero potem sprawdzamy w niej kandydatów.',
            whyEn: 'Close, but more precisely: we determine the domain first, and only then check candidates against it.' },
          { label: 'Trzeba sprawdzić w dziedzinie.', labelEn: 'You have to check it against the domain.',
            correct: true,
            why:   'Reguła mówi: najpierw dziedzina. Dla $\\log_2(x^2-9) = \\log_2(x+3)$ wymagamy jednocześnie $x^2 > 9$ oraz $x+3 > 0$, czyli $x > 3$.',
            whyEn: 'The rule says: domain first. For $\\log_2(x^2-9) = \\log_2(x+3)$ we need both $x^2 > 9$ and $x+3 > 0$, i.e. $x > 3$.' },
        ],
      },
      choices: {
        question:   'Jaki jest prawidłowy zbiór rozwiązań?',
        questionEn: 'What is the correct solution set?',
        options: [
          { id: 'both', label: '$\\{-3,\\ 4\\}$ — oba pierwiastki kwadratowego', labelEn: '$\\{-3,\\ 4\\}$ — both roots of the quadratic',  correct: false },
          { id: 'only4', label: '$\\{4\\}$ — tylko $4$ przechodzi bramkę',     labelEn: '$\\{4\\}$ — only $4$ passes the gate',          correct: true },
          { id: 'onlyneg', label: '$\\{-3\\}$',                                    labelEn: '$\\{-3\\}$',                                  correct: false },
        ],
        pick(id) { C.ch2Pick = id; },
      },
      pips() {
        return [
          { label: 'dziedzina: $x > 3$', ok: true },
          { label: 'kandydaci policzeni: $-3, 4$', ok: true },
          { label: 'bramka zastosowana', ok: C.ch2Pick === 'only4' },
        ];
      },
      solved() { return C.ch2Pick === 'only4'; },
      hints: [
        '① Dziedzina: jednocześnie $x^2 - 9 > 0$ (czyli $x > 3$ lub $x < -3$) ORAZ $x + 3 > 0$ (czyli $x > -3$). Przecięcie: $x > 3$.',
        '② Rozwiązanie algebraiczne: $x^2 - 9 = x + 3 \\Rightarrow x^2 - x - 12 = 0 \\Rightarrow (x-4)(x+3) = 0$.',
        '③ Kandydaci: $x = 4$ (przechodzi ✓) i $x = -3$ (nie spełnia $x > 3$ — bramka odrzuca). Zbiór: $\\{4\\}$.',
      ],
      hintsEn: [
        '① Domain: simultaneously $x^2 - 9 > 0$ (i.e. $x > 3$ or $x < -3$) AND $x + 3 > 0$ (i.e. $x > -3$). Intersection: $x > 3$.',
        '② Algebraic solving: $x^2 - 9 = x + 3 \\Rightarrow x^2 - x - 12 = 0 \\Rightarrow (x-4)(x+3) = 0$.',
        '③ Candidates: $x = 4$ (passes ✓) and $x = -3$ (fails $x > 3$ — gate rejects). Set: $\\{4\\}$.',
      ],
      solvedMsg:   'Każdego kandydata warto zweryfikować z dziedziną — rozwiązania, które do niej nie należą, są pozorne i nie zaliczają się do zbioru rozwiązań.',
      solvedMsgEn: 'Every candidate is worth checking against the domain — solutions that fall outside it are spurious and don’t belong in the solution set.',
      draw() {
        clearCanvas();
        drawDomainGate(ctx, {
          bounds: { x: 10, y: 10, w: W - 20, h: H - 20 },
          title: 'log₂(x² − 9) = log₂(x + 3)',
          subtitle: 'Dziedzina: x² > 9 i x + 3 > 0  ⇒  x > 3',
          domain: { label: 'x > 3', predicate: v => v > 3 },
          candidates: [
            { value: 4,  label: 'x=4',  passed: true,  note: '4 > 3 ✓' },
            { value: -3, label: 'x=−3', passed: false, note: '−3 + 3 = 0, log₂ 0 nie istnieje' },
          ],
          t: now(),
        });
      },
    },

    // ═══════════════════════════════════════════════════════════
    // Ch.3 — Substytucja
    // ═══════════════════════════════════════════════════════════
    {
      id: 'ch3',
      title:   'Podstawienie: $(\\log_2 x)^2 - 3\\log_2 x + 2 = 0$',
      titleEn: 'Substitution: $(\\log_2 x)^2 - 3\\log_2 x + 2 = 0$',
      desc:    'Tym razem pułapka tkwi nie w dziedzinie, lecz w samym podstawieniu — bramka $x > 0$ i tak czeka na końcu.',
      descEn:  'This time the trap isn’t in the domain but in the substitution itself — the $x > 0$ gate is still waiting at the end.',
      drawBackground: 'blank',
      init() { C.ch3Pick = null; },
      predict: {
        question:   'Jak rozwiązać to równanie?',
        questionEn: 'How do you solve this equation?',
        options: [
          { label: 'Podnieść obie strony do kwadratu',         labelEn: 'Square both sides',
            correct: false,
            why:   'W równaniu pojawia się kwadrat logarytmu, a nie kwadrat całego wyrażenia — podnoszenie stron do kwadratu niczego nie porządkuje.',
            whyEn: 'The equation has a squared logarithm, not a squared expression — squaring the sides doesn’t simplify anything.' },
          { label: 'Podstawienie $t = \\log_2 x$, rozwiązać $t^2 - 3t + 2 = 0$', labelEn: 'Substitute $t = \\log_2 x$ and solve $t^2 - 3t + 2 = 0$',
            correct: true,
            why:   'Takie podstawienie sprowadza całość do zwykłego równania kwadratowego w zmiennej $t$.',
            whyEn: 'That substitution reduces the whole thing to an ordinary quadratic in $t$.' },
          { label: 'Bezpośrednio podstawić $x = 2^?$',        labelEn: 'Plug in $x = 2^?$ directly',
            correct: false,
            why:   'Pomysłowe, ale znacznie trudniejsze rachunkowo — podstawienie $t = \\log_2 x$ jest czytelniejsze.',
            whyEn: 'Creative, but much harder computationally — the substitution $t = \\log_2 x$ is cleaner.' },
        ],
      },
      choices: {
        question:   'Zbiór rozwiązań w $x$:',
        questionEn: 'Solution set in $x$:',
        options: [
