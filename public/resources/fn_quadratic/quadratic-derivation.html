<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wzór kwadratowy — Wyprowadzenie przez przekształcenia</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  button:hover { background: rgba(255,255,255,.08); }
  button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="qc" width="600" height="310"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>

    <div id="sl_k" style="display:none;margin-bottom:8px;">
      <div class="slider-row">
        <span class="lbl">k =</span>
        <input type="range" id="qk" min="-3" max="1.5" step="0.05" value="-2">
        <span class="val" id="qkv" style="color:#FFD166;"></span>
      </div>
    </div>

    <div id="sl_abc" style="display:none;margin-bottom:8px;">
      <div class="sliders">
        <div class="slider-row">
          <span class="lbl" style="color:#FF6B35;">a =</span>
          <input type="range" id="sa" min="0.2" max="3" step="0.1" value="1">
          <span class="val" id="sav" style="color:#FF6B35;"></span>
        </div>
        <div class="slider-row">
          <span class="lbl" style="color:#58C4DD;">b =</span>
          <input type="range" id="sb" min="-6" max="6" step="0.5" value="-4">
          <span class="val" id="sbv" style="color:#58C4DD;"></span>
        </div>
        <div class="slider-row">
          <span class="lbl" style="color:#83C167;">c =</span>
          <input type="range" id="sc" min="-4" max="4" step="0.5" value="1">
          <span class="val" id="scv" style="color:#83C167;"></span>
        </div>
      </div>
      <div style="border-top:1px solid rgba(255,255,255,.08);margin:6px 0;"></div>
      <div class="sliders">
        <div class="slider-row">
          <span class="lbl" style="color:#FF6B35;">a =</span>
          <input type="range" id="sv_a" min="0.2" max="3" step="0.1" value="1">
          <span class="val" id="sv_av" style="color:#FF6B35;"></span>
        </div>
        <div class="slider-row">
          <span class="lbl" style="color:#FFD166;">h =</span>
          <input type="range" id="sv_h" min="-5" max="5" step="0.1" value="2">
          <span class="val" id="sv_hv" style="color:#FFD166;"></span>
        </div>
        <div class="slider-row">
          <span class="lbl" style="color:#FFD166;">k =</span>
          <input type="range" id="sv_k" min="-4" max="4" step="0.1" value="-3">
          <span class="val" id="sv_kv" style="color:#FFD166;"></span>
        </div>
      </div>
    </div>

    <div class="nav">
      <button id="qprev">← wstecz</button>
      <div id="qdots"></div>
      <button id="qnext">dalej →</button>
    </div>
  </div>
</div>

<script>
(function(){
const LANG = new URLSearchParams(window.location.search).get('lang') || 'pl';
const T = (pl, en) => LANG === 'pl' ? pl : en;

const cv=document.getElementById('qc'),cx=cv.getContext('2d');
const W=600,H=310,OX=300,OY=190,SC=48;
const px=x=>OX+x*SC, py=y=>OY-y*SC;

let qsi=0,ik=-2;
let sa=1,sb=-4,sc=1;
let fr={a:1,h:0,k:0},to={a:1,h:0,k:0},cu={a:1,h:0,k:0};
let af=0,ad=80,imode=false;
const CURVE='#58C4DD',VERT='#FF6B35',ROOT='#FFD166';

const stages=[
  {a:1,h:0,k:0,
   f:'y = x²',
   d:T('Kanoniczna parabola. Podwójny pierwiastek w x = 0.','Canonical parabola. Double root at x = 0.'),
   show:''},
  {a:1,h:0,k:-2,
   f:'y = x² + k',
   d:T('Przesunięcie pionowe rozdziela podwójny pierwiastek na x = ±√(−k). Przesuń suwak, żeby zobaczyć efekt.','Vertical shift splits the double root to x = ±√(−k). Drag to explore.'),
   show:'k'},
  {a:1,h:2,k:-2,
   f:'y = (x − h)² + k,  h = 2',
   d:T('Przesunięcie poziome: pierwiastki to x = h ± √(−k). Środek to h, rozstaw to √(−k).','Horizontal shift: roots become x = h ± √(−k). The midpoint is h, the spread is √(−k).'),
   show:''},
  {a:0.5,h:2,k:-2,
   f:'y = a(x − h)² + k,  a = ½',
   d:T('Rozciąganie pionowe: pierwiastki to x = h ± √(−k/a). Jeden wzór rządzi wszystkimi.','Vertical stretch: roots become x = h ± √(−k/a). One formula to rule them all.'),
   show:''},
  {a:1,h:2,k:-3,
   f:'y = ax² + bx + c',
   d:T('Rozwiń a(x−h)²+k i porównaj z ax²+bx+c. Przesuwaj a, b, c — obserwuj, jak zmieniają się h i k.','Expand a(x−h)²+k and match terms with ax²+bx+c. Drag a, b, c — watch h and k update.'),
   show:'abc'},
];

function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function hFromABC(a,b){return -b/(2*a);}
function kFromABC(a,b,c){return c-b*b/(4*a);}

function renderDots(){
  const dc=document.getElementById('qdots');
  dc.innerHTML=stages.map((_,i)=>
    `<span class="dot${i===qsi?' active':''}" data-i="${i}"></span>`
  ).join('');
  dc.querySelectorAll('span').forEach(s=>s.addEventListener('click',()=>qGo(+s.dataset.i)));
}

function qGo(idx){
  idx=Math.max(0,Math.min(stages.length-1,idx));
  qsi=idx; imode=false;
  const s=stages[idx];
  let th=s.h,tk=s.k,ta=s.a;
  if(s.show==='abc'){th=hFromABC(sa,sb);tk=kFromABC(sa,sb,sc);ta=sa;}
  if(s.show==='k'){tk=ik;}
  fr={...cu}; to={a:ta,h:th,k:tk}; af=0;
  document.getElementById('qf').innerHTML=s.f;
  document.getElementById('qd').innerHTML=s.d;
  document.getElementById('sl_k').style.display=s.show==='k'?'block':'none';
  document.getElementById('sl_abc').style.display=s.show==='abc'?'block':'none';
  document.getElementById('qprev').disabled=idx===0;
  document.getElementById('qnext').disabled=idx===stages.length-1;
  document.getElementById('qkv').textContent=ik<0?'−'+Math.abs(ik).toFixed(2):ik.toFixed(2);
  updateABCLabels();
  if(s.show==='abc') updateVertexSliders();
  renderDots();
}

function updateABCLabels(){
  document.getElementById('sav').textContent=sa.toFixed(1);
  document.getElementById('sbv').textContent=sb.toFixed(1);
  document.getElementById('scv').textContent=sc.toFixed(1);
}

function updateVertexSliders(){
  const h=hFromABC(sa,sb),k=kFromABC(sa,sb,sc);
  document.getElementById('sv_a').value=sa;
  document.getElementById('sv_h').value=h;
  document.getElementById('sv_k').value=k;
  document.getElementById('sv_av').textContent=sa.toFixed(1);
  document.getElementById('sv_hv').textContent=h.toFixed(2);
  document.getElementById('sv_kv').textContent=k.toFixed(2);
}

function updateABCSliders(){
  document.getElementById('sa').value=sa;
  document.getElementById('sb').value=sb;
  document.getElementById('sc').value=sc;
  updateABCLabels();
}

document.getElementById('qprev').addEventListener('click',()=>qGo(qsi-1));
document.getElementById('qnext').addEventListener('click',()=>qGo(qsi+1));
document.getElementById('qk').addEventListener('input',function(){
  ik=+this.value;
  document.getElementById('qkv').textContent=ik<0?'−'+Math.abs(ik).toFixed(2):ik.toFixed(2);
  if(imode||qsi===1){cu.k=ik;fr.k=ik;to.k=ik;imode=true;}
});
['sa','sb','sc'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    sa=+document.getElementById('sa').value;
    sb=+document.getElementById('sb').value;
    sc=+document.getElementById('sc').value;
    updateABCLabels();
    updateVertexSliders();
    if(qsi===4){
      const nh=hFromABC(sa,sb),nk=kFromABC(sa,sb,sc);
      cu.a=sa;cu.h=nh;cu.k=nk;fr={...cu};to={...cu};imode=true;
    }
  });
});

['sv_a','sv_h','sv_k'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    const va=+document.getElementById('sv_a').value;
    const vh=+document.getElementById('sv_h').value;
    const vk=+document.getElementById('sv_k').value;
    sa=va;
    sb=-2*va*vh;
    sc=va*vh*vh+vk;
    updateABCSliders();
    document.getElementById('sv_av').textContent=va.toFixed(1);
    document.getElementById('sv_hv').textContent=vh.toFixed(2);
    document.getElementById('sv_kv').textContent=vk.toFixed(2);
    if(qsi===4){
      cu.a=va;cu.h=vh;cu.k=vk;fr={...cu};to={...cu};imode=true;
    }
  });
});

function drawGrid(){
  cx.strokeStyle='rgba(255,255,255,.05)';cx.lineWidth=.7;
  for(let x=-6;x<=6;x++){cx.beginPath();cx.moveTo(px(x),0);cx.lineTo(px(x),H);cx.stroke();}
  for(let y=-4;y<=6;y++){cx.beginPath();cx.moveTo(0,py(y));cx.lineTo(W,py(y));cx.stroke();}
}

function drawAxes(){
  cx.strokeStyle='rgba(255,255,255,.38)';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(0,py(0));cx.lineTo(W-8,py(0));cx.stroke();
  cx.beginPath();cx.moveTo(px(0),H);cx.lineTo(px(0),7);cx.stroke();
  cx.fillStyle='rgba(255,255,255,.38)';
  cx.beginPath();cx.moveTo(W,py(0));cx.lineTo(W-9,py(0)-4);cx.lineTo(W-9,py(0)+4);cx.closePath();cx.fill();
  cx.beginPath();cx.moveTo(px(0),0);cx.lineTo(px(0)-4,9);cx.lineTo(px(0)+4,9);cx.closePath();cx.fill();
  for(let x=-5;x<=5;x++){
    if(!x)continue;
    cx.strokeStyle='rgba(255,255,255,.18)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(px(x),py(0)-3);cx.lineTo(px(x),py(0)+3);cx.stroke();
    cx.fillStyle='rgba(255,255,255,.25)';cx.font='11px sans-serif';cx.textAlign='center';cx.fillText(x,px(x),py(0)+14);
  }
  for(let y=-2;y<=4;y++){
    if(!y)continue;
    cx.strokeStyle='rgba(255,255,255,.18)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(px(0)-3,py(y));cx.lineTo(px(0)+3,py(y));cx.stroke();
    cx.fillStyle='rgba(255,255,255,.25)';cx.textAlign='right';cx.fillText(y,px(0)-7,py(y)+4);
  }
  cx.fillStyle='rgba(255,255,255,.4)';cx.font='13px sans-serif';
  cx.textAlign='center';cx.fillText('x',W-4,py(0)+5);cx.fillText('y',px(0),11);
}

function drawCurve(a,h,k){
  const noR=-k/a<-0.001;
  cx.beginPath();cx.strokeStyle=noR?'rgba(220,80,80,.85)':CURVE;cx.lineWidth=2.5;
  let mv=true;
  for(let i=0;i<=600;i++){
    const x=-6+12*i/600,y=a*(x-h)*(x-h)+k;
    const cpx_=px(x),cpy_=py(y);
    if(cpy_<-4||cpy_>H+4){mv=true;continue;}
    if(mv){cx.moveTo(cpx_,cpy_);mv=false;}else cx.lineTo(cpx_,cpy_);
  }
  cx.stroke();
}

function gdot(xx,yy,r,col){
  cx.beginPath();cx.arc(xx,yy,r,0,Math.PI*2);cx.fillStyle=col;
  cx.shadowColor=col;cx.shadowBlur=14;cx.fill();cx.shadowBlur=0;
}

function drawVertex(h,k){
  const vx=px(h),vy=py(k);
  if(vy<-10||vy>H+10)return;
  gdot(vx,vy,5,VERT);
  cx.fillStyle='rgba(255,107,53,.8)';cx.font='11px monospace';cx.textAlign='left';
  cx.fillText('('+h.toFixed(2)+', '+k.toFixed(2)+')',vx+9,vy+4);
}

function drawRoots(a,h,k){
  const d=-k/a;
  if(d<-0.001){
    const alpha=Math.min((-d-0.001)/0.2,1);
    cx.globalAlpha=alpha;
    cx.fillStyle='rgba(220,80,80,.8)';cx.font='12px sans-serif';cx.textAlign='center';
    cx.fillText(T('brak pierwiastków rzeczywistych','no real roots'),px(h),py(Math.max(k+0.1,-1.5)));
    cx.globalAlpha=1;return;
  }
  const sqD=Math.sqrt(Math.max(0,d));
  const single=sqD<0.03;
  const roots=single?[h]:[h-sqD,h+sqD];
  roots.forEach((rx,i)=>{
    const rpx=px(rx);
    cx.setLineDash([3,5]);cx.strokeStyle='rgba(255,209,102,.15)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(rpx,py(0));cx.lineTo(rpx,py(k));cx.stroke();
    cx.setLineDash([]);
    gdot(rpx,py(0),single?9:6,ROOT);
    cx.fillStyle=ROOT;cx.font='bold 11px monospace';cx.textAlign='center';
    cx.fillText(single?'x='+h.toFixed(2):(i===0?'x₁='+rx.toFixed(2):'x₂='+rx.toFixed(2)),rpx,py(0)-(single?20:15));
  });
}

// ── Pretty math rendering helpers ──────────────────────────────
function drawFraction(x,y,num,den,col,sz){
  cx.save();cx.font=sz+'px monospace';cx.fillStyle=col;cx.textAlign='center';
  const nw=cx.measureText(num).width, dw=cx.measureText(den).width;
  const w=Math.max(nw,dw)+6;
  cx.fillText(num,x,y-3);
  cx.strokeStyle=col;cx.lineWidth=1.2;
  cx.beginPath();cx.moveTo(x-w/2,y+1);cx.lineTo(x+w/2,y+1);cx.stroke();
  cx.fillText(den,x,y+sz+2);
  cx.restore();
  return w;
}

function drawSqrt(x,y,content,col,sz){
  cx.save();cx.font=sz+'px monospace';cx.fillStyle=col;cx.textAlign='left';
  const tw=cx.measureText(content).width;
  const h=sz+2;
  cx.strokeStyle=col;cx.lineWidth=1.4;
  cx.beginPath();
  cx.moveTo(x,y);cx.lineTo(x+4,y-2);cx.lineTo(x+8,y+h*0.4);
  cx.lineTo(x+13,y-h+2);cx.lineTo(x+16+tw,y-h+2);
  cx.stroke();
  cx.fillText(content,x+15,y);
  cx.restore();
  return 16+tw;
}

function drawQuadraticFormula(x,y,a,b,c,col,sz){
  cx.save();
  const disc=b*b-4*a*c;
  cx.font='bold '+sz+'px monospace';cx.fillStyle=col;cx.textAlign='left';
  cx.fillText('x =',x,y);
  const eqW=cx.measureText('x = ').width;
  // numerator: -b ± √(b²-4ac)
  const bStr=(b>=0?'−'+Math.abs(b).toFixed(1):b===0?'0':Math.abs(b).toFixed(1));
  const discStr=disc.toFixed(2);
  // draw the fraction bar
  cx.font=sz+'px monospace';
  const numParts='−b ± √(b²−4ac)';
  const denStr='2a = '+(2*a).toFixed(1);
  // measure for bar width
  const barW=Math.max(cx.measureText(numParts).width,cx.measureText(denStr).width)+10;
  const fracX=x+eqW+barW/2;
  // numerator line
  cx.fillStyle=col;cx.textAlign='center';
  // -b part
  const numY=y-4;
  cx.font=(sz-1)+'px monospace';
  cx.fillText(bStr+' ±',fracX-20,numY);
  // sqrt part
  cx.textAlign='left';
  const sqX=fracX+2;
  const sqContent=discStr;
  const sqH=sz-1;
  cx.strokeStyle=disc<0?'#dc5050':col;cx.lineWidth=1.3;
  cx.fillStyle=disc<0?'#dc5050':col;
  const sqTw=cx.measureText(sqContent).width;
  cx.beginPath();
  cx.moveTo(sqX,numY);cx.lineTo(sqX+3,numY-1);cx.lineTo(sqX+6,numY+sqH*0.3);
  cx.lineTo(sqX+10,numY-sqH+4);cx.lineTo(sqX+13+sqTw,numY-sqH+4);
  cx.stroke();
  cx.fillText(sqContent,sqX+12,numY);
  // fraction bar
  cx.strokeStyle=col;cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(x+eqW+2,y+2);cx.lineTo(x+eqW+barW,y+2);cx.stroke();
  // denominator
  cx.textAlign='center';cx.fillStyle=col;
  cx.font=(sz-1)+'px monospace';
  cx.fillText(denStr,fracX,y+sz+1);
  cx.restore();
  return eqW+barW+4;
}

function drawABCOverlay(a,h,k){
  const b=-2*a*h,c=a*h*h+k;
  const disc=b*b-4*a*c;
  cx.fillStyle='rgba(22,22,26,.90)';
  cx.strokeStyle='rgba(255,255,255,.10)';cx.lineWidth=.8;
  const bx=6,by=6,bw=285,bh=130;
  cx.beginPath();cx.roundRect(bx,by,bw,bh,6);cx.fill();cx.stroke();

  const lx=bx+10;let ly=by+18;
  cx.font='11px monospace';cx.textAlign='left';

  // vertex form
  cx.fillStyle='rgba(255,255,255,.40)';cx.fillText(T('wierzchołek:','vertex:'),lx,ly);
  cx.fillStyle='rgba(255,255,255,.85)';cx.fillText('a(x − h)² + k',lx+52,ly);

  // expand
  ly+=17;
  cx.fillStyle='rgba(255,255,255,.40)';cx.fillText(T('rozwinięcie:','expand:'),lx,ly);
  cx.fillStyle='rgba(255,255,255,.70)';cx.fillText('ax² − 2ah·x + ah²+k',lx+52,ly);

  // coefficients
  ly+=17;
  cx.fillStyle='rgba(255,255,255,.40)';cx.fillText(T('czyli:','so:'),lx,ly);
  cx.fillStyle='#FF6B35';cx.fillText('a='+a.toFixed(2),lx+28,ly);
  cx.fillStyle='#58C4DD';cx.fillText('b='+b.toFixed(2),lx+98,ly);
  cx.fillStyle='#83C167';cx.fillText('c='+c.toFixed(2),lx+168,ly);

  // invert — h as fraction
  ly+=19;
  cx.fillStyle='rgba(255,255,255,.40)';cx.fillText('h =',lx,ly);
  drawFraction(lx+52,ly-3,'−b','2a','#FFD166',11);
  cx.fillStyle='#FFD166';cx.font='11px monospace';cx.textAlign='left';
  cx.fillText('= '+h.toFixed(3),lx+82,ly);

  // invert — k as fraction
  ly+=19;
  cx.fillStyle='rgba(255,255,255,.40)';cx.fillText('k =',lx,ly);
  drawFraction(lx+56,ly-3,'4ac − b²','4a','#FFD166',11);
  cx.fillStyle='#FFD166';cx.font='11px monospace';cx.textAlign='left';
  cx.fillText('= '+k.toFixed(3),lx+112,ly);

  // ── Bottom formula bar ──
  const fy=H-14;
  if(disc>0.001){
    const sqD=Math.sqrt(disc);
    drawQuadraticFormula(10,fy,a,b,c,'rgba(255,209,102,.85)',13);
    // computed roots on right
    cx.font='12px monospace';cx.fillStyle='rgba(255,209,102,.65)';cx.textAlign='right';
    cx.fillText('= '+(h-sqD/(2*a)).toFixed(3)+',  '+(h+sqD/(2*a)).toFixed(3),W-8,fy);
  } else if(disc>=-0.01){
    drawQuadraticFormula(10,fy,a,b,c,'rgba(255,209,102,.85)',13);
    cx.font='12px monospace';cx.fillStyle='rgba(255,209,102,.65)';cx.textAlign='right';
    cx.fillText('= '+h.toFixed(3)+'  '+T('(podwójny)','(repeated)'),W-8,fy);
  } else {
    cx.font='bold 12px monospace';cx.fillStyle='rgba(220,80,80,.8)';cx.textAlign='left';
    cx.fillText('b²−4ac = '+disc.toFixed(3)+' < 0',10,fy);
    // draw crossed-out sqrt
    cx.fillStyle='rgba(220,80,80,.5)';
    cx.fillText('  →  '+T('brak pierwiastków rzeczywistych','no real roots'),180,fy);
  }
}

function tick(){
  if(!imode){
    af++;const t=Math.min(af/ad,1),e=ease(t);
    cu.a=fr.a+(to.a-fr.a)*e;cu.h=fr.h+(to.h-fr.h)*e;cu.k=fr.k+(to.k-fr.k)*e;
    if(t>=1&&(stages[qsi]?.show==='k'||stages[qsi]?.show==='abc'))imode=true;
  }
  cx.fillStyle='#0e0e12';cx.fillRect(0,0,W,H);
  drawGrid();drawAxes();
  drawCurve(cu.a,cu.h,cu.k);
  drawVertex(cu.h,cu.k);
