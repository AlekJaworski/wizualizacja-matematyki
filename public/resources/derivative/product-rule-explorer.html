<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Reguła iloczynu — Dlaczego pochodna x² to 2x</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  button:hover { background: rgba(255,255,255,.08); }
  button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  #sliders-wrap { min-height: 0; }
  .link-btn { display: inline-block; margin-top: 8px; padding: 6px 14px; border-radius: 6px; background: rgba(88,196,221,.12); border: 1px solid rgba(88,196,221,.3); color: #58C4DD; font-size: 12px; text-decoration: none; font-family: monospace; transition: background .15s; }
  .link-btn:hover { background: rgba(88,196,221,.22); }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="600" height="310"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>
    <div id="sliders-wrap"></div>
    <div class="nav">
      <button id="qprev">&larr;</button>
      <div id="qdots"></div>
      <button id="qnext">&rarr;</button>
    </div>
  </div>
</div>

<script>
(function(){
  const cv = document.getElementById('cv');
  const cx = cv.getContext('2d');
  const W = 600, H = 310;

  const LANG = new URLSearchParams(window.location.search).get('lang') || 'pl';
  const T = (pl, en) => LANG === 'pl' ? pl : en;

  // Colors
  const COL_P = '#4a9eff';   // p side (blue)
  const COL_Q = '#FF6B35';   // q side (orange)
  const COL_PQ = '#83C167';  // pq area (green)
  const COL_DX = '#FFD166';  // Δx terms (yellow)
  const COL_DX2 = '#E07090'; // Δx² term (pink)
  const COL_CURVE = '#58C4DD';

  // State
  let x0 = 2, dx = 1.2, r1 = 0, r2 = 0;
  let stage = 0;

  // ── Drawing helpers ──────────────────────────────────────────
  function clear() {
    cx.fillStyle = '#0e0e12';
    cx.fillRect(0, 0, W, H);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function drawGrid() {
    cx.strokeStyle = 'rgba(255,255,255,0.04)';
    cx.lineWidth = 0.7;
    for (let x = -7; x <= 7; x++) {
      cx.beginPath(); cx.moveTo(gx(x), 0); cx.lineTo(gx(x), H); cx.stroke();
    }
    for (let y = -4; y <= 4; y++) {
      cx.beginPath(); cx.moveTo(0, gy(y)); cx.lineTo(W, gy(y)); cx.stroke();
    }
  }

  function drawAxes() {
    cx.strokeStyle = 'rgba(255,255,255,0.2)';
    cx.lineWidth = 1;
    cx.beginPath(); cx.moveTo(0, gy(0)); cx.lineTo(W, gy(0)); cx.stroke();
    cx.beginPath(); cx.moveTo(gx(0), 0); cx.lineTo(gx(0), H); cx.stroke();
    cx.fillStyle = 'rgba(255,255,255,0.25)';
    cx.font = '9px monospace';
    cx.textAlign = 'center';
    for (let x = -6; x <= 6; x++) {
      if (x === 0) continue;
      cx.fillText(x, gx(x), gy(0) + 13);
    }
  }

  // Graph coords (for graph stages)
  const GOX = W / 2, GOY = H / 2, GSC = 35;
  function gx(x) { return GOX + x * GSC; }
  function gy(y) { return GOY - y * GSC; }

  function plotCurve(fn, color, alpha, dash) {
    cx.save();
    cx.strokeStyle = color;
    cx.globalAlpha = alpha;
    cx.lineWidth = 2;
    if (dash) cx.setLineDash(dash);
    cx.beginPath();
    let started = false;
    for (let sx = 0; sx <= W; sx += 2) {
      const x = (sx - GOX) / GSC;
      const y = fn(x);
      const sy = gy(y);
      if (sy < -80 || sy > H + 80) { started = false; continue; }
      if (!started) { cx.moveTo(sx, sy); started = true; } else cx.lineTo(sx, sy);
    }
    cx.stroke();
    cx.restore();
  }

  function gdot(x, y, r, col) {
    cx.beginPath();
    cx.arc(gx(x), gy(y), r, 0, Math.PI * 2);
    cx.fillStyle = col;
    cx.shadowColor = col;
    cx.shadowBlur = 10;
    cx.fill();
    cx.shadowBlur = 0;
  }

  // ── Rectangle drawing (for area model stages) ────────────────
  // Rectangle fills the canvas with proper labels
  function drawRectangle(p, q, dx, showDx2, showFormula) {
    const margin = 50;
    const maxSide = Math.max(Math.abs(p) + Math.abs(dx), Math.abs(q) + Math.abs(dx), 0.1);
    const scale = (Math.min(W, H) - margin * 2.5) / maxSide;

    const rX = margin + 20;  // rect left
    const rY = margin;       // rect top

    const pW = Math.abs(p) * scale;
    const qH = Math.abs(q) * scale;
    const dxW = Math.abs(dx) * scale;
    const dxH = Math.abs(dx) * scale;

    const totalW = pW + dxW;
    const totalH = qH + dxH;

    // Center the rectangle
    const offX = rX + (W - rX * 2 - totalW) / 2;
    const offY = rY + (H - rY * 2 - totalH) / 2;

    // pq area (main)
    cx.fillStyle = COL_PQ + '30';
    cx.strokeStyle = COL_PQ + '60';
    cx.lineWidth = 1;
    cx.fillRect(offX, offY, pW, qH);
    cx.strokeRect(offX, offY, pW, qH);

    // p·Δx area (right strip)
    cx.fillStyle = COL_P + '25';
    cx.strokeStyle = COL_P + '50';
    cx.fillRect(offX + pW, offY, dxW, qH);
    cx.strokeRect(offX + pW, offY, dxW, qH);

    // q·Δx area (bottom strip)
    cx.fillStyle = COL_Q + '25';
    cx.strokeStyle = COL_Q + '50';
    cx.fillRect(offX, offY + qH, pW, dxH);
    cx.strokeRect(offX, offY + qH, pW, dxH);

    // Δx² area (corner)
    if (showDx2) {
      cx.fillStyle = COL_DX2 + '20';
      cx.strokeStyle = COL_DX2 + '40';
    } else {
      cx.fillStyle = 'rgba(255,255,255,0.03)';
      cx.strokeStyle = 'rgba(255,255,255,0.08)';
    }
    cx.fillRect(offX + pW, offY + qH, dxW, dxH);
    cx.strokeRect(offX + pW, offY + qH, dxW, dxH);

    cx.font = '13px monospace';
    cx.textAlign = 'center';

    // Area labels inside rectangles
    if (pW > 30 && qH > 20) {
      cx.fillStyle = COL_PQ;
      cx.fillText('p·q', offX + pW/2, offY + qH/2 + 5);
      cx.font = '10px monospace';
      cx.fillStyle = COL_PQ + 'aa';
      cx.fillText('= ' + (p*q).toFixed(1), offX + pW/2, offY + qH/2 + 20);
    }

    cx.font = '12px monospace';
    if (dxW > 20 && qH > 20) {
      cx.fillStyle = COL_P;
      cx.fillText(T('q·Δx','q·Δx'), offX + pW + dxW/2, offY + qH/2 + 5);
    }

    if (pW > 20 && dxH > 15) {
      cx.fillStyle = COL_Q;
      cx.fillText(T('p·Δx','p·Δx'), offX + pW/2, offY + qH + dxH/2 + 5);
    }

    if (showDx2 && dxW > 18 && dxH > 15) {
      cx.font = '10px monospace';
      cx.fillStyle = COL_DX2;
      cx.fillText('Δx²', offX + pW + dxW/2, offY + qH + dxH/2 + 4);
    }

    // Side labels
    cx.font = '13px monospace';
    cx.textAlign = 'right';

    // Left side: q + Δx
    cx.fillStyle = COL_Q;
    cx.fillText('q=' + q.toFixed(1), offX - 8, offY + qH/2 + 5);
    cx.fillStyle = COL_DX;
    cx.fillText('Δx=' + dx.toFixed(1), offX - 8, offY + qH + dxH/2 + 5);

    // Top: p + Δx
    cx.textAlign = 'center';
    cx.fillStyle = COL_P;
    cx.fillText('p=' + p.toFixed(1), offX + pW/2, offY - 10);
    cx.fillStyle = COL_DX;
    cx.fillText('Δx=' + dx.toFixed(1), offX + pW + dxW/2, offY - 10);

    // Formula at bottom
    if (showFormula) {
      cx.font = '12px monospace';
      cx.textAlign = 'center';
      const fy = H - 15;

      cx.fillStyle = 'rgba(255,255,255,0.5)';
      cx.fillText('(p+Δx)(q+Δx) = ', W/2 - 140, fy);
      cx.fillStyle = COL_PQ;
      cx.fillText('pq', W/2 - 40, fy);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.fillText('+', W/2 - 18, fy);
      cx.fillStyle = COL_P;
      cx.fillText('qΔx', W/2 + 10, fy);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.fillText('+', W/2 + 40, fy);
      cx.fillStyle = COL_Q;
      cx.fillText('pΔx', W/2 + 68, fy);
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.fillText('+', W/2 + 98, fy);
      cx.fillStyle = showDx2 ? COL_DX2 : 'rgba(255,255,255,0.15)';
      cx.fillText('Δx²', W/2 + 128, fy);
    }
  }

  // ── Stages ───────────────────────────────────────────────────
  const stages = [
    {
      title: () => T('Przypomnienie: iloczyn dwóch prostych', 'Recall: product of two lines'),
      desc: () => T(
        'Parabola to iloczyn dwóch prostych. W punkcie x₀ każdy nawias daje liczbę: p = f(x₀), q = g(x₀). Iloczyn = p·q.',
        'A parabola is the product of two lines. At x₀, each bracket gives a number: p = f(x₀), q = g(x₀). Product = p·q.'
      ),
      sliders: [
        { id: 'x0', lbl: 'x₀', color: '#fff', min: -3, max: 3, step: 0.1, val: 2 },
      ],
      draw() {
        drawGrid(); drawAxes();
        const ff = x => x - r1;
        const gg = x => x - r2;
        const prod = x => ff(x) * gg(x);

        plotCurve(ff, COL_P, 0.4);
        plotCurve(gg, COL_Q, 0.4);
        plotCurve(prod, COL_PQ, 0.7);

        const p = ff(x0), q = gg(x0), pq = p * q;

        // Cursor
        cx.strokeStyle = 'rgba(255,255,255,0.2)';
        cx.lineWidth = 1; cx.setLineDash([4,4]);
        cx.beginPath(); cx.moveTo(gx(x0), 0); cx.lineTo(gx(x0), H); cx.stroke();
        cx.setLineDash([]);

        gdot(x0, p, 5, COL_P);
        gdot(x0, q, 5, COL_Q);
        gdot(x0, pq, 6, COL_PQ);

        // Labels
        cx.font = '12px monospace';
        cx.textAlign = 'left';
        cx.fillStyle = COL_P;
        cx.fillText('p = ' + p.toFixed(1), gx(x0) + 12, gy(p));
        cx.fillStyle = COL_Q;
        cx.fillText('q = ' + q.toFixed(1), gx(x0) + 12, gy(q));
        cx.fillStyle = COL_PQ;
        cx.fillText('p·q = ' + pq.toFixed(1), gx(x0) + 12, gy(pq) - 10);
      }
    },
    {
      title: () => T('Prostokąt: (p + Δx)(q + Δx)', 'Rectangle: (p + Δx)(q + Δx)'),
      desc: () => T(
        'Przesuń się o Δx. Nawiasy stają się (p + Δx) i (q + Δx). Iloczyn to pole prostokąta o bokach (p + Δx) i (q + Δx). Rozłóż na 4 części.',
        'Move by Δx. The brackets become (p + Δx) and (q + Δx). The product is the area of a rectangle with sides (p + Δx) and (q + Δx). Split into 4 parts.'
      ),
      sliders: [
        { id: 'x0', lbl: 'x₀', color: '#fff', min: 0.5, max: 3, step: 0.1, val: 2 },
        { id: 'dx', lbl: 'Δx', color: COL_DX, min: 0.1, max: 2.5, step: 0.05, val: 1.2 },
      ],
      draw() {
        const p = x0 - r1, q = x0 - r2;
        drawRectangle(p, q, dx, true, true);
      }
    },
    {
      title: () => T('Co się zmienia?', 'What changes?'),
      desc: () => T(
        'Zmiana pola = p·Δx + q·Δx + Δx². Zmniejsz Δx — blok Δx² znika! Szybkość zmiany ≈ p + q. Dla x·x: p = q = x₀, więc szybkość = 2x₀.',
        'Change in area = p·Δx + q·Δx + Δx². Shrink Δx — the Δx² block vanishes! Rate of change ≈ p + q. For x·x: p = q = x₀, so rate = 2x₀.'
      ),
      sliders: [
        { id: 'x0', lbl: 'x₀', color: '#fff', min: 0.5, max: 3, step: 0.1, val: 2 },
        { id: 'dx', lbl: 'Δx', color: COL_DX, min: 0.05, max: 2.5, step: 0.05, val: 1.2 },
      ],
      draw() {
        const p = x0 - r1, q = x0 - r2;
        // Show Δx² fading as dx shrinks
        const showDx2 = dx > 0.3;
        drawRectangle(p, q, dx, showDx2, true);

        // Rate of change display
        cx.font = '14px monospace';
        cx.textAlign = 'center';
        const rateY = 24;
        cx.fillStyle = 'rgba(255,255,255,0.6)';
        cx.fillText(T('szybkość zmiany', 'rate of change') + ' = ', W/2 - 80, rateY);
        cx.fillStyle = COL_Q;
        cx.fillText('p', W/2 + 20, rateY);
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.fillText('+', W/2 + 38, rateY);
        cx.fillStyle = COL_P;
        cx.fillText('q', W/2 + 55, rateY);
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.fillText('= ' + (p + q).toFixed(1), W/2 + 90, rateY);

        // Highlight vanishing Δx²
        if (dx < 0.3) {
          cx.font = '11px monospace';
          cx.fillStyle = COL_DX2 + '60';
          cx.fillText('Δx² → 0 ✓', W/2, H - 40);
        }
      }
    },
    {
      title: () => T('Dla x² : pochodna = 2x', 'For x² : derivative = 2x'),
      desc: () => T(
        'Gdy oba nawiasy to x (r₁ = r₂ = 0): p = x₀, q = x₀. Szybkość zmiany = p + q = x₀ + x₀ = 2x₀. Dlatego pochodna x² to 2x, nie x!',
        'When both brackets are x (r₁ = r₂ = 0): p = x₀, q = x₀. Rate of change = p + q = x₀ + x₀ = 2x₀. That\'s why the derivative of x² is 2x, not x!'
      ),
      sliders: [
        { id: 'x0', lbl: 'x₀', color: '#fff', min: 0.5, max: 4, step: 0.1, val: 2 },
      ],
      draw() {
        // Force r1=r2=0 for x*x
        drawGrid(); drawAxes();

        const p = x0, q = x0;
        const prod = x => x * x;
        const deriv = x => 2 * x;

        // Parabola
        plotCurve(prod, COL_PQ, 0.6);

        // Tangent line at x0
        const slope = deriv(x0);
        const yAtX0 = prod(x0);
        const tangent = x => yAtX0 + slope * (x - x0);
        plotCurve(tangent, COL_DX, 0.7, [6, 4]);

        // Point
        gdot(x0, yAtX0, 6, COL_PQ);

        // Show p + q = 2x
        cx.font = '13px monospace';
        cx.textAlign = 'left';

        const infoX = 20, infoY = 30;
        cx.fillStyle = COL_P;
        cx.fillText('p = x₀ = ' + p.toFixed(1), infoX, infoY);
        cx.fillStyle = COL_Q;
        cx.fillText('q = x₀ = ' + q.toFixed(1), infoX, infoY + 18);
        cx.fillStyle = 'rgba(255,255,255,0.7)';
        cx.fillText(T('nachylenie', 'slope') + ' = p + q = ' + (p+q).toFixed(1), infoX, infoY + 40);

        // Big formula
        cx.font = '16px monospace';
        cx.textAlign = 'center';
        cx.fillStyle = COL_CURVE;
        cx.fillText('d/dx [x²] = 2x', W/2, H - 20);
      }
    },
    {
      title: () => T('Ogólnie: (x−r₁)(x−r₂)', 'General: (x−r₁)(x−r₂)'),
      desc: () => T(
        'Dla dowolnych r₁, r₂: pochodna w x₀ = (x₀−r₁) + (x₀−r₂) = 2x₀ − r₁ − r₂. Każdy nawias dokłada swoją zmianę — reguła iloczynu.',
        'For any r₁, r₂: derivative at x₀ = (x₀−r₁) + (x₀−r₂) = 2x₀ − r₁ − r₂. Each bracket contributes its change — the product rule.'
      ),
      sliders: [
        { id: 'x0', lbl: 'x₀', color: '#fff', min: -3, max: 4, step: 0.1, val: 2 },
        { id: 'r1', lbl: 'r₁', color: COL_P, min: -3, max: 3, step: 0.5, val: -1 },
        { id: 'r2', lbl: 'r₂', color: COL_Q, min: -3, max: 3, step: 0.5, val: 2 },
      ],
      draw() {
        drawGrid(); drawAxes();

        const ff = x => x - r1;
        const gg = x => x - r2;
        const prod = x => ff(x) * gg(x);

        const p = ff(x0), q = gg(x0);
        const slope = p + q;
        const yAtX0 = prod(x0);
        const tangent = x => yAtX0 + slope * (x - x0);

        plotCurve(ff, COL_P, 0.25);
        plotCurve(gg, COL_Q, 0.25);
        plotCurve(prod, COL_PQ, 0.6);
        plotCurve(tangent, COL_DX, 0.6, [6, 4]);

        // Cursor
        cx.strokeStyle = 'rgba(255,255,255,0.15)';
        cx.lineWidth = 1; cx.setLineDash([4,4]);
        cx.beginPath(); cx.moveTo(gx(x0), 0); cx.lineTo(gx(x0), H); cx.stroke();
        cx.setLineDash([]);

        gdot(x0, yAtX0, 6, COL_PQ);
        gdot(r1, 0, 4, COL_P);
        gdot(r2, 0, 4, COL_Q);

        // Info
        const infoX = 16, infoY = 24;
        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COL_P;
        cx.fillText('p = (x₀−r₁) = ' + p.toFixed(1), infoX, infoY);
        cx.fillStyle = COL_Q;
        cx.fillText('q = (x₀−r₂) = ' + q.toFixed(1), infoX, infoY + 16);
        cx.fillStyle = COL_DX;
        cx.fillText(T('nachylenie','slope') + ' = p+q = ' + slope.toFixed(1), infoX, infoY + 34);

        cx.font = '11px monospace';
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.fillText('= 2x₀ − r₁ − r₂ = 2(' + x0.toFixed(1) + ') − (' + r1.toFixed(1) + ') − (' + r2.toFixed(1) + ')', infoX, infoY + 50);
      }
    },
  ];

  // ── Slider management ────────────────────────────────────────
  const slWrap = document.getElementById('sliders-wrap');

  function buildSliders(defs) {
    let html = '<div class="sliders">';
    defs.forEach(s => {
      html += `<div class="slider-row">
        <span class="lbl" style="color:${s.color}">${s.lbl} =</span>
        <input type="range" id="s_${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.val}">
        <span class="val" id="v_${s.id}" style="color:${s.color}"></span>
      </div>`;
    });
    html += '</div>';
    slWrap.innerHTML = html;

    defs.forEach(s => {
      const el = document.getElementById('s_' + s.id);
      document.getElementById('v_' + s.id).textContent = (+el.value).toFixed(s.step < 1 ? 1 : 0);
      el.addEventListener('input', function() {
        const v = +this.value;
        document.getElementById('v_' + s.id).textContent = v.toFixed(s.step < 1 ? 1 : 0);
        if (s.id === 'x0') x0 = v;
        if (s.id === 'dx') dx = v;
        if (s.id === 'r1') r1 = v;
        if (s.id === 'r2') r2 = v;
      });
    });
  }

  // ── Navigation ───────────────────────────────────────────────
  const prevBtn = document.getElementById('qprev');
  const nextBtn = document.getElementById('qnext');
  const dotsEl  = document.getElementById('qdots');
  const titleEl = document.getElementById('qf');
  const descEl  = document.getElementById('qd');

  function goTo(idx) {
    stage = Math.max(0, Math.min(stages.length - 1, idx));
    const s = stages[stage];
    titleEl.textContent = s.title();
    descEl.textContent = s.desc();

    // Sync slider vals
    if (s.sliders) {
      s.sliders.forEach(sl => {
        if (sl.id === 'x0') sl.val = x0;
        if (sl.id === 'dx') sl.val = dx;
        if (sl.id === 'r1') sl.val = r1;
        if (sl.id === 'r2') sl.val = r2;
      });
      buildSliders(s.sliders);
    } else {
      slWrap.innerHTML = '';
    }

    // Reset for x*x stage
    if (stage === 3) {
      r1 = 0; r2 = 0;
    }

    prevBtn.disabled = stage === 0;
    nextBtn.disabled = stage === stages.length - 1;
    renderDots();
  }

  function renderDots() {
    dotsEl.innerHTML = stages.map((_, i) =>
      `<span class="dot${i === stage ? ' active' : ''}" data-i="${i}"></span>`
    ).join('');
    dotsEl.querySelectorAll('.dot').forEach(d =>
      d.addEventListener('click', () => goTo(+d.dataset.i))
    );
  }

  prevBtn.addEventListener('click', () => goTo(stage - 1));
  nextBtn.addEventListener('click', () => goTo(stage + 1));

  // ── Render loop ──────────────────────────────────────────────
  function tick() {
    clear();
    stages[stage].draw();
    requestAnimationFrame(tick);
  }

  goTo(0);
  tick();
})();
</script>
</body>
</html>
