<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twierdzenie sinusów i cosinusów</title>
</head>
<body>
<script type="module">
import { VizCore, T, COLORS } from '../lib/viz-core.js';

function drawTriangle(cx, W, H, A, B, C, colA, colB, colC) {
  cx.beginPath(); cx.moveTo(A[0], A[1]); cx.lineTo(B[0], B[1]); cx.lineTo(C[0], C[1]); cx.closePath();
  cx.fillStyle = 'rgba(88,196,221,0.07)'; cx.fill();
  cx.strokeStyle = 'rgba(255,255,255,0.5)'; cx.lineWidth = 2.5; cx.stroke();

  // Label sides
  const mid = (P, Q) => [(P[0]+Q[0])/2, (P[1]+Q[1])/2];
  const mBC = mid(B, C), mCA = mid(C, A), mAB = mid(A, B);
  cx.font = '13px monospace'; cx.textAlign = 'center';
  cx.fillStyle = colA; cx.fillText('a', mBC[0] + 12, mBC[1]);
  cx.fillStyle = colB; cx.fillText('b', mCA[0] - 12, mCA[1]);
  cx.fillStyle = colC; cx.fillText('c', mAB[0], mAB[1] - 10);

  // Vertices
  [[A,'A',COLORS.CYAN],[B,'B',COLORS.ORANGE],[C,'C',COLORS.GREEN]].forEach(([P, lbl, col]) => {
    cx.beginPath(); cx.arc(P[0], P[1], 5, 0, Math.PI * 2);
    cx.fillStyle = col; cx.fill();
    cx.font = '13px monospace'; cx.fillStyle = col; cx.textAlign = 'center';
    cx.fillText(lbl, P[0], P[1] - 12);
  });
}

const { cx, W, H } = VizCore.init({
  title: T('Tw. sinusów i cosinusów', 'Sine & Cosine Law'),
  H: 360,
  stages: [
    // ── Stage 0: Law of sines — a/sin(A) = 2R ────────────────────
    {
      title: () => T('Twierdzenie sinusów', 'Law of Sines'),
      desc:  () => T(
        'a/sin(α) = b/sin(β) = c/sin(γ) = 2R. Zmień kąt α suwakiem i obserwuj jak zmieniają się boki i stosunek.',
        'a/sin(α) = b/sin(β) = c/sin(γ) = 2R. Change angle α and watch how sides and the ratio change.'
      ),
      sliders: [
        { id: 'alpha', lbl: 'α°', color: COLORS.CYAN,   min: 20, max: 140, step: 1, val: 60 },
        { id: 'beta',  lbl: 'β°', color: COLORS.ORANGE, min: 20, max: 140, step: 1, val: 70 },
      ],
      draw(cx, W, H, vals) {
        let alpha = vals.alpha, beta = vals.beta;
        if (alpha + beta >= 180) beta = 179 - alpha;
        const gamma = 180 - alpha - beta;
        const aR = alpha * Math.PI / 180, bR = beta * Math.PI / 180, gR = gamma * Math.PI / 180;

        // Use law of sines with fixed a = 200px
        const scale = 190;
        const a = 1, b = Math.sin(bR) / Math.sin(aR), c = Math.sin(gR) / Math.sin(aR);

        // Place triangle: B at left, C at right, A at top
        const BX = W/2 - a*scale/2, BY = H - 60;
        const CX = W/2 + a*scale/2, CY = H - 60;
        // A: angle at A is gamma, law of cosines gives position
        const AX = BX + c * scale * Math.cos(bR - Math.PI/2 + Math.PI/2);
        // Simpler: place by angles
        const AX2 = BX + c * scale * Math.cos(-(Math.PI - bR));
        const AY2 = BY + c * scale * Math.sin(-(Math.PI - bR));

        const A = [AX2, AY2], B = [BX, BY], C = [CX, CY];
        drawTriangle(cx, W, H, A, B, C, COLORS.CYAN, COLORS.ORANGE, COLORS.GREEN);

        // Angles text
        cx.font = '11px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.CYAN;   cx.fillText('α=' + alpha + '°', A[0], A[1] + 16);
        cx.fillStyle = COLORS.ORANGE; cx.fillText('β=' + beta + '°', B[0] - 20, B[1] + 16);
        cx.fillStyle = COLORS.GREEN;  cx.fillText('γ=' + gamma + '°', C[0] + 20, C[1] + 16);

        const ratio = a / Math.sin(aR);
        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('a/sin(α) = ' + ratio.toFixed(3), 14, 22);
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText('b/sin(β) = ' + (b / Math.sin(bR)).toFixed(3), 14, 40);
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('c/sin(γ) = ' + (c / Math.sin(gR)).toFixed(3), 14, 58);
        cx.fillStyle = 'rgba(255,255,255,0.35)';
        cx.fillText('← wszystkie równe!', 14, 76);
      },
    },

    // ── Stage 1: Law of cosines — find unknown side ───────────────
    {
      title: () => T('Twierdzenie cosinusów', 'Law of Cosines'),
      desc:  () => T(
        'c² = a² + b² − 2ab·cos(γ). Uogólnienie tw. Pitagorasa. Gdy γ = 90°: c² = a² + b² (Pitagoras!).',
        'c² = a² + b² − 2ab·cos(γ). Generalisation of Pythagoras. When γ = 90°: c² = a² + b² (Pythagoras!).'
      ),
      sliders: [
        { id: 'a',     lbl: 'a',  color: COLORS.CYAN,   min: 50, max: 180, step: 1,  val: 120 },
        { id: 'b',     lbl: 'b',  color: COLORS.ORANGE, min: 50, max: 180, step: 1,  val: 100 },
        { id: 'gamma', lbl: 'γ°', color: COLORS.GREEN,  min: 10, max: 170, step: 1,  val: 90 },
      ],
      draw(cx, W, H, vals) {
        const a = vals.a, b = vals.b, gamma = vals.gamma;
        const gR = gamma * Math.PI / 180;
        const c2 = a*a + b*b - 2*a*b*Math.cos(gR);
        const c = Math.sqrt(c2);

        // Place: C at centre-bottom, A at right, B above
        const CX = W/2, CY = H - 50;
        const AX = CX + a, AY = CY;
        const BX = CX + b * Math.cos(Math.PI - gR), BY = CY - b * Math.sin(Math.PI - gR);

        // Scale down if needed
        const maxX = Math.max(AX, BX, CX), minX = Math.min(AX, BX, CX);
        const maxY = Math.max(AY, BY, CY), minY = Math.min(AY, BY, CY);
        const scl = Math.min((W - 60) / (maxX - minX + 1), (H - 80) / (maxY - minY + 1), 1);
        const ox = W/2 - (CX + AX/2) * (scl - 1)/2;

        const scale = (P) => [W/2 + (P[0] - CX) * scl, H - 50 + (P[1] - CY) * scl];
        const sA = scale([AX, AY]), sB = scale([BX, BY]), sC = scale([CX, CY]);

        drawTriangle(cx, W, H, sA, sB, sC, COLORS.CYAN, COLORS.ORANGE, COLORS.GREEN);

        // Gamma angle arc
        cx.beginPath(); cx.arc(sC[0], sC[1], 22, -Math.atan2(sA[1]-sC[1], sA[0]-sC[0]),
          -Math.atan2(sB[1]-sC[1], sB[0]-sC[0]), true);
        cx.strokeStyle = COLORS.GREEN; cx.lineWidth = 2; cx.stroke();
        cx.font = '11px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.GREEN; cx.fillText('γ=' + gamma + '°', sC[0] - 28, sC[1] - 14);

        // Right-angle box for 90°
        if (Math.abs(gamma - 90) < 2) {
          const sq = 10;
          cx.beginPath(); cx.moveTo(sC[0] + sq, sC[1]); cx.lineTo(sC[0] + sq, sC[1] - sq); cx.lineTo(sC[0], sC[1] - sq);
          cx.strokeStyle = COLORS.YELLOW; cx.lineWidth = 1.5; cx.stroke();
        }

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('c² = a² + b² − 2ab·cos(γ)', 14, 22);
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('= ' + a + '² + ' + b + '² − 2·' + a + '·' + b + '·cos(' + gamma + '°)', 14, 40);
        cx.fillText('c = ' + c.toFixed(2), 14, 58);
        if (Math.abs(gamma - 90) < 2) {
          cx.fillStyle = COLORS.YELLOW; cx.fillText('(Pitagoras gdy γ=90°!)', 14, 76);
        }
      },
    },

    // ── Stage 2: Solving a triangle ───────────────────────────────
    {
      title: () => T('Wyznaczanie elementów trójkąta', 'Solving a triangle'),
      desc:  () => T(
        'Znając dwa boki i kąt między nimi (SAS) wyznaczamy trzeci bok z tw. cosinusów, potem kąty z tw. sinusów.',
        'Knowing two sides and included angle (SAS), find third side from cosine law, then angles from sine law.'
      ),
      sliders: [
        { id: 'step', lbl: 'krok', color: COLORS.CYAN, min: 0, max: 3, step: 1, val: 0 },
      ],
      draw(cx, W, H, vals) {
        const step = Math.round(vals.step);
        // Fixed SAS: a=5, b=7, gamma=40°
        const a = 5, b = 7, gDeg = 40, gR = gDeg * Math.PI / 180;
        const c = Math.sqrt(a*a + b*b - 2*a*b*Math.cos(gR));
        const alphaR = Math.asin(a * Math.sin(gR) / c);
        const betaR = Math.PI - gR - alphaR;

        const steps = [
          { text: 'Dane: a=5, b=7, γ=40°',                                           note: 'SAS — dwa boki i kąt' },
          { text: 'c² = 5² + 7² − 2·5·7·cos(40°)',                                   note: 'tw. cosinusów' },
          { text: 'c² = ' + (a*a + b*b).toFixed(1) + ' − ' + (2*a*b*Math.cos(gR)).toFixed(2) + ' = ' + (c*c).toFixed(2), note: '' },
          { text: 'c ≈ ' + c.toFixed(3) + ',  α ≈ ' + (alphaR*180/Math.PI).toFixed(1) + '°,  β ≈ ' + (betaR*180/Math.PI).toFixed(1) + '°', note: 'tw. sinusów' },
        ];

        const lineH = 58, startY = 42;
        steps.forEach((s, i) => {
          const y = startY + i * lineH;
          const active = i === step, future = i > step;
          cx.globalAlpha = future ? 0.18 : 1;
          if (active) {
            cx.fillStyle = 'rgba(88,196,221,0.1)';
            cx.beginPath(); cx.roundRect(10, y - 26, W - 20, 40, 6); cx.fill();
          }
          cx.font = active ? 'bold 13px monospace' : '12px monospace';
          cx.textAlign = 'left';
          cx.fillStyle = active ? 'white' : 'rgba(255,255,255,0.5)';
          cx.fillText(s.text, 18, y);
          if (s.note) {
            cx.font = '10px monospace'; cx.textAlign = 'right';
            cx.fillStyle = active ? COLORS.YELLOW : 'rgba(255,209,102,0.3)';
            cx.fillText(s.note, W - 14, y);
          }
          cx.globalAlpha = 1;
        });
      },
    },

    // ── Stage 3: Area of triangle using sin ───────────────────────
    {
      title: () => T('Pole trójkąta = ½ab·sin(γ)', 'Area of triangle = ½ab·sin(γ)'),
      desc:  () => T(
        'Pole trójkąta można wyliczyć ze wzoru P = ½ab·sin(γ), gdy znamy dwa boki i kąt między nimi.',
        'Area can be computed as P = ½ab·sin(γ) when two sides and the included angle are known.'
      ),
      sliders: [
        { id: 'a',     lbl: 'a',  color: COLORS.CYAN,   min: 50, max: 200, step: 1,  val: 140 },
        { id: 'b',     lbl: 'b',  color: COLORS.ORANGE, min: 50, max: 200, step: 1,  val: 110 },
        { id: 'gamma', lbl: 'γ°', color: COLORS.GREEN,  min: 10, max: 170, step: 1,  val: 60 },
      ],
      draw(cx, W, H, vals) {
        const a = vals.a, b = vals.b, gamma = vals.gamma;
        const gR = gamma * Math.PI / 180;
        const area = 0.5 * a * b * Math.sin(gR);

        // Place triangle
        const CX = W/2 - 10, CY = H - 55;
        const AX = CX + a, AY = CY;
        const BX = CX + b * Math.cos(Math.PI - gR), BY = CY - b * Math.sin(Math.PI - gR);

        // Scale
        const maxCoord = Math.max(Math.abs(AX - CX), Math.abs(BX - CX), Math.abs(BY - CY));
        const s = Math.min(1, (W - 60) / (2 * maxCoord + 40));
        const sc = P => [CX + (P[0] - CX)*s, CY + (P[1] - CY)*s];
        const sA = sc([AX,AY]), sB = sc([BX,BY]), sC = [CX, CY];

        // Fill + stroke
        cx.beginPath(); cx.moveTo(sA[0],sA[1]); cx.lineTo(sB[0],sB[1]); cx.lineTo(sC[0],sC[1]); cx.closePath();
        cx.fillStyle = 'rgba(88,196,221,0.12)'; cx.fill();
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2.5;
        cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 4; cx.stroke(); cx.shadowBlur = 0;

        // Height from B to AC (base a)
        const h = 2 * area / a;
        const footX = CX + (a - b * Math.cos(gR)) * s, footY = CY;
        cx.beginPath(); cx.moveTo(sB[0], sB[1]); cx.lineTo(footX, footY);
        cx.strokeStyle = 'rgba(255,209,102,0.5)'; cx.lineWidth = 1.5; cx.setLineDash([3,3]); cx.stroke(); cx.setLineDash([]);

        // Side labels
        cx.font = '12px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COLORS.CYAN;   cx.fillText('a=' + a, (sA[0]+sC[0])/2, sC[1]+16);
        cx.fillStyle = COLORS.ORANGE; cx.fillText('b=' + b, (sB[0]+sC[0])/2 - 14, (sB[1]+sC[1])/2);
        cx.fillStyle = COLORS.GREEN;  cx.fillText('γ=' + gamma + '°', sC[0]+22, sC[1]-8);

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('P = ½ · a · b · sin(γ)', 14, 22);
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('= ½ · ' + a + ' · ' + b + ' · sin(' + gamma + '°)', 14, 40);
        cx.fillText('= ' + area.toFixed(1), 14, 58);
      },
    },
  ],
});
</script>
</body>
</html>
