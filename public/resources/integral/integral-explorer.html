<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Całki — Eksplorator</title>
</head>
<body>
<script type="module">
import { VizCore, T, COLORS } from '../lib/viz-core.js';
import { GraphView } from '../lib/graph-core.js';

const { cx, W, H } = VizCore.init({
  title: T('Całki — Eksplorator', 'Integrals — Explorer'),
  H: 360,
  stages: [
    // ── Stage 0: Area under a curve ──────────────────────────────
    {
      title: () => T('Pole pod wykresem', 'Area under the curve'),
      desc:  () => T(
        'Całka oznaczona ∫[a,b] f(x)dx to pole między wykresem f(x) a osią X na przedziale [a, b]. Zmień funkcję i granice suwakami.',
        'The definite integral ∫[a,b] f(x)dx is the area between the graph f(x) and the x-axis on interval [a, b]. Change the function and bounds with sliders.'
      ),
      sliders: [
        { id: 'a', lbl: 'a', color: COLORS.ORANGE, min: -3, max: 1,  step: 0.25, val: 0 },
        { id: 'b', lbl: 'b', color: COLORS.GREEN,  min: -1, max: 3,  step: 0.25, val: 2 },
      ],
      draw(cx, W, H, vals) {
        const SC = 60;
        const OY_frac = 0.65;
        const xHalf = W / (2 * SC);
        const yTop = (H * OY_frac) / SC;
        const yBot = -(H * (1 - OY_frac)) / SC;
        const view = new GraphView(cx, { xRange: [-xHalf, xHalf], yRange: [yBot, yTop], scale: SC });
        const { a, b } = vals;
        const fn = x => x * x;  // f(x) = x²

        view.drawGrid();
        view.drawAxes();

        if (a < b) {
          view.shadeFnToAxis(fn, a, b, { color: COLORS.CYAN, alpha: 0.2 });
        }

        // Curve f(x) = x²
        view.plotFn(fn, { color: COLORS.CYAN });

        // Boundary lines
        [[a, COLORS.ORANGE], [b, COLORS.GREEN]].forEach(([xi, col]) => {
          view.segment(xi, 0, xi, fn(xi), { color: col, dash: [4, 3] });
          view.dot(xi, fn(xi), { color: col, radius: 4, glow: 8 });
        });

        // Compute area numerically
        let area = 0;
        const n = 1000;
        const dx = (b - a) / n;
        for (let i = 0; i < n; i++) area += fn(a + (i + 0.5) * dx) * dx;

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('∫[' + a + ', ' + b + '] x² dx ≈ ' + Math.round(area * 100) / 100, 12, 22);
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.fillText('= [x³/3]' + a + 'ᵇ = b³/3 − a³/3', 12, 40);
        const exact = (b*b*b - a*a*a) / 3;
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('= ' + (Math.round(exact*100)/100), 12, 58);
      },
    },

    // ── Stage 1: Riemann sum approximation ───────────────────────
    {
      title: () => T('Sumy Riemanna — prostokąty wypełniają pole', 'Riemann sums — rectangles fill the area'),
      desc:  () => T(
        'Dzielimy przedział na n równych kawałków i sumujemy pola prostokątów. Im więcej prostokątów (większe n), tym lepsza aproksymacja.',
        'We divide the interval into n equal pieces and sum the rectangle areas. The more rectangles (larger n), the better the approximation.'
      ),
      sliders: [
        { id: 'n', lbl: 'n', color: COLORS.CYAN,   min: 1, max: 30, step: 1,    val: 5 },
        { id: 'a', lbl: 'a', color: COLORS.ORANGE, min: 0, max: 1,  step: 0.25, val: 0 },
        { id: 'b', lbl: 'b', color: COLORS.GREEN,  min: 1, max: 3,  step: 0.25, val: 2 },
      ],
      draw(cx, W, H, vals) {
        const SC = 60;
        const OY_frac = 0.65;
        const xHalf = W / (2 * SC);
        const yTop = (H * OY_frac) / SC;
        const yBot = -(H * (1 - OY_frac)) / SC;
        const view = new GraphView(cx, { xRange: [-xHalf, xHalf], yRange: [yBot, yTop], scale: SC });
        const n = Math.round(vals.n);
        const { a, b } = vals;
        const fn = x => x * x;

        view.drawGrid();
        view.drawAxes();

        // Riemann rectangles (midpoint rule)
        const dx = (b - a) / n;
        let riemannSum = 0;
        for (let i = 0; i < n; i++) {
          const xi = a + (i + 0.5) * dx;
          const yi = fn(xi);
          riemannSum += yi * dx;
          const xLeft = a + i * dx;
          view.shadeRect(xLeft, 0, xLeft + dx, yi, { color: COLORS.CYAN, alpha: 0.2 });
          cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 0.5;
          cx.strokeRect(view.px(xLeft), view.py(yi), dx * SC, yi * SC);
        }

        // Exact area
        const exact = (b*b*b - a*a*a) / 3;
        const err = Math.abs(riemannSum - exact);

        view.plotFn(fn, { color: COLORS.YELLOW });

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('n = ' + n + '  →  suma ≈ ' + Math.round(riemannSum * 100) / 100, 12, 22);
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('dokładna wartość = ' + Math.round(exact * 100) / 100, 12, 40);
        cx.fillStyle = err < 0.01 ? COLORS.GREEN : COLORS.PINK;
        cx.fillText('błąd = ' + Math.round(err * 1000) / 1000, 12, 58);
      },
    },

    // ── Stage 2: Antiderivative connection ───────────────────────
    {
      title: () => T('Całka a pochodna — twierdzenie Newtona-Leibniza', 'Integral and derivative — Newton-Leibniz theorem'),
      desc:  () => T(
        '∫[a,b] f(x)dx = F(b) − F(a), gdzie F jest funkcją pierwotną (F\'=f). Całkowanie to operacja odwrotna do różniczkowania. Zmień b, żeby zobaczyć zmieniające się pole.',
        '∫[a,b] f(x)dx = F(b) − F(a), where F is the antiderivative (F\'=f). Integration is the inverse of differentiation. Change b to see the area update.'
      ),
      sliders: [
        { id: 'b', lbl: 'b', color: COLORS.GREEN, min: 0, max: 3, step: 0.1, val: 1.5 },
      ],
      draw(cx, W, H, vals) {
        const SC = 60;
        const OY_frac = 0.65;
        const xHalf = W / (2 * SC);
        const yTop = (H * OY_frac) / SC;
        const yBot = -(H * (1 - OY_frac)) / SC;
        const view = new GraphView(cx, { xRange: [-xHalf, xHalf], yRange: [yBot, yTop], scale: SC });
        const a = 0, b = vals.b;
        const fn = x => x * x;
        const F  = x => x * x * x / 3;  // antiderivative of x²

        view.drawGrid();
        view.drawAxes();

        // Shaded area
        view.shadeFnToAxis(fn, a, b, { color: COLORS.GREEN, alpha: 0.2 });

        view.plotFn(fn, { color: COLORS.CYAN });
        view.plotFn(F, { color: COLORS.YELLOW, lineWidth: 2, dash: [6, 4] });

        // Mark F(b) on antiderivative curve
        view.dot(b, F(b), { color: COLORS.YELLOW, glow: 8 });

        // Mark b on axis
        view.segment(b, 0, b, F(b), { color: 'rgba(131,193,103,0.5)', lineWidth: 1.5, dash: [3, 3] });

        const area = F(b) - F(a);
        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('f(x) = x²  →  F(x) = x³/3', 12, 22);
        cx.fillStyle = COLORS.GREEN;
        cx.fillText('∫[0,' + b.toFixed(1) + '] x²dx = F(' + b.toFixed(1) + ')−F(0)', 12, 40);
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('= ' + (Math.round(F(b)*100)/100) + ' − 0 = ' + (Math.round(area*100)/100), 12, 58);
      },
    },

    // ── Stage 3: Different functions ─────────────────────────────
    {
      title: () => T('Różne funkcje — to samo narzędzie', 'Different functions — same tool'),
      desc:  () => T(
        'Całkowanie działa dla każdej funkcji. Wybierz funkcję i granice. Prostokąty Riemanna zawsze dążą do dokładnej wartości gdy n → ∞.',
        'Integration works for any function. Choose a function and bounds. Riemann rectangles always approach the exact value as n → ∞.'
      ),
      sliders: [
        { id: 'fn',  lbl: 'f', color: COLORS.PURPLE, min: 0, max: 3, step: 1,    val: 0 },
        { id: 'n',   lbl: 'n', color: COLORS.CYAN,   min: 2, max: 25, step: 1,   val: 8 },
        { id: 'b',   lbl: 'b', color: COLORS.GREEN,  min: 0.5, max: 3, step: 0.25, val: 2 },
      ],
      draw(cx, W, H, vals) {
        const SC = 60;
        const OY_frac = 0.65;
        const xHalf = W / (2 * SC);
        const yTop = (H * OY_frac) / SC;
        const yBot = -(H * (1 - OY_frac)) / SC;
        const view = new GraphView(cx, { xRange: [-xHalf, xHalf], yRange: [yBot, yTop], scale: SC });
        const n = Math.round(vals.n), fnIdx = Math.round(vals.fn);
        const a = 0, b = vals.b;
        const fns = [
          { f: x => x * x,          name: 'x²' },
          { f: x => Math.sin(x),     name: 'sin(x)' },
          { f: x => Math.sqrt(x),    name: '√x' },
          { f: x => 1 / (1 + x * x), name: '1/(1+x²)' },
        ];
        const { f: fn, name } = fns[fnIdx];

        view.drawGrid();
        view.drawAxes();

        const dx = (b - a) / n;
        let sum = 0;
        for (let i = 0; i < n; i++) {
          const xi = a + (i + 0.5) * dx, yi = Math.max(0, fn(xi));
          sum += fn(xi) * dx;
          const xLeft = a + i * dx;
          view.shadeRect(xLeft, 0, xLeft + dx, yi, { color: COLORS.CYAN, alpha: 0.2 });
          cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 0.5;
          cx.strokeRect(view.px(xLeft), view.py(yi), dx * SC, yi * SC);
        }

        view.plotFn(fn, { color: COLORS.YELLOW });

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('f(x) = ' + name, 12, 22);
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('∫[0,' + b.toFixed(2) + '] ≈ ' + Math.round(sum * 1000) / 1000 + '  (n=' + n + ')', 12, 40);
      },
    },
  ],
});

</script>
</body>
</html>
