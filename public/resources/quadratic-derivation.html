<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quadratic Formula — Derivation via Transformations</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  button:hover { background: rgba(255,255,255,.08); }
  button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="qc" width="600" height="310"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>

    <div id="sl_k" style="display:none;margin-bottom:8px;">
      <div class="slider-row">
        <span class="lbl">k =</span>
        <input type="range" id="qk" min="-3" max="1.5" step="0.05" value="-2">
        <span class="val" id="qkv" style="color:#FFD166;"></span>
      </div>
    </div>

    <div id="sl_abc" style="display:none;margin-bottom:8px;">
      <div class="sliders">
        <div class="slider-row">
          <span class="lbl" style="color:#FF6B35;">a =</span>
          <input type="range" id="sa" min="0.2" max="3" step="0.1" value="1">
          <span class="val" id="sav" style="color:#FF6B35;"></span>
        </div>
        <div class="slider-row">
          <span class="lbl" style="color:#58C4DD;">b =</span>
          <input type="range" id="sb" min="-6" max="6" step="0.5" value="-4">
          <span class="val" id="sbv" style="color:#58C4DD;"></span>
        </div>
        <div class="slider-row">
          <span class="lbl" style="color:#83C167;">c =</span>
          <input type="range" id="sc" min="-4" max="4" step="0.5" value="1">
          <span class="val" id="scv" style="color:#83C167;"></span>
        </div>
      </div>
    </div>

    <div class="nav">
      <button id="qprev">← prev</button>
      <div id="qdots"></div>
      <button id="qnext">next →</button>
    </div>
  </div>
</div>

<script>
(function(){
const cv=document.getElementById('qc'),cx=cv.getContext('2d');
const W=600,H=310,OX=300,OY=190,SC=48;
const px=x=>OX+x*SC, py=y=>OY-y*SC;

let qsi=0,ik=-2;
let sa=1,sb=-4,sc=1;
let fr={a:1,h:0,k:0},to={a:1,h:0,k:0},cu={a:1,h:0,k:0};
let af=0,ad=80,imode=false;
const CURVE='#58C4DD',VERT='#FF6B35',ROOT='#FFD166';

const stages=[
  {a:1,h:0,k:0,
   f:'y = x²',
   d:'Canonical parabola. Double root at x = 0.',
   show:''},
  {a:1,h:0,k:-2,
   f:'y = x² + k',
   d:'Vertical shift splits the double root to x = ±√(−k). Drag to explore.',
   show:'k'},
  {a:1,h:2,k:-2,
   f:'y = (x − h)² + k,  h = 2',
   d:'Horizontal shift: roots become x = h ± √(−k). The midpoint is h, the spread is √(−k).',
   show:''},
  {a:0.5,h:2,k:-2,
   f:'y = a(x − h)² + k,  a = ½',
   d:'Vertical stretch: roots become x = h ± √(−k/a). One formula to rule them all.',
   show:''},
  {a:1,h:2,k:-3,
   f:'y = ax² + bx + c',
   d:'Expand a(x−h)²+k and match terms with ax²+bx+c. Drag a, b, c — watch h and k update.',
   show:'abc'},
];

function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}
function hFromABC(a,b){return -b/(2*a);}
function kFromABC(a,b,c){return c-b*b/(4*a);}

function renderDots(){
  const dc=document.getElementById('qdots');
  dc.innerHTML=stages.map((_,i)=>
    `<span class="dot${i===qsi?' active':''}" data-i="${i}"></span>`
  ).join('');
  dc.querySelectorAll('span').forEach(s=>s.addEventListener('click',()=>qGo(+s.dataset.i)));
}

function qGo(idx){
  idx=Math.max(0,Math.min(stages.length-1,idx));
  qsi=idx; imode=false;
  const s=stages[idx];
  let th=s.h,tk=s.k,ta=s.a;
  if(s.show==='abc'){th=hFromABC(sa,sb);tk=kFromABC(sa,sb,sc);ta=sa;}
  if(s.show==='k'){tk=ik;}
  fr={...cu}; to={a:ta,h:th,k:tk}; af=0;
  document.getElementById('qf').innerHTML=s.f;
  document.getElementById('qd').innerHTML=s.d;
  document.getElementById('sl_k').style.display=s.show==='k'?'block':'none';
  document.getElementById('sl_abc').style.display=s.show==='abc'?'block':'none';
  document.getElementById('qprev').disabled=idx===0;
  document.getElementById('qnext').disabled=idx===stages.length-1;
  document.getElementById('qkv').textContent=ik<0?'−'+Math.abs(ik).toFixed(2):ik.toFixed(2);
  updateABCLabels();
  renderDots();
}

function updateABCLabels(){
  document.getElementById('sav').textContent=sa.toFixed(1);
  document.getElementById('sbv').textContent=sb.toFixed(1);
  document.getElementById('scv').textContent=sc.toFixed(1);
}

document.getElementById('qprev').addEventListener('click',()=>qGo(qsi-1));
document.getElementById('qnext').addEventListener('click',()=>qGo(qsi+1));
document.getElementById('qk').addEventListener('input',function(){
  ik=+this.value;
  document.getElementById('qkv').textContent=ik<0?'−'+Math.abs(ik).toFixed(2):ik.toFixed(2);
  if(imode||qsi===1){cu.k=ik;fr.k=ik;to.k=ik;imode=true;}
});
['sa','sb','sc'].forEach(id=>{
  document.getElementById(id).addEventListener('input',function(){
    sa=+document.getElementById('sa').value;
    sb=+document.getElementById('sb').value;
    sc=+document.getElementById('sc').value;
    updateABCLabels();
    if(qsi===4){
      const nh=hFromABC(sa,sb),nk=kFromABC(sa,sb,sc);
      cu.a=sa;cu.h=nh;cu.k=nk;fr={...cu};to={...cu};imode=true;
    }
  });
});

function drawGrid(){
  cx.strokeStyle='rgba(255,255,255,.05)';cx.lineWidth=.7;
  for(let x=-6;x<=6;x++){cx.beginPath();cx.moveTo(px(x),0);cx.lineTo(px(x),H);cx.stroke();}
  for(let y=-4;y<=6;y++){cx.beginPath();cx.moveTo(0,py(y));cx.lineTo(W,py(y));cx.stroke();}
}

function drawAxes(){
  cx.strokeStyle='rgba(255,255,255,.38)';cx.lineWidth=1.5;
  cx.beginPath();cx.moveTo(0,py(0));cx.lineTo(W-8,py(0));cx.stroke();
  cx.beginPath();cx.moveTo(px(0),H);cx.lineTo(px(0),7);cx.stroke();
  cx.fillStyle='rgba(255,255,255,.38)';
  cx.beginPath();cx.moveTo(W,py(0));cx.lineTo(W-9,py(0)-4);cx.lineTo(W-9,py(0)+4);cx.closePath();cx.fill();
  cx.beginPath();cx.moveTo(px(0),0);cx.lineTo(px(0)-4,9);cx.lineTo(px(0)+4,9);cx.closePath();cx.fill();
  for(let x=-5;x<=5;x++){
    if(!x)continue;
    cx.strokeStyle='rgba(255,255,255,.18)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(px(x),py(0)-3);cx.lineTo(px(x),py(0)+3);cx.stroke();
    cx.fillStyle='rgba(255,255,255,.25)';cx.font='11px sans-serif';cx.textAlign='center';cx.fillText(x,px(x),py(0)+14);
  }
  for(let y=-2;y<=4;y++){
    if(!y)continue;
    cx.strokeStyle='rgba(255,255,255,.18)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(px(0)-3,py(y));cx.lineTo(px(0)+3,py(y));cx.stroke();
    cx.fillStyle='rgba(255,255,255,.25)';cx.textAlign='right';cx.fillText(y,px(0)-7,py(y)+4);
  }
  cx.fillStyle='rgba(255,255,255,.4)';cx.font='13px sans-serif';
  cx.textAlign='center';cx.fillText('x',W-4,py(0)+5);cx.fillText('y',px(0),11);
}

function drawCurve(a,h,k){
  const noR=-k/a<-0.001;
  cx.beginPath();cx.strokeStyle=noR?'rgba(220,80,80,.85)':CURVE;cx.lineWidth=2.5;
  let mv=true;
  for(let i=0;i<=600;i++){
    const x=-6+12*i/600,y=a*(x-h)*(x-h)+k;
    const cpx_=px(x),cpy_=py(y);
    if(cpy_<-4||cpy_>H+4){mv=true;continue;}
    if(mv){cx.moveTo(cpx_,cpy_);mv=false;}else cx.lineTo(cpx_,cpy_);
  }
  cx.stroke();
}

function gdot(xx,yy,r,col){
  cx.beginPath();cx.arc(xx,yy,r,0,Math.PI*2);cx.fillStyle=col;
  cx.shadowColor=col;cx.shadowBlur=14;cx.fill();cx.shadowBlur=0;
}

function drawVertex(h,k){
  const vx=px(h),vy=py(k);
  if(vy<-10||vy>H+10)return;
  gdot(vx,vy,5,VERT);
  cx.fillStyle='rgba(255,107,53,.8)';cx.font='11px monospace';cx.textAlign='left';
  cx.fillText('('+h.toFixed(2)+', '+k.toFixed(2)+')',vx+9,vy+4);
}

function drawRoots(a,h,k){
  const d=-k/a;
  if(d<-0.001){
    const alpha=Math.min((-d-0.001)/0.2,1);
    cx.globalAlpha=alpha;
    cx.fillStyle='rgba(220,80,80,.8)';cx.font='12px sans-serif';cx.textAlign='center';
    cx.fillText('no real roots',px(h),py(Math.max(k+0.1,-1.5)));
    cx.globalAlpha=1;return;
  }
  const sqD=Math.sqrt(Math.max(0,d));
  const single=sqD<0.03;
  const roots=single?[h]:[h-sqD,h+sqD];
  roots.forEach((rx,i)=>{
    const rpx=px(rx);
    cx.setLineDash([3,5]);cx.strokeStyle='rgba(255,209,102,.15)';cx.lineWidth=1;
    cx.beginPath();cx.moveTo(rpx,py(0));cx.lineTo(rpx,py(k));cx.stroke();
    cx.setLineDash([]);
    gdot(rpx,py(0),single?9:6,ROOT);
    cx.fillStyle=ROOT;cx.font='bold 11px monospace';cx.textAlign='center';
    cx.fillText(single?'x='+h.toFixed(2):(i===0?'x₁='+rx.toFixed(2):'x₂='+rx.toFixed(2)),rpx,py(0)-(single?20:15));
  });
}

function drawABCOverlay(a,h,k){
  const b=-2*a*h,c=a*h*h+k;
  cx.fillStyle='rgba(22,22,26,.88)';
  cx.strokeStyle='rgba(255,255,255,.12)';cx.lineWidth=.8;
  const bx=10,by=10,bw=270,bh=120;
  cx.beginPath();cx.roundRect(bx,by,bw,bh,6);cx.fill();cx.stroke();
  cx.font='12px monospace';cx.textAlign='left';
  cx.fillStyle='rgba(255,255,255,.45)';cx.fillText('vertex form:',bx+10,by+22);
  cx.fillStyle='rgba(255,255,255,.85)';cx.fillText('a(x−h)²+k',bx+100,by+22);
  cx.fillStyle='rgba(255,255,255,.45)';cx.fillText('expand:',bx+10,by+40);
  cx.fillStyle='rgba(255,255,255,.75)';cx.fillText('ax² − 2ah·x + ah²+k',bx+100,by+40);
  cx.fillStyle='rgba(255,255,255,.45)';cx.fillText('so:',bx+10,by+62);
  cx.fillStyle='#FF6B35';cx.fillText('a = '+a.toFixed(2),bx+40,by+62);
  cx.fillStyle='#58C4DD';cx.fillText('b = '+b.toFixed(2),bx+115,by+62);
  cx.fillStyle='#83C167';cx.fillText('c = '+c.toFixed(2),bx+190,by+62);
  cx.fillStyle='rgba(255,255,255,.45)';cx.fillText('invert:',bx+10,by+84);
  cx.fillStyle='#FFD166';cx.fillText('h = −b/2a = '+h.toFixed(3),bx+60,by+84);
  cx.fillStyle='#FFD166';cx.fillText('k = c−b²/4a = '+k.toFixed(3),bx+60,by+102);
  const disc=-k/a;
  cx.fillStyle='rgba(255,209,102,.7)';cx.font='13px monospace';cx.textAlign='left';
  if(disc>0.0001){
    const sqD=Math.sqrt(disc);
    cx.fillText('x = −b/2a ± √(b²−4ac)/2a  =  '+h.toFixed(2)+' ± '+sqD.toFixed(3),10,H-12);
  } else if(disc>=-0.001){
    cx.fillText('x = −b/2a = '+h.toFixed(2)+'  (one repeated root)',10,H-12);
  } else {
    cx.fillStyle='rgba(220,80,80,.7)';
    cx.fillText('b²−4ac = '+(b*b-4*a*c).toFixed(3)+' < 0  →  no real roots',10,H-12);
  }
}

function tick(){
  if(!imode){
    af++;const t=Math.min(af/ad,1),e=ease(t);
    cu.a=fr.a+(to.a-fr.a)*e;cu.h=fr.h+(to.h-fr.h)*e;cu.k=fr.k+(to.k-fr.k)*e;
    if(t>=1&&(stages[qsi]?.show==='k'||stages[qsi]?.show==='abc'))imode=true;
  }
  cx.fillStyle='#0e0e12';cx.fillRect(0,0,W,H);
  drawGrid();drawAxes();
  drawCurve(cu.a,cu.h,cu.k);
  drawVertex(cu.h,cu.k);
  drawRoots(cu.a,cu.h,cu.k);
  if(qsi===4)drawABCOverlay(cu.a,cu.h,cu.k);
  requestAnimationFrame(tick);
}

qGo(0);tick();
})();
</script>
</body>
</html>
