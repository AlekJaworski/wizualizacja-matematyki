<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zbiory — Diagram Venna</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; white-space: pre-line; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 52px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  button:hover { background: rgba(255,255,255,.08); }
  button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  #sliders-wrap { min-height: 0; }
  .btn-group { display: flex; gap: 6px; margin-bottom: 8px; flex-wrap: wrap; }
  .btn-group button { font-size: 12px; padding: 4px 10px; }
  .btn-group button.sel { background: rgba(88,196,221,.18); border-color: #58C4DD; color: #58C4DD; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="600" height="310"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>
    <div id="sliders-wrap"></div>
    <div id="buttons-wrap"></div>
    <div class="nav">
      <button id="qprev">&larr;</button>
      <div id="qdots"></div>
      <button id="qnext">&rarr;</button>
    </div>
  </div>
</div>

<script>
(function(){
  const cv = document.getElementById('cv');
  const cx = cv.getContext('2d');
  const W = 600, H = 310;

  const LANG = new URLSearchParams(window.location.search).get('lang') || 'pl';
  const T = (pl, en) => LANG === 'pl' ? pl : en;

  const COL_CYAN  = '#58C4DD';
  const COL_ORANGE = '#FF6B35';
  const COL_GREEN  = '#83C167';
  const COL_YELLOW = '#FFD166';
  const COL_PINK   = '#E07090';
  const COL_A      = '#FF6B35';  // football — orange/red
  const COL_B      = '#58C4DD';  // basketball — blue/cyan
  const COL_AB     = '#C080FF';  // both — purple
  const COL_NONE   = 'rgba(255,255,255,.25)'; // neither

  // Universe size
  const UNIVERSE = 30;

  // State
  let stage = 0;
  let sA = 12, sB = 10, sAB = 4;
  let opMode = 0; // 0: A∩B, 1: A\B, 2: B\A
  let dmStep = 0; // De Morgan step

  // Venn circle geometry — dynamic, scales with set sizes
  function getVennParams() {
    const rA = Math.max(26, Math.round(130 * Math.sqrt(sA / UNIVERSE)));
    const rB = Math.max(26, Math.round(130 * Math.sqrt(sB / UNIVERSE)));
    const cy = 148;
    const d = Math.round((rA + rB) * 0.65);
    return { rA, rB, cxA: Math.round(W / 2 - d / 2), cxB: Math.round(W / 2 + d / 2), cy };
  }

  // ── Seeded random for stable dot positions ──────────────────
  function mulberry32(seed) {
    return function() {
      let t = seed += 0x6D2B79F5;
      t = Math.imul(t ^ t >>> 15, t | 1);
      t ^= t + Math.imul(t ^ t >>> 7, t | 61);
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    };
  }

  // Generate dot positions in a region defined by a test function
  function generateDots(count, testFn, seed) {
    const rng = mulberry32(seed);
    const dots = [];
    let attempts = 0;
    while (dots.length < count && attempts < count * 200) {
      const x = 50 + rng() * 500;
      const y = 20 + rng() * 250;
      if (testFn(x, y)) {
        // Check not too close to existing dots
        let ok = true;
        for (const d of dots) {
          const dx = d.x - x, dy = d.y - y;
          if (dx * dx + dy * dy < 14 * 14) { ok = false; break; }
        }
        if (ok) dots.push({ x, y });
      }
      attempts++;
    }
    return dots;
  }

  function inCircleA(x, y) {
    const { rA, cxA, cy } = getVennParams();
    const dx = x - cxA, dy = y - cy;
    return dx * dx + dy * dy < rA * rA;
  }
  function inCircleB(x, y) {
    const { rB, cxB, cy } = getVennParams();
    const dx = x - cxB, dy = y - cy;
    return dx * dx + dy * dy < rB * rB;
  }
  function inOnlyA(x, y) { return inCircleA(x, y) && !inCircleB(x, y); }
  function inOnlyB(x, y) { return !inCircleA(x, y) && inCircleB(x, y); }
  function inBoth(x, y) { return inCircleA(x, y) && inCircleB(x, y); }
  function inNeither(x, y) { return !inCircleA(x, y) && !inCircleB(x, y) && x > 30 && x < 570 && y > 15 && y < 290; }

  // ── Drawing helpers ─────────────────────────────────────────
  function clear() { cx.fillStyle = '#0e0e12'; cx.fillRect(0, 0, W, H); }

  function drawUniverseBox(alpha) {
    cx.save();
    cx.globalAlpha = alpha || 0.3;
    cx.strokeStyle = 'rgba(255,255,255,0.2)';
    cx.lineWidth = 1;
    cx.setLineDash([4, 4]);
    cx.strokeRect(25, 10, 550, 285);
    cx.setLineDash([]);
    cx.font = '11px monospace';
    cx.fillStyle = 'rgba(255,255,255,0.35)';
    cx.textAlign = 'left';
    cx.fillText('U = ' + UNIVERSE + T(' uczniów', ' students'), 32, 300);
    cx.restore();
  }

  function drawVennCircles(alphaA, alphaB) {
    const { rA, rB, cxA, cxB, cy } = getVennParams();
    cx.save();
    // Circle A
    cx.beginPath();
    cx.arc(cxA, cy, rA, 0, Math.PI * 2);
    cx.strokeStyle = COL_A;
    cx.globalAlpha = alphaA || 0.7;
    cx.lineWidth = 2;
    cx.stroke();
    cx.font = '13px monospace';
    cx.fillStyle = COL_A;
    cx.globalAlpha = 0.8;
    cx.textAlign = 'center';
    cx.fillText(T('A (piłka nożna)', 'A (football)'), cxA - rA * 0.3, cy - rA - 10);

    // Circle B
    cx.beginPath();
    cx.arc(cxB, cy, rB, 0, Math.PI * 2);
    cx.strokeStyle = COL_B;
    cx.globalAlpha = alphaB || 0.7;
    cx.lineWidth = 2;
    cx.stroke();
    cx.font = '13px monospace';
    cx.fillStyle = COL_B;
    cx.globalAlpha = 0.8;
    cx.textAlign = 'center';
    cx.fillText(T('B (koszykówka)', 'B (basketball)'), cxB + rB * 0.3, cy - rB - 10);
    cx.restore();
  }

  function fillRegion(testFn, color, alpha) {
    cx.save();
    cx.globalAlpha = alpha || 0.12;
    cx.fillStyle = color;
    // Scan pixels
    for (let y = 10; y < 295; y += 3) {
      for (let x = 25; x < 575; x += 3) {
        if (testFn(x, y)) {
          cx.fillRect(x - 1, y - 1, 3, 3);
        }
      }
    }
    cx.restore();
  }

  function drawDot(x, y, col, radius, glow, alpha) {
    cx.save();
    if (alpha !== undefined) cx.globalAlpha = alpha;
    cx.beginPath();
    cx.arc(x, y, radius || 5, 0, Math.PI * 2);
    cx.fillStyle = col;
    cx.shadowColor = col;
    cx.shadowBlur = glow ? 12 : 6;
    cx.fill();
    cx.shadowBlur = 0;
    cx.restore();
  }

  function drawCountBadge(x, y, count, col) {
    cx.save();
    cx.font = 'bold 18px monospace';
    cx.textAlign = 'center';
    cx.textBaseline = 'middle';
    cx.fillStyle = col;
    cx.globalAlpha = 0.9;
    cx.fillText(count, x, y);
    cx.restore();
  }

  // Compute region counts
  function regionCounts() {
    const onlyA = sA - sAB;
    const onlyB = sB - sAB;
    const both = sAB;
    const neither = UNIVERSE - onlyA - onlyB - both;
    return { onlyA, onlyB, both, neither };
  }

  // Generate all dot positions for current state
  function getAllDots() {
    const r = regionCounts();
    const dotsOnlyA  = generateDots(Math.max(0, r.onlyA),  inOnlyA,  42);
    const dotsBoth   = generateDots(Math.max(0, r.both),    inBoth,   137);
    const dotsOnlyB  = generateDots(Math.max(0, r.onlyB),  inOnlyB,  271);
    const dotsNeither = generateDots(Math.max(0, r.neither), inNeither, 999);
    return { dotsOnlyA, dotsBoth, dotsOnlyB, dotsNeither };
  }

  // For stage 1: single circle dots
  function getSingleDots() {
    const r = Math.max(26, Math.round(130 * Math.sqrt(sA / UNIVERSE)));
    const testA = (x, y) => {
      const dx = x - W / 2, dy = y - 150;
      return dx * dx + dy * dy < r * r;
    };
    return generateDots(sA, testA, 42);
  }

  // ── Time for animation ──────────────────────────────────────
  let time = 0;

  // ── Stages ──────────────────────────────────────────────────
  const stages = [
    // Stage 1: Co to jest zbiór?
    {
      title: () => T('Co to jest zbiór?', 'What is a set?'),
      desc: () => T(
        'Zbiór to po prostu grupa elementów. Tutaj: zbiór A to uczniowie grający w piłkę nożną. Każda kropka = jeden uczeń. Przesuń suwak, żeby zmienić ilu ich jest.',
        'A set is simply a group of elements. Here: set A is students who play football. Each dot = one student. Move the slider to change how many there are.'
      ),
      sliders: [
        { id: 'sA', lbl: '|A|', color: COL_A, min: 1, max: 20, step: 1, val: 12 },
      ],
      buttons: null,
      draw() {
        const ccx = W / 2, ccy = 150;
        const ccr = Math.max(26, Math.round(130 * Math.sqrt(sA / UNIVERSE)));
        cx.save();
        cx.beginPath();
        cx.arc(ccx, ccy, ccr, 0, Math.PI * 2);
        cx.strokeStyle = COL_A;
        cx.globalAlpha = 0.7;
        cx.lineWidth = 2.5;
        cx.stroke();
        cx.globalAlpha = 0.06;
        cx.fillStyle = COL_A;
        cx.fill();
        cx.restore();

        cx.font = '14px monospace';
        cx.fillStyle = COL_A;
        cx.textAlign = 'center';
        cx.fillText(T('A — piłka nożna', 'A — football'), ccx, ccy - ccr - 14);

        const dots = getSingleDots();
        dots.forEach(d => drawDot(d.x, d.y, COL_A, 5));
        drawCountBadge(ccx, ccy + ccr + 22, '|A| = ' + sA, COL_A);
      }
    },

    // Stage 2: Dwa zbiory — diagram Venna
    {
      title: () => T('Dwa zbiory — diagram Venna', 'Two sets — Venn diagram'),
      desc: () => T(
        '30 uczniów w klasie. Część gra w piłkę (A, pomarańczowy), część w koszykówkę (B, niebieski), a niektórzy w oba sporty (fioletowy). Szare kropki to uczniowie niegrający w żaden.',
        '30 students in a class. Some play football (A, orange), some basketball (B, blue), some both (purple). Gray dots are students who play neither.'
      ),
      sliders: [
        { id: 'sA', lbl: '|A|', color: COL_A, min: 1, max: 25, step: 1, val: sA },
        { id: 'sB', lbl: '|B|', color: COL_B, min: 1, max: 25, step: 1, val: sB },
        { id: 'sAB', lbl: '|A∩B|', color: COL_AB, min: 0, max: 15, step: 1, val: sAB },
      ],
      buttons: null,
      draw() {
        const r = regionCounts();
        drawUniverseBox(0.3);
        // Fills
        fillRegion(inOnlyA, COL_A, 0.08);
        fillRegion(inBoth, COL_AB, 0.1);
        fillRegion(inOnlyB, COL_B, 0.08);
        drawVennCircles(0.7, 0.7);

        // Dots
        const dots = getAllDots();
        dots.dotsOnlyA.forEach(d => drawDot(d.x, d.y, COL_A, 5));
        dots.dotsBoth.forEach(d => drawDot(d.x, d.y, COL_AB, 5));
        dots.dotsOnlyB.forEach(d => drawDot(d.x, d.y, COL_B, 5));
        dots.dotsNeither.forEach(d => drawDot(d.x, d.y, COL_NONE, 4));

        // Counts in regions
        const p1 = getVennParams();
        drawCountBadge(p1.cxA - p1.rA * 0.55, p1.cy + 10, r.onlyA, COL_A);
        drawCountBadge((p1.cxA + p1.cxB) / 2, p1.cy + 10, r.both, COL_AB);
        drawCountBadge(p1.cxB + p1.rB * 0.55, p1.cy + 10, r.onlyB, COL_B);
        if (r.neither > 0) drawCountBadge(55, H - 30, r.neither, COL_NONE);
      }
    },

    // Stage 3: Suma A∪B
    {
      title: () => T('Suma A∪B', 'Union A∪B'),
      desc: () => T(
        'A∪B = kto gra w co najmniej jeden sport?\n|A∪B| = |A| + |B| − |A∩B|\nOdejmujemy |A∩B|, bo ci uczniowie zostali policzeni podwójnie! Fioletowe kropki migają — to oni.',
        'A∪B = who plays at least one sport?\n|A∪B| = |A| + |B| − |A∩B|\nWe subtract |A∩B| because those students were counted twice! Purple dots blink — that\'s them.'
      ),
      sliders: [
        { id: 'sA', lbl: '|A|', color: COL_A, min: 1, max: 25, step: 1, val: sA },
        { id: 'sB', lbl: '|B|', color: COL_B, min: 1, max: 25, step: 1, val: sB },
        { id: 'sAB', lbl: '|A∩B|', color: COL_AB, min: 0, max: 15, step: 1, val: sAB },
      ],
      buttons: null,
      draw() {
        const r = regionCounts();
        drawUniverseBox(0.3);

        // Highlight union region
        fillRegion((x, y) => inCircleA(x, y) || inCircleB(x, y), COL_GREEN, 0.13);
        drawVennCircles(0.7, 0.7);

        // Dots
        const dots = getAllDots();
        dots.dotsOnlyA.forEach(d => drawDot(d.x, d.y, COL_A, 5));
        dots.dotsOnlyB.forEach(d => drawDot(d.x, d.y, COL_B, 5));
        dots.dotsNeither.forEach(d => drawDot(d.x, d.y, COL_NONE, 3));

        // Blink the intersection dots
        const blink = Math.sin(time * 3.5) * 0.5 + 0.5;
        const blinkR = 4 + blink * 3;
        dots.dotsBoth.forEach(d => {
          drawDot(d.x, d.y, COL_AB, blinkR, true);
        });

        // Counts
        const p2 = getVennParams();
        drawCountBadge(p2.cxA - p2.rA * 0.55, p2.cy + 10, r.onlyA, COL_A);
        drawCountBadge((p2.cxA + p2.cxB) / 2, p2.cy + 10, r.both, COL_AB);
        drawCountBadge(p2.cxB + p2.rB * 0.55, p2.cy + 10, r.onlyB, COL_B);

        // Formula at top
        const unionSize = r.onlyA + r.both + r.onlyB;
        cx.font = '13px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COL_GREEN;
        cx.fillText(`|A∪B| = |A| + |B| − |A∩B| = ${sA} + ${sB} − ${sAB} = ${unionSize}`, W / 2, 22);

        // Double-count label
        cx.font = '11px monospace';
        cx.fillStyle = COL_AB;
        const blinkAlpha = 0.5 + blink * 0.5;
        cx.globalAlpha = blinkAlpha;
        cx.fillText(T('← policzeni podwójnie!', '← counted twice!'), (CX_A + CX_B) / 2, CY - 30);
        cx.globalAlpha = 1;
      }
    },

    // Stage 4: Część wspólna i różnica
    {
      title: () => T('Część wspólna i różnica', 'Intersection and difference'),
      desc: () => {
        if (opMode === 0) return T(
          'A∩B — kto gra w OBA sporty? Tylko uczniowie w fioletowym obszarze.',
          'A∩B — who plays BOTH sports? Only students in the purple region.'
        );
        if (opMode === 1) return T(
          'A\\B — kto gra w piłkę, ale NIE w koszykówkę? Tylko pomarańczowy region.',
          'A\\B — who plays football but NOT basketball? Only the orange region.'
        );
        return T(
          'B\\A — kto gra w koszykówkę, ale NIE w piłkę? Tylko niebieski region.',
          'B\\A — who plays basketball but NOT football? Only the blue region.'
        );
      },
      sliders: [
        { id: 'sA', lbl: '|A|', color: COL_A, min: 1, max: 25, step: 1, val: sA },
        { id: 'sB', lbl: '|B|', color: COL_B, min: 1, max: 25, step: 1, val: sB },
        { id: 'sAB', lbl: '|A∩B|', color: COL_AB, min: 0, max: 15, step: 1, val: sAB },
      ],
      buttons: [
        { label: 'A∩B', val: 0 },
        { label: 'A\\B', val: 1 },
        { label: 'B\\A', val: 2 },
      ],
      draw() {
        const r = regionCounts();
        drawUniverseBox(0.3);

        // Determine highlight
        let highlightTest, highlightCol, highlightCount, opLabel;
        if (opMode === 0) {
          highlightTest = inBoth; highlightCol = COL_AB;
          highlightCount = r.both; opLabel = 'A∩B = ' + r.both;
        } else if (opMode === 1) {
          highlightTest = inOnlyA; highlightCol = COL_A;
          highlightCount = r.onlyA; opLabel = 'A\\B = ' + r.onlyA;
        } else {
          highlightTest = inOnlyB; highlightCol = COL_B;
          highlightCount = r.onlyB; opLabel = 'B\\A = ' + r.onlyB;
        }

        fillRegion(highlightTest, highlightCol, 0.18);
        drawVennCircles(0.5, 0.5);

        // Dots — dim non-highlighted, bright highlighted
        const dots = getAllDots();
        const dim = 0.15;

        // Draw all dots dimmed first
        dots.dotsOnlyA.forEach(d => drawDot(d.x, d.y, COL_A, 4, false, dim));
        dots.dotsBoth.forEach(d => drawDot(d.x, d.y, COL_AB, 4, false, dim));
        dots.dotsOnlyB.forEach(d => drawDot(d.x, d.y, COL_B, 4, false, dim));
        dots.dotsNeither.forEach(d => drawDot(d.x, d.y, COL_NONE, 3, false, dim));

        // Now draw highlighted ones bright
        if (opMode === 0) {
          dots.dotsBoth.forEach(d => drawDot(d.x, d.y, COL_AB, 6, true));
        } else if (opMode === 1) {
          dots.dotsOnlyA.forEach(d => drawDot(d.x, d.y, COL_A, 6, true));
        } else {
          dots.dotsOnlyB.forEach(d => drawDot(d.x, d.y, COL_B, 6, true));
        }

        // Operation label at top
        cx.font = '14px monospace'; cx.textAlign = 'center';
        cx.fillStyle = highlightCol;
        cx.fillText(opLabel, W / 2, 22);
      }
    },

    // Stage 5: Prawa De Morgana
    {
      title: () => T('Prawa De Morgana', 'De Morgan\'s Laws'),
      desc: () => {
        if (dmStep === 0) return T(
          '(A∪B)\' = uczniowie, którzy NIE grają w żaden sport. To szare kropki — poza oboma kółkami.',
          '(A∪B)\' = students who play NO sport. Gray dots — outside both circles.'
        );
        return T(
          'A\'∩B\' = kto NIE gra w piłkę ORAZ NIE gra w koszykówkę? Ten sam zbiór! (A∪B)\' = A\'∩B\'\nTo prawo De Morgana: dopełnienie sumy = iloczyn dopełnień.',
          'A\'∩B\' = who does NOT play football AND does NOT play basketball? Same set! (A∪B)\' = A\'∩B\'\nDe Morgan\'s law: complement of union = intersection of complements.'
        );
      },
      sliders: [
        { id: 'sA', lbl: '|A|', color: COL_A, min: 1, max: 25, step: 1, val: sA },
        { id: 'sB', lbl: '|B|', color: COL_B, min: 1, max: 25, step: 1, val: sB },
        { id: 'sAB', lbl: '|A∩B|', color: COL_AB, min: 0, max: 15, step: 1, val: sAB },
      ],
      buttons: [
        { label: "(A∪B)'", val: 0 },
        { label: "A'∩B'", val: 1 },
      ],
      draw() {
        const r = regionCounts();
        drawUniverseBox(0.5);

        // Dim the union area
        fillRegion((x, y) => inCircleA(x, y) || inCircleB(x, y), '#ffffff', 0.03);
        // Highlight complement region
        const compColor = COL_YELLOW;
        fillRegion((x, y) => inNeither(x, y), compColor, 0.15);

        drawVennCircles(0.35, 0.35);

        // Dots
        const dots = getAllDots();
        dots.dotsOnlyA.forEach(d => drawDot(d.x, d.y, COL_A, 4, false, 0.15));
        dots.dotsBoth.forEach(d => drawDot(d.x, d.y, COL_AB, 4, false, 0.15));
        dots.dotsOnlyB.forEach(d => drawDot(d.x, d.y, COL_B, 4, false, 0.15));

        // Bright neither dots
        dots.dotsNeither.forEach(d => drawDot(d.x, d.y, compColor, 6, true));

        // Labels
        cx.font = '14px monospace'; cx.textAlign = 'center';
        cx.fillStyle = compColor;
        if (dmStep === 0) {
          cx.fillText(`(A∪B)' = ${r.neither}`, W / 2, 22);
        } else {
          cx.fillText(`A'∩B' = ${r.neither}`, W / 2, 22);
          // Show equality
          const pulse = Math.sin(time * 2.5) * 0.3 + 0.7;
          cx.globalAlpha = pulse;
          cx.font = '12px monospace';
          cx.fillStyle = COL_GREEN;
          cx.fillText(T("(A∪B)' = A'∩B'  ✓", "(A∪B)' = A'∩B'  ✓"), W / 2, H - 8);
          cx.globalAlpha = 1;
        }
      }
    },
  ];

  // ── Clamp sAB to valid range ────────────────────────────────
  function clampAB() {
    const maxAB = Math.min(sA, sB);
    const maxPossible = Math.min(maxAB, UNIVERSE - (sA - sAB) - (sB - sAB));
    if (sAB > maxAB) sAB = maxAB;
    // Also ensure neither >= 0
    const needed = (sA - sAB) + (sB - sAB) + sAB;
    if (needed > UNIVERSE) {
      sAB = sA + sB - UNIVERSE;
      if (sAB < 0) sAB = 0;
    }
  }

  // ── Slider management ───────────────────────────────────────
  const slWrap = document.getElementById('sliders-wrap');
  const btnWrap = document.getElementById('buttons-wrap');

  function buildSliders(defs) {
    let html = '<div class="sliders">';
    defs.forEach(s => {
      html += `<div class="slider-row">
        <span class="lbl" style="color:${s.color}">${s.lbl} =</span>
        <input type="range" id="s_${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${s.val}">
        <span class="val" id="v_${s.id}" style="color:${s.color}"></span>
      </div>`;
    });
    html += '</div>';
    slWrap.innerHTML = html;

    defs.forEach(s => {
      const el = document.getElementById('s_' + s.id);
      document.getElementById('v_' + s.id).textContent = (+el.value).toFixed(0);
      el.addEventListener('input', function() {
        const v = +this.value;
        if (s.id === 'sA') sA = v;
        if (s.id === 'sB') sB = v;
        if (s.id === 'sAB') sAB = v;
        clampAB();
        // Update all displayed values & slider positions
        updateSliderDisplays(defs);
      });
    });
  }

  function updateSliderDisplays(defs) {
    defs.forEach(s => {
      const el = document.getElementById('s_' + s.id);
      const vEl = document.getElementById('v_' + s.id);
      if (!el || !vEl) return;
      // Update max for sAB
      if (s.id === 'sAB') {
        const maxAB = Math.min(sA, sB);
        el.max = maxAB;
        if (sAB > maxAB) sAB = maxAB;
        el.value = sAB;
      }
      const current = s.id === 'sA' ? sA : s.id === 'sB' ? sB : sAB;
      vEl.textContent = current.toFixed(0);
    });
    // Update description
    descEl.textContent = stages[stage].desc();
  }

  function buildButtons(defs) {
    if (!defs) { btnWrap.innerHTML = ''; return; }
    let html = '<div class="btn-group">';
    defs.forEach(b => {
      const sel = (stage === 3 && opMode === b.val) || (stage === 4 && dmStep === b.val);
      html += `<button class="${sel ? 'sel' : ''}" data-val="${b.val}">${b.label}</button>`;
    });
    html += '</div>';
    btnWrap.innerHTML = html;
    btnWrap.querySelectorAll('button').forEach(btn => {
      btn.addEventListener('click', function() {
        const v = +this.dataset.val;
        if (stage === 3) opMode = v;
        if (stage === 4) dmStep = v;
        buildButtons(stages[stage].buttons);
        descEl.textContent = stages[stage].desc();
      });
    });
  }

  // ── Navigation ──────────────────────────────────────────────
  const prevBtn = document.getElementById('qprev');
  const nextBtn = document.getElementById('qnext');
  const dotsEl = document.getElementById('qdots');
  const titleEl = document.getElementById('qf');
  const descEl = document.getElementById('qd');

  function goTo(idx) {
    stage = Math.max(0, Math.min(stages.length - 1, idx));
    const s = stages[stage];
    titleEl.textContent = s.title();
    descEl.textContent = s.desc();
    if (s.sliders) {
      s.sliders.forEach(sl => {
        if (sl.id === 'sA') sl.val = sA;
        if (sl.id === 'sB') sl.val = sB;
        if (sl.id === 'sAB') sl.val = sAB;
      });
      clampAB();
      buildSliders(s.sliders);
    } else {
      slWrap.innerHTML = '';
    }
    buildButtons(s.buttons);
    prevBtn.disabled = stage === 0;
    nextBtn.disabled = stage === stages.length - 1;
    renderDots();
  }

  function renderDots() {
    dotsEl.innerHTML = stages.map((_, i) =>
      `<span class="dot${i === stage ? ' active' : ''}" data-i="${i}"></span>`
    ).join('');
    dotsEl.querySelectorAll('.dot').forEach(d =>
      d.addEventListener('click', () => goTo(+d.dataset.i))
    );
  }

  prevBtn.addEventListener('click', () => goTo(stage - 1));
  nextBtn.addEventListener('click', () => goTo(stage + 1));

  function tick(t) {
    time = t / 1000;
    clear();
    stages[stage].draw();
    requestAnimationFrame(tick);
  }
  goTo(0);
  requestAnimationFrame(tick);
})();
</script>
</body>
</html>
