<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Równanie okręgu</title>
</head>
<body>
<script type="module">
import { VizCore, T, COLORS } from '../lib/viz-core.js';

const { cv, cx, W, H, getCanvasPos } = VizCore.init({
  title: T('Równanie okręgu', 'Circle Equation'),
  H: 360,
  stages: [
    // ── Stage 0: Distance from centre ───────────────────────────
    {
      title: () => T('Okrąg = wszystkie punkty w odległości r od środka', 'Circle = all points at distance r from centre'),
      desc:  () => T(
        'Okrąg to zbiór punktów (x, y), których odległość od środka (p, q) wynosi dokładnie r. Z wzoru na odległość: √((x−p)²+(y−q)²) = r.',
        'A circle is the set of points (x, y) at distance r from centre (p, q). From the distance formula: √((x−p)²+(y−q)²) = r.'
      ),
      sliders: [
        { id: 'r', lbl: 'r', color: COLORS.CYAN, min: 30, max: 130, step: 1, val: 80 },
      ],
      draw(cx, W, H, vals) {
        const OX = W / 2, OY = H / 2, SC = 30;
        const r = vals.r;

        drawGrid(cx, OX, OY, SC, W, H);
        drawAxes(cx, OX, OY, W, H, SC);

        // Circle
        cx.beginPath(); cx.arc(OX, OY, r, 0, Math.PI * 2);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2.5;
        cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        // Radius line to a point on circle
        const ang = -Math.PI / 4;
        const Px = OX + r * Math.cos(ang), Py = OY + r * Math.sin(ang);
        cx.beginPath(); cx.moveTo(OX, OY); cx.lineTo(Px, Py);
        cx.strokeStyle = COLORS.YELLOW; cx.lineWidth = 2; cx.stroke();

        // Distance label
        const mx = (OX + Px) / 2, my = (OY + Py) / 2;
        cx.font = 'bold 13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.YELLOW; cx.fillText('r = ' + Math.round(r / SC * 10) / 10, mx + 5, my - 5);

        // Centre dot
        cx.beginPath(); cx.arc(OX, OY, 5, 0, Math.PI * 2);
        cx.fillStyle = COLORS.ORANGE; cx.shadowColor = COLORS.ORANGE;
        cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;
        cx.fillStyle = COLORS.ORANGE; cx.font = '12px monospace';
        cx.fillText('(0, 0)', OX + 8, OY - 8);

        // Point dot
        cx.beginPath(); cx.arc(Px, Py, 5, 0, Math.PI * 2);
        cx.fillStyle = COLORS.CYAN; cx.shadowColor = COLORS.CYAN;
        cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        const rv = (r / SC).toFixed(1);
        cx.fillText('x² + y² = r²  →  x² + y² = ' + Math.round((r/SC)*(r/SC)*10)/10, 12, 22);
      },
    },

    // ── Stage 1: General equation — drag centre ───────────────────
    {
      title: () => T('Środek nie w centrum układu', 'Centre not at origin'),
      desc:  () => T(
        'Gdy środek jest w punkcie (p, q), równanie to (x−p)²+(y−q)²=r². Przeciągnij środek okręgu lub zmień promień suwakiem.',
        'When the centre is at (p, q), the equation is (x−p)²+(y−q)²=r². Drag the circle\'s centre or change the radius with the slider.'
      ),
      sliders: [
        { id: 'r', lbl: 'r', color: COLORS.CYAN, min: 20, max: 100, step: 1, val: 60 },
      ],
      draw(cx, W, H, vals) {
        const OX = W / 2, OY = H / 2, SC = 30;
        const r = vals.r;

        drawGrid(cx, OX, OY, SC, W, H);
        drawAxes(cx, OX, OY, W, H, SC);

        const px = dragCentre.x, py = dragCentre.y;

        cx.beginPath(); cx.arc(px, py, r, 0, Math.PI * 2);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2.5;
        cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        // Centre cross
        cx.beginPath(); cx.arc(px, py, 6, 0, Math.PI * 2);
        cx.fillStyle = COLORS.ORANGE; cx.shadowColor = COLORS.ORANGE;
        cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;

        const p = Math.round((px - OX) / SC * 10) / 10;
        const q = Math.round((OY - py) / SC * 10) / 10;
        const rv = Math.round(r / SC * 10) / 10;

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText('(' + p + ', ' + q + ')', px + 8, py - 10);

        cx.fillStyle = COLORS.CYAN;
        const ps = p >= 0 ? '−' + p : '+' + Math.abs(p);
        const qs = q >= 0 ? '−' + q : '+' + Math.abs(q);
        cx.fillText('(x' + ps + ')²+(y' + qs + ')²=' + Math.round(rv*rv*10)/10, 12, 22);
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.fillText('Przeciągnij środek!', 12, 40);
      },
    },

    // ── Stage 2: Expanded form ───────────────────────────────────
    {
      title: () => T('Postać rozwinięta', 'Expanded form'),
      desc:  () => T(
        '(x−p)²+(y−q)²=r² można rozwinąć: x²+y²−2px−2qy+(p²+q²−r²)=0. Zmienne p, q, r zmieniają odpowiednie współczynniki.',
        '(x−p)²+(y−q)²=r² can be expanded: x²+y²−2px−2qy+(p²+q²−r²)=0. Changing p, q, r updates the coefficients.'
      ),
      sliders: [
        { id: 'p', lbl: 'p', color: COLORS.ORANGE, min: -4, max: 4, step: 0.5, val: 2 },
        { id: 'q', lbl: 'q', color: COLORS.YELLOW, min: -4, max: 4, step: 0.5, val: 1 },
        { id: 'r', lbl: 'r', color: COLORS.CYAN,   min: 1,  max: 5, step: 0.5, val: 3 },
      ],
      draw(cx, W, H, vals) {
        const OX = W / 2, OY = H / 2, SC = 35;
        const { p, q, r } = vals;

        drawGrid(cx, OX, OY, SC, W, H);
        drawAxes(cx, OX, OY, W, H, SC);

        const px = OX + p * SC, py = OY - q * SC;
        cx.beginPath(); cx.arc(px, py, r * SC, 0, Math.PI * 2);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2.5;
        cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        cx.beginPath(); cx.arc(px, py, 5, 0, Math.PI * 2);
        cx.fillStyle = COLORS.ORANGE; cx.shadowColor = COLORS.ORANGE;
        cx.shadowBlur = 6; cx.fill(); cx.shadowBlur = 0;

        // Show both forms
        const ps = p >= 0 ? '−' + p : '+' + Math.abs(p);
        const qs = q >= 0 ? '−' + q : '+' + Math.abs(q);
        const c = p * p + q * q - r * r;
        const coeff = cs => cs >= 0 ? '+' + cs : '' + cs;

        cx.font = '12px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('(x' + ps + ')²+(y' + qs + ')²=' + (r*r).toFixed(1), 12, 22);
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.fillText('x²+y²' + coeff(-2*p) + 'x' + coeff(-2*q) + 'y' + coeff(Math.round(c*10)/10) + '=0', 12, 40);
      },
    },

    // ── Stage 3: Read equation → draw circle ─────────────────────
    {
      title: () => T('Jak czytać równanie okręgu', 'How to read the circle equation'),
      desc:  () => T(
        'Mając równanie (x−p)²+(y−q)²=r², środek to (p, q) a promień to √r². Uwaga na znaki! (x+2)² → środek w x=−2, bo +2 = −(−2).',
        'From (x−p)²+(y−q)²=r², centre is (p, q) and radius is √r². Watch the signs! (x+2)² → centre at x=−2, because +2 = −(−2).'
      ),
      sliders: [
        { id: 'p', lbl: 'p', color: COLORS.ORANGE, min: -4, max: 4, step: 1, val: -2 },
        { id: 'q', lbl: 'q', color: COLORS.YELLOW, min: -3, max: 3, step: 1, val: 1 },
        { id: 'r2', lbl: 'r²', color: COLORS.CYAN, min: 1, max: 25, step: 1, val: 9 },
      ],
      draw(cx, W, H, vals) {
        const OX = W / 2, OY = H / 2, SC = 40;
        const { p, q, r2 } = vals;
        const r = Math.sqrt(r2);

        drawGrid(cx, OX, OY, SC, W, H);
        drawAxes(cx, OX, OY, W, H, SC);

        const px = OX + p * SC, py = OY - q * SC;
        cx.beginPath(); cx.arc(px, py, r * SC, 0, Math.PI * 2);
        cx.strokeStyle = COLORS.CYAN; cx.lineWidth = 2.5;
        cx.shadowColor = COLORS.CYAN; cx.shadowBlur = 8; cx.stroke(); cx.shadowBlur = 0;

        cx.beginPath(); cx.arc(px, py, 5, 0, Math.PI * 2);
        cx.fillStyle = COLORS.ORANGE; cx.shadowColor = COLORS.ORANGE;
        cx.shadowBlur = 8; cx.fill(); cx.shadowBlur = 0;

        // Coordinates labels on axes
        if (p !== 0) {
          cx.beginPath(); cx.moveTo(px, OY - 5); cx.lineTo(px, OY + 5);
          cx.strokeStyle = COLORS.ORANGE; cx.lineWidth = 1.5; cx.stroke();
          cx.font = '12px monospace'; cx.textAlign = 'center';
          cx.fillStyle = COLORS.ORANGE; cx.fillText(p, px, OY + 16);
        }
        if (q !== 0) {
          cx.beginPath(); cx.moveTo(OX - 5, py); cx.lineTo(OX + 5, py);
          cx.strokeStyle = COLORS.YELLOW; cx.lineWidth = 1.5; cx.stroke();
          cx.font = '12px monospace'; cx.textAlign = 'right';
          cx.fillStyle = COLORS.YELLOW; cx.fillText(q, OX - 8, py + 4);
        }

        const ps = p >= 0 ? '−' + p : '+' + Math.abs(p);
        const qs = q >= 0 ? '−' + q : '+' + Math.abs(q);

        cx.font = '13px monospace'; cx.textAlign = 'left';
        cx.fillStyle = COLORS.CYAN;
        cx.fillText('(x' + ps + ')²+(y' + qs + ')²=' + r2, 12, 22);
        cx.fillStyle = COLORS.ORANGE;
        cx.fillText('środek: (' + p + ', ' + q + ')', 12, 40);
        cx.fillStyle = COLORS.YELLOW;
        cx.fillText('r = √' + r2 + ' = ' + (Math.round(r * 100) / 100), 12, 58);
      },
    },
  ],
});

// ── Grid/axes helpers ─────────────────────────────────────────────
function drawGrid(cx, OX, OY, SC, W, H) {
  cx.strokeStyle = 'rgba(255,255,255,0.06)'; cx.lineWidth = 1;
  for (let x = OX % SC; x < W; x += SC) { cx.beginPath(); cx.moveTo(x, 0); cx.lineTo(x, H); cx.stroke(); }
  for (let y = OY % SC; y < H; y += SC) { cx.beginPath(); cx.moveTo(0, y); cx.lineTo(W, y); cx.stroke(); }
}
function drawAxes(cx, OX, OY, W, H, SC) {
  cx.strokeStyle = 'rgba(255,255,255,0.3)'; cx.lineWidth = 1.5;
  cx.beginPath(); cx.moveTo(0, OY); cx.lineTo(W, OY); cx.stroke();
  cx.beginPath(); cx.moveTo(OX, 0); cx.lineTo(OX, H); cx.stroke();
  cx.font = '10px monospace'; cx.fillStyle = 'rgba(255,255,255,0.25)'; cx.textAlign = 'center';
  for (let i = -8; i <= 8; i++) {
    if (i === 0) continue;
    const x = OX + i * SC, y = OY + i * SC;
    if (x > 5 && x < W - 5) cx.fillText(i, x, OY + 12);
    if (y > 5 && y < H - 5) { cx.textAlign = 'right'; cx.fillText(-i, OX - 4, y + 3); cx.textAlign = 'center'; }
  }
}

// ── Drag centre for stage 1 ───────────────────────────────────────
const OX = W / 2, OY = H / 2;
let dragCentre = { x: OX + 60, y: OY - 40 };
let dragging = false;

cv.classList.add('draggable');
function onDown(e) {
  const pos = getCanvasPos(e);
  if (Math.hypot(pos.x - dragCentre.x, pos.y - dragCentre.y) < 20) {
    dragging = true; if (e.preventDefault) e.preventDefault();
  }
}
function onMove(e) {
  if (!dragging) return;
  if (e.preventDefault) e.preventDefault();
  const pos = getCanvasPos(e);
  dragCentre.x = Math.max(20, Math.min(W - 20, pos.x));
  dragCentre.y = Math.max(20, Math.min(H - 20, pos.y));
}
function onUp() { dragging = false; }

cv.addEventListener('mousedown', onDown);
cv.addEventListener('mousemove', onMove);
cv.addEventListener('mouseup', onUp);
cv.addEventListener('mouseleave', onUp);
cv.addEventListener('touchstart', onDown, { passive: false });
cv.addEventListener('touchmove', onMove, { passive: false });
cv.addEventListener('touchend', onUp);
</script>
</body>
</html>
