<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schemat Bernoulliego — Bernoulli Explorer</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  button:hover { background: rgba(255,255,255,.08); }
  button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  #sliders-wrap { min-height: 0; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="600" height="310"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>
    <div id="sliders-wrap"></div>
    <div class="nav">
      <button id="qprev">&larr;</button>
      <div id="qdots"></div>
      <button id="qnext">&rarr;</button>
    </div>
  </div>
</div>

<script>
(function(){
  const cv = document.getElementById('cv');
  const cx = cv.getContext('2d');
  const W = 600, H = 310;

  const LANG = new URLSearchParams(window.location.search).get('lang') || 'pl';
  const T = (pl, en) => LANG === 'pl' ? pl : en;

  const COL_HEAD = '#4a9eff';
  const COL_TAIL = '#FF6B35';
  const COL_HL = '#58C4DD';
  const COL_FORMULA = '#83C167';
  const COL_SHADE = '#FFD166';
  const COL_MEAN = '#E07090';

  let stage = 0;
  let prob = 0.5;
  let nTrials = 4;
  let kSuccess = 2;
  let kThresh = 3;

  function clear() { cx.fillStyle = '#0e0e12'; cx.fillRect(0, 0, W, H); }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath(); ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y); ctx.closePath();
  }

  function infoBox(text, sx, sy, col) {
    cx.save(); cx.font = '12px monospace';
    const w = cx.measureText(text).width + 14;
    cx.fillStyle = 'rgba(14,14,18,0.85)'; cx.strokeStyle = col + '40'; cx.lineWidth = 1;
    roundRect(cx, sx - w/2, sy - 10, w, 22, 4); cx.fill(); cx.stroke();
    cx.fillStyle = col; cx.textAlign = 'center'; cx.fillText(text, sx, sy + 4); cx.restore();
  }

  function factorial(n) { let r = 1; for (let i = 2; i <= n; i++) r *= i; return r; }
  function comb(n, k) { if (k < 0 || k > n) return 0; return factorial(n) / (factorial(k) * factorial(n - k)); }
  function bernoulli(n, k, p) { return comb(n, k) * Math.pow(p, k) * Math.pow(1 - p, n - k); }

  function drawBar(x, y, w, h, col, alpha) {
    cx.save(); cx.globalAlpha = alpha;
    cx.fillStyle = col; roundRect(cx, x, y, w, h, 3); cx.fill();
    cx.strokeStyle = col; cx.globalAlpha = Math.min(1, alpha + 0.2); cx.lineWidth = 1;
    roundRect(cx, x, y, w, h, 3); cx.stroke();
    cx.restore();
  }

  function drawHistogram(n, p, ox, oy, maxW, maxH, highlightK, shadeFrom) {
    const barW = Math.min(40, (maxW - 10) / (n + 1) - 4);
    const gap = (maxW - (n + 1) * barW) / (n + 2);
    let maxP = 0;
    for (let k = 0; k <= n; k++) maxP = Math.max(maxP, bernoulli(n, k, p));
    if (maxP === 0) maxP = 1;

    for (let k = 0; k <= n; k++) {
      const pk = bernoulli(n, k, p);
      const bh = (pk / maxP) * maxH * 0.85;
      const bx = ox + gap + k * (barW + gap);
      const by = oy - bh;

      let col = COL_HL;
      let alpha = 0.5;
      if (highlightK !== undefined && k === highlightK) { col = COL_SHADE; alpha = 0.9; }
      if (shadeFrom !== undefined && k >= shadeFrom) { col = COL_SHADE; alpha = 0.8; }

      drawBar(bx, by, barW, bh, col, alpha);

      cx.fillStyle = 'rgba(255,255,255,0.4)'; cx.font = '9px monospace'; cx.textAlign = 'center';
      cx.fillText(k, bx + barW / 2, oy + 12);
      if (bh > 14) {
        cx.fillStyle = 'rgba(255,255,255,0.7)'; cx.font = '8px monospace';
        cx.fillText(pk.toFixed(3), bx + barW / 2, by - 4);
      }
    }

    // x-axis label
    cx.fillStyle = 'rgba(255,255,255,0.3)'; cx.font = '10px monospace'; cx.textAlign = 'center';
    cx.fillText('k (' + T('sukcesy','successes') + ')', ox + maxW / 2, oy + 24);
  }

  const stages = [
    {
      title: () => T('Jeden rzut monet\u0105', 'One coin flip'),
      desc: () => T(
        'Najprostszy schemat Bernoulliego: jeden rzut. P(orze\u0142) = p, P(reszka) = 1\u2212p. Przesu\u0144 p.',
        'Simplest Bernoulli trial: one flip. P(heads) = p, P(tails) = 1\u2212p. Slide p.'
      ),
      sliders: [
        { id: 'prob', lbl: 'p', color: COL_HEAD, min: 0, max: 1, step: 0.05, val: () => prob },
      ],
      draw() {
        const barW = 80, maxH = 180;
        const oy = H - 40;
        const hH = prob * maxH;
        const tH = (1 - prob) * maxH;

        // Heads bar
        const hx = W / 2 - barW - 30;
        drawBar(hx, oy - hH, barW, hH, COL_HEAD, 0.7);
        cx.fillStyle = COL_HEAD; cx.font = '12px monospace'; cx.textAlign = 'center';
        cx.fillText(T('Orze\u0142','Heads'), hx + barW / 2, 25);
        cx.fillText('p = ' + prob.toFixed(2), hx + barW / 2, 42);

        // Tails bar
        const tx = W / 2 + 30;
        drawBar(tx, oy - tH, barW, tH, COL_TAIL, 0.7);
        cx.fillStyle = COL_TAIL; cx.font = '12px monospace'; cx.textAlign = 'center';
        cx.fillText(T('Reszka','Tails'), tx + barW / 2, 25);
        cx.fillText('1\u2212p = ' + (1 - prob).toFixed(2), tx + barW / 2, 42);
      }
    },
    {
      title: () => T('4 rzuty \u2014 histogram', '4 flips \u2014 histogram'),
      desc: () => T(
        '4 rzuty = 2\u2074 = 16 mo\u017Cliwych wynik\u00F3w. Grupujemy wg liczby or\u0142\u00F3w. Powstaje histogram \u2014 rozk\u0142ad dwumianowy.',
        '4 flips = 2\u2074 = 16 possible outcomes. Group by number of heads. A histogram forms \u2014 the binomial distribution.'
      ),
      sliders: [
        { id: 'prob', lbl: 'p', color: COL_HEAD, min: 0, max: 1, step: 0.05, val: () => prob },
      ],
      draw() {
        drawHistogram(4, prob, 30, H - 40, W - 60, H - 70);
        infoBox('n=4, p=' + prob.toFixed(2) + '  |  2\u2074 = 16 ' + T('wynik\u00F3w','outcomes'), W / 2, 20, COL_HL);

        // Show outcome counts
        cx.fillStyle = 'rgba(255,255,255,0.25)'; cx.font = '9px monospace'; cx.textAlign = 'left';
        const counts = [1, 4, 6, 4, 1];
        cx.fillText('C(4,k): ' + counts.join(', '), 14, H - 14);
      }
    },
    {
      title: () => T('Wz\u00F3r Bernoulliego', 'Bernoulli formula'),
      desc: () => T(
        'P(k) = C(n,k) \u00B7 p\u1D4F \u00B7 (1\u2212p)\u207F\u207B\u1D4F. C(n,k) liczy ILE spos\u00F3b\u00F3w, p\u1D4F to szansa sukces\u00F3w, (1\u2212p)\u207F\u207B\u1D4F to szansa pora\u017Cek.',
        'P(k) = C(n,k) \u00B7 p\u1D4F \u00B7 (1\u2212p)\u207F\u207B\u1D4F. C(n,k) counts HOW MANY ways, p\u1D4F is success chance, (1\u2212p)\u207F\u207B\u1D4F is failure chance.'
      ),
      sliders: [
        { id: 'nTrials', lbl: 'n', color: COL_HL, min: 1, max: 10, step: 1, val: () => nTrials },
        { id: 'kSuccess', lbl: 'k', color: COL_SHADE, min: 0, max: 10, step: 1, val: () => kSuccess },
        { id: 'prob', lbl: 'p', color: COL_HEAD, min: 0, max: 1, step: 0.05, val: () => prob },
      ],
      draw() {
        const k = Math.min(kSuccess, nTrials);
        const c = comb(nTrials, k);
        const pk = Math.pow(prob, k);
        const qnk = Math.pow(1 - prob, nTrials - k);
        const result = c * pk * qnk;

        // colored formula breakdown
        const y = 30;
        cx.font = '13px monospace'; cx.textAlign = 'center';
        const parts = [
          { txt: 'P(' + k + ') = ', col: 'rgba(255,255,255,0.7)' },
          { txt: 'C(' + nTrials + ',' + k + ')', col: COL_FORMULA },
          { txt: ' \u00B7 ', col: 'rgba(255,255,255,0.5)' },
          { txt: prob.toFixed(2) + '^' + k, col: COL_HEAD },
          { txt: ' \u00B7 ', col: 'rgba(255,255,255,0.5)' },
          { txt: (1-prob).toFixed(2) + '^' + (nTrials - k), col: COL_TAIL },
        ];
        let totalW = 0;
        parts.forEach(p => { totalW += cx.measureText(p.txt).width; });
        let curX = W / 2 - totalW / 2;
        parts.forEach(p => {
          cx.fillStyle = p.col;
          cx.textAlign = 'left';
          cx.fillText(p.txt, curX, y);
          curX += cx.measureText(p.txt).width;
        });

        // numeric breakdown
        cx.font = '12px monospace'; cx.textAlign = 'center';
        cx.fillStyle = COL_FORMULA; cx.fillText('C(' + nTrials + ',' + k + ') = ' + c, W * 0.2, y + 30);
        cx.fillStyle = COL_HEAD; cx.fillText(prob.toFixed(2) + '^' + k + ' = ' + pk.toFixed(4), W * 0.5, y + 30);
        cx.fillStyle = COL_TAIL; cx.fillText((1-prob).toFixed(2) + '^' + (nTrials-k) + ' = ' + qnk.toFixed(4), W * 0.8, y + 30);

        infoBox('P(' + k + ') = ' + result.toFixed(4), W / 2, y + 55, COL_SHADE);

        // histogram with highlighted bar
        drawHistogram(nTrials, prob, 30, H - 30, W - 60, H - 120, k);
      }
    },
    {
      title: () => T('Suwaki n i p', 'Sliders for n and p'),
      desc: () => T(
        'Przesu\u0144 n (1\u201320) i p (0\u20131). Obserwuj, jak histogram zmienia kszta\u0142t. Warto\u015B\u0107 oczekiwana E = n\u00B7p (czerwona kreska).',
        'Slide n (1\u201320) and p (0\u20131). Watch the histogram change shape. Expected value E = n\u00B7p (red line).'
      ),
      sliders: [
        { id: 'nTrials', lbl: 'n', color: COL_HL, min: 1, max: 20, step: 1, val: () => nTrials },
        { id: 'prob', lbl: 'p', color: COL_HEAD, min: 0, max: 1, step: 0.05, val: () => prob },
      ],
      draw() {
        drawHistogram(nTrials, prob, 30, H - 40, W - 60, H - 70);

        // mean line
        const mean = nTrials * prob;
        const barW = Math.min(40, (W - 70) / (nTrials + 1) - 4);
        const gap = (W - 60 - (nTrials + 1) * barW) / (nTrials + 2);
        const meanX = 30 + gap + mean * (barW + gap) + barW / 2;
        if (meanX > 30 && meanX < W - 30) {
          cx.strokeStyle = COL_MEAN; cx.lineWidth = 2; cx.setLineDash([4, 3]);
          cx.beginPath(); cx.moveTo(meanX, 30); cx.lineTo(meanX, H - 40); cx.stroke(); cx.setLineDash([]);
        }

        infoBox('E = n\u00B7p = ' + nTrials + '\u00B7' + prob.toFixed(2) + ' = ' + mean.toFixed(1), W / 2, 20, COL_MEAN);
      }
    },
    {
      title: () => T('P(X \u2265 k) \u2014 "co najmniej"', 'P(X \u2265 k) \u2014 "at least"'),
      desc: () => T(
        'P(X \u2265 k) = 1 \u2212 P(X < k). Zacieniowane s\u0142upki to prawdopodobie\u0144stwo "co najmniej k sukces\u00F3w". Przesu\u0144 k.',
        'P(X \u2265 k) = 1 \u2212 P(X < k). The shaded bars are the probability of "at least k successes". Slide k.'
      ),
      sliders: [
        { id: 'nTrials', lbl: 'n', color: COL_HL, min: 1, max: 20, step: 1, val: () => nTrials },
        { id: 'prob', lbl: 'p', color: COL_HEAD, min: 0, max: 1, step: 0.05, val: () => prob },
        { id: 'kThresh', lbl: 'k', color: COL_SHADE, min: 0, max: 20, step: 1, val: () => kThresh },
      ],
      draw() {
        const k = Math.min(kThresh, nTrials);
        drawHistogram(nTrials, prob, 30, H - 40, W - 60, H - 80, undefined, k);

        let pAtLeast = 0;
        for (let i = k; i <= nTrials; i++) pAtLeast += bernoulli(nTrials, i, prob);

        infoBox('P(X \u2265 ' + k + ') = ' + pAtLeast.toFixed(4), W / 2, 20, COL_SHADE);
        cx.fillStyle = 'rgba(255,255,255,0.35)'; cx.font = '10px monospace'; cx.textAlign = 'center';
        cx.fillText('= 1 \u2212 P(X < ' + k + ') = 1 \u2212 ' + (1 - pAtLeast).toFixed(4), W / 2, 42);
      }
    },
  ];

  // ── Slider management ────────────────────────────────────────
  const slWrap = document.getElementById('sliders-wrap');

  function buildSliders(defs) {
    let html = '<div class="sliders">';
    defs.forEach(s => {
      const v = typeof s.val === 'function' ? s.val() : s.val;
      html += `<div class="slider-row">
        <span class="lbl" style="color:${s.color}">${s.lbl} =</span>
        <input type="range" id="s_${s.id}" min="${s.min}" max="${s.max}" step="${s.step}" value="${v}">
        <span class="val" id="v_${s.id}" style="color:${s.color}"></span>
      </div>`;
    });
    html += '</div>';
    slWrap.innerHTML = html;

    defs.forEach(s => {
      const el = document.getElementById('s_' + s.id);
      document.getElementById('v_' + s.id).textContent = (+el.value).toFixed(s.step < 1 ? 1 : 0);
      el.addEventListener('input', function() {
        const v = +this.value;
        document.getElementById('v_' + s.id).textContent = v.toFixed(s.step < 1 ? 1 : 0);
        if (s.id === 'prob') prob = v;
        if (s.id === 'nTrials') nTrials = v;
        if (s.id === 'kSuccess') kSuccess = v;
        if (s.id === 'kThresh') kThresh = v;
      });
    });
  }

  // ── Navigation ───────────────────────────────────────────────
  const prevBtn = document.getElementById('qprev');
  const nextBtn = document.getElementById('qnext');
  const dotsEl  = document.getElementById('qdots');
  const titleEl = document.getElementById('qf');
  const descEl  = document.getElementById('qd');

  function goTo(idx) {
    stage = Math.max(0, Math.min(stages.length - 1, idx));
    const s = stages[stage];
    titleEl.textContent = s.title();
    descEl.textContent = s.desc();
    if (s.sliders && s.sliders.length) buildSliders(s.sliders);
    else slWrap.innerHTML = '';
    prevBtn.disabled = stage === 0;
    nextBtn.disabled = stage === stages.length - 1;
    renderDots();
  }

  function renderDots() {
    dotsEl.innerHTML = stages.map((_, i) =>
      `<span class="dot${i === stage ? ' active' : ''}" data-i="${i}"></span>`
    ).join('');
    dotsEl.querySelectorAll('.dot').forEach(d =>
      d.addEventListener('click', () => goTo(+d.dataset.i))
    );
  }

  prevBtn.addEventListener('click', () => goTo(stage - 1));
  nextBtn.addEventListener('click', () => goTo(stage + 1));

  function tick() {
    clear(); stages[stage].draw();
    requestAnimationFrame(tick);
  }

  goTo(0);
  tick();
})();
</script>
</body>
</html>
