<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dziedzina równania — Warsztat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; color: rgba(255,255,255,.85); }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }

  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .head .step { font-size: 11px; color: rgba(255,255,255,.4); letter-spacing: .04em; }
  .head .title { font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  .desc { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); margin-bottom: 10px; min-height: 34px; }

  .pips { display: flex; gap: 14px; flex-wrap: wrap; margin: 4px 0 10px; font-size: 12px; }
  .pip { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.55); }
  .pip .mark { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,.25); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; line-height: 1; }
  .pip.ok { color: #83C167; }
  .pip.ok .mark { background: #83C167; border-color: #83C167; color: #0e0e12; }
  .pip.ok .mark::before { content: "\2713"; }

  .predict { margin-bottom: 10px; }
  .predict .q { font-size: 13px; color: rgba(255,255,255,.82); margin-bottom: 8px; line-height: 1.55; }
  .predict .opts { display: flex; flex-direction: column; gap: 6px; }
  .predict button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .predict button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .predict button.picked { border-color: #58C4DD; color: #58C4DD; }
  .predict .feedback { margin-top: 8px; font-size: 12px; line-height: 1.55; color: rgba(255,255,255,.7); padding: 8px 10px; border-left: 2px solid #58C4DD; background: rgba(88,196,221,.06); border-radius: 0 4px 4px 0; }

  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }

  .choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .choices button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .choices button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .choices button.picked { border-color: #58C4DD; color: #58C4DD; }
  .choices button.correct { border-color: #83C167; color: #83C167; }
  .choices button.wrong { border-color: #FF6B6B; color: #FF6B6B; }

  .hints { font-size: 12px; color: rgba(255,255,255,.5); margin: 4px 0 10px; line-height: 1.55; }

  .nav { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .nav button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  .nav button:hover:not(:disabled) { background: rgba(255,255,255,.08); }
  .nav button:disabled { opacity: .3; cursor: default; }
  .nav button.primary { border-color: #83C167; color: #83C167; }
  .nav button.primary:hover { background: rgba(131,193,103,.1); }

  .dots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.15); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  .dot.done { background: #83C167; }

  .solved-note { font-size: 13px; color: #83C167; line-height: 1.55; padding: 8px 10px; border-left: 2px solid #83C167; background: rgba(131,193,103,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }
  .wrapup-note { font-size: 13px; color: #C78DFF; line-height: 1.55; padding: 10px 12px; border-left: 2px solid #C78DFF; background: rgba(199,141,255,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="600" height="360"></canvas>
  <div class="panel">
    <div class="head">
      <span class="step" id="step"></span>
      <div class="dots" id="dots"></div>
    </div>
    <p class="title" id="title"></p>
    <p class="desc" id="desc"></p>
    <div id="predict"></div>
    <div id="sliders-wrap"></div>
    <div id="choices-wrap"></div>
    <div class="pips" id="pips"></div>
    <div class="hints" id="hints"></div>
    <div id="solved-msg"></div>
    <div class="nav">
      <button id="prev">&larr;</button>
      <button id="next" class="primary">Dalej &rarr;</button>
    </div>
  </div>
</div>

<script type="module">
import { GraphView } from '../lib/graph-core.js';
import { initWarsztat, T } from '../lib/warsztat-core.js';
{
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = 600, H = 360;

  // ── Colors ─────────────────────────────────────────────────────
  const COL_LHS  = '#FF6B6B';   // wrong/naive
  const COL_RHS  = '#83C167';   // correct
  const COL_A    = '#58C4DD';
  const COL_B    = '#FFD166';
  const COL_AB   = '#C78DFF';
  const COL_DIM  = 'rgba(255,255,255,0.35)';

  // ── Draw helpers ───────────────────────────────────────────────
  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
    c.closePath();
  }
  function infoBox(text, sx, sy, col) {
    ctx.save();
    ctx.font = '12px monospace';
    const w = ctx.measureText(text).width + 14;
    ctx.fillStyle = 'rgba(14,14,18,0.9)';
    ctx.strokeStyle = col + '60';
    ctx.lineWidth = 1;
    roundRect(ctx, sx - w/2, sy - 11, w, 22, 4);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = col;
    ctx.textAlign = 'center';
    ctx.fillText(text, sx, sy + 4);
    ctx.restore();
  }
  function fmt(v, d) { d = d ?? 2; return (Math.abs(v - Math.round(v)) < 1e-9) ? Math.round(v).toString() : v.toFixed(d); }

  // ── Challenge-local state ──────────────────────────────────────
  const C = {
    ch1_showBoth: false,   // ch1: has student toggled "show both roots"?
    ch2_x: 7,              // ch2: log domain candidate x
    ch2_seenOut: false,    // ch2: has student seen x outside domain?
    ch2_seenIn:  false,    // ch2: has student seen x inside domain?
    ch3_x: 3.5,            // ch3: squaring candidate x
    ch3_seenFake: false,   // ch3: seen x=2 region
    ch3_seenReal: false,   // ch3: seen x=5 region
    ch4_x: 0.5,            // ch4: x/(x-1)=1 candidate
    ch4_seenHole: false,   // ch4: looked near x=1
    ch5Pick: null,         // ch5: final MCQ pick
  };

  // ── Views per challenge ────────────────────────────────────────
  let view;
  function viewCh1() {
    view = new GraphView(ctx, { rect: [0, 0, W, H], xRange: [-2, 7], yRange: [-8, 32], scale: 30 });
  }
  function viewCh2() {
    view = new GraphView(ctx, { rect: [0, 0, W, H], xRange: [-1, 14], yRange: [-2, 3], scale: 40 });
  }
  function viewCh3() {
    view = new GraphView(ctx, { rect: [0, 0, W, H], xRange: [-1, 8], yRange: [-4, 5], scale: 40 });
  }
  function viewCh4() {
    view = new GraphView(ctx, { rect: [0, 0, W, H], xRange: [-3, 5], yRange: [-5, 7], scale: 38 });
  }

  // ── Challenges ─────────────────────────────────────────────────
  const challenges = [

    // ─── Ch.1: x² = 5x — dividing by x loses a root ───────────────
    {
      id: 'ch1_divide_by_x',
      title:   'Dzielenie przez $x$ gubi pierwiastek',
      titleEn: 'Dividing by $x$ loses a root',
      desc:    'Równanie $x^2 = 5x$ — po podzieleniu obu stron przez $x$ wychodzi $x = 5$, ale wykresy pokazują dwa punkty przecięcia. Zobacz, gdzie gubi się drugie rozwiązanie.',
      descEn:  'The equation $x^2 = 5x$ — dividing both sides by $x$ gives $x = 5$, but the graphs show two intersection points. See where the second solution disappears.',
      drawBackground: 'none',
      init() {},
      predict: {
        question:   'Jeśli w $x^2 = 5x$ podzielimy obie strony przez $x$, to dostaniemy...',
        questionEn: 'If we divide both sides of $x^2 = 5x$ by $x$, we get...',
        options: [
          { label: 'tylko $x = 5$',
            labelEn: 'only $x = 5$',
            correct: false,
            why:   'Pozornie poprawne, ale zgubiliśmy $x = 0$. Dzielenie przez $x$ zakłada $x \\neq 0$, więc przypadek $x = 0$ wypada po cichu z zakresu rozważań.',
            whyEn: 'Looks right, but we’ve lost $x = 0$. Dividing by $x$ silently assumes $x \\neq 0$, so the case $x = 0$ slips out of consideration.' },
          { label: '$x = 0$ i $x = 5$ (oba)',
            labelEn: '$x = 0$ and $x = 5$ (both)',
            correct: true,
            why:   'Tak — to pełne rozwiązanie, ale dzielenie przez $x$ samo $x=0$ NIE daje. Trzeba napisać $x^2 - 5x = 0$, czyli $x(x-5) = 0$, i dopiero stąd oba pierwiastki.',
            whyEn: 'Yes — that’s the full solution, but division by $x$ on its own does NOT produce $x = 0$. You have to write $x^2 - 5x = 0$, i.e. $x(x-5) = 0$, and only from there do both roots appear.' },
          { label: 'nic nie da się rozwiązać',
            labelEn: 'nothing can be solved',
            correct: false,
            why:   'Da się — tylko nie przez dzielenie. Metoda "przenieś na jedną stronę i wyłącz wspólny czynnik" zawsze działa.',
            whyEn: 'It can be solved — just not by dividing. The "move everything to one side and factor out" method always works.' },
        ],
      },
      choices: {
        question:   'Przełącz widok: pokaż OBA pierwiastki.',
        questionEn: 'Toggle the view: show BOTH roots.',
        options: [
          { id: 'one',  label: 'pokaż tylko $x = 5$ (jak po dzieleniu przez $x$)',
                        labelEn: 'show only $x = 5$ (as after dividing by $x$)', correct: false },
          { id: 'both', label: 'pokaż oba: $x = 0$ ORAZ $x = 5$',
                        labelEn: 'show both: $x = 0$ AND $x = 5$', correct: true },
        ],
        pick(id) { C.ch1_showBoth = (id === 'both'); },
      },
      pips() {
        return [
          { label: T('widzisz oba punkty przecięcia', 'you see both intersection points'), ok: C.ch1_showBoth },
          { label: T('zgubiony pierwiastek: $x = 0$', 'lost root: $x = 0$'), ok: C.ch1_showBoth },
        ];
      },
      solved() { return C.ch1_showBoth; },
      hints: [
        '① Przenieś wszystko na jedną stronę: $x^2 - 5x = 0$. Nie dziel przez $x$, bo $x$ może być zerem.',
        '② Wyłącz wspólny czynnik: $x(x - 5) = 0$. Iloczyn jest zerem $\\iff$ któryś czynnik to zero.',
        '③ Stąd $x = 0$ LUB $x = 5$. Dzieląc przez $x$ zakładaliśmy po cichu $x \\neq 0$ — i dlatego $x = 0$ zniknęło.',
      ],
      hintsEn: [
        '① Move everything to one side: $x^2 - 5x = 0$. Don’t divide by $x$ — $x$ might be zero.',
        '② Factor out the common factor: $x(x - 5) = 0$. A product is zero $\\iff$ one of the factors is zero.',
        '③ Hence $x = 0$ OR $x = 5$. Dividing by $x$ silently assumed $x \\neq 0$ — and that’s why $x = 0$ vanished.',
      ],
      solvedMsg:   'Dzielenie przez wyrażenie zawierające zmienną zawsze może zgubić pierwiastek — dokładnie te $x$, dla których dzielnik się zeruje. Bezpieczniejszą alternatywą jest przeniesienie wszystkiego na jedną stronę i faktoryzacja.',
      solvedMsgEn: 'Dividing by an expression that contains the variable can always lose a root — precisely those $x$ for which the divisor is zero. A safer alternative is to move everything to one side and factor.',
      predictAfter: {
        question:   'Ile rozwiązań ma równanie $x^3 = 4x$?',
        questionEn: 'How many solutions does the equation $x^3 = 4x$ have?',
        options: [
          { label: 'jedno: $x = 2$ (po podzieleniu przez $x^2$)',
            labelEn: 'one: $x = 2$ (after dividing by $x^2$)',
            correct: false,
            why:   'Znowu pułapka — dzielenie przez $x^2$ gubi $x=0$. Ponadto: $x^3 = 4x \\iff x(x^2 - 4) = 0$, czyli $x = 0, 2, -2$.',
            whyEn: 'Same trap — dividing by $x^2$ loses $x = 0$. Also: $x^3 = 4x \\iff x(x^2 - 4) = 0$, i.e. $x = 0, 2, -2$.' },
          { label: 'trzy: $x = 0, 2, -2$',
            labelEn: 'three: $x = 0, 2, -2$',
            correct: true,
            why:   'Tak — $x(x-2)(x+2) = 0$. Pełny rozkład daje trzy pierwiastki.',
            whyEn: 'Yes — $x(x-2)(x+2) = 0$. The full factorisation gives three roots.' },
          { label: 'dwa: $x = 2$ i $x = -2$',
            labelEn: 'two: $x = 2$ and $x = -2$',
            correct: false,
            why:   'Brakuje $x = 0$. To ten sam błąd co poprzednio.',
            whyEn: 'Missing $x = 0$. That’s the same mistake as before.' },
        ],
      },
      draw() {
        viewCh1();
        view.drawGrid({ color: 'rgba(255,255,255,0.04)' });
        view.drawAxes({ color: 'rgba(255,255,255,0.2)', arrows: false, labels: true, tickSize: 3 });

        // y = x² (blue)
        view.plotFn(x => x*x, { color: COL_A, lineWidth: 2 });
        // y = 5x (yellow)
        view.plotFn(x => 5*x, { color: COL_B, lineWidth: 2 });

        // Intersection x=5 always shown
        view.dot(5, 25, { radius: 6, color: COL_RHS });
        view.label('x = 5', 5, 27.5, { color: COL_RHS, font: '12px monospace', align: 'center' });

        // Intersection x=0 — shown only when student picked "both"
        if (C.ch1_showBoth) {
          view.dot(0, 0, { radius: 6, color: COL_RHS });
          view.label('x = 0  (zgubiony!)', 0, -3, { color: COL_RHS, font: '12px monospace', align: 'center' });
        } else {
          // Show a red dashed circle hinting that something's missing near origin
          view.dot(0, 0, { radius: 7, color: COL_LHS });
          view.label('? brak', 0.6, 2, { color: COL_LHS, font: '11px monospace', align: 'left' });
        }

        infoBox('y = x\u00B2', W*0.22, 22, COL_A);
        infoBox('y = 5x',  W*0.50, 22, COL_B);
        infoBox(C.ch1_showBoth ? '2 rozwiązania' : '1 (niepełne)', W*0.80, 22, C.ch1_showBoth ? COL_RHS : COL_LHS);
      },
    },

    // ─── Ch.2: log(x - 2) = 1 — declaring the domain ──────────────
    {
      id: 'ch2_log_domain',
      title:   'Dziedzina logarytmu',
      titleEn: 'Domain of the logarithm',
      desc:    'Rozwiąż $\\log(x - 2) = 1$. Zanim policzysz — zapisz dziedzinę: $x - 2 > 0$, czyli $x > 2$. Przesuwaj kandydata $x$ — zobacz, kiedy wyrażenie $\\log(x-2)$ ma w ogóle sens.',
      descEn:  'Solve $\\log(x - 2) = 1$. Before computing anything — write down the domain: $x - 2 > 0$, i.e. $x > 2$. Drag the candidate $x$ — see when the expression $\\log(x-2)$ even makes sense.',
      drawBackground: 'log',
      init() {},
      predict: {
        question:   'Jaka jest dziedzina równania $\\log(x - 2) = 1$?',
        questionEn: 'What is the domain of the equation $\\log(x - 2) = 1$?',
        options: [
          { label: '$\\mathbb{R}$ — logarytm jest zdefiniowany wszędzie',
            labelEn: '$\\mathbb{R}$ — the logarithm is defined everywhere',
            correct: false,
            why:   'Nie — $\\log$ jest określony tylko dla argumentów DODATNICH. $\\log 0$ i $\\log(-5)$ są nieokreślone.',
            whyEn: 'No — $\\log$ is defined only for POSITIVE arguments. $\\log 0$ and $\\log(-5)$ are undefined.' },
          { label: '$x > 2$ (argument $> 0$)',
            labelEn: '$x > 2$ (argument $> 0$)',
            correct: true,
            why:   'Tak — $x - 2 > 0 \\iff x > 2$. Dopiero na tej dziedzinie wolno liczyć. Rozwiązanie $x = 12$ należy do $D$, więc jest OK.',
            whyEn: 'Yes — $x - 2 > 0 \\iff x > 2$. Only on this domain are we allowed to compute. The solution $x = 12$ lies in $D$, so it’s fine.' },
          { label: '$x \\neq 2$',
            labelEn: '$x \\neq 2$',
            correct: false,
            why:   'To byłaby dziedzina dla $\\dfrac{1}{x-2}$, nie dla $\\log$. Logarytm wymaga $>$, nie tylko $\\neq$.',
            whyEn: 'That would be the domain of $\\dfrac{1}{x-2}$, not of $\\log$. A logarithm needs $>$, not just $\\neq$.' },
        ],
      },
      sliders: [
        { id: 'ch2_x', lbl: 'x', color: COL_A, min: -0.5, max: 13.5, step: 0.5, get: () => C.ch2_x, set: v => {
            C.ch2_x = v;
            if (v <= 2) C.ch2_seenOut = true; else C.ch2_seenIn = true;
          } },
      ],
      pips() {
        return [
          { label: T('widziałeś $x \\leq 2$ (poza $D$)', 'you saw $x \\leq 2$ (outside $D$)'), ok: C.ch2_seenOut },
          { label: T('widziałeś $x > 2$ (w $D$)', 'you saw $x > 2$ (inside $D$)'), ok: C.ch2_seenIn },
          { label: T('wartość $x = 12$ daje $\\log 10 = 1$', 'the value $x = 12$ gives $\\log 10 = 1$'), ok: Math.abs(C.ch2_x - 12) < 0.26 },
        ];
      },
      solved() { return C.ch2_seenOut && C.ch2_seenIn; },
      hints: [
        '① Regula: $\\log_a(\\text{arg})$ istnieje $\\iff$ $\\text{arg} > 0$. Pisz dziedzinę PRZED rozwiązywaniem.',
        '② Tutaj: $x - 2 > 0 \\iff x > 2$. Zaznacz to jako $D = (2, +\\infty)$.',
        '③ Rozwiązanie: $\\log(x-2) = 1 \\iff x - 2 = 10 \\iff x = 12$. Sprawdzamy: $12 > 2$ — OK, $x=12$ należy do $D$, jest prawidłowe.',
      ],
      hintsEn: [
        '① Rule: $\\log_a(\\text{arg})$ exists $\\iff$ $\\text{arg} > 0$. Write the domain BEFORE solving.',
        '② Here: $x - 2 > 0 \\iff x > 2$. Note this as $D = (2, +\\infty)$.',
        '③ Solution: $\\log(x-2) = 1 \\iff x - 2 = 10 \\iff x = 12$. Check: $12 > 2$ — OK, $x = 12$ lies in $D$, so it’s valid.',
      ],
      solvedMsg:   'Dziedzina to "gdzie równanie ma prawo istnieć". Deklarując $D$ przed rozwiązywaniem unikasz pułapek typu "log ujemnego", "dzielenie przez zero" czy "pierwiastek z ujemnego".',
      solvedMsgEn: 'The domain is "where the equation is allowed to exist". Declaring $D$ before solving sidesteps traps like "log of a negative", "division by zero", or "square root of a negative".',
      draw() {
        viewCh2();
        view.drawGrid({ color: 'rgba(255,255,255,0.04)' });

        // Shade domain x > 2
        ctx.save();
        const xp2 = view.toPx(2, 0)[0];
        ctx.fillStyle = 'rgba(131,193,103,0.08)';
        ctx.fillRect(xp2, 0, W - xp2, H);
        ctx.restore();

        // Shade x <= 2 (outside domain)
        ctx.save();
        ctx.fillStyle = 'rgba(255,107,107,0.06)';
        ctx.fillRect(0, 0, xp2, H);
        ctx.restore();

        view.drawAxes({ color: 'rgba(255,255,255,0.2)', arrows: false, labels: true, tickSize: 3 });

        // y = log10(x - 2) — only valid for x > 2
        view.plotFn(x => (x > 2.001) ? Math.log10(x - 2) : NaN, { color: COL_A, lineWidth: 2 });
        // horizontal line y = 1
        view.plotFn(x => 1, { color: COL_B, alpha: 0.6, lineWidth: 1.5, dash: [4, 4] });

        // Vertical asymptote at x=2
        view.segment(2, -2, 2, 3, { color: COL_LHS, alpha: 0.5, lineWidth: 1, dash: [3, 3] });

        // Candidate x marker
        const inDomain = C.ch2_x > 2;
        const yVal = inDomain ? Math.log10(C.ch2_x - 2) : NaN;
        const markerCol = inDomain ? COL_RHS : COL_LHS;
        view.segment(C.ch2_x, -2, C.ch2_x, 3, { color: markerCol, alpha: 0.7, lineWidth: 1.5 });
        if (inDomain) {
          view.dot(C.ch2_x, yVal, { radius: 5, color: markerCol });

        dangerous.forEach((it, i) => {
          const row = 182 + i * 22;
          ctx.fillStyle = COL_LHS; ctx.fillText('\u26A0 ' + it.txt, 52, row);
          ctx.fillStyle = 'rgba(255,255,255,0.45)'; ctx.fillText(it.note, 360, row);
        });

        // User pick indicator
        if (C.ch5Pick) {
          const picked = { a: 'dodawanie', b: 'mnożenie przez (x-1)', c: 'kwadrat', d: 'dzielenie przez x' }[C.ch5Pick];
          const ok = C.ch5Pick === 'a';
          ctx.font = '11px monospace'; ctx.textAlign = 'center';
          ctx.fillStyle = ok ? COL_RHS : COL_LHS;
          ctx.fillText('Wybrane: ' + picked + (ok ? '  (bezpieczne \u2713)' : '  (niebezpieczne \u2717)'), W/2, H - 14);
        }
      },
    },

  ];

  initWarsztat({
    canvasId: 'cv',
    challenges,
    lsKey: 'warsztat:equation_domain:completed',
    wrapup:   'Zasada żelazna: $(1)$ przed rozwiązywaniem napisz DZIEDZINĘ, $(2)$ po rozwiązaniu sprawdź kandydatów w równaniu oryginalnym. Operacje bezpieczne to dodawanie oraz mnożenie przez stałą $c \\neq 0$. Operacje niebezpieczne wymagają ostrożności: dzielenie przez wyrażenie z $x$ może zgubić pierwiastek (te $x$, dla których dzielnik się zeruje), mnożenie przez $(x-a)$ może wprowadzić fałszywy pierwiastek $x = a$, a podnoszenie do kwadratu — fałszywe rozwiązania różniące się znakiem.',
    wrapupEn: 'Cast-iron rule: $(1)$ before solving, write down the DOMAIN; $(2)$ after solving, check the candidates in the original equation. Safe operations are addition and multiplication by a constant $c \\neq 0$. Dangerous operations need care: dividing by an expression containing $x$ can lose a root (those $x$ for which the divisor is zero), multiplying by $(x-a)$ can introduce a false root $x = a$, and squaring can introduce false solutions that differ in sign.',
    onFrame({ ch }) {
      ctx.save();
      ctx.fillStyle = '#0e0e12';
      ctx.fillRect(0, 0, W, H);
      ctx.restore();
    },
  });
}
</script>
