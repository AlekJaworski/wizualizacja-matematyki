<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Twierdzenie Bayesa — Paradoks testu na rzadką chorobę</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 90px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 64px; text-align: right; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  button:hover { background: rgba(255,255,255,.08); }
  button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  #sliders-wrap { min-height: 0; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="qc" width="600" height="310"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>

    <div id="sliders-wrap"></div>

    <div class="nav">
      <button id="qprev">&larr; wstecz</button>
      <div id="qdots"></div>
      <button id="qnext">dalej &rarr;</button>
    </div>
  </div>
</div>

<script>
(function(){
const cv=document.getElementById('qc'),cx=cv.getContext('2d');
const W=600,H=310;
const CYAN='#58C4DD',ORANGE='#FF6B35',YELLOW='#FFD166',GREEN='#83C167',PINK='#E07090',PURPLE='#9D7FEA';
let stageIdx=0;

const vals={};
let animProgress=0; // 0..1 for grid rearrangement animation
let prevStage=-1;

// Seeded random for stable assignments
function seededRandom(seed){let s=seed;return function(){s=(s*16807+0)%2147483647;return(s-1)/2147483646;}}

const sliderDef=[
  {id:'pop',lbl:'Populacja N',min:200,max:2000,step:100,val:1000,color:CYAN},
  {id:'prev',lbl:'Chorobowość',min:0.001,max:0.05,step:0.001,val:0.01,color:PINK},
  {id:'sens',lbl:'Czułość testu',min:0.80,max:1.00,step:0.01,val:0.95,color:YELLOW},
  {id:'spec',lbl:'Swoistość',min:0.80,max:1.00,step:0.01,val:0.95,color:GREEN}
];

const stages=[
  { title:'Populacja',
    desc:'Każda kropka to jedna osoba. Czerwone = naprawdę chore. Zmień chorobowość, żeby zobaczyć jak rzadka jest choroba.',
    sliders:sliderDef},
  { title:'Wyniki testu',
    desc:'Testujemy wszystkich. Kropki przesuwają się do tabeli 2×2: chorzy/zdrowi × wynik +/−. Zwróć uwagę na fałszywe alarmy!',
    sliders:sliderDef},
  { title:'Paradoks ujawniony',
    desc:'Podświetl kolumnę „test +" — to Twój nowy świat po otrzymaniu wyniku. P(chory|+) jest zaskakująco niskie!',
    sliders:sliderDef},
  { title:'Dlaczego powtórny test?',
    desc:'Po powtórzeniu testu wśród osób z wynikiem + „chorobowość" w tej grupie jest znacznie wyższa, więc Bayes działa na Twoją korzyść.',
    sliders:sliderDef}
];

// ── Compute stats ──────────────────────────────────────────────
function getStats(){
  const N=vals['pop']||1000;
  const prev=vals['prev']||0.01;
  const sens=vals['sens']||0.95;
  const spec=vals['spec']||0.95;

  const sick=Math.round(N*prev);
  const healthy=N-sick;
  const tp=Math.round(sick*sens);
  const fn_=sick-tp;
  const tn=Math.round(healthy*spec);
  const fp=healthy-tn;

  const totalPos=tp+fp;
  const ppv=totalPos>0?tp/totalPos:0;

  // Retest among positives
  const retest_tp=Math.round(tp*sens);
  const retest_fp=Math.round(fp*(1-spec));
  const retest_totalPos=retest_tp+retest_fp;
  const retest_ppv=retest_totalPos>0?retest_tp/retest_totalPos:0;

  return {N,prev,sens,spec,sick,healthy,tp,fn_,tn,fp,totalPos,ppv,retest_tp,retest_fp,retest_totalPos,retest_ppv};
}

// ── Assign categories to each person ───────────────────────────
function getCategories(s){
  const rng=seededRandom(42);
  const indices=Array.from({length:s.N},(_,i)=>i);
  for(let i=indices.length-1;i>0;i--){
    const j=Math.floor(rng()*((i+1)|0));
    [indices[i],indices[j]]=[indices[j],indices[i]];
  }
  // 0=TN, 1=FP, 2=FN, 3=TP
  const cat=new Array(s.N);
  for(let i=0;i<s.N;i++){
    const idx=indices[i];
    if(i<s.sick) cat[idx]=(i<s.tp)?3:2;
    else cat[idx]=(i-s.sick<s.fp)?1:0;
  }
  return cat;
}

// ── Grid positions ─────────────────────────────────────────────
// Random grid: simple row-major in full canvas
function randomGridPos(i, N){
  const cols=Math.ceil(Math.sqrt(N*W/H));
  const rows=Math.ceil(N/cols);
  const gapX=(W-20)/cols;
  const gapY=(H-30)/rows;
  const col=i%cols, row=Math.floor(i/cols);
  return {x:10+gapX/2+col*gapX, y:18+gapY/2+row*gapY};
}

// 2x2 table grid: sick/healthy rows, test+/test- columns
function tableGridPos(i, cat, s){
  // Quadrants: TL=TP(3), TR=FN(2), BL=FP(1), BR=TN(0)
  const quadCounts={3:s.tp, 2:s.fn_, 1:s.fp, 0:s.tn};
  const c=cat[i];

  // Count how many of same category come before index i
  let rank=0;
  for(let j=0;j<i;j++) if(cat[j]===c) rank++;

  const count=quadCounts[c];
  if(count===0) return randomGridPos(i, s.N);

  // Layout: left half = test+, right half = test-
  // Top = sick, bottom = healthy
  const isTestPos=(c===3||c===1);
  const isSick=(c===3||c===2);

  const margin=6;
  const labelH=16; // space for row/col labels
  const gap=4; // gap between quadrants
  const halfW=(W-2*margin-gap-labelH)/2;
  const halfH=(H-2*margin-gap-labelH)/2;

  const qx=margin+labelH+(isTestPos?0:halfW+gap);
  const qy=margin+labelH+(isSick?0:halfH+gap);

  // Fill quadrant with dots
  const aspect=halfW/halfH;
  const qCols=Math.max(1,Math.ceil(Math.sqrt(count*aspect)));
  const qRows=Math.max(1,Math.ceil(count/qCols));
  const dotGapX=halfW/qCols;
  const dotGapY=halfH/qRows;
  const col=rank%qCols, row=Math.floor(rank/qCols);

  return {x:qx+dotGapX/2+col*dotGapX, y:qy+dotGapY/2+row*dotGapY};
}

// ── Drawing helpers ────────────────────────────────────────────
function clear(){cx.fillStyle='#0e0e12';cx.fillRect(0,0,W,H);}

function roundRect(x,y,w,h,r){
  cx.beginPath();cx.moveTo(x+r,y);cx.lineTo(x+w-r,y);cx.quadraticCurveTo(x+w,y,x+w,y+r);
  cx.lineTo(x+w,y+h-r);cx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  cx.lineTo(x+r,y+h);cx.quadraticCurveTo(x,y+h,x,y+h-r);
  cx.lineTo(x,y+r);cx.quadraticCurveTo(x,y,x+r,y);cx.closePath();
}

function lerp(a,b,t){return a+(b-a)*t;}
function ease(t){return t<.5?4*t*t*t:1-Math.pow(-2*t+2,3)/2;}

function dotColor(cat, stageOverride){
  const st=stageOverride!==undefined?stageOverride:stageIdx;
  if(st===0){
    return (cat===3||cat===2)?PINK:'rgba(255,255,255,0.15)';
  }
  // Stages 1+: color by quadrant
  if(cat===3) return GREEN;   // TP
  if(cat===2) return PURPLE;  // FN
  if(cat===1) return ORANGE;  // FP
  return 'rgba(255,255,255,0.12)'; // TN
}

// ── Draw 2x2 table frame ──────────────────────────────────────
function drawTableFrame(s, highlightCol){
  const margin=6, labelH=16, gap=4;
  const halfW=(W-2*margin-gap-labelH)/2;
  const halfH=(H-2*margin-gap-labelH)/2;
  const lx=margin+labelH, ly=margin+labelH;

  // Column headers
  cx.font='bold 11px monospace';cx.textAlign='center';
  cx.fillStyle=highlightCol==='pos'?YELLOW:'rgba(255,255,255,0.5)';
  cx.fillText('Test +',lx+halfW/2,margin+11);
  cx.fillStyle=highlightCol==='neg'?'rgba(255,255,255,0.6)':'rgba(255,255,255,0.3)';
  cx.fillText('Test \u2212',lx+halfW+gap+halfW/2,margin+11);

  // Row headers
  cx.save();cx.translate(margin+8,ly+halfH/2);cx.rotate(-Math.PI/2);
  cx.fillStyle=PINK;cx.textAlign='center';cx.fillText('Chorzy',0,0);
  cx.restore();
  cx.save();cx.translate(margin+8,ly+halfH+gap+halfH/2);cx.rotate(-Math.PI/2);
  cx.fillStyle='rgba(255,255,255,0.4)';cx.textAlign='center';cx.fillText('Zdrowi',0,0);
  cx.restore();

  // Grid lines
  cx.strokeStyle='rgba(255,255,255,0.08)';cx.lineWidth=1;
  // Vertical divider
  cx.beginPath();cx.moveTo(lx+halfW+gap/2,ly);cx.lineTo(lx+halfW+gap/2,ly+2*halfH+gap);cx.stroke();
  // Horizontal divider
  cx.beginPath();cx.moveTo(lx,ly+halfH+gap/2);cx.lineTo(lx+2*halfW+gap,ly+halfH+gap/2);cx.stroke();

  // Highlight column
  if(highlightCol==='pos'){
    cx.fillStyle='rgba(255,209,102,0.06)';
    cx.fillRect(lx,ly,halfW,2*halfH+gap);
  }

  // Quadrant counts
  cx.font='bold 10px monospace';cx.textAlign='right';
  // TP
  cx.fillStyle=GREEN;
  cx.fillText('TP: '+s.tp,lx+halfW-4,ly+halfH-4);
  // FN
  cx.fillStyle=PURPLE;
  cx.fillText('FN: '+s.fn_,lx+2*halfW+gap-4,ly+halfH-4);
  // FP
  cx.fillStyle=ORANGE;
  cx.fillText('FP: '+s.fp,lx+halfW-4,ly+2*halfH+gap-4);
  // TN
  cx.fillStyle='rgba(255,255,255,0.3)';
  cx.fillText('PN: '+s.tn,lx+2*halfW+gap-4,ly+2*halfH+gap-4);
}

// ── Stage 0: Population ────────────────────────────────────────
function drawStage0(){
  const s=getStats();
  const cat=getCategories(s);
  const dotR=Math.min(Math.floor(Math.sqrt(W*H/s.N)/2.8),5);

  for(let i=0;i<s.N;i++){
    const pos=randomGridPos(i,s.N);
    cx.beginPath();cx.arc(pos.x,pos.y,dotR,0,Math.PI*2);
    cx.fillStyle=dotColor(cat[i],0);cx.fill();
  }

  // Legend
  cx.font='11px monospace';cx.textAlign='left';
  cx.fillStyle=PINK;
  cx.fillText('\u25cf Chorzy ('+s.sick+')',10,H-8);
  cx.fillStyle='rgba(255,255,255,0.35)';
  cx.fillText('\u25cf Zdrowi ('+s.healthy+')',140,H-8);
}

// ── Stage 1: Animate to 2x2 table ─────────────────────────────
function drawStage1(){
  const s=getStats();
  const cat=getCategories(s);
  const dotR=Math.min(Math.floor(Math.sqrt(W*H/s.N)/2.8),5);
  const t=ease(Math.min(1,animProgress));

  for(let i=0;i<s.N;i++){
    const from=randomGridPos(i,s.N);
    const to=tableGridPos(i,cat,s);
    const x=lerp(from.x,to.x,t);
    const y=lerp(from.y,to.y,t);

    cx.beginPath();cx.arc(x,y,dotR,0,Math.PI*2);
    // Fade from population colors to test-result colors
    const c0=dotColor(cat[i],0);
    const c1=dotColor(cat[i],1);
    cx.fillStyle=t<0.3?c0:c1;
    cx.fill();
  }

  if(t>0.5) drawTableFrame(s);
}

// ── Stage 2: Highlight test+ column (the paradox) ──────────────
function drawStage2(){
  const s=getStats();
  const cat=getCategories(s);
  const dotR=Math.min(Math.floor(Math.sqrt(W*H/s.N)/2.8),5);

  // Draw table frame with highlighted positive column
  drawTableFrame(s,'pos');

  for(let i=0;i<s.N;i++){
    const pos=tableGridPos(i,cat,s);
    const c=cat[i];
    const isPos=(c===3||c===1);

    cx.beginPath();cx.arc(pos.x,pos.y,dotR,0,Math.PI*2);
    cx.globalAlpha=isPos?1:0.15;
    cx.fillStyle=dotColor(c,1);
    cx.fill();
    cx.globalAlpha=1;
  }

  // Bayes formula overlay on right
  const ox=W-220, oy=40;
  cx.fillStyle='rgba(14,14,18,0.85)';
  roundRect(ox-10,oy-15,225,120,8);cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=0.5;
  roundRect(ox-10,oy-15,225,120,8);cx.stroke();

  cx.font='bold 12px monospace';cx.textAlign='left';
  cx.fillStyle=CYAN;
  cx.fillText('Twierdzenie Bayesa',ox,oy);

  cx.font='11px monospace';
  cx.fillStyle=GREEN;cx.fillText('TP: '+s.tp+' (wykryci chorzy)',ox,oy+22);
  cx.fillStyle=ORANGE;cx.fillText('FP: '+s.fp+' (fałszywy alarm)',ox,oy+38);

  cx.strokeStyle='rgba(255,255,255,0.15)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(ox,oy+46);cx.lineTo(ox+200,oy+46);cx.stroke();

  cx.fillStyle='rgba(255,255,255,0.5)';
  cx.fillText('Wszystkich +: '+s.totalPos,ox,oy+60);

  cx.fillStyle=YELLOW;cx.font='bold 15px monospace';
  cx.fillText('P(chory|+) = '+(s.ppv*100).toFixed(1)+'%',ox,oy+85);

  cx.fillStyle='rgba(255,255,255,0.4)';cx.font='10px monospace';
  if(s.ppv<0.5){
    cx.fillText('Większość wyników + to fałszywe alarmy!',ox,oy+102);
  }
}

// ── Stage 3: Retest ────────────────────────────────────────────
function drawStage3(){
  const s=getStats();
  const cat=getCategories(s);
  const dotR=Math.min(Math.floor(Math.sqrt(W*H/s.N)/2.8),5);

  drawTableFrame(s,'pos');

  // Among positives, assign retest results
  const tpList=[], fpList=[];
  for(let i=0;i<s.N;i++){
    if(cat[i]===3) tpList.push(i);
    if(cat[i]===1) fpList.push(i);
  }

  // Determine retest result for each person
  const retestPos=new Set();
  for(let j=0;j<Math.min(s.retest_tp,tpList.length);j++) retestPos.add(tpList[j]);
  for(let j=0;j<Math.min(s.retest_fp,fpList.length);j++) retestPos.add(fpList[j]);

  for(let i=0;i<s.N;i++){
    const pos=tableGridPos(i,cat,s);
    const c=cat[i];
    const isFirstPos=(c===3||c===1);

    let alpha=1, color=dotColor(c,1);

    if(!isFirstPos){
      alpha=0.1;
    } else if(!retestPos.has(i)){
      // Was positive, now negative on retest → dim
      alpha=0.2;
      color='rgba(255,255,255,0.15)';
    }
    // Still positive on retest → bright

    cx.beginPath();cx.arc(pos.x,pos.y,dotR,0,Math.PI*2);
    cx.globalAlpha=alpha;
    cx.fillStyle=color;
    cx.fill();
    cx.globalAlpha=1;
  }

  // Stats overlay
  const ox=W-225, oy=35;
  cx.fillStyle='rgba(14,14,18,0.85)';
  roundRect(ox-10,oy-15,230,155,8);cx.fill();
  cx.strokeStyle='rgba(255,255,255,0.1)';cx.lineWidth=0.5;
  roundRect(ox-10,oy-15,230,155,8);cx.stroke();

  cx.font='bold 12px monospace';cx.textAlign='left';
  cx.fillStyle=CYAN;cx.fillText('Po powtórnym teście',ox,oy);

  cx.font='11px monospace';
  cx.fillStyle='rgba(255,255,255,0.5)';
  cx.fillText('Wyników + z 1. testu: '+s.totalPos,ox,oy+20);

  cx.fillStyle=PINK;
  cx.fillText('Chorych wśród +: '+(s.ppv*100).toFixed(1)+'%',ox,oy+38);
  cx.fillStyle='rgba(255,255,255,0.3)';
  cx.fillText('(było '+(s.prev*100).toFixed(1)+'% w populacji)',ox,oy+53);

  cx.fillStyle=GREEN;cx.fillText('Powtórny TP: '+s.retest_tp,ox,oy+73);
  cx.fillStyle=ORANGE;cx.fillText('Powtórny FP: '+s.retest_fp,ox,oy+88);

  cx.strokeStyle='rgba(255,255,255,0.12)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(ox,oy+95);cx.lineTo(ox+210,oy+95);cx.stroke();

  cx.fillStyle=YELLOW;cx.font='bold 14px monospace';
  cx.fillText('P(chory|++) = '+(s.retest_ppv*100).toFixed(1)+'%',ox,oy+113);

  // Comparison bars
  const barX=ox, barY=oy+125, barW=200, barH=10;
  cx.fillStyle='rgba(255,255,255,0.06)';
  roundRect(barX,barY,barW,barH,3);cx.fill();
  cx.fillStyle='rgba(255,209,102,0.35)';
  roundRect(barX,barY,barW*s.ppv,barH,3);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.25)';cx.font='9px monospace';cx.textAlign='right';
  cx.fillText('1. test '+(s.ppv*100).toFixed(0)+'%',barX-4,barY+8);

  cx.fillStyle='rgba(255,255,255,0.06)';
  roundRect(barX,barY+14,barW,barH,3);cx.fill();
  cx.fillStyle='rgba(131,193,103,0.5)';
  roundRect(barX,barY+14,barW*s.retest_ppv,barH,3);cx.fill();
  cx.fillStyle='rgba(255,255,255,0.25)';
  cx.fillText('2. test '+(s.retest_ppv*100).toFixed(0)+'%',barX-4,barY+22);
}

// ── Slider management ──────────────────────────────────────────
function buildSliders(idx){
  const wrap=document.getElementById('sliders-wrap');
  const s=stages[idx];
  if(!s.sliders||!s.sliders.length){wrap.innerHTML='';return;}
  let html='<div class="sliders">';
  s.sliders.forEach(sl=>{
    if(vals[sl.id]===undefined) vals[sl.id]=sl.val;
    html+=`<div class="slider-row">
      <span class="lbl" style="color:${sl.color}">${sl.lbl}</span>
      <input type="range" id="${sl.id}" min="${sl.min}" max="${sl.max}" step="${sl.step}" value="${vals[sl.id]}">
      <span class="val" id="${sl.id}v" style="color:${sl.color}">${fmtVal(vals[sl.id],sl.step)}</span>
    </div>`;
  });
  html+='</div>';
  wrap.innerHTML=html;
  s.sliders.forEach(sl=>{
    const inp=document.getElementById(sl.id);
    inp.addEventListener('input',function(){
      vals[sl.id]=+this.value;
      document.getElementById(sl.id+'v').textContent=fmtVal(+this.value,sl.step);
    });
  });
}

function fmtVal(v,step){
  if(step>=1) return Math.round(v).toString();
  if(step>=0.01) return (v*100).toFixed(0)+'%';
  return (v*100).toFixed(1)+'%';
}

// ── Navigation ─────────────────────────────────────────────────
function renderDots(){
  const dc=document.getElementById('qdots');
  dc.innerHTML=stages.map((_,i)=>
    `<span class="dot${i===stageIdx?' active':''}" data-i="${i}"></span>`
  ).join('');
  dc.querySelectorAll('span').forEach(s=>s.addEventListener('click',()=>goTo(+s.dataset.i)));
}

function goTo(idx){
  idx=Math.max(0,Math.min(stages.length-1,idx));
  prevStage=stageIdx;
  stageIdx=idx;
  animProgress=0;
  document.getElementById('qf').textContent=stages[idx].title;
  document.getElementById('qd').textContent=stages[idx].desc;
  document.getElementById('qprev').disabled=idx===0;
  document.getElementById('qnext').disabled=idx===stages.length-1;
  buildSliders(idx);
  renderDots();
}

document.getElementById('qprev').addEventListener('click',()=>goTo(stageIdx-1));
document.getElementById('qnext').addEventListener('click',()=>goTo(stageIdx+1));

// ── Main render loop ───────────────────────────────────────────
function tick(){
  // Advance animation
  if(animProgress<1) animProgress=Math.min(1,animProgress+0.018);

  clear();

  switch(stageIdx){
    case 0: drawStage0(); break;
    case 1: drawStage1(); break;
    case 2: drawStage2(); break;
    case 3: drawStage3(); break;
  }

  requestAnimationFrame(tick);
}

goTo(0);
tick();
})();
</script>
</body>
</html>
