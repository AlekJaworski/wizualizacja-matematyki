<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ciągi rekurencyjne — Eksplorator</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 52px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }
  .ctrls { display: flex; gap: 8px; margin-bottom: 8px; flex-wrap: wrap; }
  .ctrls button { background: rgba(88,196,221,.08); border: 1px solid rgba(88,196,221,.28); color: #58C4DD; padding: 5px 10px; font-size: 12px; border-radius: 5px; cursor: pointer; font-family: monospace; }
  .ctrls button:hover { background: rgba(88,196,221,.18); }
  .ctrls button.active { background: rgba(88,196,221,.22); border-color: rgba(88,196,221,.6); }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  .nav button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  .nav button:hover { background: rgba(255,255,255,.08); }
  .nav button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="600" height="340"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>
    <div id="ctrls-wrap"></div>
    <div id="sliders-wrap"></div>
    <div class="nav">
      <button id="qprev">&larr;</button>
      <div id="qdots"></div>
      <button id="qnext">&rarr;</button>
    </div>
  </div>
</div>

<script type="module">
(function(){
  const cv = document.getElementById('cv');
  const cx = cv.getContext('2d');
  const W = 600, H = 340;

  const LANG = new URLSearchParams(window.location.search).get('lang') || 'pl';
  const T = (pl, en) => LANG === 'pl' ? pl : en;

  const COL_CYAN  = '#58C4DD';
  const COL_BLUE  = '#4a9eff';
  const COL_ORANGE= '#FF6B35';
  const COL_GREEN = '#83C167';
  const COL_YELLOW= '#FFD166';
  const COL_PINK  = '#E07090';
  const COL_PURP  = '#C080FF';

  // ── State shared across stages ─────────────────────────────────
  let stage = 0;
  let animT = 0;

  // stages 1–3: indexed from 1. a[1], a[2], then a[n+2] = rule(a[n+1], a[n]).
  // "revealed" = how many terms are shown (base + computed steps).
  // Each stage manages its own revealed counter via the stepBtn.
  let a1 = 1, a2 = 1;                 // base cases for stage 1 & 2
  let revealed = 2;                    // number of terms currently shown

  // Stage 3: rule choice
  const RULES = [
    { id: 'fib',  labelPl: 'aₙ₊₂ = aₙ₊₁ + aₙ',     labelEn: 'aₙ₊₂ = aₙ₊₁ + aₙ',     fn: (p, pp) => p + pp,        tag: '+' },
    { id: 'lin',  labelPl: 'aₙ₊₂ = 2aₙ₊₁ − aₙ',    labelEn: 'aₙ₊₂ = 2aₙ₊₁ − aₙ',    fn: (p, pp) => 2 * p - pp,    tag: '−' },
    { id: 'prod', labelPl: 'aₙ₊₂ = aₙ₊₁ · aₙ',     labelEn: 'aₙ₊₂ = aₙ₊₁ · aₙ',     fn: (p, pp) => p * pp,        tag: '·' },
    { id: 'sub',  labelPl: 'aₙ₊₂ = aₙ₊₁ − aₙ',     labelEn: 'aₙ₊₂ = aₙ₊₁ − aₙ',     fn: (p, pp) => p - pp,        tag: '−' },
  ];
  let ruleIdx = 0;

  // ── Helpers ────────────────────────────────────────────────────
  function clear() {
    cx.fillStyle = '#0e0e12';
    cx.fillRect(0, 0, W, H);
  }

  function dot(sx, sy, r, col, alpha) {
    cx.save();
    if (alpha !== undefined) cx.globalAlpha = alpha;
    cx.fillStyle = col;
    cx.beginPath();
    cx.arc(sx, sy, r, 0, Math.PI * 2);
    cx.fill();
    cx.restore();
  }

  function fmt(v) {
    if (!isFinite(v)) return '∞';
    if (Math.abs(v) >= 1e6) return v.toExponential(1);
    if (Math.abs(v - Math.round(v)) < 0.01) return Math.round(v).toString();
    return v.toFixed(1);
  }

  function roundRect(ctx, x, y, w, h, r) {
    ctx.beginPath();
    ctx.moveTo(x+r,y); ctx.lineTo(x+w-r,y); ctx.quadraticCurveTo(x+w,y,x+w,y+r);
    ctx.lineTo(x+w,y+h-r); ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    ctx.lineTo(x+r,y+h); ctx.quadraticCurveTo(x,y+h,x,y+h-r);
    ctx.lineTo(x,y+r); ctx.quadraticCurveTo(x,y,x+r,y);
    ctx.closePath();
  }

  function infoBox(text, sx, sy, col, alpha) {
    cx.save();
    cx.font = '12px monospace';
    if (alpha !== undefined) cx.globalAlpha = alpha;
    const w = cx.measureText(text).width + 16;
    cx.fillStyle = 'rgba(14,14,18,0.88)';
    cx.strokeStyle = col + '50';
    cx.lineWidth = 1;
    roundRect(cx, sx - w/2, sy - 12, w, 24, 5);
    cx.fill(); cx.stroke();
    cx.fillStyle = col;
    cx.textAlign = 'center';
    cx.fillText(text, sx, sy + 4);
    cx.restore();
  }

  /**
   * Compute terms a[1..N] from base cases and rule. Clamped to a safe range
   * so explosive geometric/product sequences don't crash the draw loop.
   */
  function computeTerms(base1, base2, N, rule) {
    const a = [0, base1, base2];
    for (let n = 3; n <= N; n++) {
      const next = rule(a[n-1], a[n-2]);
      a.push(Math.max(-1e9, Math.min(1e9, next)));
    }
    return a;
  }

  /**
   * Draw a horizontal number line with index labels, plus vertical bars
   * for each revealed term. Returns screen coordinates so stages can
   * draw arrows on top.
   */
  function drawLine(terms, revealedCount, opts) {
    const {
      color = COL_CYAN,
      yTop = 80, yBase = H - 46,
      xPad = 56, indexStart = 1, maxN = 10,
      highlightLast = true,
    } = opts || {};

    const shown = terms.slice(indexStart, indexStart + maxN);
    const valsClamped = shown.map(v => Math.max(-200, Math.min(200, v || 0)));
    let yMin = Math.min(...valsClamped, 0);
    let yMax = Math.max(...valsClamped, 1);
    if (yMax - yMin < 1) yMax = yMin + 1;
    const yRange = yMax - yMin;
    yMin -= yRange * 0.15; yMax += yRange * 0.25;
    const scY = (yBase - yTop) / (yMax - yMin);
    const scX = (W - xPad - 30) / (maxN + 1);
    const zeroY = yBase - (0 - yMin) * scY;

    // Zero line
    cx.save();
    cx.strokeStyle = 'rgba(255,255,255,0.08)';
    cx.lineWidth = 0.7;
    cx.beginPath();
    cx.moveTo(xPad, zeroY);
    cx.lineTo(W - 15, zeroY);
    cx.stroke();
    cx.restore();

    const positions = [];
    for (let i = 0; i < maxN; i++) {
      const n = indexStart + i;
      const val = terms[n];
      const xp = xPad + (i + 1) * scX;
      const clamped = Math.max(-200, Math.min(200, val || 0));
      const yp = yBase - (clamped - yMin) * scY;
      positions.push({ n, xp, yp, val, zeroY });

      // n label on axis
      cx.save();
      cx.font = '10px monospace';
      cx.fillStyle = 'rgba(255,255,255,0.4)';
      cx.textAlign = 'center';
      cx.fillText('n=' + n, xp, yBase + 16);
      cx.restore();

      const isRevealed = i < revealedCount;
      if (!isRevealed || val === undefined) continue;

      const isNewest = highlightLast && (i === revealedCount - 1);
      const appear = isNewest ? Math.min(1, animT / 22) : 1;

      // Bar from zero to value
      const barW = Math.min(scX * 0.5, 28);
      cx.save();
      cx.globalAlpha = appear;
      cx.fillStyle = color + '20';
      cx.strokeStyle = color + '50';
      cx.lineWidth = 1;
      const barTop = Math.min(yp, zeroY);
      const barH = Math.abs(yp - zeroY);
      if (barH > 1) {
        roundRect(cx, xp - barW/2, barTop, barW, barH, 3);
        cx.fill(); cx.stroke();
      }
      cx.restore();

      dot(xp, yp, isNewest ? 5.5 : 4.5, color, appear);

      // Value label
      cx.save();
      cx.globalAlpha = appear;
      cx.font = isNewest ? 'bold 11px monospace' : '10px monospace';
      cx.fillStyle = color;
      cx.textAlign = 'center';
      const labelY = val >= 0 ? yp - 9 : yp + 16;
      cx.fillText(fmt(val), xp, labelY);
      cx.restore();
    }

    return positions;
  }

  /**
   * Draw an arc arrow from (x1,y1) to (x2,y2).
   * Clean semicircle whose diameter is the AB segment — size scales with
   * distance (predictable: distance 1 = small arc, distance 2 = big arc).
   * Bulges to the left of the A→B direction (above the line when going right).
   */
  function arrow(x1, y1, x2, y2, col, alpha) {
    cx.save();
    cx.globalAlpha = alpha === undefined ? 0.85 : alpha;
    cx.strokeStyle = col;
    cx.fillStyle = col;
    cx.lineWidth = 1.4;

    const mx = (x1 + x2) / 2, my = (y1 + y2) / 2;
    const dx = x2 - x1, dy = y2 - y1;
    const L = Math.sqrt(dx*dx + dy*dy);
    if (L < 4) { cx.restore(); return; }
    const r = L / 2;
    // Unit perpendicular pointing "left of direction" (visually above when going right)
    const perpX = dy / L;
    const perpY = -dx / L;

    // Stop arc slightly before the endpoint so the head doesn't overlap the target
    const gap = Math.min(8, r * 0.25);
    const endT = Math.PI - gap / r;

    const steps = 28;
    cx.beginPath();
    for (let i = 0; i <= steps; i++) {
      const t = (i / steps) * endT;
      const cT = Math.cos(t), sT = Math.sin(t);
      const px = mx + cT * (x1 - mx) + sT * r * perpX;
      const py = my + cT * (y1 - my) + sT * r * perpY;
      if (i === 0) cx.moveTo(px, py); else cx.lineTo(px, py);
    }
    cx.stroke();

    // Arrowhead at (x2, y2). Tangent at t=π is −perp (direction of motion into B).
    const ux = -perpX, uy = -perpY;
    const ah = 6;
    const baseX = x2 - ux * ah;
    const baseY = y2 - uy * ah;
    cx.beginPath();
    cx.moveTo(x2, y2);
    cx.lineTo(baseX + uy * (ah * 0.5), baseY - ux * (ah * 0.5));
    cx.lineTo(baseX - uy * (ah * 0.5), baseY + ux * (ah * 0.5));
    cx.closePath();
    cx.fill();
    cx.restore();
  }

  /** Render a number as Unicode subscript, e.g. 12 → "₁₂". */
  function sub(n) {
    const S = '₀₁₂₃₄₅₆₇₈₉';
    return String(n).replace(/\d/g, d => S[+d]);
  }

  // ── Stages ─────────────────────────────────────────────────────
  const stages = [
    // ───────────────────────────────────────────────────────────
    // Stage 1: What is a recursive sequence?
    {
      title: () => T('Ciąg rekurencyjny — definiowany przez poprzedniki',
                     'Recursive sequence — defined by predecessors'),
      desc: () => T(
        'Reguła aₙ₊₂ = aₙ₊₁ + aₙ mówi, jak policzyć kolejny wyraz, mając dwa poprzednie. Dwa pierwsze wyrazy (a₁ = 1, a₂ = 1) podajemy jawnie — bez nich nie da się ruszyć. Kliknij „Policz kolejny", żeby zobaczyć, jak podstawienie tworzy następny wyraz: strzałki pokazują, które dwa wyrazy wchodzą do reguły.',
        'The rule aₙ₊₂ = aₙ₊₁ + aₙ tells you how to compute the next term from the two previous ones. The first two (a₁ = 1, a₂ = 1) are given — without them nothing is defined. Press "Compute next" to see how substitution builds each term: the arrows show which two values feed into the rule.'
      ),
      ctrls: [
        { id: 'next', labelPl: '▶ Policz kolejny', labelEn: '▶ Compute next',
          onClick: () => { if (revealed < 10) { revealed++; animT = 0; } } },
        { id: 'reset', labelPl: '↺ Reset', labelEn: '↺ Reset',
          onClick: () => { revealed = 2; animT = 0; } },
      ],
      onEnter: () => { a1 = 1; a2 = 1; ruleIdx = 0; revealed = 2; animT = 0; },
      draw() {
        const rule = RULES[0].fn;
        const terms = computeTerms(a1, a2, 10, rule);
        const positions = drawLine(terms, revealed, { color: COL_CYAN });

        // Arrows for the last revealed term (n >= 3)
        if (revealed >= 3) {
          const lastIdx = revealed - 1; // 0-based into positions
          const newest = positions[lastIdx];
          const p1 = positions[lastIdx - 1];
          const p2 = positions[lastIdx - 2];
          const alpha = Math.min(1, animT / 22) * 0.85;
          arrow(p2.xp, p2.yp, newest.xp, newest.yp, COL_YELLOW, alpha * 0.9);
          arrow(p1.xp, p1.yp, newest.xp, newest.yp, COL_GREEN, alpha);

          // Substitution pill: a_{n+2} = a_{n+1} + a_n with actual numbers
          cx.save();
          cx.globalAlpha = alpha;
          const txt = fmt(newest.val) + ' = ' + fmt(p1.val) + ' + ' + fmt(p2.val);
          infoBox(txt, W / 2, 26, COL_CYAN);
          cx.restore();
        } else {
          infoBox(T('a₁ = 1, a₂ = 1 — reguła: aₙ₊₂ = aₙ₊₁ + aₙ',
                    'a₁ = 1, a₂ = 1 — rule: aₙ₊₂ = aₙ₊₁ + aₙ'),
                  W / 2, 26, COL_CYAN);
        }

        // Status line
        cx.save();
        cx.font = '11px monospace';
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.textAlign = 'center';
        cx.fillText(T('policzone wyrazy: ', 'terms computed: ') + revealed + ' / 10', W / 2, H - 16);
        cx.restore();
      }
    },

    // ───────────────────────────────────────────────────────────
    // Stage 2: Change base cases
    {
      title: () => T('Zmień punkt startu — ten sam wzór, inny ciąg',
                     'Change the base — same rule, different sequence'),
      desc: () => T(
        'Reguła aₙ₊₂ = aₙ₊₁ + aₙ pozostaje ta sama. Zmieniaj a₁ i a₂ suwakami i patrz, jak cały ciąg się przesuwa. Wniosek: sama reguła nie wystarczy — reguła razem z warunkami początkowymi jednoznacznie definiują ciąg. Spróbuj a₁ = 2, a₂ = 1 — to ciąg Lucasa.',
        'The rule aₙ₊₂ = aₙ₊₁ + aₙ is fixed. Drag a₁ and a₂ and watch the whole sequence shift. Takeaway: the rule alone is not enough — rule together with base cases defines the sequence. Try a₁ = 2, a₂ = 1 — that is the Lucas numbers.'
      ),
      sliders: [
        { id: 'a1', lbl: 'a₁', color: COL_BLUE,  min: -3, max: 5, step: 1, get: () => a1, set: v => { a1 = v; } },
        { id: 'a2', lbl: 'a₂', color: COL_GREEN, min: -3, max: 5, step: 1, get: () => a2, set: v => { a2 = v; } },
      ],
      onEnter: () => { a1 = 1; a2 = 1; ruleIdx = 0; },
      draw() {
        const rule = RULES[0].fn;
        const terms = computeTerms(a1, a2, 10, rule);
        drawLine(terms, 10, { color: COL_CYAN, highlightLast: false });

        // Formula pill with current base
        const eqTxt = 'a₁=' + fmt(a1) + ', a₂=' + fmt(a2) + '  →  aₙ₊₂ = aₙ₊₁ + aₙ';
        infoBox(eqTxt, W / 2, 26, COL_CYAN);

        // Side-by-side classic sequences hint
        cx.save();
        cx.font = '10px monospace';
        cx.fillStyle = 'rgba(255,255,255,0.45)';
        cx.textAlign = 'center';
        let tag = '';
        if (a1 === 1 && a2 === 1)      tag = T('Fibonacci', 'Fibonacci');
        else if (a1 === 2 && a2 === 1) tag = T('Lucas', 'Lucas');
        else if (a1 === 0 && a2 === 0) tag = T('ciąg zerowy', 'zero sequence');
        if (tag) cx.fillText('— ' + tag + ' —', W / 2, H - 16);
        cx.restore();
      }
    },

    // ───────────────────────────────────────────────────────────
    // Stage 3: Change the rule
    {
      title: () => T('Zmień regułę — rekurencja to nie tylko suma',
                     'Change the rule — recursion is more than addition'),
      desc: () => T(
        'Ciągi rekurencyjne różnią się regułą kombinowania poprzednich wyrazów. Dla a₁ = a₂ = 1 spróbuj kolejno: sumy (Fibonacci), 2aₙ₊₁ − aₙ (ciąg liniowy — wyjdzie stała), iloczynu, różnicy. Zauważ, jak różnie rosną — od liniowego przez wykładniczy po oscylujący.',
        'Recursive sequences differ by how they combine previous terms. For a₁ = a₂ = 1, cycle through: sum (Fibonacci), 2aₙ₊₁ − aₙ (linear — constant), product, difference. Notice how differently they grow — linear, exponential, oscillating.'
      ),
      ctrls: RULES.map((r, i) => ({
        id: 'r_' + i,
        labelPl: r.labelPl,
        labelEn: r.labelEn,
        isActive: () => ruleIdx === i,
        onClick: () => { ruleIdx = i; animT = 0; },
      })),
      onEnter: () => { a1 = 1; a2 = 1; },
      draw() {
        const rule = RULES[ruleIdx].fn;
        const terms = computeTerms(a1, a2, 10, rule);
        const col = [COL_CYAN, COL_BLUE, COL_ORANGE, COL_PINK][ruleIdx];
        drawLine(terms, 10, { color: col, highlightLast: false });

        infoBox(RULES[ruleIdx][LANG === 'pl' ? 'labelPl' : 'labelEn'], W / 2, 26, col);

        // Growth note
        cx.save();
        cx.font = '10px monospace';
        cx.fillStyle = 'rgba(255,255,255,0.5)';
        cx.textAlign = 'center';
        let note = '';
        if (ruleIdx === 0) note = T('rosnąco, ~złoty podział', 'grows, ~golden ratio');
        else if (ruleIdx === 1) note = T('stała: wszystkie wyrazy = 1', 'constant: all terms = 1');
        else if (ruleIdx === 2) note = T('wykładniczo — eksploduje', 'exponential — explodes');
        else if (ruleIdx === 3) note = T('oscyluje, okres 6', 'oscillates, period 6');
        if (note) cx.fillText(note, W / 2, H - 16);
        cx.restore();
      }
    },

    // ───────────────────────────────────────────────────────────
    // Stage 4: Reindexing — same machinery, new labels
    {
      title: () => T('Przeindeksowanie — ta sama maszyna, inne etykiety',
                     'Reindexing — same machinery, different labels'),
      desc: () => T(
        'Każda kropka ma dwie nazwy: aₙ (numeracja od 1) i bₖ (numeracja od 0, przy k = n − 1). Reguła przepisuje się mechanicznie — wstawiając k+1 w każde n, aₙ₊₂ = aₙ₊₁ + aₙ przechodzi w bₖ₊₁ = bₖ + bₖ₋₁. Kliknij „Policz kolejny bₖ" — ta sama maszyna podstawień co w etapie 1, tylko na innych etykietach. Geometrycznie to przesunięcie wykresu ciągu w lewo o 1 — ta sama operacja, co y = f(x+1) w węźle fn_transforms.',
        'Each dot has two names: aₙ (indexed from 1) and bₖ (indexed from 0, with k = n − 1). The rule rewrites mechanically — substitute k+1 for every n, and aₙ₊₂ = aₙ₊₁ + aₙ becomes bₖ₊₁ = bₖ + bₖ₋₁. Press "Compute next bₖ" — same substitution machinery as stage 1, just on different labels. Geometrically this is a left shift of the sequence graph by 1 — the same operation as y = f(x+1) in the fn_transforms node.'
      ),
      ctrls: [
        { id: 'next', labelPl: '▶ Policz kolejny bₖ', labelEn: '▶ Compute next bₖ',
          onClick: () => { if (revealed < 8) { revealed++; animT = 0; } } },
        { id: 'reset', labelPl: '↺ Reset', labelEn: '↺ Reset',
          onClick: () => { revealed = 2; animT = 0; } },
      ],
      onEnter: () => { a1 = 1; a2 = 1; revealed = 2; animT = 0; },
      draw() {
        const N = 8;
        const xPad = 56;
        const scX = (W - xPad - 30) / (N + 1);
        const yDot  = 230;
        const yALbl = 210;
        const yBLbl = 256;

        // Top pill: both rule forms, showing the mechanical substitution
        infoBox('aₙ₊₂ = aₙ₊₁ + aₙ   ≡   bₖ₊₁ = bₖ + bₖ₋₁', W / 2, 24, COL_YELLOW);

        // Row of flat dots; aₙ above (dim, "already named from stage 1"),
        // bₖ below (bold, revealed one at a time as the b-rule computes them).
        const positions = [];
        for (let i = 0; i < N; i++) {
          const n = i + 1;
          const k = i;
          const xp = xPad + (i + 1) * scX;
          positions.push({ xp, yp: yDot });

          cx.save();
          cx.globalAlpha = 0.55;
          cx.font = '11px monospace';
          cx.fillStyle = COL_CYAN;
          cx.textAlign = 'center';
          cx.fillText('a' + sub(n), xp, yALbl);
          cx.restore();

          dot(xp, yDot, 4.5, COL_YELLOW, 0.85);

          const isRevealedB = i < revealed;
          const isNewestB   = i === revealed - 1 && revealed >= 3;
          if (isRevealedB) {
            const appearB = isNewestB ? Math.min(1, animT / 22) : 1;
            cx.save();
            cx.globalAlpha = appearB;
            cx.font = isNewestB ? 'bold 13px monospace' : 'bold 12px monospace';
            cx.fillStyle = COL_ORANGE;
            cx.textAlign = 'center';
            cx.fillText('b' + sub(k), xp, yBLbl);
            cx.restore();
          }
        }

        // Arcs into the newest bₖ — same yellow/green as stage 1 so the
        // machinery is instantly recognisable; the *labels* are what changed.
        if (revealed >= 3) {
          const idx = revealed - 1;
          const newest = positions[idx];
          const near   = positions[idx - 1]; // bₖ   (distance 1, small arc)
          const far    = positions[idx - 2]; // bₖ₋₁ (distance 2, big arc)
          const alpha  = Math.min(1, animT / 22);
          arrow(far.xp,  far.yp,  newest.xp, newest.yp, COL_YELLOW, alpha * 0.85);
          arrow(near.xp, near.yp, newest.xp, newest.yp, COL_GREEN,  alpha);

          // Symbolic substitution pill — shows the rule specialised to this k,
          // with no numerical values (growth isn't the point here).
          const txt = 'b' + sub(idx) + ' = b' + sub(idx - 1) + ' + b' + sub(idx - 2);
          cx.save();
          cx.globalAlpha = alpha;
          infoBox(txt, W / 2, 62, COL_ORANGE);
          cx.restore();
        } else {
          cx.save();
          cx.font = '11px monospace';
          cx.fillStyle = 'rgba(255,255,255,0.45)';
          cx.textAlign = 'center';
          cx.fillText(T('bazowe: b₀ i b₁ dane. Kliknij „Policz kolejny bₖ".',
                        'base: b₀ and b₁ given. Press "Compute next bₖ".'),
                      W / 2, 66);
          cx.restore();
        }

        // Footer — invariance reminder
        cx.save();
        cx.font = '10px monospace';
        cx.fillStyle = 'rgba(255,255,255,0.4)';
        cx.textAlign = 'center';
        cx.fillText(T('każda kropka = jeden wyraz; aₙ nad nią, bₖ pod nią',
                      'each dot = one term; aₙ above, bₖ below'),
                    W / 2, H - 14);
        cx.restore();
      }
    },
  ];

  // ── Controls (action buttons per stage) ─────────────────────────
  const ctrlWrap = document.getElementById('ctrls-wrap');
  function buildCtrls(defs) {
    if (!defs || !defs.length) { ctrlWrap.innerHTML = ''; return; }
    let html = '<div class="ctrls">';
    defs.forEach(c => {
      const label = LANG === 'pl' ? c.labelPl : c.labelEn;
      const active = c.isActive && c.isActive() ? ' active' : '';
      html += '<button class="ctrl-btn' + active + '" data-id="' + c.id + '">' + label + '</button>';
    });
    html += '</div>';
    ctrlWrap.innerHTML = html;
    ctrlWrap.querySelectorAll('.ctrl-btn').forEach(b => {
      b.addEventListener('click', () => {
        const def = defs.find(x => x.id === b.dataset.id);
        if (def && def.onClick) def.onClick();
        buildCtrls(defs); // refresh active state
      });
    });
  }

  // ── Sliders ─────────────────────────────────────────────────────
  const slWrap = document.getElementById('sliders-wrap');
  function fmtSlider(v, step) {
    if (step < 0.1) return v.toFixed(2);
    if (step < 1) return v.toFixed(1);
    return v.toFixed(0);
  }
  function buildSliders(defs) {
    if (!defs || !defs.length) { slWrap.innerHTML = ''; return; }
    let html = '<div class="sliders">';
    defs.forEach(s => {
      const v = s.get();
      html += '<div class="slider-row">' +
        '<span class="lbl" style="color:' + s.color + '">' + s.lbl + ' =</span>' +
        '<input type="range" id="s_' + s.id + '" min="' + s.min + '" max="' + s.max + '" step="' + s.step + '" value="' + v + '">' +
        '<span class="val" id="v_' + s.id + '">' + fmtSlider(v, s.step) + '</span>' +
      '</div>';
    });
    html += '</div>';
    slWrap.innerHTML = html;
    defs.forEach(s => {
      const el = document.getElementById('s_' + s.id);
      const valEl = document.getElementById('v_' + s.id);
      el.addEventListener('input', function() {
        const v = +this.value;
        valEl.textContent = fmtSlider(v, s.step);
        s.set(v);
      });
    });
  }

  // ── Navigation ──────────────────────────────────────────────────
  const prevBtn = document.getElementById('qprev');
  const nextBtn = document.getElementById('qnext');
  const dotsEl  = document.getElementById('qdots');
  const titleEl = document.getElementById('qf');
  const descEl  = document.getElementById('qd');

  function goTo(idx) {
    stage = Math.max(0, Math.min(stages.length - 1, idx));
    animT = 0;
    const s = stages[stage];
    if (s.onEnter) s.onEnter();
    titleEl.textContent = s.title();
    descEl.textContent = s.desc();
    buildCtrls(s.ctrls);
    buildSliders(s.sliders);
    prevBtn.disabled = stage === 0;
    nextBtn.disabled = stage === stages.length - 1;
    renderDots();
  }

  function renderDots() {
    dotsEl.innerHTML = stages.map((_, i) =>
      '<span class="dot' + (i === stage ? ' active' : '') + '" data-i="' + i + '"></span>'
    ).join('');
    dotsEl.querySelectorAll('.dot').forEach(d =>
      d.addEventListener('click', () => goTo(+d.dataset.i))
    );
  }

  prevBtn.addEventListener('click', () => goTo(stage - 1));
  nextBtn.addEventListener('click', () => goTo(stage + 1));

  // ── Render loop ─────────────────────────────────────────────────
  function tick() {
    animT++;
    clear();
    stages[stage].draw();
    requestAnimationFrame(tick);
  }

  goTo(0);
  tick();
})();
</script>
</body>
</html>
