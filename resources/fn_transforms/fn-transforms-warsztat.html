<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Przekształcenia wykresów — Warsztat</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; color: rgba(255,255,255,.85); }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }

  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .head .step { font-size: 11px; color: rgba(255,255,255,.4); letter-spacing: .04em; }
  .head .title { font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  .desc { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); margin-bottom: 10px; min-height: 34px; }

  .pips { display: flex; gap: 14px; flex-wrap: wrap; margin: 4px 0 10px; font-size: 12px; }
  .pip { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.55); }
  .pip .mark { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,.25); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; line-height: 1; }
  .pip.ok { color: #83C167; }
  .pip.ok .mark { background: #83C167; border-color: #83C167; color: #0e0e12; }
  .pip.ok .mark::before { content: "\2713"; }

  .predict { margin-bottom: 10px; }
  .predict .q { font-size: 13px; color: rgba(255,255,255,.82); margin-bottom: 8px; line-height: 1.55; }
  .predict .opts { display: flex; flex-direction: column; gap: 6px; }
  .predict button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .predict button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .predict button.picked { border-color: #58C4DD; color: #58C4DD; }
  .predict .feedback { margin-top: 8px; font-size: 12px; line-height: 1.55; color: rgba(255,255,255,.7); padding: 8px 10px; border-left: 2px solid #58C4DD; background: rgba(88,196,221,.06); border-radius: 0 4px 4px 0; }

  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }

  .choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .choices button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .choices button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .choices button.picked { border-color: #58C4DD; color: #58C4DD; }
  .choices button.correct { border-color: #83C167; color: #83C167; }
  .choices button.wrong { border-color: #FF6B6B; color: #FF6B6B; }

  .hints { font-size: 12px; color: rgba(255,255,255,.5); margin: 4px 0 10px; line-height: 1.55; }
  .hints .hint { padding: 6px 10px; border-left: 2px solid #FFD166; background: rgba(255,209,102,.05); margin-top: 4px; border-radius: 0 4px 4px 0; }

  .nav { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .nav button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  .nav button:hover:not(:disabled) { background: rgba(255,255,255,.08); }
  .nav button:disabled { opacity: .3; cursor: default; }
  .nav button.primary { border-color: #83C167; color: #83C167; }
  .nav button.primary:hover { background: rgba(131,193,103,.1); }

  .dots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.15); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  .dot.done { background: #83C167; }

  .solved-note { font-size: 13px; color: #83C167; line-height: 1.55; padding: 8px 10px; border-left: 2px solid #83C167; background: rgba(131,193,103,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }
  .wrapup-note { font-size: 13px; color: #C78DFF; line-height: 1.55; padding: 10px 12px; border-left: 2px solid #C78DFF; background: rgba(199,141,255,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="cv" width="600" height="360"></canvas>
  <div class="panel">
    <div class="head">
      <span class="step" id="step"></span>
      <div class="dots" id="dots"></div>
    </div>
    <p class="title" id="title"></p>
    <p class="desc" id="desc"></p>
    <div id="predict"></div>
    <div id="sliders-wrap"></div>
    <div id="choices-wrap"></div>
    <div class="pips" id="pips"></div>
    <div class="hints" id="hints"></div>
    <div id="solved-msg"></div>
    <div class="nav">
      <button id="prev">&larr;</button>
      <button id="next" class="primary">Dalej &rarr;</button>
    </div>
  </div>
</div>

<script type="module">
import { GraphView } from '../lib/graph-core.js';
import { initWarsztat, T } from '../lib/warsztat-core.js';
{
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = 600, H = 360;

  // ── Colors ─────────────────────────────────────────────────────
  const COL_BASE = 'rgba(255,255,255,0.32)';
  const COL_G    = '#58C4DD';   // transformed g(x)
  const COL_AX   = '#FFD166';
  const COL_OK   = '#83C167';
  const COL_HINT = '#C78DFF';

  // ── GraphView (rebuilt each frame) ─────────────────────────────
  let view;
  function initView(xRange, yRange, scale) {
    view = new GraphView(ctx, {
      rect: [0, 0, W, H],
      xRange: xRange || [-6, 6],
      yRange: yRange || [-3.5, 4.3],
      scale:  scale  || 46,
    });
  }

  // ── Draw helpers ───────────────────────────────────────────────
  function roundRect(c, x, y, w, h, r) {
    c.beginPath();
    c.moveTo(x+r,y); c.lineTo(x+w-r,y); c.quadraticCurveTo(x+w,y,x+w,y+r);
    c.lineTo(x+w,y+h-r); c.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
    c.lineTo(x+r,y+h); c.quadraticCurveTo(x,y+h,x,y+h-r);
    c.lineTo(x,y+r); c.quadraticCurveTo(x,y,x+r,y);
    c.closePath();
  }
  function infoBox(text, sx, sy, col) {
    ctx.save();
    ctx.font = '12px monospace';
    const w = ctx.measureText(text).width + 14;
    ctx.fillStyle = 'rgba(14,14,18,0.9)';
    ctx.strokeStyle = col + '60';
    ctx.lineWidth = 1;
    roundRect(ctx, sx - w/2, sy - 11, w, 22, 4);
    ctx.fill(); ctx.stroke();
    ctx.fillStyle = col;
    ctx.textAlign = 'center';
    ctx.fillText(text, sx, sy + 4);
    ctx.restore();
  }
  function dashed(x1, y1, x2, y2, col, alpha) {
    view.segment(x1, y1, x2, y2, { color: col, alpha: alpha ?? 0.55, lineWidth: 1.2, dash: [5,4] });
  }
  function fmt(v) {
    if (Math.abs(v - Math.round(v)) < 0.01) return Math.round(v).toString();
    return v.toFixed(2);
  }
  function fmtSigned(v) {
    if (v >= 0) return '+ ' + fmt(v);
    return '\u2212 ' + fmt(-v);
  }

  // ── Challenge-local state ──────────────────────────────────────
  const C = {
    introDone: false, // ch0: intro slide acknowledged
    a: 0,            // ch1: horizontal shift f(x - a)
    c: 0,            // ch2: vertical shift   f(x) + c
    mode: 'none',    // ch3: 'fx' | 'f-x' | '-f-x' | 'none'
    av: 1,           // ch4: outer vertical scale
    bv: 1,           // ch4: inner horizontal scale
  };

  // ── Mini-plot helper for the intro slide ──────────────────────
  // Draws one panel showing a base curve (dotted gray) and a transformed
  // curve (colored solid) on a small math-coord region within the canvas.
  function miniPlot(px, py, pw, ph, title, fBase, fTrans, color) {
    const xmin = -4, xmax = 4, ymin = -1.5, ymax = 3.2;
    const padT = 20, padB = 8, padL = 8, padR = 8;
    const iw = pw - padL - padR;
    const ih = ph - padT - padB;
    const ix = px + padL;
    const iy = py + padT;
    const toSX = x => ix + ((x - xmin) / (xmax - xmin)) * iw;
    const toSY = y => iy + ih - ((y - ymin) / (ymax - ymin)) * ih;

    // Panel background
    ctx.fillStyle = 'rgba(255,255,255,0.02)';
    ctx.fillRect(px + 2, py + 2, pw - 4, ph - 4);

    // Title
    ctx.font = '11px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.65)';
    ctx.textAlign = 'left';
    ctx.fillText(title, px + 8, py + 14);

    // Axes (faint)
    ctx.strokeStyle = 'rgba(255,255,255,0.12)';
    ctx.lineWidth = 0.6;
    ctx.beginPath();
    if (ymin < 0 && ymax > 0) { ctx.moveTo(ix, toSY(0)); ctx.lineTo(ix + iw, toSY(0)); }
    if (xmin < 0 && xmax > 0) { ctx.moveTo(toSX(0), iy); ctx.lineTo(toSX(0), iy + ih); }
    ctx.stroke();

    // Plot curve helper (clipped to the panel)
    function plotCurve(fn, style) {
      ctx.save();
      ctx.beginPath(); ctx.rect(ix, iy, iw, ih); ctx.clip();
      ctx.strokeStyle = style.color;
      ctx.lineWidth = style.width ?? 1.6;
      if (style.dash) ctx.setLineDash(style.dash);
      ctx.beginPath();
      const steps = 160;
      let first = true;
      for (let i = 0; i <= steps; i++) {
        const x = xmin + (xmax - xmin) * (i / steps);
        const y = fn(x);
        if (!isFinite(y)) { first = true; continue; }
        const sx = toSX(x), sy = toSY(y);
        if (first) { ctx.moveTo(sx, sy); first = false; }
        else ctx.lineTo(sx, sy);
      }
      ctx.stroke();
      ctx.restore();
    }

    plotCurve(fBase, { color: 'rgba(255,255,255,0.35)', width: 1.4, dash: [3, 3] });
    plotCurve(fTrans, { color, width: 2.2 });
  }

  const near = (a, b, eps = 0.02) => Math.abs(a - b) < eps;

  // ── Challenges ─────────────────────────────────────────────────
  const challenges = [
    // ─── Ch.0: Intro slide — preview of all 4 transformation families ─
    {
      id: 'ch0_intro',
      title: 'Wprowadzenie: cztery rodziny przekszta\u0142ce\u0144',
      titleEn: 'Intro: four families of transformations',
      desc: 'Te same zasady dzia\u0142aj\u0105 dla ka\u017Cdej bazowej krzywej. Na g\u00F3rze widzisz parabol\u0119 $y = x^2$, na dole sinusoid\u0119 $y = \\sin x$. W ka\u017Cdej kolumnie inna rodzina przekszta\u0142ce\u0144. W nast\u0119pnych wyzwaniach zbadasz po kolei ka\u017Cd\u0105 z nich.',
      descEn: 'The same rules apply to every base curve. On top you see the parabola $y = x^2$, on the bottom the sine $y = \\sin x$. Each column shows a different family of transformations. The next challenges walk through them one at a time.',
      drawBackground: 'none',
      init() { C.introDone = false; },
      choices: {
        question: 'Kliknij, \u017Ceby przej\u015B\u0107 do \u0107wicze\u0144.',
        questionEn: 'Click to move on to the exercises.',
        options: [
          { id: 'go', label: 'Rozumiem \u2014 przejd\u017A dalej', labelEn: 'Got it \u2014 move on', correct: true },
        ],
        pick(id) { C.introDone = id === 'go'; },
      },
      pips() { return [{ label: T('wprowadzenie przeczytane', 'intro read'), ok: C.introDone }]; },
      solved() { return C.introDone; },
      hints: [
        'Wewn\u0105trz argumentu funkcji zmiany dzia\u0142aj\u0105 w POZIOMIE i przeciwnie do intuicji \u2014 $(x - 3)^2$ przesuwa w prawo, nie w lewo.',
        'Na zewn\u0105trz funkcji zmiany dzia\u0142aj\u0105 w PIONIE i zgodnie z intuicj\u0105 \u2014 $f(x) + 2$ idzie w g\u00F3r\u0119 o 2.',
        'Ta sama zasada obowi\u0105zuje dla $x^2$, $\\sin x$, $|x|$, $\\sqrt{x}$ i ka\u017Cdej innej bazowej krzywej, kt\u00F3r\u0105 spotkasz.',
      ],
      hintsEn: [
        'Inside the argument, changes act HORIZONTALLY and counter to intuition \u2014 $(x - 3)^2$ shifts to the right, not the left.',
        'Outside the function, changes act VERTICALLY and match intuition \u2014 $f(x) + 2$ goes up by 2.',
        'The same rule holds for $x^2$, $\\sin x$, $|x|$, $\\sqrt{x}$ and every other base curve you\u2019ll meet.',
      ],
      solvedMsg: 'Zaczynamy od przesuni\u0119\u0107 poziomych.',
      solvedMsgEn: 'We start with horizontal shifts.',
      draw() {
        // 2 rows × 4 columns: top = parabola transformations, bottom = sin.
        // Canvas 600×360. Column width 150, row height ~165.
        const cols = 4;
        const rows = 2;
        const colW = W / cols;
        const rowH = (H - 30) / rows;  // leave header strip
        const y0 = 28;

        // Header row
        ctx.save();
        ctx.font = '11px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.textAlign = 'center';
        ctx.fillText('RODZINY PRZEKSZTA\u0141CE\u0143', W/2, 14);
        ctx.restore();

        // Family definitions: [title, transform-applied-to-base]
        const families = [
          { title: 'f(x - 2)',   color: '#58C4DD', fT: (f) => (x) => f(x - 2) },
          { title: 'f(x) + 1.5', color: '#83C167', fT: (f) => (x) => f(x) + 1.5 },
          { title: '-f(x)',      color: '#FF6B6B', fT: (f) => (x) => -f(x) },
          { title: '2 \u00B7 f(x)', color: '#C78DFF', fT: (f) => (x) => 2 * f(x) },
        ];

        // Top row: parabola base
        const xSq = (x) => 0.4 * x * x - 0.5;  // gentle parabola that fits the mini y-range
        // Bottom row: sine base
        const xSin = (x) => Math.sin(x * 0.9) * 1.1;

        for (let c = 0; c < cols; c++) {
          const fam = families[c];
          const px = c * colW;
          // Top (parabola)
          miniPlot(px, y0, colW, rowH, fam.title, xSq, fam.fT(xSq), fam.color);
          // Bottom (sine)
          miniPlot(px, y0 + rowH, colW, rowH, fam.title, xSin, fam.fT(xSin), fam.color);
        }

        // Footer rule
        ctx.save();
        ctx.font = '10px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.textAlign = 'center';
        ctx.fillText('linia przerywana = krzywa bazowa  \u2022  linia ci\u0105g\u0142a = po przekszta\u0142ceniu', W/2, H - 4);
        ctx.restore();
      },
    },

    // ─── Ch.1: Horizontal shift f(x - a) — the canonical trap ────
    {
      id: 'ch1_horizontal_shift',
      title: 'Przesuni\u0119cie poziome: $f(x - a)$',
      titleEn: 'Horizontal shift: $f(x - a)$',
      desc: 'Baza: $f(x) = x^2$. Przesuwaj suwak $a$ i obserwuj, dok\u0105d w\u0119druje wierzcho\u0142ek $g(x) = (x - a)^2$.',
      descEn: 'Base: $f(x) = x^2$. Drag the $a$ slider and watch where the vertex of $g(x) = (x - a)^2$ moves.',
      drawBackground: 'graph',
      init() { C.a = 0; },
      predict: {
        question: 'Je\u015Bli $g(x) = f(x - 2)$, to wykres $g$ jest wykresem $f$...',
        questionEn: 'If $g(x) = f(x - 2)$, then the graph of $g$ is the graph of $f$...',
        options: [
          { label: 'przesuni\u0119tym o 2 w LEWO', labelEn: 'shifted 2 to the LEFT', correct: false, why: 'Typowa pu\u0142apka \u2014 znak wewn\u0105trz nawiasu dzia\u0142a przeciwnie do intuicji. Spr\u00F3buj podstawi\u0107: $g(5) = f(5-2) = f(3)$ \u2014 to warto\u015B\u0107, kt\u00F3r\u0105 $f$ mia\u0142 w $x=3$. Wykres przesun\u0105\u0142 si\u0119 w PRAWO.', whyEn: 'The classic trap \u2014 the sign inside the parentheses acts opposite to intuition. Plug in: $g(5) = f(5-2) = f(3)$ \u2014 that\u2019s the value $f$ had at $x=3$. The graph moved to the RIGHT.' },
          { label: 'przesuni\u0119tym o 2 w PRAWO', labelEn: 'shifted 2 to the RIGHT', correct: true,  why: 'Tak \u2014 argument $x - 2$ oznacza \u201Esi\u0119gnij 2 pozycje wstecz\u201D, wi\u0119c wykres wygl\u0105da tak, jakby warto\u015Bci przenios\u0142y si\u0119 o 2 w prawo.', whyEn: 'Yes \u2014 the argument $x - 2$ means \u201Creach back 2 positions,\u201D so the graph looks as if values moved 2 to the right.' },
          { label: 'przesuni\u0119tym o 2 w G\u00D3R\u0118', labelEn: 'shifted 2 UP', correct: false, why: 'G\u00F3ra/d\u00F3\u0142 to zmiany NA ZEWN\u0104TRZ funkcji: $f(x) + 2$. Znak wewn\u0105trz argumentu dzia\u0142a w poziomie.', whyEn: 'Up/down comes from changes OUTSIDE the function: $f(x) + 2$. A sign inside the argument acts horizontally.' },
        ],
      },
      sliders: [
        { id: 'a', lbl: 'a', color: COL_AX, min: -3, max: 3, step: 1, get: () => C.a, set: v => C.a = v },
      ],
      pips() {
        return [{ label: T('przesu\u0144 $a$ \u017Beby zobaczy\u0107', 'drag $a$ to see it'), ok: C.a !== 0 }];
      },
      solved() { return C.a !== 0; },
      hints: [
        '\u2460 Podstaw konkretny $x$ do $g$. Je\u015Bli $g(x) = f(x - 2)$, ile wynosi $g(5)$? A ile $f(5)$?',
        '\u2461 $g(5) = f(3)$ \u2014 to warto\u015B\u0107 $f$ w $x = 3$. Czyli wykres $g$ w punkcie 5 to to, co $f$ mia\u0142 w 3. Przesuw w PRAWO.',
        '\u2462 Regu\u0142a: $f(x - a)$ przesuwa wykres w prawo o $a$. Znak w nawiasie jest PRZECIWNY do kierunku przesuni\u0119cia.',
      ],
      hintsEn: [
        '\u2460 Plug a concrete $x$ into $g$. If $g(x) = f(x - 2)$, what is $g(5)$? And $f(5)$?',
        '\u2461 $g(5) = f(3)$ \u2014 that\u2019s the value of $f$ at $x = 3$. So $g$ at point 5 shows what $f$ had at 3. A RIGHT-ward shift.',
        '\u2462 Rule: $f(x - a)$ shifts the graph right by $a$. The sign in the parentheses is OPPOSITE to the direction of the shift.',
      ],
      solvedMsg: 'Argument funkcji jest \u201Eodwr\u00F3cony w czasie\u201D \u2014 to co odejmujemy od $x$ przek\u0142ada si\u0119 na dodawanie w kierunku przesuni\u0119cia.',
      solvedMsgEn: 'The argument is \u201Ctime-reversed\u201D \u2014 what we subtract from $x$ becomes addition in the direction of the shift.',
      predictAfter: {
        question: 'A co robi $f(x + 3)$?',
        questionEn: 'And what does $f(x + 3)$ do?',
        options: [
          { label: 'przesuwa w lewo o 3', labelEn: 'shifts left by 3', correct: true,  why: 'Tak \u2014 $+3$ w argumencie przesuwa w LEWO o 3. Zawsze przeciwnie do znaku wewn\u0105trz nawiasu.', whyEn: 'Yes \u2014 $+3$ in the argument shifts LEFT by 3. Always opposite to the sign inside the parentheses.' },
          { label: 'przesuwa w prawo o 3', labelEn: 'shifts right by 3', correct: false, why: 'Odwrotnie \u2014 $+3$ w nawiasie to przesuw w LEWO. Reguly: znak w nawiasie dzia\u0142a przeciwnie.', whyEn: 'The other way around \u2014 $+3$ inside the parentheses means a LEFT shift. The rule: the sign inside acts opposite.' },
          { label: 'nic \u2014 znak wewn\u0105trz nie zmienia wykresu', labelEn: 'nothing \u2014 a sign inside doesn\u2019t change the graph', correct: false, why: 'Znak w nawiasie zmienia \u2014 tylko w poziomie, nie w pionie.', whyEn: 'A sign inside does change things \u2014 just horizontally, not vertically.' },
        ],
      },
      draw() {
        // base f(x) = x^2 light gray
        view.plotFn(x => x*x, { color: COL_BASE, alpha: 0.9, lineWidth: 2 });
        // transformed g(x) = (x - a)^2 cyan
        view.plotFn(x => (x - C.a) * (x - C.a), { color: COL_G, alpha: 0.95, lineWidth: 2.5 });
        // vertex dots
        view.dot(0, 0, { radius: 5, color: COL_BASE });
        view.dot(C.a, 0, { radius: 6, color: COL_G });
        view.label('(0,0)', 0, -0.55, { color: COL_BASE, align: 'center', font: '11px monospace' });
        view.label('(' + C.a + ',0)', C.a, -0.55, { color: COL_G, align: 'center', font: '11px monospace' });

        // ─ Animated lookup: for each visible x on g, value comes from f(x − a).
        // Sweep a traveling indicator across the x-axis, showing the mapping
        //   x on g  ←  (x − a) on f
        // with dots on both curves at the same height and a connecting arrow.
        if (C.a !== 0) {
          const period = 3800;
          const phase = (Date.now() % period) / period;
          // Sweep through a range where g(x) stays visible in the y-window
          const xmin = C.a - 2, xmax = C.a + 2;
          const xG = xmin + (xmax - xmin) * phase;
          const xF = xG - C.a;
          const y = (xG - C.a) * (xG - C.a);

          // Connecting arrow at y + 0.15 (just above x-axis if y=0)
          const yArrow = Math.max(y + 0.15, 0.2);
          const sx1 = view.px(xG), sy = view.py(yArrow);
          const sx2 = view.px(xF);
          ctx.save();
          ctx.strokeStyle = COL_AX;
          ctx.lineWidth = 1.3;
          ctx.setLineDash([4, 3]);
          ctx.beginPath(); ctx.moveTo(sx1, sy); ctx.lineTo(sx2, sy); ctx.stroke();
          // Arrowhead at source end (xF side)
          ctx.setLineDash([]);
          ctx.fillStyle = COL_AX;
          const dir = sx2 < sx1 ? -1 : 1;
          ctx.beginPath();
          ctx.moveTo(sx2, sy);
          ctx.lineTo(sx2 - dir * 7, sy - 4);
          ctx.lineTo(sx2 - dir * 7, sy + 4);
          ctx.closePath();
          ctx.fill();
          ctx.restore();

          // Traveling dots on each curve
          view.dot(xG, y, { radius: 6, color: COL_G });
          view.dot(xF, y, { radius: 5, color: COL_BASE });

          // Label showing the mapping numerically
          const mapLabel = 'g(' + xG.toFixed(1) + ') = f(' + xF.toFixed(1) + ')';
          view.label(mapLabel, (xG + xF) / 2, yArrow + 0.35,
            { color: COL_AX, align: 'center', font: '10px monospace' });
        }

        // equations
        infoBox('f(x) = x\u00B2', W*0.28, 22, COL_BASE.replace('rgba(255,255,255,0.32)', '#BBBBBB'));
        const label = C.a === 0
          ? 'g(x) = (x)\u00B2'
          : (C.a > 0 ? 'g(x) = (x \u2212 ' + C.a + ')\u00B2' : 'g(x) = (x + ' + (-C.a) + ')\u00B2');
        infoBox(label, W*0.72, 22, COL_G);
      },
    },

        '① Zacznij od krzywej bazowej $y = |x|$ — litera V z wierzchołkiem w $(0, 0)$.',
        '② Wewnątrz zewnętrznego modułu mamy $|x - 3| - 2$. Składnik $|x - 3|$ to V przesunięte o 3 w prawo (zasada „wewnątrz działa przeciwnie"); odjęcie $2$ to przesunięcie w dół o 2.',
        '③ Zewnętrzny moduł bierze z tego wartość bezwzględną, czyli „odbija" ujemną część w górę. W efekcie środkowe ramiona V opadają do zera w punktach $x = 1$ i $x = 5$, a między nimi wyrasta drugi wierzchołek — powstaje W.',
      ],
      hintsEn: [
        '① Start from the base curve $y = |x|$ — a V with its vertex at $(0, 0)$.',
        '② Inside the outer absolute value we have $|x - 3| - 2$. The piece $|x - 3|$ is the V shifted 3 to the right (the “inside acts opposite” rule); subtracting $2$ shifts it down by 2.',
        '③ The outer absolute value takes the absolute value of that, i.e. it “flips” the negative part upward. The middle arms of the V drop to zero at $x = 1$ and $x = 5$, and a second vertex pops up between them — that’s the W.',
      ],
      solvedMsg: 'Kształt W to bazowa krzywa $y = |x|$ poddana tym samym regułom przesunięć z wyzwań 1–4, a następnie objęta dodatkowym modułem, który odbija ujemną część w górę.',
      solvedMsgEn: 'The W-shape is the base curve $y = |x|$ run through the same shift rules from challenges 1–4, then wrapped in another absolute value that reflects the negative part upward.',
      draw() {
        // 2×2 grid of candidate W-shape graphs. One correct (A), three distractors.
        const cols = 2, rows = 2;
        const gridPadTop = 38;
        const gridPadBottom = 22;
        const panelW = W / cols;
        const panelH = (H - gridPadTop - gridPadBottom) / rows;

        // Header
        ctx.save();
        ctx.font = '12px monospace';
        ctx.fillStyle = '#FFD166';
        ctx.textAlign = 'center';
        ctx.fillText('y = ||x \u2212 3| \u2212 2|', W/2, 18);
        ctx.font = '10px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.45)';
        ctx.fillText('kt\u00F3ry z wykres\u00F3w pasuje?', W/2, 32);
        ctx.restore();

        const candidates = [
          { id: 'A', fn: x => Math.abs(Math.abs(x - 3) - 2) },              // correct
          { id: 'B', fn: x => Math.abs(x - 3) },                             // V shifted (no nested)
          { id: 'C', fn: x => Math.abs(Math.abs(x + 3) - 2) },               // W shifted LEFT (wrong sign)
          { id: 'D', fn: x => 4 - Math.abs(Math.abs(x - 3) - 2) },           // W flipped upside down
        ];

        const xmin = -2, xmax = 8, ymin = -1, ymax = 5;

        for (let r = 0; r < rows; r++) {
          for (let c = 0; c < cols; c++) {
            const i = r * cols + c;
            const cand = candidates[i];
            const px = c * panelW;
            const py = gridPadTop + r * panelH;

            const innerPadT = 14, innerPadB = 8, innerPadL = 10, innerPadR = 10;
            const iw = panelW - innerPadL - innerPadR;
            const ih = panelH - innerPadT - innerPadB;
            const ix = px + innerPadL;
            const iy = py + innerPadT;
            const toSX = x => ix + ((x - xmin) / (xmax - xmin)) * iw;
            const toSY = y => iy + ih - ((y - ymin) / (ymax - ymin)) * ih;

            // Panel bg + border, highlighted when picked
            const isPicked = C.ch5Pick === cand.id;
            const isRight = cand.id === 'A';
            ctx.fillStyle = 'rgba(255,255,255,0.02)';
            ctx.fillRect(px + 3, py + 3, panelW - 6, panelH - 6);
            ctx.lineWidth = isPicked ? 2 : 1;
            ctx.strokeStyle = isPicked
              ? (isRight ? '#83C167' : '#FF6B6B')
              : 'rgba(255,255,255,0.15)';
            ctx.strokeRect(px + 3, py + 3, panelW - 6, panelH - 6);

            // Label
            ctx.font = 'bold 13px monospace';
            ctx.fillStyle = isPicked ? (isRight ? '#83C167' : '#FF6B6B') : 'rgba(255,255,255,0.7)';
            ctx.textAlign = 'left';
            ctx.fillText(cand.id, px + 10, py + 16);

            // Axes
            ctx.strokeStyle = 'rgba(255,255,255,0.12)';
            ctx.lineWidth = 0.6;
            ctx.beginPath();
            ctx.moveTo(ix, toSY(0)); ctx.lineTo(ix + iw, toSY(0));  // x-axis
            if (xmin < 0) { ctx.moveTo(toSX(0), iy); ctx.lineTo(toSX(0), iy + ih); }  // y-axis
            ctx.stroke();
            // Integer ticks on x-axis
            ctx.font = '9px monospace';
            ctx.fillStyle = 'rgba(255,255,255,0.35)';
            ctx.textAlign = 'center';
            for (let xt = -2; xt <= 8; xt += 2) {
              const sx = toSX(xt);
              if (sx < ix - 1 || sx > ix + iw + 1) continue;
              ctx.fillText(xt, sx, toSY(0) + 11);
            }

            // Plot curve (clipped)
            ctx.save();
            ctx.beginPath(); ctx.rect(ix, iy, iw, ih); ctx.clip();
            ctx.strokeStyle = '#FFD166';
            ctx.lineWidth = 2;
            ctx.beginPath();
            const steps = 240;
            let first = true;
            for (let s = 0; s <= steps; s++) {
              const x = xmin + (xmax - xmin) * (s / steps);
              const y = cand.fn(x);
              if (!isFinite(y)) { first = true; continue; }
              const sx = toSX(x), sy = toSY(y);
              if (first) { ctx.moveTo(sx, sy); first = false; }
              else ctx.lineTo(sx, sy);
            }
            ctx.stroke();
            ctx.restore();
          }
        }

        // Footer
        ctx.save();
        ctx.font = '10px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.4)';
        ctx.textAlign = 'center';
        ctx.fillText('kliknij literę w odpowiedziach poni\u017Cej', W/2, H - 6);
        ctx.restore();
      },
      predictAfter: {
        question: 'Te same reguły przesunięć stosujesz też do $y = \\sqrt{x}$. Który wzór przesunie bazową krzywą $y = \\sqrt{x}$ o 5 w prawo i 1 w górę?',
        questionEn: 'The same shift rules apply to $y = \\sqrt{x}$. Which formula shifts the base curve $y = \\sqrt{x}$ by 5 to the right and 1 up?',
        options: [
          { label: '$y = \\sqrt{x - 5} + 1$', labelEn: '$y = \\sqrt{x - 5} + 1$', correct: true,  why: 'Tak — argument $x - 5$ to przesunięcie w prawo o 5 (wewnątrz działa przeciwnie do intuicji), a $+ 1$ na zewnątrz to przesunięcie w górę o 1. Te same reguły działają dla każdej bazowej krzywej.', whyEn: 'Yes — the argument $x - 5$ shifts right by 5 (inside acts opposite to intuition), and $+ 1$ on the outside shifts up by 1. The same rules apply to every base curve.' },
          { label: '$y = \\sqrt{x + 5} + 1$', labelEn: '$y = \\sqrt{x + 5} + 1$', correct: false, why: 'Znak $+ 5$ wewnątrz argumentu przesunąłby wykres w LEWO o 5.', whyEn: 'The sign $+ 5$ inside the argument would shift the graph LEFT by 5.' },
          { label: '$y = \\sqrt{x - 5} - 1$', labelEn: '$y = \\sqrt{x - 5} - 1$', correct: false, why: 'Zewnętrzne $- 1$ daje przesunięcie w DÓŁ, nie w górę.', whyEn: 'An outer $- 1$ gives a DOWN shift, not up.' },
        ],
      },
    },
  ];

  initWarsztat({
    canvasId: 'cv',
    challenges,
    lsKey: 'warsztat:fn_transforms:completed',
    wrapup: 'Zasada uniwersalna: co jest W ARGUMENCIE (wewn\u0105trz funkcji), dzia\u0142a W POZIOMIE i ODWROTNIE do intuicji. Co jest NA ZEWN\u0104TRZ, dzia\u0142a W PIONIE i zgodnie z intuicj\u0105. Te same przekszta\u0142cenia rozpoznasz jako posta\u0107 kanoniczn\u0105 paraboli $y=(x-h)^2+k$ oraz kszta\u0142t W z zagnie\u017Cd\u017Conego modu\u0142u — to jeden i ten sam przepis.',
    wrapupEn: 'The universal rule: what’s IN THE ARGUMENT (inside the function) acts HORIZONTALLY and OPPOSITE to intuition. What’s OUTSIDE acts VERTICALLY and matches intuition. You’ll recognise the same transformations as the vertex form of a parabola $y=(x-h)^2+k$ and as the W-shape from a nested absolute value — it’s one and the same recipe.',
    onFrame({ ch }) {
      const vcfg = ch.view || {};
      initView(vcfg.xRange, vcfg.yRange, vcfg.scale);
      view.clear();
      if (ch.drawBackground === 'graph') {
        view.drawGrid({ color: 'rgba(255,255,255,0.04)' });
        view.drawAxes({ color: 'rgba(255,255,255,0.2)', arrows: false, labels: true, tickSize: 3 });
      }
    },
  });
}
</script>
