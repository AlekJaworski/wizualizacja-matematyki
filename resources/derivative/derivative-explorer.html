<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pochodna — Interaktywna wizualizacja</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }
  #qf { margin: 0 0 5px; font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  #qd { margin: 0 0 10px; font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); min-height: 48px; }
  .sliders { display: flex; flex-direction: column; gap: 6px; margin-bottom: 8px; }
  .slider-row { display: flex; align-items: center; gap: 10px; font-size: 13px; color: rgba(255,255,255,.45); }
  .slider-row span.lbl { font-family: monospace; min-width: 36px; }
  .slider-row input[type=range] { flex: 1; accent-color: #58C4DD; }
  .slider-row span.val { font-family: monospace; min-width: 46px; text-align: right; }
  .nav { display: flex; align-items: center; justify-content: space-between; }
  button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  button:hover { background: rgba(255,255,255,.08); }
  button:disabled { opacity: .3; cursor: default; }
  #qdots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.18); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  .slider-wrap { display: none; margin-bottom: 8px; }
  .slider-wrap.visible { display: block; }
</style>
</head>
<body>
<div class="wrap">
  <canvas id="qc" width="600" height="440"></canvas>
  <div class="panel">
    <p id="qf"></p>
    <p id="qd"></p>

    <div id="sl_dx" class="slider-wrap">
      <div class="sliders">
        <div class="slider-row">
          <span class="lbl" style="color:#83C167;">&Delta;x =</span>
          <input type="range" id="s_dx" min="0.01" max="3" step="0.01" value="2">
          <span class="val" id="v_dx" style="color:#83C167;"></span>
        </div>
      </div>
    </div>

    <div id="sl_x0" class="slider-wrap">
      <div class="sliders">
        <div class="slider-row">
          <span class="lbl" style="color:#58C4DD;">x =</span>
          <input type="range" id="s_x0" min="-3" max="3" step="0.05" value="1">
          <span class="val" id="v_x0" style="color:#58C4DD;"></span>
        </div>
      </div>
    </div>

    <div id="sl_xsync" class="slider-wrap">
      <div class="sliders">
        <div class="slider-row">
          <span class="lbl" style="color:#58C4DD;">x =</span>
          <input type="range" id="s_xsync" min="-2.5" max="2.5" step="0.05" value="0">
          <span class="val" id="v_xsync" style="color:#58C4DD;"></span>
        </div>
      </div>
    </div>

    <div id="sl_n" class="slider-wrap">
      <div class="sliders">
        <div class="slider-row">
          <span class="lbl" style="color:#FFD166;">n =</span>
          <input type="range" id="s_n" min="1" max="5" step="1" value="2">
          <span class="val" id="v_n" style="color:#FFD166;"></span>
        </div>
      </div>
    </div>

    <div class="nav">
      <button id="qprev">&larr; wstecz</button>
      <div id="qdots"></div>
      <button id="qnext">dalej &rarr;</button>
    </div>
  </div>
</div>

<script type="module">
import { GraphView } from '../lib/graph-core.js';

(function(){
const LANG = new URLSearchParams(window.location.search).get('lang') || 'pl';
const T = (pl, en) => LANG === 'pl' ? pl : en;

const cv=document.getElementById('qc'),cx=cv.getContext('2d');
const W=600,H=440;
const CURVE='#58C4DD',DERIV='#FF9F43',TANG='#83C167',ROOT='#FFD166';

let stage=0;
let sDx=2, sX0=1, sXsync=0, sN=2;

const stages=[
  {id:'secant',    slider:'sl_dx',    f:'f(x) = x\u00B2',                        d:T('Sieczna \u0142\u0105czy dwa punkty na wykresie i pokazuje \u015Brednie nachylenie mi\u0119dzy nimi. Zmniejsz \u0394x \u2014 gdy przerwa znika, sieczna staje si\u0119 styczn\u0105: nachyleniem w jednym punkcie. To w\u0142a\u015Bnie jest pochodna.','A secant connects two points on the graph, showing the average slope between them. Shrink \u0394x \u2014 as the gap vanishes, the secant becomes the tangent: the slope at a single point. That\u2019s the derivative.')},
  {id:'tangent',   slider:'sl_x0',    f:'f(x) = x\u00B2,  f\u2032(x) = 2x',     d:T('Styczna w ruchomym punkcie. Nachylenie wynosi 2x \u2014 pochodna w tym punkcie.','Tangent at a movable point. The slope is 2x \u2014 the derivative at that point.')},
  {id:'fvsfp',     slider:'sl_xsync', f:'f(x) = x\u00B3 \u2212 3x  vs  f\u2032(x) = 3x\u00B2 \u2212 3', d:T('f\u2032 > 0 gdy f jest rosn\u0105ca, f\u2032 < 0 gdy f jest malej\u0105ca, f\u2032 = 0 w ekstremach.','f\u2032 > 0 when f is increasing, f\u2032 < 0 when f is decreasing, f\u2032 = 0 at extrema.')},
  {id:'power',     slider:'sl_n',     f:T('Regu\u0142a pot\u0119gowa: d/dx x\u207F = nx\u207F\u207B\u00B9','Power rule: d/dx x\u207F = nx\u207F\u207B\u00B9'),   d:T('Przesu\u0144 n od 1 do 5. Obserwuj, jak pochodna zale\u017Cy od wyj\u015Bciowej pot\u0119gi.','Slide n from 1 to 5. Observe how the derivative depends on the original power.')},
  {id:'extrema',   slider:'',         f:'f(x) = x\u00B3 \u2212 3x + 1',         d:T('f\u2032(a) = 0 jest warunkiem koniecznym, ale nie wystarczaj\u0105cym \u2014 dodatkowo pochodna musi zmienia\u0107 znak w punkcie a (z + na \u2212 \u2192 maksimum lokalne, z \u2212 na + \u2192 minimum lokalne). Sam punkt krytyczny mo\u017Ce by\u0107 te\u017C punktem przegi\u0119cia.','f\u2032(a) = 0 is necessary but not sufficient \u2014 additionally f\u2032 must change sign at a (+ to \u2212 \u2192 local max, \u2212 to + \u2192 local min). A critical point can also be an inflection.')},
];

// ── Slider wiring ──
document.getElementById('s_dx').addEventListener('input',function(){sDx=+this.value;document.getElementById('v_dx').textContent=sDx.toFixed(2);});
document.getElementById('s_x0').addEventListener('input',function(){sX0=+this.value;document.getElementById('v_x0').textContent=sX0.toFixed(2);});
document.getElementById('s_xsync').addEventListener('input',function(){sXsync=+this.value;document.getElementById('v_xsync').textContent=sXsync.toFixed(2);});
document.getElementById('s_n').addEventListener('input',function(){sN=+this.value;document.getElementById('v_n').textContent=sN;});

// ── Navigation ──
function renderDots(){
  const dc=document.getElementById('qdots');
  dc.innerHTML=stages.map((_,i)=>`<span class="dot${i===stage?' active':''}" data-i="${i}"></span>`).join('');
  dc.querySelectorAll('span').forEach(s=>s.addEventListener('click',()=>goTo(+s.dataset.i)));
}

function goTo(idx){
  stage=Math.max(0,Math.min(stages.length-1,idx));
  const s=stages[stage];
  document.getElementById('qf').innerHTML=s.f;
  document.getElementById('qd').innerHTML=s.d;
  document.querySelectorAll('.slider-wrap').forEach(el=>el.classList.remove('visible'));
  if(s.slider)document.getElementById(s.slider).classList.add('visible');
  document.getElementById('qprev').disabled=stage===0;
  document.getElementById('qnext').disabled=stage===stages.length-1;
  // update slider labels
  document.getElementById('v_dx').textContent=sDx.toFixed(2);
  document.getElementById('v_x0').textContent=sX0.toFixed(2);
  document.getElementById('v_xsync').textContent=sXsync.toFixed(2);
  document.getElementById('v_n').textContent=sN;
  renderDots();
}

document.getElementById('qprev').addEventListener('click',()=>goTo(stage-1));
document.getElementById('qnext').addEventListener('click',()=>goTo(stage+1));

// ── Stage renderers ──

function drawStage0(){
  // Secant to tangent: f(x)=x^2
  const gv = new GraphView(cx, { rect:[0,0,W,H], xRange:[-6,6], yRange:[-2.6,8.8], scale:50 });
  gv.drawGrid();
  gv.drawAxes();
  const f=x=>x*x;
  gv.plotFn(f, {color:CURVE, lineWidth:2.5});

  const x0=1;
  const x1=x0+sDx;
  const y0=f(x0),y1=f(x1);
  const slope=(y1-y0)/(x1-x0);

  // Draw secant/tangent line extended
  const lineColor = sDx<0.1 ? TANG : 'rgba(131,193,103,.6)';
  gv.line(x0, y0, x1, y1, {color:lineColor, lineWidth:2});

  // Points
  gv.dot(x0, y0, {radius:5, color:CURVE});
  if(sDx>0.05) gv.dot(x1, y1, {radius:5, color:'#FF9F43'});

  // Delta x bracket
  if(sDx>0.05){
    gv.segment(x0, y0, x1, y0, {color:'rgba(255,255,255,.2)', lineWidth:1, dash:[3,3]});
    gv.segment(x1, y0, x1, y1, {color:'rgba(255,255,255,.2)', lineWidth:1, dash:[3,3]});
    // labels
    cx.fillStyle='rgba(255,255,255,.5)';cx.font='11px monospace';cx.textAlign='center';
    cx.fillText('\u0394x='+sDx.toFixed(2), (gv.px(x0)+gv.px(x1))/2, gv.py(y0)+14);
    cx.fillText('\u0394y='+(y1-y0).toFixed(2), gv.px(x1)+30, (gv.py(y0)+gv.py(y1))/2);
  }

  // Slope label
  cx.fillStyle=TANG;cx.font='bold 13px monospace';cx.textAlign='left';
  cx.fillText(T('nachylenie','slope')+' = '+slope.toFixed(3),14,24);
  if(sDx<0.1){
    cx.fillStyle='rgba(255,255,255,.5)';cx.font='12px monospace';
    cx.fillText('= f\u2032(1) = 2',14,42);
  }
  // True derivative reference
  cx.fillStyle='rgba(255,255,255,.3)';cx.font='11px monospace';cx.textAlign='right';
  cx.fillText(T('dok\u0142adne','true')+' f\u2032(1) = 2.000',W-10,24);
}

function drawStage1(){
  // Derivative as slope: f(x)=x^2, movable point
  const gv = new GraphView(cx, { rect:[0,0,W,H], xRange:[-6,6], yRange:[-2.6,8.8], scale:50 });
  gv.drawGrid();
  gv.drawAxes();
  const f=x=>x*x;
  gv.plotFn(f, {color:CURVE, lineWidth:2.5});

  const x0=sX0;
  const y0=f(x0);
  const slope=2*x0;

  // Tangent line
  gv.tangentLine(f, x0, {color:TANG, lineWidth:2, derivFn:x=>2*x});

  gv.dot(x0, y0, {radius:6, color:CURVE});

  // Labels
  cx.fillStyle=TANG;cx.font='bold 13px monospace';cx.textAlign='left';
  cx.fillText(T('nachylenie','slope')+' = f\u2032('+x0.toFixed(2)+') = '+slope.toFixed(2),14,24);
  cx.fillStyle='rgba(255,255,255,.5)';cx.font='12px monospace';
  cx.fillText('f\u2032(x) = 2x',14,42);

  // Derivative value bar on right side
  const barX=W-30, barH=160, barY0=gv.py(0);
  cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=1;
  cx.beginPath();cx.moveTo(barX,barY0+20);cx.lineTo(barX,barY0-barH);cx.stroke();
  // marker
  const markerY=Math.max(barY0-barH,Math.min(barY0+20, gv.py(0)-slope*gv.scale/4*2));
  cx.fillStyle=DERIV;cx.font='11px monospace';cx.textAlign='right';
  cx.fillText('f\u2032='+slope.toFixed(2),barX-6,markerY+4);
  gv.dotScreen(barX,markerY,{radius:4,color:DERIV});

  // Point coordinates
  cx.fillStyle='rgba(255,255,255,.4)';cx.font='11px monospace';cx.textAlign='left';
  cx.fillText('('+x0.toFixed(2)+', '+y0.toFixed(2)+')', gv.px(x0)+10, gv.py(y0)-8);
}

function drawStage2(){
  // f(x) vs f'(x) split view
  const topH=210, gap=20, botTop=topH+gap;
  const botH=H-botTop;

  const top = new GraphView(cx, { rect:[0,0,W,topH], xRange:[-4,4], yRange:[-3,3] });
  const bot = new GraphView(cx, { rect:[0,botTop,W,botH], xRange:[-4,4], yRange:[-4,4] });

  const f=x=>x*x*x-3*x;
  const fp=x=>3*x*x-3;

  // Top panel: f(x)
  top.beginClip();
  top.drawGrid();
  top.drawAxes();

  // Shading for sign of f' on top panel (very subtle)
  top.shadeRect(-4, -3, -1, 3, { color: TANG, alpha: 0.05 });
  top.shadeRect(1, -3, 4, 3, { color: TANG, alpha: 0.05 });
  top.shadeRect(-1, -3, 1, 3, { color: '#FF6B6B', alpha: 0.05 });

  top.plotFn(f, {color:CURVE, lineWidth:2.5, domain:[-3,3]});
  top.endClip();

  // Divider
  GraphView.drawDivider(cx, topH, gap);
  cx.strokeStyle='rgba(255,255,255,.08)';cx.lineWidth=0.5;
  cx.beginPath();cx.moveTo(0,topH);cx.lineTo(W,topH);cx.stroke();
  cx.beginPath();cx.moveTo(0,topH+gap);cx.lineTo(W,topH+gap);cx.stroke();

  // Bottom panel: f'(x)
  bot.beginClip();
  bot.drawGrid();
  bot.drawAxes();
  // Zero line on bottom
  bot.horizontalLine(0, {color:'rgba(255,255,255,.12)', lineWidth:1, dash:[4,4]});
  bot.plotFn(fp, {color:DERIV, lineWidth:2.5, domain:[-3,3]});
  bot.endClip();

  // Synced vertical line across both panels
  const x=sXsync;
  cx.setLineDash([3,3]);cx.strokeStyle='rgba(255,255,255,.25)';cx.lineWidth=1;
  const vpx=top.px(x);
  cx.beginPath();cx.moveTo(vpx,0);cx.lineTo(vpx,H);cx.stroke();
  cx.setLineDash([]);

  // Points on curves
  const yf=f(x), yfp=fp(x);
  const ptTopY=top.py(yf);
  const ptBotY=bot.py(yfp);
  if(ptTopY>0&&ptTopY<topH) top.dot(x, yf, {radius:5, color:CURVE});
  if(ptBotY>botTop&&ptBotY<H) bot.dot(x, yfp, {radius:5, color:DERIV});

  // Critical point markers (x = -1, x = 1)
  [-1,1].forEach(cx0=>{
    const cpy_top=top.py(f(cx0));
    const cpx=top.px(cx0);
    if(cpy_top>0&&cpy_top<topH){
      top.dot(cx0, f(cx0), {radius:4, color:ROOT});
      cx.fillStyle=ROOT;cx.font='10px monospace';cx.textAlign='center';
      cx.fillText(cx0===-1?T('maks.','max'):T('min.','min'), cpx, cpy_top+(cx0===-1?-10:14));
    }
    bot.dot(cx0, 0, {radius:4, color:ROOT});
  });

  // Labels
  cx.fillStyle=CURVE;cx.font='bold 12px monospace';cx.textAlign='left';
  cx.fillText('f(x) = x\u00B3 \u2212 3x',10,16);
  cx.fillStyle=DERIV;cx.fillText('f\u2032(x) = 3x\u00B2 \u2212 3',10,botTop+16);

  // Values at sync point
  cx.fillStyle='rgba(255,255,255,.5)';cx.font='11px monospace';cx.textAlign='right';
  cx.fillText('f('+x.toFixed(2)+') = '+yf.toFixed(2),W-10,16);
  cx.fillText('f\u2032('+x.toFixed(2)+') = '+yfp.toFixed(2),W-10,botTop+16);

  // Sign indicator
  const sign=yfp>0.01?T('> 0  (rosn\u0105ca)','> 0  (increasing)'):yfp<-0.01?T('< 0  (malej\u0105ca)','< 0  (decreasing)'):T('\u2248 0  (ekstremum)','\u2248 0  (extremum)');
  const signCol=yfp>0.01?TANG:yfp<-0.01?'#FF6B6B':ROOT;
  cx.fillStyle=signCol;cx.font='11px monospace';cx.textAlign='right';
  cx.fillText('f\u2032 '+sign,W-10,botTop+32);
}

function drawStage3(){
  // Power rule: f(x) = x^n, f'(x) = nx^(n-1)
  const gv = new GraphView(cx, { rect:[0,0,W,H], xRange:[-6,6], yRange:[-3.2,8.8], scale:50 });
  gv.drawGrid();
  gv.drawAxes();

  const n=sN;
  const f=x=>Math.pow(x,n);
  const fp=x=>n*Math.pow(x,n-1);

  gv.plotFn(f, {color:CURVE, lineWidth:2.5, domain:[-3,3]});
  gv.plotFn(fp, {color:DERIV, lineWidth:2, domain:[-3,3]});

  // Labels
  const supN=['\u00B9','\u00B2','\u00B3','\u2074','\u2075'];
  const supNm1=['\u2070','\u00B9','\u00B2','\u00B3','\u2074'];
  const nStr=supN[n-1]||n;
  const nm1Str=n===1?'':n===2?'x':'x'+supNm1[n-2];

  cx.fillStyle=CURVE;cx.font='bold 13px monospace';cx.textAlign='left';
  cx.fillText('f(x) = x'+nStr,14,24);
  cx.fillStyle=DERIV;cx.font='bold 13px monospace';
  if(n===1){
    cx.fillText('f\u2032(x) = 1',14,42);
  } else {
    cx.fillText('f\u2032(x) = '+n+nm1Str,14,42);
  }

  // Legend
  cx.fillStyle=CURVE;cx.font='11px monospace';cx.textAlign='right';
  cx.fillText('\u2500\u2500 f(x)',W-10,24);
  cx.fillStyle=DERIV;
  cx.fillText('\u2500\u2500 f\u2032(x)',W-10,40);

  // At x=1 show both values
  const x1=1,y1=f(x1),yp1=fp(x1);
  gv.dot(x1, y1, {radius:4, color:CURVE});
  gv.dot(x1, yp1, {radius:4, color:DERIV});
  cx.fillStyle='rgba(255,255,255,.4)';cx.font='10px monospace';cx.textAlign='left';
  cx.fillText('f(1)='+y1.toFixed(0), gv.px(x1)+8, gv.py(y1)-4);
  cx.fillText('f\u2032(1)='+yp1.toFixed(0), gv.px(x1)+8, gv.py(yp1)+14);
}

function drawStage4(){
  // Extrema: f(x) = x^3 - 3x + 1
  const gv = new GraphView(cx, { rect:[0,0,W,H], xRange:[-6.25,6.25], yRange:[-3.3,8.3], scale:48 });
  gv.drawGrid();
  gv.drawAxes();

  const f=x=>x*x*x-3*x+1;
  const fp=x=>3*x*x-3;

  gv.plotFn(f, {color:CURVE, lineWidth:2.5, domain:[-3,3]});
  gv.plotFn(fp, {color:DERIV, lineWidth:1.8, domain:[-3,3]});

  // Critical points: x = -1, x = 1
  const crits=[
    {x:-1, label:T('maks. lok.','local max'), yOff:-14},
    {x:1,  label:T('min. lok.','local min'), yOff:16}
  ];

  crits.forEach(cp=>{
    // Dashed vertical at critical point
    gv.verticalLine(cp.x, {color:'rgba(255,209,102,.2)', lineWidth:1, dash:[3,4]});

    // Point on f
    gv.dot(cp.x, f(cp.x), {radius:6, color:ROOT});
    // Point on f' (should be at y=0)
    gv.dot(cp.x, 0, {radius:4, color:DERIV});

    // Label
    const cpx=gv.px(cp.x), cpy=gv.py(f(cp.x));
    cx.fillStyle=ROOT;cx.font='bold 11px monospace';cx.textAlign='center';
    cx.fillText(cp.label,cpx,cpy+cp.yOff);
    cx.fillStyle='rgba(255,255,255,.4)';cx.font='10px monospace';
    cx.fillText('('+cp.x+', '+f(cp.x).toFixed(1)+')',cpx,cpy+cp.yOff+(cp.yOff>0?14:-14));
  });

  // Sign diagram for f'
  cx.fillStyle='rgba(14,14,18,.85)';
  cx.fillRect(8,H-48,240,42);
  cx.strokeStyle='rgba(255,255,255,.1)';cx.lineWidth=0.5;
  cx.strokeRect(8,H-48,240,42);

  cx.font='11px monospace';cx.textAlign='left';
  cx.fillStyle='rgba(255,255,255,.5)';cx.fillText(T('znak f\u2032:','f\u2032 sign:'),16,H-32);
  cx.fillStyle=TANG;cx.fillText('+ + +',76,H-32);
  cx.fillStyle='rgba(255,255,255,.3)';cx.fillText('|',118,H-32);
  cx.fillStyle='#FF6B6B';cx.fillText('\u2212 \u2212 \u2212',126,H-32);
  cx.fillStyle='rgba(255,255,255,.3)';cx.fillText('|',168,H-32);
  cx.fillStyle=TANG;cx.fillText('+ + +',176,H-32);

  cx.fillStyle='rgba(255,255,255,.35)';cx.font='10px monospace';
  cx.fillText('x<\u22121',82,H-16);
  cx.fillText('\u22121<x<1',122,H-16);
  cx.fillText('x>1',182,H-16);

  // Labels
  cx.fillStyle=CURVE;cx.font='bold 12px monospace';cx.textAlign='left';
  cx.fillText('f(x) = x\u00B3 \u2212 3x + 1',14,20);
  cx.fillStyle=DERIV;cx.fillText('f\u2032(x) = 3x\u00B2 \u2212 3',14,38);

  // f'(x)=0 label
  cx.fillStyle='rgba(255,255,255,.4)';cx.font='11px monospace';cx.textAlign='right';
  cx.fillText(T('f\u2032(x) = 0 dla x = \u00B11','f\u2032(x) = 0 at x = \u00B11'),W-10,20);
  cx.fillStyle='rgba(255,255,255,.28)';cx.font='10px monospace';
  cx.fillText(T('zmiana znaku f\u2032 \u2192 ekstremum','sign change of f\u2032 \u2192 extremum'),W-10,34);
}

// ── Main loop ──
function tick(){
  cx.fillStyle='#0e0e12';cx.fillRect(0,0,W,H);
  switch(stage){
    case 0: drawStage0(); break;
    case 1: drawStage1(); break;
    case 2: drawStage2(); break;
    case 3: drawStage3(); break;
    case 4: drawStage4(); break;
  }
  requestAnimationFrame(tick);
}

document.getElementById('qprev').innerHTML='&larr; '+T('wstecz','prev');
document.getElementById('qnext').innerHTML=T('dalej','next')+' &rarr;';
goTo(0);
tick();
})();
</script>
