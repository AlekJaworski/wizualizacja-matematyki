<!DOCTYPE html>
<html lang="pl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.css">
<script defer src="https://cdn.jsdelivr.net/npm/katex@0.16.9/dist/katex.min.js"></script>
<title>Równania logarytmiczne — Warsztat (Bramka Dziedziny)</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0e0e12; font-family: monospace; display: flex; justify-content: center; padding: 2rem 1rem; min-height: 100vh; color: rgba(255,255,255,.85); }
  .wrap { width: 100%; max-width: 640px; }
  canvas { width: 100%; display: block; border-radius: 10px 10px 0 0; background: #0e0e12; }
  .panel { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-top: 0.5px solid rgba(255,255,255,.07); border-radius: 0 0 10px 10px; padding: .875rem 1.25rem; }

  .head { display: flex; align-items: baseline; justify-content: space-between; margin-bottom: 6px; }
  .head .step { font-size: 11px; color: rgba(255,255,255,.4); letter-spacing: .04em; }
  .head .title { font-size: 16px; font-weight: 500; color: #58C4DD; letter-spacing: .02em; }
  .desc { font-size: 13px; line-height: 1.65; color: rgba(255,255,255,.62); margin-bottom: 10px; min-height: 34px; }

  .pips { display: flex; gap: 14px; flex-wrap: wrap; margin: 4px 0 10px; font-size: 12px; }
  .pip { display: inline-flex; align-items: center; gap: 6px; color: rgba(255,255,255,.55); }
  .pip .mark { width: 14px; height: 14px; border-radius: 50%; border: 1px solid rgba(255,255,255,.25); display: inline-flex; align-items: center; justify-content: center; font-size: 10px; line-height: 1; }
  .pip.ok { color: #83C167; }
  .pip.ok .mark { background: #83C167; border-color: #83C167; color: #0e0e12; }
  .pip.ok .mark::before { content: "\2713"; }

  .predict { margin-bottom: 10px; }
  .predict .q { font-size: 13px; color: rgba(255,255,255,.82); margin-bottom: 8px; line-height: 1.55; }
  .predict .opts { display: flex; flex-direction: column; gap: 6px; }
  .predict button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .predict button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .predict button.picked { border-color: #58C4DD; color: #58C4DD; }
  .predict .feedback { margin-top: 8px; font-size: 12px; line-height: 1.55; color: rgba(255,255,255,.7); padding: 8px 10px; border-left: 2px solid #58C4DD; background: rgba(88,196,221,.06); border-radius: 0 4px 4px 0; }

  /* Choices */
  .choices { display: flex; flex-direction: column; gap: 6px; margin-bottom: 10px; }
  .choices button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.78); padding: 8px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .choices button:hover { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.4); }
  .choices button.picked { border-color: #58C4DD; color: #58C4DD; }
  .choices button.wrong { border-color: #FF6B6B; color: #FF6B6B; background: rgba(255,107,107,.06); }
  .choices button.correct { border-color: #83C167; color: #83C167; background: rgba(131,193,103,.08); }

  /* Debug widget */
  .debug { margin-bottom: 10px; }
  .debug-task { font-size: 13px; color: rgba(255,255,255,.82); margin-bottom: 10px; line-height: 1.55; padding: 8px 10px; border-left: 2px solid #58C4DD; background: rgba(88,196,221,.06); border-radius: 0 4px 4px 0; }
  .debug-steps { display: flex; flex-direction: column; gap: 4px; }
  .debug-step { display: flex; align-items: flex-start; gap: 10px; background: transparent; border: 0.5px solid rgba(255,255,255,.15); color: rgba(255,255,255,.8); padding: 8px 12px; font-size: 13px; line-height: 1.5; border-radius: 6px; cursor: pointer; font-family: monospace; text-align: left; transition: background .15s, border-color .15s; }
  .debug-step:hover:not(:disabled) { background: rgba(255,255,255,.05); border-color: rgba(255,255,255,.45); }
  .debug-step:disabled { cursor: default; opacity: .85; }
  .debug-step .debug-n { color: rgba(255,255,255,.4); min-width: 20px; }
  .debug-step .debug-text { flex: 1; }
  .debug-step.wrong { border-color: #FF6B6B; background: rgba(255,107,107,.08); color: #FF6B6B; }
  .debug-step.correct { border-color: #83C167; background: rgba(131,193,103,.1); color: #83C167; }
  .debug-feedback { margin-top: 10px; font-size: 12px; line-height: 1.55; padding: 8px 10px; border-radius: 0 4px 4px 0; }
  .debug-feedback.ok { color: rgba(255,255,255,.82); border-left: 2px solid #83C167; background: rgba(131,193,103,.06); }
  .debug-feedback.bad { color: rgba(255,255,255,.78); border-left: 2px solid #FF6B6B; background: rgba(255,107,107,.06); }

  .hints { font-size: 12px; color: rgba(255,255,255,.5); margin: 4px 0 10px; line-height: 1.55; }
  .hints .hint { padding: 6px 10px; border-left: 2px solid #FFD166; background: rgba(255,209,102,.05); margin-top: 4px; border-radius: 0 4px 4px 0; }

  .nav { display: flex; align-items: center; justify-content: space-between; margin-top: 6px; }
  .nav button { background: transparent; border: 0.5px solid rgba(255,255,255,.25); color: rgba(255,255,255,.7); padding: 5px 14px; font-size: 13px; border-radius: 6px; cursor: pointer; font-family: monospace; transition: background .15s; }
  .nav button:hover:not(:disabled) { background: rgba(255,255,255,.08); }
  .nav button:disabled { opacity: .3; cursor: default; }
  .nav button.primary { border-color: #83C167; color: #83C167; }
  .nav button.primary:hover { background: rgba(131,193,103,.1); }

  .dots { display: flex; gap: 8px; }
  .dot { width: 9px; height: 9px; border-radius: 50%; display: inline-block; cursor: pointer; background: rgba(255,255,255,.15); transition: background .2s; }
  .dot.active { background: #58C4DD; }
  .dot.done { background: #83C167; }

  .solved-note { font-size: 13px; color: #83C167; line-height: 1.55; padding: 8px 10px; border-left: 2px solid #83C167; background: rgba(131,193,103,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }
  .wrapup-note { font-size: 13px; color: #C78DFF; line-height: 1.55; padding: 10px 12px; border-left: 2px solid #C78DFF; background: rgba(199,141,255,.06); border-radius: 0 4px 4px 0; margin-bottom: 8px; }

  .banner { background: #16161a; border: 0.5px solid rgba(255,255,255,.1); border-bottom: 0; border-radius: 10px 10px 0 0; padding: 14px 18px; color: rgba(255,255,255,.72); font-size: 13px; line-height: 1.6; }
  .banner b { color: #FFD166; font-weight: 500; }
</style>
</head>
<body>
<div class="wrap">
  <div class="banner">
    <b>Bramka Dziedziny.</b> Każde rozwiązanie równania logarytmicznego musi przejść przez bramkę, która sprawdza dziedzinę ($\log$ wymaga argumentu $> 0$). Algebraiczne rozwiązanie $\neq$ prawdziwe rozwiązanie — spotkasz tu liczby matematycznie poprawne, ale odrzucone przez bramkę.
  </div>
  <canvas id="cv" width="600" height="310"></canvas>
  <div class="panel">
    <div class="head">
      <span class="step" id="step"></span>
      <div class="dots" id="dots"></div>
    </div>
    <p class="title" id="title"></p>
    <p class="desc" id="desc"></p>
    <div id="predict"></div>
    <div id="sliders-wrap"></div>
    <div id="choices-wrap"></div>
    <div id="debug-wrap"></div>
    <div class="pips" id="pips"></div>
    <div class="hints" id="hints"></div>
    <div id="solved-msg"></div>
    <div class="nav">
      <button id="prev">&larr;</button>
      <button id="next" class="primary">Dalej &rarr;</button>
    </div>
  </div>
</div>

<script type="module">
import { initWarsztat, renderMath } from '../lib/warsztat-core.js';
import { drawDomainGate, drawMiniGate } from '../lib/domain-gate.js';
{
  const cv = document.getElementById('cv');
  const ctx = cv.getContext('2d');
  const W = 600, H = 310;

  // A monotonic animation clock used by the gate helpers.
  let T0 = performance.now();
  function now() { return (performance.now() - T0) / 1000; }

  // Helper: fill canvas background + banner-esque title strip.
  function clearCanvas() {
    ctx.fillStyle = '#0e0e12';
    ctx.fillRect(0, 0, W, H);
  }

  // Helper: render a KaTeX-style formula into an offscreen HTML element
  // then paint as image? Too heavy. Instead, we keep canvas text plain and
  // put the proper KaTeX in the DOM desc. Canvas shows ASCII-style shorthand.

  // ── Challenge-local state ───────────────────────────────────
  const C = {
    // Ch.1
    ch1Pick: null,
    // Ch.2
    ch2Pick: null,
    // Ch.3
    ch3Pick: null,
    // Ch.5 has no work phase beyond predict — predictAfter handles transfer.
  };

  // Shared text helpers
  function drawHeader(text, subtitle) {
    ctx.save();
    ctx.font = 'bold 13px monospace';
    ctx.fillStyle = 'rgba(255,255,255,0.88)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillText(text, W / 2, 10);
    if (subtitle) {
      ctx.font = '11px monospace';
      ctx.fillStyle = 'rgba(255,255,255,0.48)';
      ctx.fillText(subtitle, W / 2, 28);
    }
    ctx.restore();
  }

  // ── Challenges ──────────────────────────────────────────────
  const challenges = [

    // ═══════════════════════════════════════════════════════════
    // Ch.1 — Dziedzina przed rozwiązaniem (warm-up)
    // ═══════════════════════════════════════════════════════════
    {
      id: 'ch1',
      title: 'Dziedzina przed rozwi\u0105zaniem',
      desc: 'R\u00F3wnanie: $\\log_2(x - 3) = 4$. Najpierw zapisz dziedzin\u0119, potem rozwi\u0105\u017C. Ka\u017Cdy kandydat musi przej\u015B\u0107 przez **Bramk\u0119 Dziedziny**.',
      drawBackground: 'blank',
      init() { C.ch1Pick = null; },
      predict: {
        question: 'Przed rozwi\u0105zaniem: jakie warunki na $x$ musi spe\u0142ni\u0107?',
        options: [
          { label: '$x > 0$',        correct: false, why: 'Taki warunek pasowałby do $\\log_2 x$, ale tutaj logarytm działa na $x - 3$, więc to wyrażenie $x - 3$ musi być dodatnie.' },
          { label: '$x > 3$',        correct: true,  why: 'Argument $\\log_2(x-3)$ musi być dodatni, więc $x - 3 > 0$.' },
          { label: '$x \\geq 3$',    correct: false, why: 'Niemal poprawnie, ale $\\log_2 0$ nie istnieje, więc wymagamy nierówności ściśle większej.' },
          { label: 'brak warunk\u00F3w', correct: false, why: 'Każdy logarytm ma ograniczoną dziedzinę — jej zapisanie jest pierwszym krokiem w każdym zadaniu.' },
        ],
      },
      choices: {
        question: 'Jak rozwi\u0105za\u0107 $\\log_2(x-3) = 4$?',
        options: [
          { id: 'a', label: '$x - 3 = 2^4 = 16$, wi\u0119c $x = 19$', correct: true },
          { id: 'b', label: '$x - 3 = \\log_2 4$, wi\u0119c $x = 5$',  correct: false },
          { id: 'c', label: '$x = 4 \\cdot 2 + 3 = 11$',              correct: false },
        ],
        pick(id) { C.ch1Pick = id; },
      },
      pips() {
        return [
          { label: 'dziedzina: $x > 3$', ok: true }, // assumed after predict
          { label: 'rozwi\u0105zanie wybrane', ok: C.ch1Pick === 'a' },
        ];
      },
      solved() { return C.ch1Pick === 'a'; },
      hints: [
        '\u2460 Najpierw **dziedzina**: $x - 3 > 0 \\Rightarrow x > 3$. Zapisz ten warunek od razu.',
        '\u2461 Teraz rozwi\u0105zanie: zamie\u0144 $\\log_2 A = 4$ na $A = 2^4$. Tu $A = x - 3$, wi\u0119c $x - 3 = 16$.',
        '\u2462 $x = 19$. Sprawd\u017A z dziedzin\u0105: $19 > 3$ \u2713. Bramka przepuszcza.',
      ],
      solvedMsg: 'W każdym zadaniu logarytmicznym zaczynamy od zapisania dziedziny, a dopiero potem rozwiązujemy algebraicznie — bez dziedziny można otrzymać liczbę, która wcale równania nie spełnia.',
      draw() {
        clearCanvas();
        // Build candidates based on current pick
        const candidates = [];
        if (C.ch1Pick === 'a' || C.ch1Pick === null) {
          candidates.push({ value: 19, label: 'x=19', passed: true, note: '19 > 3 \u2713' });
        }
        if (C.ch1Pick === 'b') {
          candidates.push({ value: 19, label: 'x=19', passed: true });
          candidates.push({ value: 5,  label: 'x=5',  passed: false, note: '5 > 3? tak — ale nie spe\u0142nia r\u00F3wnania' });
        }
        if (C.ch1Pick === 'c') {
          candidates.push({ value: 19, label: 'x=19', passed: true });
          candidates.push({ value: 11, label: 'x=11', passed: false, note: 'to nie rozwi\u0105zanie r\u00F3wnania' });
        }

        drawDomainGate(ctx, {
          bounds: { x: 10, y: 10, w: W - 20, h: H - 20 },
          title: 'log\u2082(x \u2212 3) = 4',
          subtitle: 'Dziedzina: x \u2212 3 > 0, czyli x > 3',
          domain: { label: 'x > 3', predicate: v => v > 3 },
          candidates,
          t: now(),
        });
      },
    },

    // ═══════════════════════════════════════════════════════════
    // Ch.2 — Ekstraneal root (the punch)
    // ═══════════════════════════════════════════════════════════
    {
      id: 'ch2',
      title: 'Pierwiastek pozorny — bramka odrzuca',
      desc: 'Rozwiązujemy $\\log_2(x^2 - 9) = \\log_2(x + 3)$. Obaj kandydaci z równania kwadratowego spróbują przejść — o tym, który przechodzi, decyduje bramka dziedziny.',
      drawBackground: 'blank',
      init() { C.ch2Pick = null; },
      predict: {
        question: 'Czy $x = -3$ mo\u017Ce by\u0107 rozwi\u0105zaniem?',
        options: [
          { label: 'Tak — przecie\u017C $x^2 - 9 = x + 3$ ma $-3$ jako pierwiastek.', correct: false, why: 'Podstawiając do oryginalnego równania, dostajemy $\\log_2((-3)^2 - 9) = \\log_2 0$, a taka wartość logarytmu nie istnieje.' },
          { label: 'Nie — spe\u0142nia r\u00F3wnanie algebraiczne, ale nie dziedzin\u0119.', correct: false, why: 'Bliski trop, ale precyzyjniej: dziedzinę wyznaczamy najpierw, a dopiero potem sprawdzamy w niej kandydatów.' },
          { label: 'Trzeba sprawdzi\u0107 w dziedzinie.', correct: true, why: 'Reguła mówi: najpierw dziedzina. Dla $\\log_2(x^2-9) = \\log_2(x+3)$ wymagamy jednocześnie $x^2 > 9$ oraz $x+3 > 0$, czyli $x > 3$.' },
        ],
      },
      choices: {
        question: 'Jaki jest prawid\u0142owy zbi\u00F3r rozwi\u0105za\u0144?',
        options: [
          { id: 'both', label: '$\\{-3,\\ 4\\}$ — oba pierwiastki kwadratowego', correct: false },
          { id: 'only4', label: '$\\{4\\}$ — tylko $4$ przechodzi bramk\u0119', correct: true },
          { id: 'onlyneg', label: '$\\{-3\\}$', correct: false },
        ],
        pick(id) { C.ch2Pick = id; },
      },
      pips() {
        return [
          { label: 'dziedzina: $x > 3$', ok: true },
          { label: 'kandydaci policzeni: $-3, 4$', ok: true },
          { label: 'bramka zastosowana', ok: C.ch2Pick === 'only4' },
        ];
      },
      solved() { return C.ch2Pick === 'only4'; },
      hints: [
        '\u2460 Dziedzina: jednocze\u015Bnie $x^2 - 9 > 0$ (czyli $x > 3$ lub $x < -3$) ORAZ $x + 3 > 0$ (czyli $x > -3$). Przeci\u0119cie: $x > 3$.',
        '\u2461 Rozwi\u0105zanie algebraiczne: $x^2 - 9 = x + 3 \\Rightarrow x^2 - x - 12 = 0 \\Rightarrow (x-4)(x+3) = 0$.',
        '\u2462 Kandydaci: $x = 4$ (przechodzi \u2713) i $x = -3$ (nie spe\u0142nia $x > 3$ — bramka odrzuca). Zbi\u00F3r: $\\{4\\}$.',
      ],
      solvedMsg: 'Każdego kandydata warto zweryfikować z dziedziną — rozwiązania, które do niej nie należą, są pozorne i nie zaliczają się do zbioru rozwiązań.',
      draw() {
        clearCanvas();
        drawDomainGate(ctx, {
          bounds: { x: 10, y: 10, w: W - 20, h: H - 20 },
          title: 'log\u2082(x\u00B2 \u2212 9) = log\u2082(x + 3)',
          subtitle: 'Dziedzina: x\u00B2 > 9 i x + 3 > 0  \u21D2  x > 3',
          domain: { label: 'x > 3', predicate: v => v > 3 },
          candidates: [
            { value: 4,  label: 'x=4',  passed: true,  note: '4 > 3 \u2713' },
            { value: -3, label: 'x=\u22123', passed: false, note: '\u22123 + 3 = 0, log\u2082 0 nie istnieje' },
          ],
          t: now(),
        });
      },
    },

    // ═══════════════════════════════════════════════════════════
    // Ch.3 — Substytucja
    // ═══════════════════════════════════════════════════════════
    {
      id: 'ch3',
      title: 'Podstawienie: $(\\log_2 x)^2 - 3\\log_2 x + 2 = 0$',
      desc: 'Tym razem pułapka tkwi nie w dziedzinie, lecz w samym podstawieniu — bramka $x > 0$ i tak czeka na końcu.',
      drawBackground: 'blank',
      init() { C.ch3Pick = null; },
      predict: {
        question: 'Jak rozwi\u0105za\u0107 to r\u00F3wnanie?',
        options: [
          { label: 'Podnie\u015B\u0107 obie strony do kwadratu',         correct: false, why: 'W równaniu pojawia się kwadrat logarytmu, a nie kwadrat całego wyrażenia — podnoszenie stron do kwadratu niczego nie porządkuje.' },
          { label: 'Podstawienie $t = \\log_2 x$, rozwi\u0105za\u0107 $t^2 - 3t + 2 = 0$', correct: true, why: 'Takie podstawienie sprowadza całość do zwykłego równania kwadratowego w zmiennej $t$.' },
          { label: 'Bezpo\u015Brednio podstawi\u0107 $x = 2^?$',        correct: false, why: 'Pomysłowe, ale znacznie trudniejsze rachunkowo — podstawienie $t = \\log_2 x$ jest czytelniejsze.' },
        ],
      },
      choices: {
        question: 'Zbi\u00F3r rozwi\u0105za\u0144 w $x$:',
        options: [
          { id: 'x24', label: '$\\{2,\\ 4\\}$',                 correct: true },
          { id: 'x12', label: '$\\{1,\\ 2\\}$ (pomy\u0142ka przy wracaniu $t \\to x$)', correct: false },
          { id: 't12', label: '$\\{t=1,\\ t=2\\}$ (zapomnia\u0142e\u015B wr\u00F3ci\u0107 do $x$)', correct: false },
        ],
        pick(id) { C.ch3Pick = id; },
      },
      pips() {
        return [
          { label: 'podstawienie $t = \\log_2 x$', ok: true },
          { label: 'rozwi\u0105zane w $t$: $t \\in \\{1, 2\\}$', ok: true },
          { label: 'powr\u00F3t do $x$', ok: C.ch3Pick === 'x24' },
        ];
      },
      solved() { return C.ch3Pick === 'x24'; },
      hints: [
        '\u2460 Je\u015Bli widzisz $(\\log x)^2$, **podstaw** $t = \\log x$. R\u00F3wnanie staje si\u0119 kwadratowe w $t$.',
        '\u2461 Rozwi\u0105\u017C kwadratowe: $t^2 - 3t + 2 = 0 \\Rightarrow (t-1)(t-2) = 0 \\Rightarrow t = 1$ lub $t = 2$.',
        '\u2462 Wr\u00F3\u0107 do $x$: $\\log_2 x = 1 \\Rightarrow x = 2$;  $\\log_2 x = 2 \\Rightarrow x = 4$. Bramka $x > 0$ — oba pasuj\u0105.',
      ],
      solvedMsg: 'Gdy w równaniu pojawia się $(\\log x)^2$ lub $a \\cdot \\log x + b$, podstawienie $t = \\log x$ sprowadza je do zwykłego równania kwadratowego. Po wyznaczeniu $t$ trzeba pamiętać o powrocie do zmiennej $x$.',
      draw() {
        clearCanvas();
        // Visual: a "flow" diagram above the gate showing the substitution.
        ctx.save();
        ctx.font = 'bold 12px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.88)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'top';
        ctx.fillText('(log\u2082 x)\u00B2 \u2212 3\u00B7log\u2082 x + 2 = 0', W / 2, 8);

        ctx.font = '11px monospace';
        ctx.fillStyle = 'rgba(255,209,102,0.85)';
        ctx.fillText('podstaw t = log\u2082 x   \u2192   t\u00B2 \u2212 3t + 2 = 0   \u2192   t \u2208 {1, 2}   \u2192   x \u2208 {2, 4}', W / 2, 26);
        ctx.restore();

        // Show either both candidates passing, or student's wrong set.
        let candidates;
        if (C.ch3Pick === 'x12') {
          candidates = [
            { value: 2, label: 'x=2', passed: true, note: 't=1 \u2192 x=2 \u2713' },
            { value: 1, label: 'x=1', passed: false, note: 'b\u0142\u0105d: z t=1 wychodzi x=2, nie 1' },
          ];
        } else if (C.ch3Pick === 't12') {
          candidates = [
            { value: 't1', label: 't=1', passed: false, note: 'nie wr\u00F3ci\u0142e\u015B do x' },
            { value: 't2', label: 't=2', passed: false, note: 'nie wr\u00F3ci\u0142e\u015B do x' },
          ];
        } else {
          candidates = [
            { value: 2, label: 'x=2', passed: true, note: '2 > 0 \u2713' },

          ];
        }

        drawDomainGate(ctx, {
          bounds: { x: 10, y: 48, w: W - 20, h: H - 58 },
          title: null,
          subtitle: null,
          domain: { label: 'x > 0', predicate: v => typeof v === 'number' && v > 0 },
          candidates,

      },
    },

    // ═══════════════════════════════════════════════════════════
    // Ch.4 — Debug Jana
    // ═══════════════════════════════════════════════════════════
    {
      id: 'ch4',
      title: 'Debug: czego Jan nie zauwa\u017Cy\u0142',
      desc: 'Wskaż krok, w którym Jan popełnił błąd — a być może coś istotnego pominął.',
      drawBackground: 'blank',
      init() {},
      debug: {
        task: 'Jan rozwi\u0105zuje <b>log\u2082(x \u2212 1) + log\u2082(x + 2) = 2</b> i pisze:',
        steps: [
          { n: 1, text: 'log\u2082((x \u2212 1)(x + 2)) = 2   [z wzoru na sum\u0119 logarytm\u00F3w]' },
          { n: 2, text: '(x \u2212 1)(x + 2) = 4' },
          { n: 3, text: 'x\u00B2 + x \u2212 6 = 0   \u2192   (x + 3)(x \u2212 2) = 0' },

        errorLine: 4,

          1: 'Krok 1 jest poprawny — $\\log_a M + \\log_a N = \\log_a(MN)$ obowi\u0105zuje.',

          3: 'Krok 3 jest poprawny — $(x+3)(x-2)$ rzeczywi\u015Bcie daje $x^2+x-6$.',

        correctExplanation: 'Jan pomin\u0105\u0142 <b>dziedzin\u0119</b>. Wymagamy jednocze\u015Bnie $x - 1 > 0$ i $x + 2 > 0$, czyli $x > 1$. Z dw\u00F3ch kandydat\u00F3w $(-3, 2)$ tylko $2$ spe\u0142nia $x > 1$. Rozwi\u0105zanie: $\\{2\\}$, nie $\\{-3, 2\\}$. Bramka odrzuca $-3$.',
        // Need renderMath for the steps? They use plain Unicode/HTML — OK.
      },
      pips: () => [],
      solved: () => false,
      hints: [
        'Przejrzyj ka\u017Cdy krok — czy algebra si\u0119 zgadza? A je\u015Bli tak, to co zostaje?',
        'Jan nigdzie nie zapisa\u0142 dziedziny. Czy oba pierwiastki pasuj\u0105 do dziedziny oryginalnego r\u00F3wnania?',
        'Dla $\\log_2(x-1)$ wymagamy $x > 1$. Czy $-3 > 1$?',
      ],
      solvedMsg: 'Jan pominął bramkę dziedziny. Błąd nie leży w algebrze, lecz w logice — zbiór rozwiązań równania logarytmicznego to część wspólna rozwiązań równania algebraicznego i dziedziny.',
      draw() {
        clearCanvas();
        drawDomainGate(ctx, {
          bounds: { x: 10, y: 10, w: W - 20, h: H - 20 },

    // ═══════════════════════════════════════════════════════════

    {
      id: 'ch5',
      title: 'Trzy bramki logarytmu',
      desc: 'Ograniczenia ma nie tylko argument, lecz także **podstawa** logarytmu. W równaniu $\\log_x 9 = 2$: jakie wartości $x$ są dozwolone?',
      drawBackground: 'blank',
      init() {},
      predict: {
        question: 'R\u00F3wnanie $\\log_x 9 = 2$. Jakie warunki na $x$?',
        options: [
          { label: '$x > 0$',                    correct: false, why: 'Ten warunek jest niewystarczający — podstawa logarytmu ma dodatkowe ograniczenie.' },
          { label: '$x > 0$ i $x \\neq 1$',      correct: true,  why: 'Podstawa logarytmu musi być dodatnia i różna od $1$ — gdyby $x = 1$, to $1^a = 1$ dla każdego $a$ i równanie byłoby niejednoznaczne.' },
          { label: '$x > 0$ i $x \\neq 0$',      correct: false, why: 'Drugi warunek powtarza pierwszy, a brakuje wykluczenia $x = 1$.' },

        'Argument logarytmu musi by\u0107 dodatni.',

        'Dodatkowo: podstawa $\\neq 1$ (bo $1^a = 1$ dla ka\u017Cdego $a$ — logarytm by\u0142by wieloznaczny).',
      ],
      solvedMsg: 'Trzy warunki dziedziny logarytmu: argument $> 0$, podstawa $> 0$, podstawa $\\neq 1$. Warto zapisywać je na marginesie już na początku każdego zadania logarytmicznego.',
      predictAfter: {
        question: 'Dla $\\log_{x-2} 16 = 4$, jakie $x$?',
        options: [
          { label: '$x = 4$',         correct: true,  why: 'Podstawa wynosi $x - 2 = 2$ i $2^4 = 16$. Dziedzina wymaga $x > 2$ oraz $x \\neq 3$ — oba warunki są spełnione.' },
          { label: '$x = 3$',         correct: false, why: 'Podstawa wynosiłaby $x - 2 = 1$, co jest niedozwolone — trzecia bramka dziedziny odrzuca tę wartość.' },
          { label: '$x = 0$',         correct: false, why: 'Podstawa wyszłaby ujemna ($-2$), co wyklucza już pierwsza bramka dziedziny.' },
          { label: 'Nie ma rozwi\u0105zania', correct: false, why: 'Rozwiązanie istnieje — to $x = 4$.' },
        ],
      },
      draw() {
        clearCanvas();
        drawHeader('log_x 9 = 2', 'Trzy warunki na podstaw\u0119/argument logarytmu');

        // Three mini-gates representing the three domain conditions.
        const gy = 80, gh = 130;
        const totalW = W - 40;
        const gw = (totalW - 20) / 3;
        drawMiniGate(ctx, { x: 20,             y: gy, w: gw, h: gh, label: 'argument > 0',     passed: true, t: now() });
        drawMiniGate(ctx, { x: 20 + gw + 10,   y: gy, w: gw, h: gh, label: 'podstawa > 0',    passed: true, t: now() });
        drawMiniGate(ctx, { x: 20 + 2*(gw+10), y: gy, w: gw, h: gh, label: 'podstawa \u2260 1', passed: true, t: now() });

        // Single candidate flowing through all three.
        ctx.save();
        ctx.font = 'bold 12px monospace';
        ctx.fillStyle = '#83C167';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';
        // Arrow bar
        ctx.strokeStyle = 'rgba(131,193,103,0.4)';
        ctx.lineWidth = 1.5;
        ctx.setLineDash([4, 4]);
        ctx.beginPath();
        ctx.moveTo(40, gy + gh + 26);
        ctx.lineTo(W - 40, gy + gh + 26);
        ctx.stroke();
        ctx.setLineDash([]);
        ctx.fillText('x = 3   \u2713 spe\u0142nia wszystkie trzy warunki (dla log\u2083 9 = 2)', W/2, gy + gh + 40);

        ctx.font = '11px monospace';
        ctx.fillStyle = 'rgba(255,255,255,0.5)';
        ctx.fillText('Ka\u017Cdy logarytm musi przej\u015B\u0107 przez wszystkie trzy bramki.', W/2, gy + gh + 60);
        ctx.restore();
      },

  initWarsztat({
    canvasId: 'cv',
    challenges,

    wrapup: 'Dwie zasady do zapamiętania na maturze: (1) najpierw dziedzina, dopiero potem algebra — dla każdego logarytmu warto zapisać warunki na argument i podstawę; (2) każde rozwiązanie wyznaczone algebraicznie musi przejść przez bramkę dziedziny, inaczej pozostaje rozwiązaniem pozornym.',
  });
}
